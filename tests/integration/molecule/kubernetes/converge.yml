---
# Molecule converge: Kubernetes (kind) integration test.
# Tests kustomization generation and kind cluster management.
#
# NOTE: Requires kind and kubectl installed.

- name: Kubernetes integration test
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _test_dir: "{{ molecule_ephemeral_directory }}/k8s-test"
    canasta_root: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | default(playbook_dir + '/../../../..', true) }}"

  tasks:
    - name: Check kind is available
      ansible.builtin.command:
        cmd: "kind --version"
      register: _kind_check
      changed_when: false
      ignore_errors: true

    - name: Skip if kind not available
      ansible.builtin.meta: end_play
      when: _kind_check.rc != 0

    - name: Create test instance directory
      ansible.builtin.file:
        path: "{{ _test_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - config/settings/global
        - config/settings/wikis/main
        - kubernetes
        - extensions
        - skins
        - images

    - name: Create test .env
      ansible.builtin.copy:
        content: |
          HTTP_PORT=80
          HTTPS_PORT=443
          MYSQL_PASSWORD=testpass
          MW_SITE_SERVER=https://localhost
          MW_SITE_FQDN=localhost
          CANASTA_ENABLE_VARNISH=true
          CANASTA_ENABLE_OBSERVABILITY=false
          CANASTA_ENABLE_ELASTICSEARCH=false
        dest: "{{ _test_dir }}/.env"
        mode: "0644"

    - name: Create test wikis.yaml
      ansible.builtin.copy:
        content: |
          wikis:
            - id: main
              url: localhost
              name: "Test Wiki"
        dest: "{{ _test_dir }}/config/wikis.yaml"
        mode: "0644"

    - name: Create test my.cnf
      ansible.builtin.copy:
        content: "[client]\n"
        dest: "{{ _test_dir }}/my.cnf"
        mode: "0644"

    - name: Create test Caddyfile files
      ansible.builtin.copy:
        content: "# test"
        dest: "{{ _test_dir }}/config/{{ item }}"
        mode: "0644"
      loop:
        - Caddyfile
        - Caddyfile.site
        - Caddyfile.global
        - default.vcl

    - name: Copy K8s manifests
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../../roles/orchestrator/files/kubernetes/"
        dest: "{{ _test_dir }}/kubernetes/"
        mode: "0644"

    - name: Set instance facts for kustomization generation
      ansible.builtin.set_fact:
        instance_path: "{{ _test_dir }}"
        instance_id: "k8s-test"
        instance_orchestrator: "kubernetes"
        instance_managed_cluster: true

    - name: Generate kustomization.yaml
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: generate_kustomization.yml

    - name: Verify kustomization.yaml was created
      ansible.builtin.stat:
        path: "{{ _test_dir }}/kustomization.yaml"
      register: _kust_file

    - name: Assert kustomization exists
      ansible.builtin.assert:
        that: _kust_file.stat.exists
        fail_msg: "kustomization.yaml was not created"

    - name: Read kustomization.yaml
      ansible.builtin.slurp:
        src: "{{ _test_dir }}/kustomization.yaml"
      register: _kust_content

    - name: Verify kustomization content
      ansible.builtin.assert:
        that:
          - "'namespace:' in (_kust_content.content | b64decode)"
          - "'kubernetes/web.yaml' in (_kust_content.content | b64decode)"
          - "'kubernetes/db.yaml' in (_kust_content.content | b64decode)"
          - "'kubernetes/caddy.yaml' in (_kust_content.content | b64decode)"
          - "'kubernetes/varnish.yaml' in (_kust_content.content | b64decode)"
          - "'NodePort' in (_kust_content.content | b64decode)"
        fail_msg: "kustomization.yaml content is incorrect"
