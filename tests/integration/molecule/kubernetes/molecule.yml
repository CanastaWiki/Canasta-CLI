---
# Molecule scenario for Kubernetes (kind) integration tests.
#
# Prerequisites:
#   - Docker installed and running
#   - kind installed: https://kind.sigs.k8s.io/docs/user/quick-start/
#   - kubectl installed
#
# Run: molecule test -s kubernetes
#
# NOTE: This scenario creates and destroys a real kind cluster.
# It should NOT run in CI unless kind is available.

dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: localhost
    managed: false
provisioner:
  name: ansible
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
            ansible_python_interpreter: "{{ ansible_playbook_python }}"
  config_options:
    defaults:
      gathering: explicit
      roles_path: ../../../../roles
      library: ../../../../roles/common/library:../../../../roles/extensions_skins/library:../../../../roles/backup/library
      callback_plugins: ../../../../callback_plugins
      deprecation_warnings: false
verifier:
  name: ansible
