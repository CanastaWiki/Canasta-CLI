---
# Molecule scenario for Kubernetes (kind) integration tests.
#
# Prerequisites:
#   - Docker installed and running
#   - kind installed: https://kind.sigs.k8s.io/docs/user/quick-start/
#   - kubectl installed
#
# Run: molecule test -s kubernetes

dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: localhost
    managed: false
provisioner:
  name: ansible
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
            ansible_python_interpreter: "{{ ansible_playbook_python }}"
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles"
    ANSIBLE_LIBRARY: "${MOLECULE_PROJECT_DIRECTORY}/roles/common/library:${MOLECULE_PROJECT_DIRECTORY}/roles/extensions_skins/library:${MOLECULE_PROJECT_DIRECTORY}/roles/backup/library"
    ANSIBLE_CALLBACK_PLUGINS: "${MOLECULE_PROJECT_DIRECTORY}/callback_plugins"
  config_options:
    defaults:
      gathering: explicit
      deprecation_warnings: false
verifier:
  name: ansible
