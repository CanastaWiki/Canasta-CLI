---
# Full lifecycle integration test: create -> verify -> stop -> start -> delete.
# Requires Docker daemon running.
#
# Run from repo root: molecule test -s lifecycle
# Or: cd tests/integration && molecule test -s lifecycle

dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: localhost
    managed: false
provisioner:
  name: ansible
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
            ansible_python_interpreter: "{{ ansible_playbook_python }}"
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles"
    ANSIBLE_LIBRARY: "${MOLECULE_PROJECT_DIRECTORY}/roles/common/library:${MOLECULE_PROJECT_DIRECTORY}/roles/extensions_skins/library:${MOLECULE_PROJECT_DIRECTORY}/roles/backup/library"
    ANSIBLE_CALLBACK_PLUGINS: "${MOLECULE_PROJECT_DIRECTORY}/callback_plugins"
    CANASTA_CONFIG_DIR: "${MOLECULE_EPHEMERAL_DIRECTORY}/canasta-config"
  config_options:
    defaults:
      gathering: explicit
      deprecation_warnings: false
scenario:
  test_sequence:
    - dependency
    - syntax
    - converge
    - verify
verifier:
  name: ansible
