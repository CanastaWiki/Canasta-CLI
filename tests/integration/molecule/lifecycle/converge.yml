---
# Full lifecycle integration test.
# Mirrors Go CLI's TestLifecycle_CreateStartStopDelete.
#
# Requires: Docker daemon running, ports 10080/10443 available.

- name: Lifecycle integration test
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    test_id: "mol-lifecycle"
    test_wiki: "main"
    test_http_port: "10080"
    test_https_port: "10443"
    test_work_dir: "{{ molecule_ephemeral_directory }}"
    canasta_root: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | default(playbook_dir + '/../../../..', true) }}"
    playbook_root: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | default(playbook_dir + '/../../../..', true) }}"

  tasks:
    - name: Check Docker is available
      ansible.builtin.command:
        cmd: "docker info"
      changed_when: false
      register: _docker_check
      ignore_errors: true

    - name: Skip if Docker not available
      ansible.builtin.meta: end_play
      when: _docker_check.rc != 0

    - name: Load command definitions
      ansible.builtin.include_vars:
        file: "{{ playbook_root }}/meta/command_definitions.yml"
        name: canasta_commands

    # --- CREATE ---
    - name: Create instance
      vars:
        id: "{{ test_id }}"
        wiki: "{{ test_wiki }}"
        path: "{{ test_work_dir }}"
        domain_name: "localhost"
        orchestrator: "compose"
        instance_orchestrator: "compose"
        instance_managed_cluster: false
        instance_devmode: false
      block:
        - name: Set instance facts
          ansible.builtin.set_fact:
            instance_orchestrator: "compose"
            instance_managed_cluster: false
            instance_devmode: false

        - name: Run create role
          ansible.builtin.include_role:
            name: create
          vars:
            canasta_default_image: "ghcr.io/canastawiki/canasta:latest"

    - name: Override ports for testing (CADDY_AUTO_HTTPS=off)
      canasta_env:
        path: "{{ test_work_dir }}/{{ test_id }}/.env"
        state: set
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - { key: "HTTP_PORT", value: "{{ test_http_port }}" }
        - { key: "HTTPS_PORT", value: "{{ test_https_port }}" }
        - { key: "CADDY_AUTO_HTTPS", value: "off" }

    # --- VERIFY RUNNING ---
    - name: Set instance facts for lifecycle commands
      ansible.builtin.set_fact:
        instance_id: "{{ test_id }}"
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        instance_orchestrator: "compose"
        instance_devmode: false
        instance_managed_cluster: false

    - name: Restart with test ports
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: stop.yml

    - name: Regenerate Caddyfile with test ports
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: rewrite_caddy.yml

    - name: Start with test ports
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: start.yml

    - name: Wait for wiki to become ready (up to 5 minutes)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ test_http_port }}/w/api.php?action=query&meta=siteinfo&format=json"
        return_content: true
        status_code: [200, 403]
      register: _wiki_check
      until: _wiki_check.status in [200, 403]
      retries: 60
      delay: 5
      ignore_errors: true

    - name: Verify wiki is accessible
      ansible.builtin.assert:
        that: _wiki_check.status in [200, 403]
        fail_msg: "Wiki did not become ready within 5 minutes. Status: {{ _wiki_check.status | default('timeout') }}"

    # --- STOP ---
    - name: Stop instance
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: stop.yml

    - name: Verify containers stopped
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: check_running.yml

    - name: Assert not running
      ansible.builtin.assert:
        that: not (_container_running | bool)
        fail_msg: "Containers should be stopped"

    # --- START ---
    - name: Start instance again
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: start.yml

    - name: Wait for wiki after restart
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ test_http_port }}/w/api.php?action=query&meta=siteinfo&format=json"
        return_content: true
        status_code: [200, 403]
      register: _wiki_restart_check
      until: _wiki_restart_check.status in [200, 403]
      retries: 60
      delay: 5
      ignore_errors: true

    - name: Verify wiki accessible after restart
      ansible.builtin.assert:
        that: _wiki_restart_check.status in [200, 403]
        fail_msg: "Wiki not accessible after restart"

    # --- EXPORT DATABASE ---
    - name: Read DB password for export
      canasta_env:
        path: "{{ test_work_dir }}/{{ test_id }}/.env"
        state: read
        key: MYSQL_PASSWORD
      register: _test_dbpass
      no_log: true

    - name: Export wiki database (dump inside container)
      ansible.builtin.shell:
        cmd: |
          docker compose exec -T db \
            /bin/bash -c \
            "mariadb-dump -u root -p\$MYSQL_ROOT_PASSWORD \
            {{ test_wiki }} > /tmp/{{ test_wiki }}.sql"
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Copy dump from container to host
      ansible.builtin.command:
        cmd: >-
          docker compose cp
          db:/tmp/{{ test_wiki }}.sql
          {{ test_work_dir }}/{{ test_wiki }}_export.sql
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Verify export file exists
      ansible.builtin.stat:
        path: "{{ test_work_dir }}/{{ test_wiki }}_export.sql"
      register: _export_stat

    - name: Assert export file created
      ansible.builtin.assert:
        that:
          - _export_stat.stat.exists
          - _export_stat.stat.size > 0
        fail_msg: "Export file not created or empty"

    # --- CONFIG GET/SET ---
    - name: Read MW_SITE_SERVER from config
      canasta_env:
        path: "{{ test_work_dir }}/{{ test_id }}/.env"
        state: read
        key: MW_SITE_SERVER
      register: _config_server

    - name: Verify MW_SITE_SERVER is set
      ansible.builtin.assert:
        that: _config_server.found
        fail_msg: "MW_SITE_SERVER not found in .env"

    - name: Set a custom config value
      canasta_env:
        path: "{{ test_work_dir }}/{{ test_id }}/.env"
        state: set
        key: PHP_UPLOAD_MAX_FILESIZE
        value: "50M"

    - name: Read back custom config value
      canasta_env:
        path: "{{ test_work_dir }}/{{ test_id }}/.env"
        state: read
        key: PHP_UPLOAD_MAX_FILESIZE
      register: _config_upload

    - name: Assert config value was set
      ansible.builtin.assert:
        that: _config_upload.value == '50M'
        fail_msg: >-
          Config set failed.
          Expected 50M, got {{ _config_upload.value }}

    # --- EXTENSION ENABLE/DISABLE ---
    - name: Read current extensions settings
      canasta_settings_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        item_type: extensions
        state: read
      register: _ext_before

    - name: Enable an extension in settings
      canasta_settings_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        item_type: extensions
        state: enable
        names: ["ParserFunctions"]

    - name: Verify extension enabled
      canasta_settings_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        item_type: extensions
        state: read
      register: _ext_after

    - name: Assert ParserFunctions enabled
      ansible.builtin.assert:
        that: "'ParserFunctions' in _ext_after['items']"
        fail_msg: "ParserFunctions not in enabled extensions"

    - name: Disable the extension
      canasta_settings_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        item_type: extensions
        state: disable
        names: ["ParserFunctions"]

    - name: Verify extension disabled
      canasta_settings_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        item_type: extensions
        state: read
      register: _ext_final

    - name: Assert ParserFunctions disabled
      ansible.builtin.assert:
        that: "'ParserFunctions' not in _ext_final['items']"
        fail_msg: "ParserFunctions still enabled after disable"

    # --- WIKI MANAGEMENT ---
    - name: Read wikis before add
      canasta_wikis_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        state: read
      register: _wikis_before

    - name: Assert single wiki
      ansible.builtin.assert:
        that: _wikis_before.wiki_ids | length == 1
        fail_msg: "Expected 1 wiki, got {{ _wikis_before.wiki_ids }}"

    - name: Add second wiki to wikis.yaml
      canasta_wikis_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        state: add
        wiki_id: "docs"
        domain: "localhost"
        wiki_path: "docs"
        site_name: "Documentation"

    - name: Verify second wiki added
      canasta_wikis_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        state: read
      register: _wikis_after

    - name: Assert two wikis
      ansible.builtin.assert:
        that:
          - _wikis_after.wiki_ids | length == 2
          - "'docs' in _wikis_after.wiki_ids"
        fail_msg: "Expected 2 wikis with 'docs'"

    - name: Remove second wiki
      canasta_wikis_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        state: remove
        wiki_id: "docs"

    - name: Verify wiki removed
      canasta_wikis_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        state: read
      register: _wikis_final

    - name: Assert back to single wiki
      ansible.builtin.assert:
        that: _wikis_final.wiki_ids | length == 1
        fail_msg: "Expected 1 wiki after remove"

    # --- IMPORT DATABASE ---
    - name: Add second wiki for import test
      canasta_wikis_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        state: add
        wiki_id: "importtest"
        domain: "localhost"
        wiki_path: "importtest"
        site_name: "Import Test"

    - name: Create database for import test
      ansible.builtin.shell:
        cmd: |
          docker compose exec -T db \
            /bin/bash -c \
            "mysql -u root -p\$MYSQL_ROOT_PASSWORD \
            -e 'CREATE DATABASE IF NOT EXISTS importtest'"
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Copy export file into container
      ansible.builtin.command:
        cmd: >-
          docker compose cp
          {{ test_work_dir }}/{{ test_wiki }}_export.sql
          db:/tmp/import.sql
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Import SQL dump into importtest wiki
      ansible.builtin.shell:
        cmd: |
          docker compose exec -T db \
            /bin/bash -c \
            "mysql -u root -p\$MYSQL_ROOT_PASSWORD \
            importtest < /tmp/import.sql"
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Verify original wiki still accessible after import
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ test_http_port }}/w/api.php
          ?action=query&meta=siteinfo&format=json
        return_content: true
        status_code: [200, 403]
      register: _post_import_check
      until: _post_import_check.status in [200, 403]
      retries: 36
      delay: 5
      ignore_errors: true

    - name: Assert wiki accessible after import
      ansible.builtin.assert:
        that: _post_import_check.status in [200, 403]
        fail_msg: "Wiki not accessible after import"

    - name: Remove import test wiki
      canasta_wikis_yaml:
        instance_path: "{{ test_work_dir }}/{{ test_id }}"
        state: remove
        wiki_id: "importtest"

    - name: Clean up export file
      ansible.builtin.file:
        path: "{{ test_work_dir }}/{{ test_wiki }}_export.sql"
        state: absent

    # --- UPGRADE (migration test) ---
    - name: Read current .env
      ansible.builtin.slurp:
        src: "{{ test_work_dir }}/{{ test_id }}/.env"
      register: _pre_upgrade_env

    - name: Remove CANASTA_IMAGE from .env (simulate pre-migration)
      ansible.builtin.copy:
        content: >-
          {{ (_pre_upgrade_env.content | b64decode).split('\n')
             | reject('match', '^CANASTA_IMAGE=')
             | join('\n') }}
        dest: "{{ test_work_dir }}/{{ test_id }}/.env"
        mode: "0644"

    - name: Verify CANASTA_IMAGE removed
      canasta_env:
        path: "{{ test_work_dir }}/{{ test_id }}/.env"
        state: read
        key: CANASTA_IMAGE
      register: _img_before

    - name: Assert CANASTA_IMAGE not in .env
      ansible.builtin.assert:
        that: not _img_before.found
        fail_msg: "CANASTA_IMAGE should have been removed"

    - name: Run backfill_canasta_image migration
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/upgrade/tasks/migrations/backfill_canasta_image.yml

    - name: Verify CANASTA_IMAGE backfilled
      canasta_env:
        path: "{{ test_work_dir }}/{{ test_id }}/.env"
        state: read
        key: CANASTA_IMAGE
      register: _img_after

    - name: Assert CANASTA_IMAGE restored
      ansible.builtin.assert:
        that:
          - _img_after.found
          - _img_after.value != ''
        fail_msg: >-
          CANASTA_IMAGE not backfilled.
          Value: {{ _img_after.value | default('empty') }}

    - name: Verify wiki still accessible after migration
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ test_http_port }}/w/api.php
          ?action=query&meta=siteinfo&format=json
        return_content: true
        status_code: [200, 403]
      register: _post_upgrade_check
      until: _post_upgrade_check.status in [200, 403]
      retries: 36
      delay: 5
      ignore_errors: true

    - name: Assert wiki accessible after upgrade
      ansible.builtin.assert:
        that: _post_upgrade_check.status in [200, 403]
        fail_msg: "Wiki not accessible after upgrade migration"

    # --- BACKUP / RESTORE ---
    - name: Create backup repository directory
      ansible.builtin.file:
        path: "{{ test_work_dir }}/backup-repo"
        state: directory
        mode: "0755"

    - name: Set restic config (no restart)
      canasta_env:
        path: "{{ test_work_dir }}/{{ test_id }}/.env"
        state: set
        key: "{{ item.key }}"
        value: "{{ item.value }}"
      loop:
        - key: RESTIC_REPOSITORY
          value: "/backup-repo"
        - key: RESTIC_PASSWORD
          value: "testpass"
      no_log: true

    - name: Mount backup repo into container
      ansible.builtin.shell:
        cmd: >-
          docker compose exec -T web /bin/bash -c
          "mkdir -p /backup-repo" &&
          docker compose cp
          {{ test_work_dir }}/backup-repo
          web:/backup-repo
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Initialize backup repository
      ansible.builtin.shell:
        cmd: >-
          docker compose exec -T
          -e RESTIC_REPOSITORY=/backup-repo
          -e RESTIC_PASSWORD=testpass
          web restic init
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Create backup snapshot
      ansible.builtin.shell:
        cmd: >-
          docker compose exec -T
          -e RESTIC_REPOSITORY=/backup-repo
          -e RESTIC_PASSWORD=testpass
          web restic backup
          --tag test-snapshot
          /mediawiki/config
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: List backup snapshots
      ansible.builtin.shell:
        cmd: >-
          docker compose exec -T
          -e RESTIC_REPOSITORY=/backup-repo
          -e RESTIC_PASSWORD=testpass
          web restic snapshots
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      register: _backup_list
      changed_when: false

    - name: Verify snapshot exists
      ansible.builtin.assert:
        that: "'test-snapshot' in _backup_list.stdout"
        fail_msg: >-
          Backup snapshot not found.
          Output: {{ _backup_list.stdout }}

    - name: Simulate data loss (drop main database)
      ansible.builtin.shell:
        cmd: |
          docker compose exec -T db \
            /bin/bash -c \
            "mysql -u root -p\$MYSQL_ROOT_PASSWORD \
            -e 'DROP DATABASE IF EXISTS main; \
            CREATE DATABASE main;'"
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Extract snapshot ID
      ansible.builtin.set_fact:
        _snapshot_id: >-
          {{ _backup_list.stdout_lines
             | select('search', 'test-snapshot')
             | first | split() | first }}

    - name: Restore from backup
      ansible.builtin.shell:
        cmd: >-
          docker compose exec -T
          -e RESTIC_REPOSITORY=/backup-repo
          -e RESTIC_PASSWORD=testpass
          web restic restore {{ _snapshot_id }}
          --target /
        chdir: "{{ test_work_dir }}/{{ test_id }}"
      changed_when: true

    - name: Wait for wiki after restore
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ test_http_port }}/w/api.php
          ?action=query&meta=siteinfo&format=json
        return_content: true
        status_code: [200, 403]
      register: _post_restore_check
      until: _post_restore_check.status in [200, 403]
      retries: 36
      delay: 5
      ignore_errors: true

    - name: Assert wiki accessible after restore
      ansible.builtin.assert:
        that: _post_restore_check.status in [200, 403]
        fail_msg: "Wiki not accessible after backup restore"

    # --- GITOPS ---
    - name: Check git-crypt available
      ansible.builtin.command:
        cmd: git-crypt --version
      register: _gitcrypt_check
      changed_when: false
      ignore_errors: true

    - name: Run gitops tests
      when: _gitcrypt_check.rc == 0
      block:
        - name: Create bare git repository for gitops
          ansible.builtin.command:
            cmd: "git init --bare {{ test_work_dir }}/gitops-remote.git"
          changed_when: true

        - name: Initialize gitops
          ansible.builtin.command:
            cmd: >-
              git init -b main
            chdir: "{{ test_work_dir }}/{{ test_id }}"
          changed_when: true

        - name: Initialize git-crypt
          ansible.builtin.command:
            cmd: "git-crypt init"
            chdir: "{{ test_work_dir }}/{{ test_id }}"
          changed_when: true

        - name: Export git-crypt key
          ansible.builtin.command:
            cmd: >-
              git-crypt export-key
              {{ test_work_dir }}/gitops-test.key
            chdir: "{{ test_work_dir }}/{{ test_id }}"
          changed_when: true

        - name: Verify key file created
          ansible.builtin.stat:
            path: "{{ test_work_dir }}/gitops-test.key"
          register: _gitops_key

        - name: Assert key file exists
          ansible.builtin.assert:
            that: _gitops_key.stat.exists
            fail_msg: "git-crypt key not exported"

        - name: Write .gitignore
          ansible.builtin.copy:
            src: >-
              {{ canasta_root }}/roles/gitops/files/gitignore.default
            dest: >-
              {{ test_work_dir }}/{{ test_id }}/.gitignore
            mode: "0644"

        - name: Write .gitattributes
          ansible.builtin.copy:
            src: >-
              {{ canasta_root }}/roles/gitops/files/gitattributes.default
            dest: >-
              {{ test_work_dir }}/{{ test_id }}/.gitattributes
            mode: "0644"

        - name: Create .gitops-host file
          ansible.builtin.copy:
            content: "testhost"
            dest: >-
              {{ test_work_dir }}/{{ test_id }}/.gitops-host
            mode: "0644"

        - name: Add remote and make initial commit
          ansible.builtin.shell:
            cmd: >-
              git add -A &&
              git commit -m "Initial gitops configuration" &&
              git remote add origin
              {{ test_work_dir }}/gitops-remote.git &&
              git push -u origin main
            chdir: "{{ test_work_dir }}/{{ test_id }}"
          changed_when: true

        - name: Verify initial commit in bare repo
          ansible.builtin.command:
            cmd: >-
              git log --oneline -1
            chdir: "{{ test_work_dir }}/gitops-remote.git"
          register: _gitops_log
          changed_when: false

        - name: Assert initial commit exists
          ansible.builtin.assert:
            that: >-
              'Initial gitops' in _gitops_log.stdout
            fail_msg: >-
              Initial commit not found.
              Got: {{ _gitops_log.stdout }}

        - name: Create test settings file
          ansible.builtin.copy:
            content: |
              <?php
              // Gitops integration test
              $wgTestSetting = true;
            dest: >-
              {{ test_work_dir }}/{{ test_id }}/config/settings/global/GitopsTest.php
            mode: "0644"

        - name: Stage and push test file
          ansible.builtin.shell:
            cmd: >-
              git add -A &&
              git commit -m "Add test settings file" &&
              git push
            chdir: "{{ test_work_dir }}/{{ test_id }}"
          changed_when: true

        - name: Verify push in bare repo
          ansible.builtin.command:
            cmd: "git log --oneline -1"
            chdir: "{{ test_work_dir }}/gitops-remote.git"
          register: _gitops_push_log
          changed_when: false

        - name: Assert push committed
          ansible.builtin.assert:
            that: >-
              'test settings' in _gitops_push_log.stdout
            fail_msg: >-
              Push commit not found.
              Got: {{ _gitops_push_log.stdout }}

        - name: Verify file in bare repo
          ansible.builtin.command:
            cmd: >-
              git show HEAD:config/settings/global/GitopsTest.php
            chdir: "{{ test_work_dir }}/gitops-remote.git"
          register: _gitops_file
          changed_when: false

        - name: Assert file content correct
          ansible.builtin.assert:
            that: "'wgTestSetting' in _gitops_file.stdout"
            fail_msg: "File content not correct in repo"

    - name: Skip gitops (git-crypt not available)
      ansible.builtin.debug:
        msg: "Skipping gitops tests (git-crypt not installed)"
      when: _gitcrypt_check.rc != 0

    # --- LIST ---
    - name: List instances
      canasta_registry:
        state: query_all

      register: _list_result

    - name: Verify instance in list
      ansible.builtin.assert:
        that: test_id in _list_result.instances
        fail_msg: "Instance not found in registry"

    # --- DELETE ---
    - name: Destroy containers
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: destroy.yml

    - name: Remove instance directory
      ansible.builtin.file:
        path: "{{ test_work_dir }}/{{ test_id }}"
        state: absent

    - name: Deregister instance
      canasta_registry:
        id: "{{ test_id }}"
        state: absent


    - name: Verify instance removed from registry
      canasta_registry:
        state: query_all

      register: _post_delete

    - name: Assert instance deleted
      ansible.builtin.assert:
        that: test_id not in _post_delete.instances
        fail_msg: "Instance still in registry after delete"

    - name: Report success
      ansible.builtin.debug:
        msg: >-
          All tests passed: create -> verify -> stop ->
          start -> export -> config -> extensions -> wikis ->
          import -> upgrade -> backup/restore ->
          gitops -> list -> delete
