---
# canasta create - Create a new Canasta instance.

- name: Validate wiki ID
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/validate_wiki_id.yml"
  when: wiki is defined and wiki != ''

- name: Create Canasta instance
  block:
    - name: Run create role
      ansible.builtin.include_role:
        name: create
  rescue:
    - name: Clean up on failure (destroy Compose containers)
      ansible.builtin.command:
        cmd: "docker compose down -v"
        chdir: "{{ instance_path | default(omit) }}"
      when:
        - instance_path is defined
        - not (keep_config | default(false) | bool)
        - (orchestrator | default('compose')) == 'compose'
      ignore_errors: true

    - name: Clean up on failure (uninstall Helm release)
      ansible.builtin.command:
        cmd: "helm uninstall canasta-{{ id }} -n canasta-{{ id }}"
      when:
        - not (keep_config | default(false) | bool)
        - (orchestrator | default('compose')) in ['kubernetes', 'k8s']
      ignore_errors: true

    - name: Clean up on failure (delete K8s namespace)
      ansible.builtin.command:
        cmd: "kubectl delete namespace canasta-{{ id }} --ignore-not-found"
      when:
        - not (keep_config | default(false) | bool)
        - (orchestrator | default('compose')) in ['kubernetes', 'k8s']
      ignore_errors: true

    - name: Clean up on failure (remove directory)
      ansible.builtin.file:
        path: "{{ instance_path }}"
        state: absent
      when:
        - instance_path is defined
        - not (keep_config | default(false) | bool)
      ignore_errors: true

    - name: Deregister instance on failure
      canasta_registry:
        id: "{{ id }}"
        state: absent
      delegate_to: localhost
      ignore_errors: true

    - name: Report failure
      ansible.builtin.fail:
        msg: "Instance creation failed.{{ (keep_config | default(false) | bool) | ternary(' Config files kept.', ' Files cleaned up.') }}"
