---
# canasta host remove - Remove a host entry from the user hosts.yml.

- name: Resolve config directory
  ansible.builtin.include_tasks: _resolve_config_dir.yml

- name: Read existing hosts.yml
  ansible.builtin.slurp:
    src: "{{ _config_dir }}/hosts.yml"
  register: _existing_hosts
  ignore_errors: true
  delegate_to: localhost

- name: Fail if hosts.yml does not exist
  ansible.builtin.fail:
    msg: "No hosts.yml found at {{ _config_dir }}/hosts.yml"
  when: _existing_hosts is failed

- name: Parse existing hosts
  ansible.builtin.set_fact:
    _hosts_data: "{{ _existing_hosts.content | b64decode | from_yaml }}"

- name: Fail if host not found
  ansible.builtin.fail:
    msg: "Host '{{ host_name }}' not found in {{ _config_dir }}/hosts.yml"
  when: host_name not in (_hosts_data.all.hosts | default({}))

- name: Remove host from structure
  ansible.builtin.set_fact:
    _updated_hosts:
      all:
        hosts: "{{ _hosts_data.all.hosts | dict2items | rejectattr('key', 'equalto', host_name) | list | items2dict }}"

- name: Write updated hosts.yml
  ansible.builtin.copy:
    content: "{{ _updated_hosts | to_nice_yaml(indent=2) }}"
    dest: "{{ _config_dir }}/hosts.yml"
    mode: "0644"
  delegate_to: localhost

- name: Report
  ansible.builtin.debug:
    msg: "Host '{{ host_name }}' removed from {{ _config_dir }}/hosts.yml"
