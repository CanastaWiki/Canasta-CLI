---
# canasta host list - List all host entries from the user hosts.yml.

- name: Resolve config directory
  ansible.builtin.include_tasks: _resolve_config_dir.yml

- name: Read existing hosts.yml
  ansible.builtin.slurp:
    src: "{{ _config_dir }}/hosts.yml"
  register: _existing_hosts
  ignore_errors: true
  delegate_to: localhost

- name: No hosts message
  ansible.builtin.debug:
    msg: "No hosts configured (no file at {{ _config_dir }}/hosts.yml)."
  when: _existing_hosts is failed

- name: Parse hosts
  when: _existing_hosts is succeeded
  block:
    - name: Set hosts fact
      ansible.builtin.set_fact:
        _hosts_entries: >-
          {{ (_existing_hosts.content | b64decode | from_yaml).all.hosts
             | default({}) }}

    - name: Report empty
      ansible.builtin.debug:
        msg: "No hosts configured."
      when: _hosts_entries | length == 0

    - name: Display hosts
      ansible.builtin.debug:
        msg: |
          {% for name, entry in _hosts_entries.items() %}
          {{ name }}
          {% for key, value in entry.items() %}
            {{ key }}: {{ value }}
          {% endfor %}
          {% endfor %}
      when: _hosts_entries | length > 0
