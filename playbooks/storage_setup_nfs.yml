---
# canasta storage setup nfs — Install NFS CSI driver and create StorageClass.
# Optionally install NFS server on the target host.

- name: Validate Kubernetes prerequisites
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: k8s_preflight.yml
  vars:
    instance_id: storage

- name: Install NFS server on target host
  when: install_server | default(false) | bool
  block:
    - name: Install NFS server packages
      ansible.builtin.package:
        name:
          - nfs-kernel-server
        state: present
      become: true

    - name: Create NFS export directory
      ansible.builtin.file:
        path: "{{ share }}"
        state: directory
        mode: "0755"
      become: true

    - name: Configure NFS export
      ansible.builtin.lineinfile:
        path: /etc/exports
        line: "{{ share }} *(rw,sync,no_subtree_check,no_root_squash)"
        create: true
        mode: "0644"
      become: true

    - name: Apply NFS exports
      ansible.builtin.command:
        cmd: exportfs -ra
      become: true
      changed_when: true

    - name: Ensure NFS server is running
      ansible.builtin.service:
        name: nfs-kernel-server
        state: started
        enabled: true
      become: true

    - name: Set NFS server address to target host
      ansible.builtin.set_fact:
        _nfs_server: "{{ ansible_default_ipv4.address | default(inventory_hostname) }}"

- name: Set NFS server from parameter
  ansible.builtin.set_fact:
    _nfs_server: "{{ server }}"
  when: not (install_server | default(false) | bool)

- name: Fail if no server specified
  ansible.builtin.fail:
    msg: "Either --server or --install-server is required."
  when: _nfs_server is not defined or _nfs_server == ''

- name: Add NFS CSI driver Helm repository
  kubernetes.core.helm_repository:
    name: csi-driver-nfs
    repo_url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts

- name: Install NFS CSI driver
  kubernetes.core.helm:
    name: csi-driver-nfs
    chart_ref: csi-driver-nfs/csi-driver-nfs
    release_namespace: kube-system
    create_namespace: false
    wait: true
    timeout: "5m"

- name: Create NFS StorageClass
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: "{{ storage_class_name | default('nfs') }}"
      provisioner: nfs.csi.k8s.io
      parameters:
        server: "{{ _nfs_server }}"
        share: "{{ share }}"
      reclaimPolicy: Retain
      mountOptions:
        - nfsvers=4.1

- name: Save default storage class
  canasta_registry:
    state: set_setting
    setting_key: defaultStorageClass
    setting_value: "{{ storage_class_name | default('nfs') }}"
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

- name: Report setup complete
  ansible.builtin.debug:
    msg:
      - >-
        NFS storage configured. StorageClass
        '{{ storage_class_name | default('nfs') }}' is ready and set
        as the default for new Kubernetes instances.
      - >-
        To run a multi-replica web pod across nodes, also pass
        --access-mode ReadWriteMany when creating the instance:
      - >-
        canasta create -i <id> --orchestrator kubernetes
        --storage-class {{ storage_class_name | default('nfs') }}
        --access-mode ReadWriteMany ...
      - "See docs/multi-node.md for the full walkthrough."
