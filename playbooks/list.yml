---
# canasta list - List all registered Canasta instances.
# Matches Go CLI output format with per-wiki details.

- name: Clean up stale entries
  canasta_registry:
    state: cleanup
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _cleanup_result
  when: cleanup | default(false) | bool

- name: Report cleaned entries
  ansible.builtin.debug:
    msg: >-
      Removed stale entries:
      {{ _cleanup_result.removed | join(', ') }}
  when: >-
    cleanup | default(false) | bool and
    _cleanup_result.removed | default([]) | length > 0

- name: Get all instances
  canasta_registry:
    state: query_all
    filter_host: "{{ target_host | default(omit) }}"
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _all_instances

- name: No instances
  ansible.builtin.debug:
    msg: "No Canasta instances."
  when: _all_instances.instances | length == 0

- name: Build instance list with wiki details
  when: _all_instances.instances | length > 0
  block:
    - name: Build SSH args from config
      ansible.builtin.set_fact:
        _ssh_extra: >-
          {{ lookup('env', 'ANSIBLE_SSH_ARGS')
             | default('-o StrictHostKeyChecking=accept-new', true) }}

    - name: Check instance directories exist
      ansible.builtin.command:
        cmd: >-
          {{ 'ssh ' + _ssh_extra + ' '
             + (item.value.host | default('localhost'))
             + ' test -d ' + (item.value.path | quote)
             if (item.value.host | default('localhost')) != 'localhost'
             else 'test -d ' + (item.value.path | quote) }}
      register: _list_dir_checks
      loop: >-
        {{ _all_instances.instances | dict2items }}
      loop_control:
        label: "{{ item.key }}"
      changed_when: false
      ignore_errors: true

    - name: Build directory existence map
      ansible.builtin.set_fact:
        _dir_exists: "{{ _dir_exists | default({}) | combine({item.item.key: (item.rc == 0)}) }}"
      loop: "{{ _list_dir_checks.results }}"
      loop_control:
        label: "{{ item.item.key | default('?') }}"

    - name: Read wikis for each instance
      ansible.builtin.command:
        cmd: >-
          {{ 'ssh ' + _ssh_extra + ' '
             + (item.value.host | default('localhost'))
             + ' cat ' + (item.value.path | quote) + '/config/wikis.yaml'
             if (item.value.host | default('localhost')) != 'localhost'
             else 'cat ' + (item.value.path | quote) + '/config/wikis.yaml' }}
      register: _list_wikis_raw
      loop: >-
        {{ _all_instances.instances | dict2items }}
      loop_control:
        label: "{{ item.key }}"
      changed_when: false
      ignore_errors: true
      when: (_dir_exists | default({}))[item.key] | default(false)

    - name: Parse wikis from YAML output
      ansible.builtin.set_fact:
        _list_wikis_map: >-
          {{ _list_wikis_map | default({}) | combine({
            item.item.key: (item.stdout | from_yaml).wikis | default([])
          }) }}
      loop: "{{ _list_wikis_raw.results | default([]) }}"
      loop_control:
        label: "{{ item.item.key | default('?') }}"
      when: item is not skipped and item.rc == 0

    - name: Check running status for each instance
      ansible.builtin.command:
        cmd: >-
          {{ 'ssh ' + _ssh_extra + ' '
             + (item.value.host | default('localhost'))
             + ' "cd ' + (item.value.path | quote)
             + ' && docker compose ps -q web"'
             if (item.value.host | default('localhost')) != 'localhost'
             else 'docker compose ps -q web' }}
        chdir: "{{ item.value.path
                   if (item.value.host | default('localhost')) == 'localhost'
                   else omit }}"
      register: _list_running_results
      loop: >-
        {{ _all_instances.instances | dict2items }}
      loop_control:
        label: "{{ item.key }}"
      changed_when: false
      ignore_errors: true
      when:
        - item.value.orchestrator | default('compose') == 'compose'
        - (_dir_exists | default({}))[item.key] | default(false)

    - name: Check K8s running status
      ansible.builtin.command:
        cmd: >-
          kubectl get deployment/canasta-{{ item.key }}-web
          -n canasta-{{ item.key }}
          -o jsonpath={.status.readyReplicas}
      register: _list_k8s_running_results
      loop: >-
        {{ _all_instances.instances | dict2items }}
      loop_control:
        label: "{{ item.key }}"
      changed_when: false
      ignore_errors: true
      when: >-
        item.value.orchestrator | default('compose')
        in ['kubernetes', 'k8s']

    - name: Combine running status results
      ansible.builtin.set_fact:
        _all_running_results: >-
          {{ (_list_running_results.results | default([])
              + _list_k8s_running_results.results | default([]))
             | selectattr('item', 'defined') | list }}

    - name: Build running status map
      vars:
        _is_running: >-
          {{ item.rc == 0
             and item.stdout | default('') | trim | length > 0
             and item.stdout | trim != '0' }}
      ansible.builtin.set_fact:
        _running_map: "{{ _running_map | default({}) | combine({item.item.key: _is_running}) }}"
      loop: "{{ _all_running_results }}"
      loop_control:
        label: "{{ item.item.key | default('?') }}"
      when: item is not skipped

    - name: Compute host column width
      vars:
        # All host strings (default 'localhost'), plus a floor of 16
        _host_lengths: >-
          {{ (_all_instances.instances | dict2items
              | map(attribute='value.host')
              | map('default', 'localhost', true)
              | map('length') | list) + [16] }}
      ansible.builtin.set_fact:
        # +2 for gutter between Host and Instance Path columns
        _host_col_width: "{{ (_host_lengths | max) + 2 }}"

    - name: Display instances
      ansible.builtin.debug:
        msg: |
          {% set hw = _host_col_width | int %}
          {% set ns = namespace(lines=[]) %}
          {% set ns.lines = ns.lines + ["%-16s%-*s%s" % ("Canasta ID", hw, "Host", "Instance Path")] %}
          {% set ns.lines = ns.lines + ["%-16s%-16s%s" % ("", "Orchestrator", "Status")] %}
          {% set ns.lines = ns.lines + ["  %-14s%s" % ("Wiki ID", "Wiki URL")] %}
          {% set ns.lines = ns.lines + ["─" * (16 + hw + 20)] %}
          {% for inst_item in _all_instances.instances | dict2items %}
          {% set inst = inst_item %}
          {% set dir_ok = (_dir_exists | default({}))[inst.key] | default(false) %}
          {% set wikis = (_list_wikis_map | default({}))[inst.key] | default([]) %}
          {% set running = (_running_map | default({}))[inst.key] | default(false) %}
          {% set status = "running" if running else ("not found" if not dir_ok else "stopped") %}
          {% set orch = (inst.value.orchestrator | default('compose')) | upper %}
          {% set host = inst.value.host | default('localhost') %}
          {% set ns.lines = ns.lines + ["%-16s%-*s%s" % (inst.key, hw, host, inst.value.path)] %}
          {% set ns.lines = ns.lines + ["%-16s%-16s%s" % ("", orch, status | upper)] %}
          {% if wikis | length > 0 %}
          {% for w in wikis %}
          {% set url = w.url if '/' in w.url else w.url + '/' %}
          {% set ns.lines = ns.lines + ["  %-14s%s" % (w.id, url)] %}
          {% endfor %}
          {% else %}
          {% set ns.lines = ns.lines + ["  (no wikis)"] %}
          {% endif %}
          {% if not loop.last %}
          {% set ns.lines = ns.lines + [""] %}
          {% endif %}
          {% endfor %}
          {% for line in ns.lines %}
          {{ line }}
          {% endfor %}
