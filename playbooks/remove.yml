---
# canasta remove - Remove a wiki from a Canasta instance.
# Matches Go: cleans images/public_assets inside container, drops DB, removes config.

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Require confirmation
  ansible.builtin.fail:
    msg: "Removing wiki '{{ wiki }}' from instance '{{ instance_id }}'. Use --yes to confirm."
  when: not (yes | default(false) | bool)

- name: Read DB password
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  register: _remove_dbpass
  no_log: true

# Clean up wiki images inside container (owned by www-data on Linux)
- name: Remove wiki images inside container
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "rm -rf /mediawiki/images/{{ wiki | quote }}"
  ignore_errors: true

# Clean up public assets (sitemaps etc.)
- name: Remove wiki public assets
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "rm -rf /mediawiki/public_assets/{{ wiki | quote }}"
  ignore_errors: true

- name: Remove wiki from wikis.yaml
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: remove
    wiki_id: "{{ wiki }}"

- name: Drop wiki database
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: db
    exec_command: "mysql -u root -p{{ _remove_dbpass.value | default('mediawiki') | quote }} -e 'DROP DATABASE IF EXISTS {{ wiki | quote }}'"
  ignore_errors: true

- name: Remove per-wiki settings directory
  ansible.builtin.file:
    path: "{{ instance_path }}/config/settings/wikis/{{ wiki }}"
    state: absent

- name: Remove admin password file
  ansible.builtin.file:
    path: "{{ instance_path }}/admin-password_{{ wiki }}"
    state: absent

- name: Regenerate Caddyfile
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: update_config.yml

- name: Restart instance
  ansible.builtin.include_role:
    name: instance_lifecycle
    tasks_from: restart.yml

- name: Report wiki removed
  ansible.builtin.debug:
    msg: "Wiki '{{ wiki }}' removed from instance '{{ instance_id }}'."
