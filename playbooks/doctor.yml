---
# canasta doctor - Check target host dependencies.
# Verifies all required tools are installed and reports status.

- name: Check dependencies
  ansible.builtin.debug:
    msg: "Checking dependencies on {{ inventory_hostname }}..."

# --- Required for all orchestrators ---
- name: Check Python 3
  ansible.builtin.command:
    cmd: python3 --version
  register: _doc_python
  changed_when: false
  ignore_errors: true  # Checking if installed

- name: Check Docker
  ansible.builtin.command:
    cmd: docker --version
  register: _doc_docker
  changed_when: false
  ignore_errors: true  # Checking if installed

- name: Check Docker Compose
  ansible.builtin.command:
    cmd: docker compose version
  register: _doc_compose
  changed_when: false
  ignore_errors: true  # Checking if installed

- name: Check Docker daemon running
  ansible.builtin.command:
    cmd: docker info
  register: _doc_daemon
  changed_when: false
  ignore_errors: true  # Checking if daemon running

# --- Required for Kubernetes ---
- name: Check kubectl
  ansible.builtin.command:
    cmd: kubectl version --client --output=yaml
  register: _doc_kubectl
  changed_when: false
  ignore_errors: true  # Checking if installed

- name: Check Helm
  ansible.builtin.command:
    cmd: helm version --short
  register: _doc_helm
  changed_when: false
  ignore_errors: true  # Checking if installed

- name: Check k3s
  ansible.builtin.command:
    cmd: k3s --version
  register: _doc_k3s
  changed_when: false
  ignore_errors: true  # Checking if installed

- name: Check Argo CD
  ansible.builtin.command:
    cmd: kubectl get deployment argocd-server -n argocd
  register: _doc_argocd
  changed_when: false
  ignore_errors: true  # Checking if installed

- name: Check cluster reachable
  ansible.builtin.command:
    cmd: kubectl cluster-info
  register: _doc_cluster
  changed_when: false
  ignore_errors: true  # Checking if cluster reachable

# --- Required for GitOps ---
- name: Check git
  ansible.builtin.command:
    cmd: git --version
  register: _doc_git
  changed_when: false
  ignore_errors: true  # Checking if installed

- name: Check git-crypt
  ansible.builtin.command:
    cmd: git-crypt --version
  register: _doc_gitcrypt
  changed_when: false
  ignore_errors: true  # Checking if installed

# --- System resources ---
- name: Check system memory
  ansible.builtin.command:
    cmd: >-
      python3 -c "import os;
      mem = os.sysconf('SC_PAGE_SIZE')
      * os.sysconf('SC_PHYS_PAGES') // (1024**3);
      print(str(mem) + ' GB')"
  register: _doc_memory
  changed_when: false
  ignore_errors: true  # OK if sysconf unavailable

- name: Check disk space
  ansible.builtin.shell:
    cmd: "df -h / | awk 'NR==2{print $4}'"
  register: _doc_disk
  changed_when: false
  ignore_errors: true  # OK if df unavailable

# --- Report ---
- name: Display dependency report
  ansible.builtin.debug:
    msg: |
      Canasta Dependency Check ({{ inventory_hostname }})
      ====================================================

      Core (required):
        Python 3:        {{ (_doc_python.rc == 0) | ternary('OK (' + _doc_python.stdout | trim + ')', 'MISSING') }}
        Docker:          {{ (_doc_docker.rc == 0) | ternary('OK (' + _doc_docker.stdout | trim + ')', 'MISSING') }}
        Docker Compose:  {{ (_doc_compose.rc == 0) | ternary('OK (' + _doc_compose.stdout | trim + ')', 'MISSING') }}
        Docker daemon:   {{ (_doc_daemon.rc == 0) | ternary('OK (running)', 'NOT RUNNING') }}

      Kubernetes (optional):
        kubectl:         {{ (_doc_kubectl.rc == 0) | ternary('OK', 'not installed') }}
        Helm:            {{ (_doc_helm.rc == 0) | ternary('OK (' + _doc_helm.stdout | trim + ')', 'not installed') }}
        k3s:             {{ (_doc_k3s.rc == 0) | ternary('OK', 'not installed') }}
        Cluster:         {{ (_doc_cluster.rc == 0) | ternary('reachable', 'not reachable') }}
        Argo CD:         {{ (_doc_argocd.rc == 0) | ternary('installed', 'not found') }}

      GitOps (optional):
        git:             {{ (_doc_git.rc == 0) | ternary('OK (' + _doc_git.stdout | trim + ')', 'not installed') }}
        git-crypt:       {{ (_doc_gitcrypt.rc == 0) | ternary('OK', 'not installed') }}

      System:
        Memory:          {{ _doc_memory.stdout | default('unknown') | trim }}
        Disk (/ avail):  {{ _doc_disk.stdout | default('unknown') | trim }}

- name: Fail if core dependencies missing
  ansible.builtin.fail:
    msg: >-
      Missing core dependencies:
      {{ (_doc_docker.rc != 0) | ternary('Docker ', '') }}
      {{ (_doc_compose.rc != 0) | ternary('Docker Compose ', '') }}
      {{ (_doc_daemon.rc != 0) | ternary('(Docker not running) ', '') }}
      Install Docker and ensure the daemon is running.
  when: _doc_docker.rc != 0 or _doc_compose.rc != 0 or _doc_daemon.rc != 0
