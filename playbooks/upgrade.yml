---
# canasta upgrade - Upgrade all registered Canasta instances.
# The CLI self-update (git pull on the install dir) happens in
# canasta.py before this playbook runs — see canasta.self_update_cli.
# That keeps the running ansible-playbook process from holding a
# stale ansible.cfg / module_utils path in memory across a pull
# (#489).

# --- Upgrade instances ---
- name: Get all instances
  canasta_registry:
    state: query_all
    filter_host: "{{ target_host | default(omit) }}"
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _upgrade_instances

- name: Report dry run
  ansible.builtin.debug:
    msg: >-
      Dry run - would upgrade
      {{ _upgrade_instances.instances | length }} instance(s):
      {{ _upgrade_instances.instances.keys() | list | join(', ') }}
  when: dry_run | default(false) | bool

- name: Upgrade each instance
  when: not (dry_run | default(false) | bool)
  block:
    - name: Upgrade instances
      ansible.builtin.include_tasks: _upgrade_single.yml
      loop: "{{ _upgrade_instances.instances | dict2items }}"
      loop_control:
        loop_var: _inst
        label: "{{ _inst.key }}"

    - name: Report upgrade complete
      ansible.builtin.debug:
        msg: "Upgraded {{ _upgrade_instances.instances | length }} instance(s)."
