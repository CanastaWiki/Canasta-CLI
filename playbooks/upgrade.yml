---
# canasta upgrade - Upgrade all registered Canasta instances.
# Auto-checks for playbook updates first (matching Go CLI's self-update behavior),
# then upgrades all instances.

# --- Auto-check for playbook updates ---
- name: Check for playbook updates
  ansible.builtin.include_tasks: self_update.yml

# --- Upgrade instances ---
- name: Get all instances
  canasta_registry:
    state: query_all
    filter_host: "{{ target_host | default(omit) }}"
  delegate_to: localhost
  register: _upgrade_instances

- name: Report dry run
  ansible.builtin.debug:
    msg: "Dry run - would upgrade {{ _upgrade_instances.instances | length }} instance(s): {{ _upgrade_instances.instances.keys() | list | join(', ') }}"
  when: dry_run | default(false) | bool

- name: Upgrade each instance
  when: not (dry_run | default(false) | bool)
  block:
    - name: Upgrade instances
      ansible.builtin.include_tasks: _upgrade_single.yml
      loop: "{{ _upgrade_instances.instances | dict2items }}"
      loop_control:
        loop_var: _inst
        label: "{{ _inst.key }}"

    - name: Report upgrade complete
      ansible.builtin.debug:
        msg: "Upgraded {{ _upgrade_instances.instances | length }} instance(s)."
