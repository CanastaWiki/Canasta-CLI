---
# canasta export - Export a wiki's database.
# Uses container temp file + copy to host (matching Go behavior).

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Read DB password from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  register: _export_dbpass
  no_log: true

- name: Set DB password with fallback
  ansible.builtin.set_fact:
    _export_db_password: "{{ _export_dbpass.value | default('mediawiki') }}"
  no_log: true

- name: Set output file
  ansible.builtin.set_fact:
    _export_file: "{{ file | default(wiki + '.sql') }}"

- name: Check if gzip requested
  ansible.builtin.set_fact:
    _export_gzip: "{{ _export_file | regex_search('\\.gz$') is not none }}"

- name: Dump database to temp file in container
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: db
    exec_no_log: true
    exec_command: >-
      mariadb-dump -u root
      -p{{ _export_db_password | quote }}
      {{ wiki | quote }}
      > /tmp/{{ wiki | quote }}.sql
  no_log: true

- name: Compress dump if gzip requested
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: db
    exec_command: "gzip -f /tmp/{{ wiki }}.sql"
  when: _export_gzip | bool

- name: Set container temp file path
  ansible.builtin.set_fact:
    _container_file: "/tmp/{{ wiki }}.sql{{ (_export_gzip | bool) | ternary('.gz', '') }}"

- name: Copy dump from container to host (Compose)
  ansible.builtin.command:
    cmd: "docker compose cp {{ ('db:' + _container_file) | quote }} {{ _export_file | quote }}"
    chdir: "{{ instance_path }}"
  changed_when: true
  when: instance_orchestrator | default('compose') == 'compose'

- name: Copy dump from container to host (Kubernetes)
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Get DB pod name
      ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/k8s_get_pod.yml"
      vars:
        _k8s_namespace: "canasta-{{ instance_id }}"
        _k8s_component: db

    - name: Copy dump via kubectl cp
      ansible.builtin.command:
        cmd: "kubectl cp canasta-{{ instance_id }}/{{ _k8s_pod_name }}:{{ _container_file }} {{ _export_file }}"
      changed_when: true

- name: Clean up temp files in container
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: db
    exec_command: "rm -f /tmp/{{ wiki }}.sql /tmp/{{ wiki }}.sql.gz"

- name: Report export complete
  ansible.builtin.debug:
    msg: "Wiki '{{ wiki }}' exported to {{ _export_file }}"
