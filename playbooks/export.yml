---
# canasta export - Export a wiki's database.
# Uses container temp file + docker compose cp (matching Go behavior).

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/common/tasks/resolve_instance.yml"

- name: Read DB password from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  register: _export_dbpass
  no_log: true

- name: Set output file
  ansible.builtin.set_fact:
    _export_file: "{{ file | default(wiki + '.sql') }}"

- name: Check if gzip requested
  ansible.builtin.set_fact:
    _export_gzip: "{{ _export_file | regex_search('\\.gz$') is not none }}"

- name: Dump database to temp file in container
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: db
    exec_command: "mariadb-dump -u root -p{{ _export_dbpass.value }} {{ wiki }} > /tmp/{{ wiki }}.sql"
  no_log: true

- name: Compress dump if gzip requested
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: db
    exec_command: "gzip -f /tmp/{{ wiki }}.sql"
  when: _export_gzip | bool

- name: Set container temp file path
  ansible.builtin.set_fact:
    _container_file: "/tmp/{{ wiki }}.sql{{ (_export_gzip | bool) | ternary('.gz', '') }}"

- name: Copy dump from container to host
  ansible.builtin.command:
    cmd: "docker compose cp db:{{ _container_file }} {{ _export_file }}"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Clean up temp files in container
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: db
    exec_command: "rm -f /tmp/{{ wiki }}.sql /tmp/{{ wiki }}.sql.gz"

- name: Report export complete
  ansible.builtin.debug:
    msg: "Wiki '{{ wiki }}' exported to {{ _export_file }}"
