---
# canasta export - Export a wiki's database.

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/common/tasks/resolve_instance.yml"

- name: Read DB password from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  register: _export_dbpass
  no_log: true

- name: Set output file
  ansible.builtin.set_fact:
    _export_file: "{{ file | default(wiki + '.sql') }}"

- name: Check if gzip requested
  ansible.builtin.set_fact:
    _export_gzip: "{{ _export_file | regex_search('\\.gz$') is not none }}"

- name: Export database (plain SQL)
  when: not (_export_gzip | bool)
  block:
    - name: Dump database
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: exec.yml
      vars:
        exec_service: db
        exec_command: "mysqldump -u root -p{{ _export_dbpass.value }} {{ wiki }}"

    - name: Write dump to file
      ansible.builtin.copy:
        content: "{{ exec_result.stdout }}"
        dest: "{{ _export_file }}"
        mode: "0644"

- name: Export database (gzipped)
  when: _export_gzip | bool
  block:
    - name: Dump and compress in container
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: exec.yml
      vars:
        exec_service: db
        exec_command: "mysqldump -u root -p{{ _export_dbpass.value }} {{ wiki }} | gzip > /tmp/export.sql.gz"

    - name: Copy dump from container
      ansible.builtin.command:
        cmd: "docker compose cp db:/tmp/export.sql.gz {{ _export_file }}"
        chdir: "{{ instance_path }}"
      changed_when: true

    - name: Clean up temp file
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: exec.yml
      vars:
        exec_service: db
        exec_command: "rm -f /tmp/export.sql.gz"

- name: Report export complete
  ansible.builtin.debug:
    msg: "Wiki '{{ wiki }}' exported to {{ _export_file }}"
