---
# canasta clone - Clone a Canasta instance to another host with a new ID/domain.
# Source instance continues running. New instance gets independent database copy.

- name: Require confirmation
  ansible.builtin.fail:
    msg: >-
      Cloning instance '{{ id }}' from {{ from }} to {{ to }} as '{{ new_id }}'
      with domain '{{ new_domain }}'.
      Use --yes to confirm.
  when: not (yes | default(false) | bool)

- name: Validate new instance ID
  canasta_farmsettings:
    validate: instance_id
    value: "{{ new_id }}"

- name: Check new ID doesn't already exist
  canasta_registry:
    id: "{{ new_id }}"
    state: query
  delegate_to: localhost
  register: _clone_existing
  ignore_errors: true

- name: Fail if new ID already exists
  ansible.builtin.fail:
    msg: "Instance '{{ new_id }}' already exists at {{ _clone_existing.instance.path }}"
  when: _clone_existing is succeeded

- name: Look up source instance
  canasta_registry:
    id: "{{ id }}"
    state: query
  delegate_to: localhost
  register: _clone_source

- name: Set transfer facts
  ansible.builtin.set_fact:
    _source_host: "{{ from }}"
    _source_id: "{{ id }}"
    _source_instance_path: "{{ _clone_source.instance.path }}"
    _dest_host: "{{ to }}"
    _dest_id: "{{ new_id }}"
    _dest_instance_path: "{{ _clone_source.instance.path | dirname }}/{{ new_id }}"
    _dest_orchestrator: "{{ _clone_source.instance.orchestrator | default('compose') }}"
    _dest_domain: "{{ new_domain }}"

# --- Dump databases (source stays running) ---
- name: Dump databases on source
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/transfer/tasks/dump_databases.yml"

# --- Sync to destination ---
- name: Sync instance to destination
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/transfer/tasks/sync_to_dest.yml"

# --- Import on destination with new ID/domain ---
- name: Set up and start on destination
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/transfer/tasks/import_on_dest.yml"

# --- Clone backup schedule ---
- name: Clone backup schedule to destination
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/transfer/tasks/clone_backup_schedule.yml"

# --- Clean up transfer directory on source ---
- name: Clean up transfer directory on source
  ansible.builtin.file:
    path: "{{ _source_instance_path }}/transfer"
    state: absent
  delegate_to: "{{ _source_host }}"

- name: Report clone complete
  ansible.builtin.debug:
    msg: "Instance '{{ id }}' cloned to '{{ new_id }}' on {{ to }} with domain '{{ new_domain }}'."
