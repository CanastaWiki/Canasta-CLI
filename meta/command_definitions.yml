---
# Command definitions for Canasta-Ansible.
# Single source of truth for command dispatch, parameter validation, and documentation generation.
#
# Parameter types:
#   string   - Free-form text
#   path     - Filesystem path
#   bool     - True/false flag (default: false)
#   choice   - One of a fixed set of values (see 'choices')
#   integer  - Whole number
#
# Special fields:
#   required          - Parameter must be provided
#   required_unless   - Required unless the named parameter is provided
#   sensitive         - Value is a secret (auto-generated if omitted, no_log in Ansible)
#   mutual_exclusion  - Cannot be combined with the named parameter
#   positional        - Accepted as positional argument(s), not a flag

global_flags:
  - name: host
    short: H
    type: string
    description: "Target host (default: localhost)"
  - name: verbose
    short: v
    type: bool
    default: false
    description: "Enable verbose output"

commands:
  # ---------------------------------------------------------------------------
  # Instance lifecycle
  # ---------------------------------------------------------------------------
  - name: create
    description: "Create a new Canasta instance"
    long_description: |
      Create a new Canasta MediaWiki instance. Generates configuration files,
      starts the containers, and runs the MediaWiki installer.
    examples:
      - "canasta create -i mysite -w main -n example.com"
      - "canasta create -i mysite -w main -d /path/to/dump.sql"
    playbook: create.yml
    parameters:
      - name: path
        short: p
        type: path
        default: "."
        description: "Canasta installation directory"
      - name: orchestrator
        short: o
        type: choice
        choices: [compose, kubernetes, k8s]
        default: compose
        description: "Container orchestrator (k8s is an alias for kubernetes)"
      - name: id
        short: i
        type: string
        required: true
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required_unless: yamlfile
        description: "ID of the wiki"
      - name: site_name
        short: t
        type: string
        description: "Display name of the wiki (defaults to wiki ID)"
      - name: domain_name
        short: n
        type: string
        default: localhost
        description: "Domain name"
      - name: admin
        short: a
        type: string
        default: WikiSysop
        description: "Initial wiki admin username"
      - name: password
        short: s
        type: string
        sensitive: true
        description: "Initial wiki admin password (auto-generated if not provided)"
      - name: yamlfile
        short: f
        type: path
        description: "Initial wikis.yaml file"
      - name: keep_config
        short: k
        type: bool
        default: false
        description: "Keep config files on failure"
      - name: override
        short: r
        type: path
        description: "File to copy to docker-compose.override.yml (Compose only)"
      - name: rootdbpass
        type: string
        sensitive: true
        description: "Root database password (auto-generated if not provided)"
      - name: wikidbuser
        type: string
        default: root
        description: "Wiki database username"
      - name: wikidbpass
        type: string
        sensitive: true
        description: "Wiki database password (auto-generated if not provided)"
      - name: envfile
        short: e
        type: path
        description: "Path to .env file with password overrides"
      - name: canasta_image
        type: string
        mutual_exclusion: build_from
        description: "Custom Canasta image reference"
      - name: build_from
        type: path
        mutual_exclusion: canasta_image
        description: "Build from local source directory"
      - name: database
        short: d
        type: path
        description: "Path to existing database dump (.sql or .sql.gz)"
      - name: wiki_settings
        short: l
        type: path
        description: "Path to per-wiki Settings.php"
      - name: global_settings
        short: g
        type: path
        description: "Path to global settings file"
      - name: composer
        type: path
        description: "Path to custom composer.local.json"
      - name: registry
        type: string
        default: "localhost:5000"
        orchestrator_only: kubernetes
        description: "Container registry for pushing locally built images"
      - name: install_k3s
        long: install-k8s
        type: bool
        default: false
        orchestrator_only: kubernetes
        description: "Install Kubernetes (kubectl, helm, k3s) on the target host"
      - name: skip_argocd_install
        type: bool
        default: false
        orchestrator_only: kubernetes
        description: "Skip Argo CD installation (assume already present)"
      - name: argocd_namespace
        type: string
        default: argocd
        orchestrator_only: kubernetes
        description: "Namespace for Argo CD"
      - name: ingress_class
        type: string
        orchestrator_only: kubernetes
        description: "Kubernetes ingress class name (e.g. nginx, traefik, alb)"
      - name: storage_class
        type: string
        orchestrator_only: kubernetes
        description: "Kubernetes storage class for shared volumes (e.g. nfs, efs)"
      - name: access_mode
        type: string
        orchestrator_only: kubernetes
        description: >-
          Access mode for content PVCs (ReadWriteOnce or
          ReadWriteMany). Use ReadWriteMany with an RWM-capable
          storage class for multi-node multi-replica web pods.
      - name: tls_email
        type: string
        orchestrator_only: kubernetes
        description: "Email for Let's Encrypt certificate notifications (optional)"
      - name: skip_tls
        type: bool
        default: false
        description: "Skip automatic Let's Encrypt TLS setup"

  - name: delete
    description: "Delete a Canasta instance"
    long_description: |
      Permanently delete a Canasta instance, removing containers, volumes,
      and configuration files. If run without --id from an instance directory,
      the instance is resolved by matching the current directory against the
      registry.
    examples:
      - "canasta delete -i mysite -y"
      - "cd /path/to/instance && canasta delete -y"
    playbook: delete.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: "yes"
        short: "y"
        type: bool
        default: false
        description: "Skip confirmation prompt"

  - name: start
    description: "Start a Canasta instance"
    long_description: "Start Docker containers for a Canasta instance."
    examples:
      - "canasta start -i mysite"
    playbook: start.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: stop
    description: "Stop a Canasta instance"
    long_description: "Stop Docker containers for a Canasta instance."
    examples:
      - "canasta stop -i mysite"
    playbook: stop.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: restart
    description: "Restart a Canasta instance"
    long_description: "Restart Docker containers for a Canasta instance."
    examples:
      - "canasta restart -i mysite"
    playbook: restart.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: list
    description: "List all registered Canasta instances"
    long_description: "Display all Canasta instances in the local registry."
    examples:
      - "canasta list"
      - "canasta list --cleanup"
    playbook: list.yml
    parameters:
      - name: cleanup
        type: bool
        default: false
        description: "Remove stale entries whose directories no longer exist"

  - name: version
    description: "Display version information"
    long_description: "Show Canasta-Ansible version."
    examples:
      - "canasta version"
    playbook: version.yml
    parameters: []

  - name: doctor
    description: "Check target host dependencies"
    long_description: |
      Verify that all required tools (Docker, Docker Compose, etc.)
      are installed on the target host. Reports status of optional
      tools (kubectl, kind, git, git-crypt, rsync) and system
      resources (memory, disk space).
    examples:
      - "canasta doctor"
      - "canasta --host prod1.example.com doctor"
    playbook: doctor.yml
    parameters: []

  - name: install
    description: "Install dependencies on the target host"
    long_description: |
      Install one or more dependencies on the target host. Supported
      packages: docker, k3s, git-crypt. Multiple packages can be
      specified in a single command.
    examples:
      - "canasta install docker"
      - "canasta install k3s"
      - "canasta install docker git-crypt"
      - "canasta --host prod1.example.com install docker"
    playbook: install.yml
    parameters:
      - name: packages
        type: string
        positional: true
        multi: true
        required: true
        description: "Dependencies to install (docker, k3s, git-crypt)"

  - name: upgrade
    description: "Upgrade Canasta instances"
    long_description: |
      Upgrade all registered Canasta instances by refreshing configs,
      pulling latest images, running migrations, and restarting containers.
    examples:
      - "canasta upgrade"
      - "canasta upgrade --dry-run"
    playbook: upgrade.yml
    parameters:
      - name: dry_run
        type: bool
        default: false
        description: "Preview changes without applying"

  # ---------------------------------------------------------------------------
  # Wiki management
  # ---------------------------------------------------------------------------
  - name: add
    description: "Add a wiki to an existing Canasta instance"
    long_description: |
      Add a new wiki to an existing Canasta instance (wiki farm).
    examples:
      - "canasta add -i mysite -w docs -u localhost/docs"
    playbook: add.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required: true
        description: "ID of the wiki"
      - name: url
        short: u
        type: string
        required: true
        description: "Domain/path for the wiki (e.g. localhost/docs)"
      - name: site_name
        short: t
        type: string
        description: "Display name of the wiki"
      - name: database
        short: d
        type: path
        description: "Path to existing database dump"
      - name: wiki_settings
        short: l
        type: path
        description: "Path to per-wiki Settings.php"
      - name: admin
        short: a
        type: string
        description: "Initial wiki admin username"
      - name: password
        short: s
        type: string
        sensitive: true
        description: "Initial wiki admin password"
      - name: wikidbuser
        type: string
        description: "Wiki database username"

  - name: remove
    description: "Remove a wiki from a Canasta instance"
    long_description: |
      Remove a wiki from a Canasta instance. Drops the wiki database
      and removes per-wiki configuration.
    examples:
      - "canasta remove -i mysite -w docs -y"
    playbook: remove.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required: true
        description: "ID of the wiki to remove"
      - name: "yes"
        short: "y"
        type: bool
        default: false
        description: "Skip confirmation prompt"

  - name: import
    description: "Import a database into a wiki"
    long_description: |
      Import a SQL dump into an existing wiki's database.
    examples:
      - "canasta import -i mysite -w main -d dump.sql"
    playbook: import.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required: true
        description: "ID of the wiki to import into"
      - name: database
        short: d
        type: path
        required: true
        description: "Path to SQL dump file (.sql or .sql.gz)"
      - name: wiki_settings
        short: l
        type: path
        description: "Path to per-wiki Settings.php to replace"

  - name: export
    description: "Export a wiki's database"
    long_description: |
      Export a wiki's database as a SQL dump file.
    examples:
      - "canasta export -i mysite -w main"
      - "canasta export -i mysite -w main -f backup.sql.gz"
    playbook: export.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required: true
        description: "ID of the wiki to export"
      - name: file
        short: f
        type: path
        description: "Output file path (default: <wikiID>.sql, use .gz for compression)"

  # ---------------------------------------------------------------------------
  # Config management
  # ---------------------------------------------------------------------------
  - name: config_get
    description: "Show configuration settings"
    long_description: |
      Show configuration settings from the instance .env file.
      With no --key, prints all settings. With --key, prints
      just that value.
    examples:
      - "canasta config get -i mysite"
      - "canasta config get -i mysite --key MW_SITE_SERVER"
    playbook: config_get.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: key
        short: k
        type: string
        description: "Configuration key to query"
      - name: force
        short: f
        type: bool
        default: false
        description: "Allow querying unrecognized keys"

  - name: config_set
    description: "Change configuration values"
    long_description: |
      Change one or more configuration values in the instance .env file.
      Handles side effects automatically (e.g. updating wikis.yaml when
      changing HTTPS_PORT).
    examples:
      - "canasta config set -i mysite MW_SITE_SERVER=https://example.com"
    playbook: config_set.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: settings
        type: string
        positional: true
        multi: true
        description: "KEY=VALUE pairs to set"
      - name: no_restart
        type: bool
        default: false
        description: "Save settings without restarting the instance"
      - name: force
        short: f
        type: bool
        default: false
        description: "Allow setting unrecognized keys"

  - name: config_regenerate
    description: "Regenerate rendered config files (e.g. Caddyfile) from current sources"
    long_description: |
      Re-render the orchestrator's config files from the current .env
      and wikis.yaml. Useful after 'canasta backup restore' (which
      overwrites rendered files with the source host's copies) or
      after any manual edit that left rendered state drifted from the
      canonical sources.
    examples:
      - "canasta config regenerate -i mysite"
    playbook: config_regenerate.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: config_unset
    description: "Remove configuration keys"
    long_description: |
      Remove one or more configuration keys from the instance .env file.
    examples:
      - "canasta config unset -i mysite MW_SITE_SERVER"
    playbook: config_unset.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: keys
        type: string
        positional: true
        multi: true
        description: "Configuration keys to remove"
      - name: no_restart
        type: bool
        default: false
        description: "Remove settings without restarting the instance"
      - name: force
        short: f
        type: bool
        default: false
        description: "Allow unsetting unrecognized keys"

  # ---------------------------------------------------------------------------
  # Extensions
  # ---------------------------------------------------------------------------
  - name: extension_list
    description: "List installed extensions"
    long_description: "List all extensions available in the Canasta instance."
    examples:
      - "canasta extension list -i mysite"
    playbook: extension_list.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"

  - name: extension_enable
    description: "Enable extensions"
    long_description: |
      Enable one or more MediaWiki extensions. Runs update.php by default.
    examples:
      - "canasta extension enable -i mysite VisualEditor,Cite"
    playbook: extension_enable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"
      - name: extensions
        type: string
        positional: true
        required: true
        description: "Comma-separated extension names"
      - name: skip_update
        type: bool
        default: false
        description: "Skip running update.php after enabling"

  - name: extension_disable
    description: "Disable extensions"
    long_description: "Disable one or more MediaWiki extensions."
    examples:
      - "canasta extension disable -i mysite VisualEditor"
    playbook: extension_disable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"
      - name: extensions
        type: string
        positional: true
        required: true
        description: "Comma-separated extension names"

  # ---------------------------------------------------------------------------
  # Skins
  # ---------------------------------------------------------------------------
  - name: skin_list
    description: "List installed skins"
    long_description: "List all skins available in the Canasta instance."
    examples:
      - "canasta skin list -i mysite"
    playbook: skin_list.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"

  - name: skin_enable
    description: "Enable skins"
    long_description: |
      Enable one or more MediaWiki skins. Runs update.php by default.
    examples:
      - "canasta skin enable -i mysite Timeless"
    playbook: skin_enable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"
      - name: skins
        type: string
        positional: true
        required: true
        description: "Comma-separated skin names"
      - name: skip_update
        type: bool
        default: false
        description: "Skip running update.php after enabling"

  - name: skin_disable
    description: "Disable skins"
    long_description: "Disable one or more MediaWiki skins."
    examples:
      - "canasta skin disable -i mysite Timeless"
    playbook: skin_disable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"
      - name: skins
        type: string
        positional: true
        required: true
        description: "Comma-separated skin names"

  # ---------------------------------------------------------------------------
  # Maintenance
  # ---------------------------------------------------------------------------
  - name: maintenance_update
    description: "Run MediaWiki maintenance update"
    long_description: |
      Run standard MediaWiki maintenance: update.php, runJobs.php,
      and Semantic MediaWiki rebuildData.php.
    examples:
      - "canasta maintenance update -i mysite"
      - "canasta maintenance update -i mysite -w mywiki --skip-jobs"
    playbook: maintenance_update.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID to run on (default: all wikis)"
      - name: skip_jobs
        type: bool
        default: false
        description: "Skip running runJobs.php"
      - name: skip_smw
        type: bool
        default: false
        description: "Skip running Semantic MediaWiki rebuildData.php"

  - name: maintenance_script
    description: "Run a MediaWiki maintenance script"
    long_description: "Run an arbitrary MediaWiki core maintenance script."
    examples:
      - "canasta maintenance script -i mysite -- rebuildall.php"
    playbook: maintenance_script.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID to run script on"
      - name: script_args
        type: string
        positional: true
        description: "Maintenance script name and arguments"

  - name: maintenance_extension
    description: "Run extension maintenance scripts"
    long_description: "Run extension-specific maintenance scripts."
    examples:
      - "canasta maintenance extension -i mysite"
    playbook: maintenance_extension.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID"
      - name: script_args
        type: string
        positional: true
        description: "Extension maintenance script and arguments"

  - name: maintenance_exec
    description: "Execute a command in a container"
    long_description: |
      Execute an arbitrary command inside a container of a Canasta instance.

      With no arguments and no --service flag, lists the running services.
      The default service is "web" (the MediaWiki container).
    examples:
      - "canasta maintenance exec -i mysite -- ls /var/www/mediawiki"
      - "canasta maintenance exec -i mysite -s db -- mariadb-admin ping -h localhost"
    playbook: maintenance_exec.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: service
        short: s
        type: string
        description: "Service name (default: web)"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID"
      - name: exec_args
        type: string
        positional: true
        description: "Command and arguments to execute"

  # ---------------------------------------------------------------------------
  # DevMode
  # ---------------------------------------------------------------------------
  - name: devmode_enable
    description: "Enable development mode"
    long_description: |
      Enable development mode on a Canasta instance. Extracts MediaWiki code
      for live editing and builds an Xdebug-enabled image. Docker Compose only.
    examples:
      - "canasta devmode enable -i mysite"
    playbook: devmode_enable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: devmode_disable
    description: "Disable development mode"
    long_description: |
      Disable development mode. Restores extensions and skins as real
      directories and removes Xdebug.
    examples:
      - "canasta devmode disable -i mysite"
    playbook: devmode_disable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  # ---------------------------------------------------------------------------
  # Sitemap
  # ---------------------------------------------------------------------------
  - name: sitemap_generate
    description: "Generate XML sitemaps"
    long_description: "Generate XML sitemaps for one or all wikis."
    examples:
      - "canasta sitemap generate -i mysite"
      - "canasta sitemap generate -i mysite -w mywiki"
    playbook: sitemap_generate.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID (omit to generate for all wikis)"

  - name: sitemap_remove
    description: "Remove XML sitemaps"
    long_description: "Remove XML sitemaps for one or all wikis."
    examples:
      - "canasta sitemap remove -i mysite"
    playbook: sitemap_remove.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID (omit to remove for all wikis)"

  # ---------------------------------------------------------------------------
  # Backup
  # ---------------------------------------------------------------------------
  - name: backup_init
    description: "Initialize a backup repository"
    long_description: "Initialize a new Restic backup repository for a Canasta instance."
    examples:
      - "canasta backup init -i mysite"
    playbook: backup_init.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_list
    description: "List backup snapshots"
    long_description: "List all snapshots in the backup repository."
    examples:
      - "canasta backup list -i mysite"
    playbook: backup_list.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_create
    description: "Create a backup"
    long_description: |
      Create a backup snapshot. Dumps all wiki databases, stages
      config/extensions/images/skins, and uploads to the repository.
    examples:
      - "canasta backup create -i mysite -t before-upgrade"
    playbook: backup_create.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: tag
        short: t
        type: string
        required: true
        description: "Backup tag"

  - name: backup_restore
    description: "Restore from a backup"
    long_description: "Restore a Canasta instance from a backup snapshot."
    examples:
      - "canasta backup restore -i mysite -s abc123"
    playbook: backup_restore.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: snapshot
        short: s
        type: string
        required: true
        description: "Snapshot ID"
      - name: skip_safety_backup
        type: bool
        default: false
        description: "Skip taking a safety snapshot before restore"
      - name: wiki
        short: w
        type: string
        description: "Restore only this wiki's database and per-wiki files"

  - name: backup_delete
    description: "Delete a backup snapshot"
    long_description: "Delete a specific snapshot from the backup repository."
    examples:
      - "canasta backup delete -i mysite -s abc123"
    playbook: backup_delete.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: snapshot
        short: s
        type: string
        required: true
        description: "Snapshot ID to delete"

  - name: backup_unlock
    description: "Unlock the backup repository"
    long_description: "Unlock a backup repository (needed if a previous backup was interrupted)."
    examples:
      - "canasta backup unlock -i mysite"
    playbook: backup_unlock.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_files
    description: "List files in a backup snapshot"
    long_description: "List all files contained in a specific backup snapshot."
    examples:
      - "canasta backup files -i mysite -s abc123"
    playbook: backup_files.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: snapshot
        short: s
        type: string
        required: true
        description: "Snapshot ID"

  - name: backup_check
    description: "Verify backup repository integrity"
    long_description: "Verify the integrity of the backup repository."
    examples:
      - "canasta backup check -i mysite"
    playbook: backup_check.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_diff
    description: "Compare two backup snapshots"
    long_description: "Show the differences between two backup snapshots."
    examples:
      - "canasta backup diff -i mysite -s snap1 --snapshot2 snap2"
    playbook: backup_diff.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: snapshot
        short: s
        type: string
        required: true
        description: "First snapshot ID"
      - name: snapshot2
        type: string
        required: true
        description: "Second snapshot ID"

  - name: backup_purge
    description: "Purge old backups"
    long_description: "Remove old backups based on retention policies."
    examples:
      - "canasta backup purge -i mysite --keep-last 5"
      - "canasta backup purge -i mysite --older-than 30d"
    playbook: backup_purge.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: keep_last
        type: string
        description: "Number of most recent backups to keep"
      - name: keep_hourly
        type: string
        description: "Number of hourly backups to keep"
      - name: keep_daily
        type: string
        description: "Number of daily backups to keep"
      - name: keep_monthly
        type: string
        description: "Number of monthly backups to keep"
      - name: older_than
        type: string
        description: "Purge backups older than this (e.g. 30d, 6m)"

  - name: backup_schedule_set
    description: "Set a backup schedule"
    long_description: "Set a recurring backup schedule using a cron expression."
    examples:
      - "canasta backup schedule set -i mysite '0 2 * * *'"
    playbook: backup_schedule_set.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: cron_expression
        type: string
        positional: true
        required: true
        description: "Cron expression for the schedule"
      - name: purge_older_than
        type: string
        description: "Purge backups older than this on each scheduled run"

  - name: backup_schedule_list
    description: "Show the backup schedule"
    long_description: "Show the current backup schedule for a Canasta instance."
    examples:
      - "canasta backup schedule list -i mysite"
    playbook: backup_schedule_list.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_schedule_remove
    description: "Remove the backup schedule"
    long_description: "Remove the scheduled backup for a Canasta instance."
    examples:
      - "canasta backup schedule remove -i mysite"
    playbook: backup_schedule_remove.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  # ---------------------------------------------------------------------------
  # GitOps
  # ---------------------------------------------------------------------------
  - name: gitops_init
    description: "Initialize git-based configuration management"
    long_description: |
      Bootstrap git-based configuration management. Converts extensions
      and skins to submodules and pushes to a remote repository.
    examples:
      - "canasta gitops init -i mysite -n prod --repo git@github.com:org/config.git --key /tmp/gc.key"
    playbook: gitops_init.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: host_name
        short: n
        long: name
        type: string
        required: true
        description: "Name for this host in hosts.yaml"
      - name: role
        type: choice
        choices: [source, sink, both]
        default: both
        description: "Host role"
      - name: repo
        type: string
        required: true
        description: "Git repository URL"
      - name: key
        type: path
        required: true
        description: "Path to export the git-crypt key"
      - name: force
        type: bool
        default: false
        description: "Force push to non-empty remote"
      - name: pull_requests
        type: bool
        default: false
        description: "Require pull requests instead of pushing to main"
      - name: git_user_name
        type: string
        description: "Git user.name for commits on the target host (set if not already configured)"
      - name: git_user_email
        type: string
        description: "Git user.email for commits on the target host (set if not already configured)"

  - name: gitops_join
    description: "Join an existing gitops repository"
    long_description: "Join an existing git-based configuration repository."
    examples:
      - "canasta gitops join -i mysite -n staging --repo git@github.com:org/config.git --key /tmp/gc.key"
    playbook: gitops_join.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: host_name
        short: n
        long: name
        type: string
        required: true
        description: "Name for this host"
      - name: repo
        type: string
        required: true
        description: "Git repository URL"
      - name: key
        type: path
        required: true
        description: "Path to git-crypt key"
      - name: git_user_name
        type: string
        description: "Git user.name for commits on the target host (set if not already configured)"
      - name: git_user_email
        type: string
        description: "Git user.email for commits on the target host (set if not already configured)"

  - name: gitops_add
    description: "Add configuration changes to git"
    long_description: "Stage configuration changes for the next gitops push."
    examples:
      - "canasta gitops add -i mysite"
    playbook: gitops_add.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_rm
    description: "Remove configuration from git tracking"
    long_description: |
      Remove configuration files from git tracking. If a file path is
      given, delete that file and stage the deletion. Without a path,
      stage all pending deletions (files already deleted from disk).
    examples:
      - "canasta gitops rm -i mysite public_assets/main/.htaccess"
      - "canasta gitops rm -i mysite"
    playbook: gitops_rm.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: path
        type: string
        positional: true
        description: "File path to remove (relative to instance root)"

  - name: gitops_push
    description: "Push configuration changes"
    long_description: "Push configuration changes to the remote gitops repository."
    examples:
      - "canasta gitops push -i mysite"
      - "canasta gitops push -i mysite -m 'Add docs wiki'"
    playbook: gitops_push.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: message
        short: m
        type: string
        description: "Commit message (defaults to 'Configuration update')"

  - name: gitops_pull
    description: "Pull configuration changes"
    long_description: "Pull configuration changes from the remote gitops repository."
    examples:
      - "canasta gitops pull -i mysite"
    playbook: gitops_pull.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_status
    description: "Show gitops status"
    long_description: "Show the git status of the configuration directory."
    examples:
      - "canasta gitops status -i mysite"
    playbook: gitops_status.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_diff
    description: "Show gitops diff"
    long_description: "Show differences in the configuration directory."
    examples:
      - "canasta gitops diff -i mysite"
    playbook: gitops_diff.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_fix_submodules
    description: "Fix gitops submodules"
    long_description: "Fix submodule registration after adding extensions."
    examples:
      - "canasta gitops fix-submodules -i mysite"
    playbook: gitops_fix_submodules.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_sync
    description: "Trigger an immediate Argo CD sync (kubernetes only)"
    long_description: |
      Forces Argo CD to immediately reconcile the cluster state with the Git
      repository, rather than waiting for the next automatic sync interval.
      On Docker Compose instances this command has no effect.
    examples:
      - "canasta gitops sync -i mysite"
    playbook: gitops_sync.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  # ---------------------------------------------------------------------------
  # Storage provisioning (Kubernetes only)
  # ---------------------------------------------------------------------------
  - name: storage_setup_nfs
    description: "Set up NFS shared storage for Kubernetes"
    long_description: |
      Install the NFS CSI driver and create a StorageClass for shared storage
      on Kubernetes clusters. Optionally install an NFS server on the target host.
      After setup, set persistence.*.storageClass in values.yaml to use it.
    examples:
      - "canasta storage setup nfs --server 192.168.1.10 --share /srv/nfs/canasta"
      - "canasta storage setup nfs --install-server --share /srv/nfs/canasta"
    playbook: storage_setup_nfs.yml
    parameters:
      - name: server
        type: string
        description: "NFS server IP or hostname"
      - name: share
        type: string
        required: true
        description: "NFS export path (e.g. /srv/nfs/canasta)"
      - name: install_server
        type: bool
        default: false
        description: "Install NFS server on the target host"
      - name: storage_class_name
        type: string
        default: nfs
        description: "Name for the Kubernetes StorageClass"

  # ---------------------------------------------------------------------------
  # Host management (persistent hosts.yml in user config dir)
  # ---------------------------------------------------------------------------
  - name: host_add
    description: "Add or update a host entry in the persistent hosts.yml"
    long_description: |
      Add or update a host definition in $CANASTA_CONFIG_DIR/hosts.yml.
      Saved hosts can then be targeted by short name with --host.
    examples:
      - "canasta host add --name prod1 --ssh ubuntu@prod1.example.com"
      - "canasta host add --name prod2 --ssh canasta@10.0.0.5 --python /usr/bin/python3"
    playbook: host_add.yml
    parameters:
      - name: host_name
        long: name
        short: n
        type: string
        required: true
        description: "Short name for the host (used with --host)"
      - name: ssh
        type: string
        required: true
        description: "SSH destination (user@host or just host)"
      - name: python
        type: string
        description: "Path to python3 on the remote host"

  - name: host_remove
    description: "Remove a host entry from the persistent hosts.yml"
    examples:
      - "canasta host remove --name prod1"
    playbook: host_remove.yml
    parameters:
      - name: host_name
        long: name
        short: n
        type: string
        required: true
        description: "Short name of the host to remove"

  - name: host_list
    description: "List all host entries from the persistent hosts.yml"
    examples:
      - "canasta host list"
    playbook: host_list.yml
    parameters: []

  - name: storage_setup_efs
    description: "Set up AWS EFS shared storage for Kubernetes"
    long_description: |
      Install the EFS CSI driver and create a StorageClass for shared storage
      on AWS Kubernetes clusters. The EFS filesystem must be created separately
      via AWS console or CLI.
    examples:
      - "canasta storage setup efs --filesystem-id fs-0123456789abcdef0"
    playbook: storage_setup_efs.yml
    parameters:
      - name: filesystem_id
        type: string
        required: true
        description: "AWS EFS filesystem ID (e.g. fs-0123456789abcdef0)"
      - name: storage_class_name
        type: string
        default: efs
        description: "Name for the Kubernetes StorageClass"
