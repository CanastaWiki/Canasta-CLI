---
# Command definitions for the Canasta CLI.
# Single source of truth for command dispatch, parameter validation, and documentation generation.
#
# Parameter types:
#   string   - Free-form text
#   path     - Filesystem path
#   bool     - True/false flag (default: false)
#   choice   - One of a fixed set of values (see 'choices')
#   integer  - Whole number
#
# Special fields:
#   required          - Parameter must be provided
#   required_unless   - Required unless the named parameter is provided
#   sensitive         - Value is a secret (auto-generated if omitted, no_log in Ansible)
#   mutual_exclusion  - Cannot be combined with the named parameter
#   positional        - Accepted as positional argument(s), not a flag

global_flags:
  # --help/-h is provided automatically by argparse on every parser;
  # listed here so wiki_publish.py renders it in the Global Flags
  # section of every command page. No argparse wiring reads this entry.
  - name: help
    short: h
    type: bool
    default: false
    description: "Show help message and exit"
  - name: verbose
    short: v
    type: bool
    default: false
    description: "Enable verbose output"

commands:
  # ---------------------------------------------------------------------------
  # Instance lifecycle
  # ---------------------------------------------------------------------------
  - name: create
    description: "Create a new Canasta instance"
    long_description: |
      Create a new Canasta MediaWiki instance. Generates configuration files,
      starts the containers, and runs the MediaWiki installer.
    examples:
      - "canasta create -i mysite -w main -n example.com"
      - "canasta create -i mysite -w main -d /path/to/dump.sql"
    playbook: create.yml
    parameters:
      - name: host
        short: H
        type: string
        description: "Target host for the new instance (default: localhost)"
      - name: path
        short: p
        type: path
        default: "."
        description: "Canasta installation directory"
      - name: orchestrator
        short: o
        type: choice
        choices: [compose, kubernetes, k8s]
        default: compose
        description: "Container orchestrator (k8s is an alias for kubernetes)"
      - name: id
        short: i
        type: string
        required: true
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required_unless: yamlfile
        description: "ID of the wiki"
      - name: site_name
        short: t
        type: string
        description: "Display name of the wiki (defaults to wiki ID)"
      - name: domain_name
        short: n
        type: string
        default: localhost
        description: "Domain name"
      - name: admin
        short: a
        type: string
        default: WikiSysop
        description: "Initial wiki admin username"
      - name: password
        short: s
        type: string
        sensitive: true
        description: "Initial wiki admin password (auto-generated if not provided)"
      - name: yamlfile
        short: f
        type: path
        description: "Initial wikis.yaml file"
      - name: keep_config
        short: k
        type: bool
        default: false
        description: "Keep config files on failure"
      - name: override
        short: r
        type: path
        orchestrator_only: compose
        description: "File to copy to docker-compose.override.yml"
      - name: rootdbpass
        type: string
        sensitive: true
        description: "Root database password (auto-generated if not provided)"
      - name: wikidbuser
        type: string
        default: root
        description: "Wiki database username"
      - name: wikidbpass
        type: string
        sensitive: true
        description: "Wiki database password (auto-generated if not provided)"
      - name: envfile
        short: e
        type: path
        description: "Path to .env file with password overrides"
      - name: canasta_image
        type: string
        mutual_exclusion: build_from
        description: "Custom Canasta image reference"
      - name: build_from
        type: path
        mutual_exclusion: canasta_image
        description: "Build from local source directory"
      - name: database
        short: d
        type: path
        description: "Path to existing database dump (.sql or .sql.gz)"
      - name: wiki_settings
        short: l
        type: path
        description: "Path to per-wiki Settings.php"
      - name: global_settings
        short: g
        type: path
        description: "Path to global settings file"
      - name: composer
        type: path
        description: "Path to custom composer.local.json"
      - name: registry
        type: string
        default: "localhost:5000"
        orchestrator_only: kubernetes
        description: "Container registry for pushing locally built images"
      - name: skip_argocd_install
        type: bool
        default: false
        orchestrator_only: kubernetes
        description: "Skip Argo CD installation (assume already present)"
      - name: argocd_namespace
        type: string
        default: argocd
        orchestrator_only: kubernetes
        description: "Namespace for Argo CD"
      - name: ingress_class
        type: string
        orchestrator_only: kubernetes
        description: "Kubernetes ingress class name (e.g. nginx, traefik, alb)"
      - name: storage_class
        type: string
        orchestrator_only: kubernetes
        description: "Kubernetes storage class for shared volumes (e.g. nfs, efs)"
      - name: access_mode
        type: string
        orchestrator_only: kubernetes
        description: >-
          Access mode for content PVCs (ReadWriteOnce or
          ReadWriteMany). Use ReadWriteMany with an RWM-capable
          storage class for multi-node multi-replica web pods.
      - name: tls_email
        type: string
        orchestrator_only: kubernetes
        description: "Email for Let's Encrypt certificate notifications"
      - name: skip_tls
        type: bool
        default: false
        description: "Skip automatic Let's Encrypt TLS setup"
      - name: staging_certs
        type: bool
        default: false
        description: "Use Let's Encrypt staging CA (untrusted by browsers, but avoids rate limits while testing)"

  - name: delete
    description: "Delete a Canasta instance"
    long_description: |
      Permanently delete a Canasta instance, removing containers, volumes,
      and configuration files. If run without --id from an instance directory,
      the instance is resolved by matching the current directory against the
      registry.
    examples:
      - "canasta delete -y"
      - "cd /path/to/instance && canasta delete -y"
    playbook: delete.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: "yes"
        short: "y"
        type: bool
        default: false
        description: "Skip confirmation prompt"

  - name: start
    description: "Start a Canasta instance"
    long_description: |
      Start the Docker containers for a Canasta instance. Before
      bringing the stack up, `COMPOSE_PROFILES` in `.env` is
      reconciled from the instance's feature flags so optional
      components start or stay down based on their current setting:

      - `CANASTA_ENABLE_VARNISH` (default `true`) — Varnish cache
      - `CANASTA_ENABLE_OBSERVABILITY` (default `false`) — Prometheus
        and Grafana stack
      - `CANASTA_ENABLE_ELASTICSEARCH` (default `false`) — Elasticsearch

      If the instance has development mode enabled, Xdebug starts
      automatically. Use `canasta devmode enable` or `canasta devmode
      disable` to toggle development mode; use `canasta config set
      <FLAG>=true|false` to adjust the optional components.
    examples:
      - "canasta start"
    playbook: start.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: stop
    description: "Stop a Canasta instance"
    long_description: |
      Stop all Docker containers for a Canasta instance. The
      containers are stopped gracefully, preserving all data in
      Docker volumes.
    examples:
      - "canasta stop"
    direct_only: true
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: restart
    description: "Restart a Canasta instance"
    long_description: |
      Restart a Canasta instance by stopping and then starting all
      Docker containers. Any pending configuration migrations are
      applied during the restart. Use `canasta devmode enable` or
      `canasta devmode disable` to change the development mode
      setting.
    examples:
      - "canasta restart"
    playbook: restart.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: list
    description: "List all registered Canasta instances"
    long_description: |
      Display all Canasta instances in the local registry.

      With --cleanup, remove registry entries for instances whose
      directories are confirmed missing. Entries for hosts that are
      unreachable (DNS failure, SSH refused, etc.) are left alone —
      a transient network problem shouldn't cause entries to be
      silently dropped. Pass --force to remove unreachable entries
      too, or --dry-run to preview without removing anything.
    examples:
      - "canasta list"
      - "canasta list --cleanup"
      - "canasta list --cleanup --dry-run"
      - "canasta list --cleanup --force"
    direct_only: true
    parameters:
      - name: host
        short: H
        type: string
        description: "Filter output by host (default: all hosts)"
      - name: cleanup
        type: bool
        default: false
        description: "Remove stale entries whose directories are confirmed missing"
      - name: force
        short: f
        type: bool
        default: false
        description: "With --cleanup, also remove entries for unreachable hosts"
      - name: dry_run
        type: bool
        default: false
        description: "With --cleanup, print what would be removed without removing"

  - name: version
    description: "Display version information"
    long_description: |
      Always prints the Canasta CLI version and the target
      Canasta version (the image tag this CLI release is built to
      deploy).

      Additional output depends on context:

      - Inside an instance directory: also reports that instance's
        pinned CANASTA_IMAGE tag and running runtime version.
      - Outside any instance directory: lists every registered
        instance with its pinned CANASTA_IMAGE tag (no runtime query;
        fast).
      - With --id: reports full image + running version for the
        named instance (same as inside that instance's directory).
      - With --cli-only: prints only the CLI header; skips all
        instance reads. Intended for scripts that just want the CLI
        version deterministically.
    examples:
      - "canasta version"
      - "canasta version -i mysite"
      - "canasta version --cli-only"
    direct_only: true
    parameters:
      - name: host
        short: H
        type: string
        description: "Filter list-all output by host (default: all hosts)"
      - name: id
        short: i
        type: string
        description: "Report image version for this instance"
      - name: cli_only
        short: c
        type: bool
        default: false
        description: "Print only the CLI version; skip instance queries"

  - name: doctor
    description: "Check target host dependencies"
    long_description: |
      Verify that the target host has the tools required for its
      orchestrator: Docker + Docker Compose for Compose installs,
      or kubectl + Helm for Kubernetes installs. Also reports
      status of optional tools (git, git-crypt, rsync) and system
      resources (memory, disk space).
    examples:
      - "canasta doctor"
      - "canasta doctor --host prod1.example.com"
    playbook: doctor.yml
    parameters:
      - name: host
        short: H
        type: string
        description: "Target host (default: localhost)"

  - name: install
    description: "Install dependencies on the target host"
    long_description: |
      Install one or more dependencies on the target host. Supported
      packages: docker, k8s-cp, git-crypt.

      `k8s-cp` installs k3s as a control-plane node — the cluster's
      API server, scheduler, etc., plus kubectl + helm on the same
      machine. The right install for single-node K8s deployments and
      for the first node of a multi-node cluster.

      For multi-node deployments where the controller (the machine
      running canasta) is a separate machine from the cluster nodes,
      pass `--public-ip <addr>` to add that address to the k3s API
      server's TLS certificate. Without it, the controller's `kubectl`
      fails TLS verification when talking to the cluster over the
      public IP. Repeat `--public-ip` to add more than one (e.g. an IP
      and a hostname).
    examples:
      - "canasta install docker"
      - "canasta install k8s-cp"
      - "canasta install k8s-cp --public-ip 203.0.113.10"
      - "canasta install docker git-crypt"
      - "canasta install docker --host prod1.example.com"
    playbook: install.yml
    parameters:
      - name: host
        short: H
        type: string
        description: "Target host (default: localhost)"
      - name: packages
        type: string
        positional: true
        multi: true
        required: true
        description: "Dependencies to install (docker, k8s-cp, git-crypt)"
      - name: public_ip
        type: string
        multi: true
        description: >-
          Public IP or hostname of the cluster node, added to the k3s
          API server's TLS cert (k8s-cp only). Repeat to add multiple.
          Required when the controller talks to k3s over a non-private
          address — without it, kubectl from the controller fails TLS
          verification because the cert defaults only cover the node's
          internal IP and 127.0.0.1.

  - name: uninstall
    description: "Uninstall dependencies from the target host"
    long_description: |
      Uninstall dependencies from the target host. Supported packages:
      k8s (removes k3s, kubectl, helm, and cleans up iptables rules).
    examples:
      - "canasta uninstall k8s"
    playbook: uninstall.yml
    parameters:
      - name: host
        short: H
        type: string
        description: "Target host (default: localhost)"
      - name: packages
        type: string
        positional: true
        multi: true
        required: true
        description: "Dependencies to uninstall (k8s)"
      - name: "yes"
        short: "y"
        type: bool
        default: false
        description: "Skip confirmation prompt"

  - name: upgrade
    description: "Upgrade Canasta instances"
    long_description: |
      Upgrade all registered Canasta instances by refreshing configs,
      pulling latest images, running migrations, and restarting containers.
    examples:
      - "canasta upgrade"
      - "canasta upgrade --dry-run"
    playbook: upgrade.yml
    parameters:
      - name: dry_run
        type: bool
        default: false
        description: "Preview changes without applying"

  # ---------------------------------------------------------------------------
  # Wiki management
  # ---------------------------------------------------------------------------
  - name: add
    description: "Add a new wiki to a Canasta instance"
    long_description: |
      Add a new wiki to an existing Canasta instance, creating a
      wiki farm. The new wiki is registered in `wikis.yaml`, the
      Caddyfile is regenerated, and the MediaWiki installer runs
      for the new wiki. You can also import an existing database
      dump instead of running the installer.
    examples:
      - "canasta add -w docs -u localhost/docs"
    playbook: add.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required: true
        description: "ID of the wiki"
      - name: url
        short: u
        type: string
        required: true
        description: "Domain/path for the wiki (e.g. localhost/docs)"
      - name: site_name
        short: t
        type: string
        description: "Display name of the wiki"
      - name: database
        short: d
        type: path
        description: "Path to existing database dump"
      - name: wiki_settings
        short: l
        type: path
        description: "Path to per-wiki Settings.php"
      - name: admin
        short: a
        type: string
        description: "Initial wiki admin username"
      - name: password
        short: s
        type: string
        sensitive: true
        description: "Initial wiki admin password"
      - name: wikidbuser
        type: string
        description: "Wiki database username"

  - name: remove
    description: "Remove a wiki from a Canasta instance"
    long_description: |
      Remove a wiki from a Canasta instance. Drops the wiki database
      and removes per-wiki configuration.
    examples:
      - "canasta remove -w docs -y"
    playbook: remove.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required: true
        description: "ID of the wiki to remove"
      - name: "yes"
        short: "y"
        type: bool
        default: false
        description: "Skip confirmation prompt"

  - name: import
    description: "Import a database into an existing wiki"
    long_description: |
      Import a database dump into an existing wiki, replacing its
      current database. The instance must be running. Supported
      formats are .sql and .sql.gz files.

      To create a new wiki from a database dump, use the `--database`
      flag with `canasta create` or `canasta add` instead.
    examples:
      - "canasta import -w main -d dump.sql"
    playbook: import.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required: true
        description: "ID of the wiki to import into"
      - name: database
        short: d
        type: path
        required: true
        description: "Path to SQL dump file (.sql or .sql.gz)"
      - name: wiki_settings
        short: l
        type: path
        description: "Path to per-wiki Settings.php to replace"

  - name: export
    description: "Export the database of a wiki in a Canasta instance"
    long_description: |
      Export a wiki's database as a SQL dump file. The instance must
      be running. By default the dump is saved to `<wikiID>.sql` in
      the current directory. Use a `.gz` extension on the output
      path to get a gzip-compressed dump.
    examples:
      - "canasta export -w main"
      - "canasta export -w main -f backup.sql.gz"
    playbook: export.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        required: true
        description: "ID of the wiki to export"
      - name: file
        short: f
        type: path
        description: "Output file path (default: <wikiID>.sql, use .gz for compression)"

  # ---------------------------------------------------------------------------
  # Config management
  # ---------------------------------------------------------------------------
  - name: config_get
    description: "Show configuration settings"
    long_description: |
      Show configuration settings from the instance .env file.
      With no keys, prints all settings. With one or more keys,
      prints just those values.
    examples:
      - "canasta config get"
      - "canasta config get MW_SITE_SERVER"
      - "canasta config get MW_SITE_SERVER HTTPS_PORT"
    direct_only: true
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: keys
        type: string
        positional: true
        multi: true
        description: "Configuration key(s) to query"
      - name: force
        short: f
        type: bool
        default: false
        description: "Allow querying unrecognized keys"

  - name: config_set
    description: "Change configuration values"
    long_description: |
      Change one or more configuration values in the instance .env file.
      Handles side effects automatically (e.g. updating wikis.yaml when
      changing HTTPS_PORT).
    examples:
      - "canasta config set MW_SITE_SERVER=https://example.com"
    playbook: config_set.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: settings
        type: string
        positional: true
        multi: true
        description: "KEY=VALUE pairs to set"
      - name: no_restart
        type: bool
        default: false
        description: "Save settings without restarting the instance"
      - name: force
        short: f
        type: bool
        default: false
        description: "Allow setting unrecognized keys"

  - name: config_regenerate
    description: "Regenerate rendered config files (e.g. Caddyfile) from current sources"
    long_description: |
      Re-render the orchestrator's config files from the current .env
      and wikis.yaml. Useful after 'canasta backup restore' (which
      overwrites rendered files with the source host's copies) or
      after any manual edit that left rendered state drifted from the
      canonical sources.
    examples:
      - "canasta config regenerate"
    playbook: config_regenerate.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: config_unset
    description: "Remove a configuration setting"
    long_description: |
      Remove one or more configuration keys from the `.env` file of
      a Canasta instance.

      Each argument is a key name to remove. Multiple keys can be
      removed in a single invocation and only one restart is
      performed.

      If a key has side effects (e.g., `HTTPS_PORT`), they are
      reverted before the key is removed. The instance is then
      restarted unless `--no-restart` is specified.
    examples:
      - "canasta config unset MW_SITE_SERVER"
    playbook: config_unset.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: keys
        type: string
        positional: true
        multi: true
        description: "Configuration keys to remove"
      - name: no_restart
        type: bool
        default: false
        description: "Remove settings without restarting the instance"
      - name: force
        short: f
        type: bool
        default: false
        description: "Allow unsetting unrecognized keys"

  # ---------------------------------------------------------------------------
  # Extensions
  # ---------------------------------------------------------------------------
  - name: extension_list
    description: "Lists all the installed Canasta extensions"
    long_description: |
      List all Canasta extensions available in the instance. Each
      extension is shown with its enabled/disabled status.
    examples:
      - "canasta extension list"
    playbook: extension_list.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"

  - name: extension_enable
    description: "Enable a Canasta extension"
    long_description: |
      Enable one or more Canasta extensions by name. Multiple
      extensions can be specified as a comma-separated list. Use
      the `--wiki` flag to enable an extension for a specific wiki
      only.

      After enabling, `update.php` is automatically run to apply any
      required database changes. Use `--skip-update` to skip this
      step.
    examples:
      - "canasta extension enable VisualEditor,Cite"
    playbook: extension_enable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"
      - name: extensions
        type: string
        positional: true
        required: true
        description: "Comma-separated extension names"
      - name: skip_update
        type: bool
        default: false
        description: "Skip running update.php after enabling"

  - name: extension_disable
    description: "Disable a Canasta extension"
    long_description: |
      Disable one or more Canasta extensions by name. Multiple
      extensions can be specified as a comma-separated list. Use
      the `--wiki` flag to disable an extension for a specific wiki
      only.
    examples:
      - "canasta extension disable VisualEditor"
    playbook: extension_disable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"
      - name: extensions
        type: string
        positional: true
        required: true
        description: "Comma-separated extension names"

  # ---------------------------------------------------------------------------
  # Skins
  # ---------------------------------------------------------------------------
  - name: skin_list
    description: "Lists all the installed Canasta skins"
    long_description: |
      List all Canasta skins available in the instance. Each skin is
      shown with its enabled/disabled status.
    examples:
      - "canasta skin list"
    playbook: skin_list.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"

  - name: skin_enable
    description: "Enable a Canasta skin"
    long_description: |
      Enable one or more Canasta skins by name. Multiple skins can
      be specified as a comma-separated list. Use the `--wiki` flag
      to enable a skin for a specific wiki only.

      After enabling, `update.php` is automatically run to apply any
      required database changes. Use `--skip-update` to skip this
      step.
    examples:
      - "canasta skin enable Timeless"
    playbook: skin_enable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"
      - name: skins
        type: string
        positional: true
        required: true
        description: "Comma-separated skin names"
      - name: skip_update
        type: bool
        default: false
        description: "Skip running update.php after enabling"

  - name: skin_disable
    description: "Disable a Canasta skin"
    long_description: |
      Disable one or more Canasta skins by name. Multiple skins can
      be specified as a comma-separated list. Use the `--wiki` flag
      to disable a skin for a specific wiki only.
    examples:
      - "canasta skin disable Timeless"
    playbook: skin_disable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID within the farm"
      - name: skins
        type: string
        positional: true
        required: true
        description: "Comma-separated skin names"

  # ---------------------------------------------------------------------------
  # Maintenance
  # ---------------------------------------------------------------------------
  - name: maintenance_update
    description: "Run MediaWiki maintenance update"
    long_description: |
      Run standard MediaWiki maintenance: update.php, runJobs.php,
      and Semantic MediaWiki rebuildData.php.
    examples:
      - "canasta maintenance update"
      - "canasta maintenance update -w mywiki --skip-jobs"
    playbook: maintenance_update.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID to run on (default: all wikis)"
      - name: skip_jobs
        type: bool
        default: false
        description: "Skip running runJobs.php"
      - name: skip_smw
        type: bool
        default: false
        description: "Skip running Semantic MediaWiki rebuildData.php"

  - name: maintenance_script
    description: "Run maintenance scripts"
    long_description: |
      Run a MediaWiki core maintenance script inside the web
      container.

      With no arguments, lists all available maintenance scripts.
      With one or more arguments, runs the specified script. The
      script name is relative to the `maintenance/` directory.

      Flags (`-i`, `--wiki`) must come before the script name.
      Everything after the script name is treated as script
      arguments — no quotes needed.

      In a wiki farm, runs on all wikis by default. Use `--wiki` to
      target a specific wiki.
    examples:
      - "canasta maintenance script -- rebuildall.php"
    playbook: maintenance_script.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID to run script on"
      - name: script_args
        type: string
        positional: true
        description: "Maintenance script name and arguments"

  - name: maintenance_extension
    description: "Run extension maintenance scripts"
    long_description: |
      Run maintenance scripts provided by loaded MediaWiki
      extensions.

      With no arguments, lists all loaded extensions that have a
      `maintenance/` directory. With one argument (extension name),
      lists available maintenance scripts for that extension. With
      two or more arguments (extension name, script name, and
      optional script arguments), runs the specified script.

      Flags (`-i`, `--wiki`) must come before the extension name.
      Everything after the extension name is treated as the script
      and its arguments — no quotes needed.

      Only extensions that are currently loaded (enabled) for the
      target wiki are shown and allowed to run. In a wiki farm, runs
      on all wikis by default. Use `--wiki` to target a specific
      wiki.
    examples:
      - "canasta maintenance extension"
    playbook: maintenance_extension.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID"
      - name: script_args
        type: string
        positional: true
        description: "Extension maintenance script and arguments"

  - name: maintenance_exec
    description: "Execute a command in a container"
    long_description: |
      Execute an arbitrary command inside a container of a Canasta instance.

      With no arguments and no --service flag, lists the running services.
      The default service is "web" (the MediaWiki container).
    examples:
      - "canasta maintenance exec -- ls /var/www/mediawiki"
      - "canasta maintenance exec -s db -- mariadb-admin ping -h localhost"
    playbook: maintenance_exec.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: service
        short: s
        type: string
        description: "Service name (default: web)"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID"
      - name: exec_args
        type: string
        positional: true
        description: "Command and arguments to execute"

  # ---------------------------------------------------------------------------
  # DevMode
  # ---------------------------------------------------------------------------
  - name: devmode_enable
    description: "Enable development mode"
    long_description: |
      Enable development mode on a Canasta instance. Extracts MediaWiki code
      for live editing and builds an Xdebug-enabled image. Docker Compose only.
    examples:
      - "canasta devmode enable"
    playbook: devmode_enable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: devmode_disable
    description: "Disable development mode"
    long_description: |
      Disable development mode. Restores extensions and skins as real
      directories and removes Xdebug.
    examples:
      - "canasta devmode disable"
    playbook: devmode_disable.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  # ---------------------------------------------------------------------------
  # Sitemap
  # ---------------------------------------------------------------------------
  - name: sitemap_generate
    description: "Generate sitemaps for one or all wikis"
    long_description: |
      Generate XML sitemaps for wikis in a Canasta instance. If
      `--wiki` is specified, generates a sitemap for that wiki only.
      Otherwise, generates sitemaps for all wikis in the instance.
      Once generated, the background generator will automatically
      refresh them.
    examples:
      - "canasta sitemap generate"
      - "canasta sitemap generate -w mywiki"
    playbook: sitemap_generate.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID (omit to generate for all wikis)"

  - name: sitemap_remove
    description: "Remove sitemaps for one or all wikis"
    long_description: |
      Remove XML sitemap files for wikis in a Canasta instance. If
      `--wiki` is specified, removes the sitemap for that wiki only.
      Otherwise, removes sitemaps for all wikis. Once removed, the
      background generator will skip those wikis.
    examples:
      - "canasta sitemap remove"
    playbook: sitemap_remove.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: wiki
        short: w
        type: string
        description: "Wiki ID (omit to remove for all wikis)"

  # ---------------------------------------------------------------------------
  # Backup
  # ---------------------------------------------------------------------------
  - name: backup_init
    description: "Initialize a backup repository"
    long_description: |
      Initialize a new backup repository. This must be run once
      before creating any backups. The repository location is read
      from the `RESTIC_REPOSITORY` variable (or AWS S3 settings) in
      the instance's `.env` file.
    examples:
      - "canasta backup init"
    playbook: backup_init.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_list
    description: "List backups"
    long_description: |
      List all snapshots stored in the backup repository. Displays
      each snapshot's ID, timestamp, hostname, and tags.
    examples:
      - "canasta backup list"
    playbook: backup_list.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_create
    description: "Create a backup"
    long_description: |
      Create a backup snapshot. Dumps all wiki databases, stages
      config/extensions/images/skins, and uploads to the repository.
    examples:
      - "canasta backup create -t before-upgrade"
    playbook: backup_create.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: tag
        short: t
        type: string
        required: true
        description: "Backup tag"

  - name: backup_restore
    description: "Restore a backup"
    long_description: |
      Restore a Canasta instance from a backup snapshot. By default,
      a safety snapshot is taken before restoring. The restore
      replaces configuration files, extensions, images, skins,
      public_assets, `.env`, `docker-compose.override.yml`, `my.cnf`,
      and all wiki databases with the contents of the specified
      snapshot.

      Use `-w`/`--wiki` to restore only a single wiki's database,
      per-wiki settings, images, and public assets from the backup,
      leaving shared files untouched.
    examples:
      - "canasta backup restore -s abc123"
    playbook: backup_restore.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: snapshot
        short: s
        type: string
        required: true
        description: "Snapshot ID"
      - name: skip_safety_backup
        type: bool
        default: false
        description: "Skip taking a safety snapshot before restore"
      - name: wiki
        short: w
        type: string
        description: "Restore only this wiki's database and per-wiki files"

  - name: backup_delete
    description: "Delete a backup"
    long_description: |
      Remove a snapshot from the backup repository by its ID. The
      snapshot data may still exist until a prune is run on the
      repository.
    examples:
      - "canasta backup delete -s abc123"
    playbook: backup_delete.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: snapshot
        short: s
        type: string
        required: true
        description: "Snapshot ID to delete"

  - name: backup_unlock
    description: "Remove locks other processes created"
    long_description: |
      Remove stale lock files from the backup repository. Use this
      if a previous backup operation was interrupted and left the
      repository in a locked state.
    examples:
      - "canasta backup unlock"
    playbook: backup_unlock.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_files
    description: "List files in a backup"
    long_description: |
      List all files contained in a specific backup snapshot. This
      is useful for inspecting what was backed up before performing
      a restore.
    examples:
      - "canasta backup files -s abc123"
    playbook: backup_files.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: snapshot
        short: s
        type: string
        required: true
        description: "Snapshot ID"

  - name: backup_check
    description: "Check backup repository integrity"
    long_description: |
      Verify the integrity of the backup repository and its data.
      This checks for errors in the repository structure and
      snapshot data.
    examples:
      - "canasta backup check"
    playbook: backup_check.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_diff
    description: "Show difference between two backups"
    long_description: |
      Show the differences between two backup snapshots. This
      compares the file contents and metadata of both snapshots,
      displaying added, removed, and modified files.
    examples:
      - "canasta backup diff -s snap1 --snapshot2 snap2"
    playbook: backup_diff.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: snapshot
        short: s
        type: string
        required: true
        description: "First snapshot ID"
      - name: snapshot2
        type: string
        required: true
        description: "Second snapshot ID"

  - name: backup_purge
    description: "Remove old backups based on retention policy"
    long_description: |
      Remove backup snapshots that exceed the specified retention
      policy and reclaim disk space. At least one retention flag
      (`--older-than` or `--keep-last`) is required.
    examples:
      - "canasta backup purge --keep-last 5"
      - "canasta backup purge --older-than 30d"
    playbook: backup_purge.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: keep_last
        type: string
        description: "Number of most recent backups to keep"
      - name: keep_hourly
        type: string
        description: "Number of hourly backups to keep"
      - name: keep_daily
        type: string
        description: "Number of daily backups to keep"
      - name: keep_monthly
        type: string
        description: "Number of monthly backups to keep"
      - name: older_than
        type: string
        description: "Purge backups older than this (e.g. 30d, 6m)"

  - name: backup_schedule_set
    description: "Set a recurring backup schedule"
    long_description: |
      Schedule recurring backups using a cron expression. This adds
      or updates a crontab entry that runs `canasta backup create`
      on the specified schedule. Backup output is logged to
      `backup.log` in the instance directory.

      Use `--purge-older-than` to automatically purge old backups
      after each scheduled backup.
    examples:
      - "canasta backup schedule set '0 2 * * *'"
    playbook: backup_schedule_set.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: cron_expression
        type: string
        positional: true
        required: true
        description: "Cron expression for the schedule"
      - name: purge_older_than
        type: string
        description: "Purge backups older than this on each scheduled run"

  - name: backup_schedule_list
    description: "Show the backup schedule"
    long_description: |
      Show the current backup schedule for this instance, if one
      exists.
    examples:
      - "canasta backup schedule list"
    playbook: backup_schedule_list.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: backup_schedule_remove
    description: "Remove a scheduled backup"
    long_description: |
      Remove the crontab entry for recurring backups of this
      instance.
    examples:
      - "canasta backup schedule remove"
    playbook: backup_schedule_remove.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  # ---------------------------------------------------------------------------
  # GitOps
  # ---------------------------------------------------------------------------
  - name: gitops_init
    description: "Initialize git-based configuration management"
    long_description: |
      Bootstrap git-based configuration management. Converts extensions
      and skins to submodules and pushes to a remote repository.
    examples:
      - "canasta gitops init -n prod --repo git@github.com:org/config.git --key /tmp/gc.key"
    playbook: gitops_init.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: host_name
        short: n
        long: name
        type: string
        required: true
        description: "Name for this host in hosts.yaml"
      - name: role
        type: choice
        choices: [source, sink, both]
        default: both
        description: "Host role"
      - name: repo
        type: string
        required: true
        description: "Git repository URL"
      - name: key
        type: path
        required: true
        description: "Path to export the git-crypt key"
      - name: force
        type: bool
        default: false
        description: "Force push to non-empty remote"
      - name: pull_requests
        type: bool
        default: false
        description: "Require pull requests instead of pushing to main"
      - name: git_user_name
        type: string
        description: "Git user.name for commits on the target host (set if not already configured)"
      - name: git_user_email
        type: string
        description: "Git user.email for commits on the target host (set if not already configured)"

  - name: gitops_join
    description: "Join an existing gitops repository"
    long_description: |
      Join an existing gitops repository for a Canasta instance.

      Clones the repo, unlocks git-crypt with the provided key,
      adds this host to the host inventory, extracts host-specific
      values into `vars.yaml`, and pushes the new host entry back
      to the repo.

      The instance must already exist and have a working `.env`
      file. Use `canasta gitops init` to bootstrap a new gitops
      repository instead.
    examples:
      - "canasta gitops join -n staging --repo git@github.com:org/config.git --key /tmp/gc.key"
    playbook: gitops_join.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: host_name
        short: n
        long: name
        type: string
        required: true
        description: "Name for this host"
      - name: repo
        type: string
        required: true
        description: "Git repository URL"
      - name: key
        type: path
        required: true
        description: "Path to git-crypt key"
      - name: git_user_name
        type: string
        description: "Git user.name for commits on the target host (set if not already configured)"
      - name: git_user_email
        type: string
        description: "Git user.email for commits on the target host (set if not already configured)"

  - name: gitops_add
    description: "Add configuration changes to git"
    long_description: |
      Stage configuration changes for the next gitops push. If a file
      path is given, stage just that path. Without a path, stage all
      changes under the config directory (existing behavior).
    examples:
      - "canasta gitops add extensions/WikiWorks/LocalSettings.php"
      - "canasta gitops add"
    playbook: gitops_add.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: path
        type: string
        positional: true
        description: "File path to stage (relative to instance root)"

  - name: gitops_rm
    description: "Remove configuration from git tracking"
    long_description: |
      Remove configuration files from git tracking. If a file path is
      given, delete that file and stage the deletion. Without a path,
      stage all pending deletions (files already deleted from disk).
    examples:
      - "canasta gitops rm public_assets/main/.htaccess"
      - "canasta gitops rm"
    playbook: gitops_rm.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: path
        type: string
        positional: true
        description: "File path to remove (relative to instance root)"

  - name: gitops_push
    description: "Push configuration changes to the git repository"
    long_description: |
      Commit staged changes and push to the remote repository. Files
      must be staged first using `canasta gitops add`. When
      `pull_requests` is enabled in `hosts.yaml`, creates a branch
      and opens a pull request instead of pushing directly to main.
    examples:
      - "canasta gitops push"
      - "canasta gitops push -m 'Add docs wiki'"
    playbook: gitops_push.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"
      - name: message
        short: m
        type: string
        description: "Commit message (defaults to 'Configuration update')"

  - name: gitops_pull
    description: "Pull latest configuration from the git repository"
    long_description: |
      Pull the latest configuration from the remote repository,
      update submodules, render `.env` and admin password files from
      the template and host vars, and report what changed and
      whether a restart is needed.
    examples:
      - "canasta gitops pull"
    playbook: gitops_pull.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_status
    description: "Show gitops status for the instance"
    long_description: |
      Show the current host, role, uncommitted changes, and
      ahead/behind status relative to the remote.
    examples:
      - "canasta gitops status"
    direct_only: true
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_diff
    description: "Show local and remote changes since the branches diverged"
    long_description: |
      Show uncommitted working tree changes, then fetch the latest
      from the remote and show what files have changed locally, what
      files have changed on the remote, and which files have changed
      in both (potential merge conflicts).
    examples:
      - "canasta gitops diff"
    playbook: gitops_diff.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_fix_submodules
    description: "Convert extensions and skins to proper git submodules"
    long_description: |
      Fix submodule registration in an existing gitops repository.

      This handles two cases:

      1. Extensions or skins that were added after gitops init and
         need to be converted from standalone git repositories to
         submodules.
      2. Submodules listed in .gitmodules that were accidentally
         committed as regular directories instead of gitlinks.

      After fixing, run `canasta gitops push` to push the changes.
    examples:
      - "canasta gitops fix-submodules"
    playbook: gitops_fix_submodules.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  - name: gitops_sync
    description: "Trigger an immediate Argo CD sync (kubernetes only)"
    long_description: |
      Forces Argo CD to immediately reconcile the cluster state with the Git
      repository, rather than waiting for the next automatic sync interval.
      On Docker Compose instances this command has no effect.
    examples:
      - "canasta gitops sync"
    playbook: gitops_sync.yml
    parameters:
      - name: id
        short: i
        type: string
        description: "Canasta instance ID"

  # ---------------------------------------------------------------------------
  # Storage provisioning (Kubernetes only)
  # ---------------------------------------------------------------------------
  - name: storage_setup_nfs
    description: "Set up NFS shared storage for Kubernetes"
    long_description: |
      Install the NFS CSI driver and create a StorageClass for shared storage
      on Kubernetes clusters. Optionally install an NFS server on the target host.
      After setup, set persistence.*.storageClass in values.yaml to use it.
    examples:
      - "canasta storage setup nfs --server 192.168.1.10 --share /srv/nfs/canasta"
      - "canasta storage setup nfs --install-server --share /srv/nfs/canasta"
    playbook: storage_setup_nfs.yml
    parameters:
      - name: server
        type: string
        description: "NFS server IP or hostname"
      - name: share
        type: string
        required: true
        description: "NFS export path (e.g. /srv/nfs/canasta)"
      - name: install_server
        type: bool
        default: false
        description: "Install NFS server on the target host"
      - name: storage_class_name
        type: string
        default: nfs
        description: "Name for the Kubernetes StorageClass"

  # ---------------------------------------------------------------------------
  # Host management (persistent hosts.yml in user config dir)
  # ---------------------------------------------------------------------------
  - name: host_add
    description: "Add or update a host entry in the persistent hosts.yml"
    long_description: |
      Add or update a host definition in $CANASTA_CONFIG_DIR/hosts.yml.
      Saved hosts can then be targeted by short name with --host.
    examples:
      - "canasta host add --name prod1 --ssh ubuntu@prod1.example.com"
      - "canasta host add --name prod2 --ssh canasta@10.0.0.5 --python /usr/bin/python3"
    direct_only: true
    parameters:
      - name: host_name
        long: name
        short: n
        type: string
        required: true
        description: "Short name for the host (used with --host)"
      - name: ssh
        type: string
        required: true
        description: "SSH destination (user@host or just host)"
      - name: python
        type: string
        description: "Path to python3 on the remote host"

  - name: host_remove
    description: "Remove a host entry from the persistent hosts.yml"
    long_description: |
      Remove a saved host definition from
      `$CANASTA_CONFIG_DIR/hosts.yml`. After removal, the short name
      can no longer be used with `--host`.

      Removing a host from `hosts.yml` does not affect instances
      already registered on that host; they remain in the registry
      and continue to be targeted by their original SSH details.
    examples:
      - "canasta host remove --name prod1"
    direct_only: true
    parameters:
      - name: host_name
        long: name
        short: n
        type: string
        required: true
        description: "Short name of the host to remove"

  - name: host_list
    description: "List all host entries from the persistent hosts.yml"
    long_description: |
      List every saved host definition from
      `$CANASTA_CONFIG_DIR/hosts.yml`. For each host, displays the
      short name (the value passed to `--host`), the SSH destination
      (`user@host`), and the Python interpreter path if one was set.

      Use `canasta host add` to add entries and `canasta host remove`
      to remove them.
    examples:
      - "canasta host list"
    direct_only: true
    parameters: []

  - name: storage_setup_efs
    description: "Set up AWS EFS shared storage for Kubernetes"
    long_description: |
      Install the EFS CSI driver and create a StorageClass for shared storage
      on AWS Kubernetes clusters. The EFS filesystem must be created separately
      via AWS console or CLI.
    examples:
      - "canasta storage setup efs --filesystem-id fs-0123456789abcdef0"
    playbook: storage_setup_efs.yml
    parameters:
      - name: filesystem_id
        type: string
        required: true
        description: "AWS EFS filesystem ID (e.g. fs-0123456789abcdef0)"
      - name: storage_class_name
        type: string
        default: efs
        description: "Name for the Kubernetes StorageClass"
