---
# Canasta-Ansible main dispatcher playbook.
#
# Usage:
#   ansible-playbook canasta.yml -e "command=create id=mysite wiki=mywiki"
#   ansible-playbook canasta.yml -e "command=start id=mysite target_host=prod1.example.com" --limit prod1.example.com
#   ./canasta create --id mysite --wiki mywiki
#   ./canasta --host prod1.example.com start --id mysite
#
- name: Canasta
  hosts: "{{ target_host | default('localhost') }}"
  gather_facts: false

  vars:
    canasta_root: "{{ playbook_dir }}"
    canasta_default_image: "ghcr.io/canastawiki/canasta:{{ lookup('file', playbook_dir + '/CANASTA_VERSION') | trim }}"

  pre_tasks:
    - name: Validate command parameter
      ansible.builtin.assert:
        that: command is defined and command != ''
        fail_msg: >-
          No command specified. Usage: ansible-playbook canasta.yml -e "command=<command>"
          or use the ./canasta wrapper script. Run ./canasta --help for available commands.

    - name: Load command definitions
      ansible.builtin.include_vars:
        file: meta/command_definitions.yml
        name: canasta_commands

    - name: Validate command exists
      ansible.builtin.assert:
        that: command in (canasta_commands.commands | map(attribute='name'))
        fail_msg: >-
          Unknown command '{{ command }}'.
          Valid commands: {{ canasta_commands.commands | map(attribute='name') | join(', ') }}

    - name: Validate required parameters
      ansible.builtin.include_tasks: roles/common/tasks/validate_params.yml

  tasks:
    - name: Look up command definition
      ansible.builtin.set_fact:
        _cmd_def: >-
          {{ canasta_commands.commands
             | selectattr('name', 'equalto', command) | first }}

    # direct_only commands are implemented entirely in direct_commands.py
    # and have no Ansible playbook. If we're dispatching from canasta.yml,
    # the CLI's direct-path bypass didn't fire (likely CANASTA_FORCE_ANSIBLE
    # is set, or the direct handler returned FALLBACK for a case it can't
    # handle). Fail clearly rather than trying to include a nonexistent
    # playbook.
    - name: Fail if command has no Ansible playbook
      ansible.builtin.fail:
        msg: >-
          Command '{{ command }}' has direct_only: true and no Ansible
          playbook. If CANASTA_FORCE_ANSIBLE is set, unset it; this
          command is implemented in direct_commands.py only.
      when: _cmd_def.direct_only | default(false) | bool

    - name: Dispatch to command playbook
      ansible.builtin.include_tasks: "playbooks/{{ _cmd_def.playbook }}"
