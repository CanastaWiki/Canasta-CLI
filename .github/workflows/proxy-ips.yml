---
# Keep the vendored CDN/WAF edge IP ranges current.
#
# CADDY_TRUSTED_PROXIES=cloudflare|imperva locks Caddy's trusted_proxies
# to the provider's published edge ranges (roles/orchestrator/vars/
# <provider>_ips.yml). Those ranges change over time, and a stale list
# silently degrades real-client-IP recovery, so this refreshes them on a
# schedule and opens a PR when the published list changes. Never commits
# to main directly — a human reviews the diff.

name: Proxy IP ranges

on:
  schedule:
    # 06:00 UTC on the 1st of each month.
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Refresh vendored ranges
        run: python3 scripts/update_proxy_ips.py

      - name: Open a PR if the ranges changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- roles/orchestrator/vars/; then
            echo "No change in published ranges."
            exit 0
          fi
          BRANCH="automation/proxy-ips-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add roles/orchestrator/vars/
          git commit -m "chore: refresh CDN/WAF trusted-proxy IP ranges"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Refresh CDN/WAF trusted-proxy IP ranges" \
            --body "Automated refresh of the vendored Cloudflare/Imperva edge ranges used by CADDY_TRUSTED_PROXIES. Review the diff before merging." \
            --base main --head "$BRANCH"
