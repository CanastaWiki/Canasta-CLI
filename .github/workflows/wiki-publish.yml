name: Publish CLI Reference to Wiki

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Publish CLI pages
        run: |
          go run tools/wiki-publish/main.go \
            -api "${{ secrets.WIKI_API_URL }}" \
            -user "${{ secrets.WIKI_BOT_USER }}" \
            -pass "${{ secrets.WIKI_BOT_PASSWORD }}"
