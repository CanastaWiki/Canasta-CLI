---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest-cov

      - name: Run unit tests with coverage
        run: |
          .venv/bin/pytest tests/unit/ -v \
            --cov=roles/common/library \
            --cov=roles/extensions_skins/library \
            --cov=scripts/generate_docs.py \
            --cov=scripts/validate_definitions.py \
            --cov=canasta.py \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70

      - name: Coverage summary
        if: always() && hashFiles('coverage.xml') != ''
        run: |
          # Total as a single integer percentage, plus the per-module
          # markdown table that coverage.py generates directly.
          TOTAL=$(.venv/bin/coverage report --format=total)
          {
            echo "## Unit Test Coverage: ${TOTAL}%"
            echo ""
            .venv/bin/coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML report
        if: always() && hashFiles('htmlcov/index.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: warn

      - name: Upload coverage XML
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Validate command definitions
        run: .venv/bin/python scripts/validate_definitions.py

  integration-core:
    name: "Integration: Core Lifecycle"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y git-crypt
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          .venv/bin/ansible-galaxy collection install kubernetes.core
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      - name: Run core tests
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          lifecycle import upgrade version doctor host-management
        timeout-minutes: 20

  integration-features:
    name: "Integration: Features"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y git-crypt
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          .venv/bin/ansible-galaxy collection install kubernetes.core
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      - name: Run feature tests
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          extension-skin wiki-farm config-side-effects backup backup-advanced
          sitemap maintenance
        timeout-minutes: 30

  integration-gitops:
    name: "Integration: GitOps"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y git-crypt
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          .venv/bin/ansible-galaxy collection install kubernetes.core
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      - name: Run gitops tests
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          gitops gitops-pull-diff
        timeout-minutes: 15

  integration-k8s:
    name: "Integration: Kubernetes"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-crypt
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1
      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | sudo sh -
          mkdir -p ~/.kube
          sudo k3s kubectl config view --raw > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          .venv/bin/ansible-galaxy collection install kubernetes.core
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      - name: Run K8s tests
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          k8s-lifecycle
        timeout-minutes: 20

  remote-integration:
    name: Remote Host Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          .venv/bin/ansible-galaxy collection install kubernetes.core

      - name: Run remote integration tests
        run: tests/integration/remote/run_tests.sh
        timeout-minutes: 15

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t canasta-ansible:test .

      - name: Test version command
        run: |
          OUTPUT=$(docker run --rm canasta-ansible:test version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Canasta CLI v"

      - name: Test list command (empty registry)
        run: |
          OUTPUT=$(docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            canasta-ansible:test list)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "No Canasta instances"

      - name: Test doctor command
        run: |
          OUTPUT=$(docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            canasta-ansible:test doctor)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Docker"

      - name: Test help output
        run: |
          OUTPUT=$(docker run --rm canasta-ansible:test --help)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "create"
          echo "$OUTPUT" | grep -q "backup"

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Lint chart with localhost domain
        run: >-
          helm lint roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=localhost'

      - name: Lint chart with real domain
        run: >-
          helm lint roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=example.com'

      - name: Template renders without errors (localhost)
        run: >-
          helm template test roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=localhost'
          > /dev/null

      - name: Template renders without errors (multi-domain)
        run: >-
          helm template test roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=example.com'
          --set 'domains[1]=docs.example.com'
          > /dev/null

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install yamllint

      - name: YAML lint
        run: >-
          .venv/bin/yamllint -c .yamllint.yml
          meta/ roles/ playbooks/ inventory/ canasta.yml

      - name: Validate definitions
        run: .venv/bin/python scripts/validate_definitions.py
