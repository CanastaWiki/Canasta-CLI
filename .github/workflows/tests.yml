---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger for re-running the full suite (including the
  # integration jobs that are normally gated to push-to-main only).
  # Useful when reviewing a PR that touches integration-relevant
  # code. See #67.
  workflow_dispatch:

# All jobs in this workflow only read the checkout to run tests and
# linters; none push images, write back to the repo, or post comments.
permissions:
  contents: read

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest-cov

      - name: Run unit tests with coverage
        run: |
          .venv/bin/pytest tests/unit/ -v \
            --cov=roles/common/library \
            --cov=roles/extensions_skins/library \
            --cov=scripts/generate_docs.py \
            --cov=scripts/validate_definitions.py \
            --cov=canasta.py \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70

      - name: Coverage summary
        if: always() && hashFiles('coverage.xml') != ''
        run: |
          # Total as a single integer percentage, plus the per-module
          # markdown table that coverage.py generates directly.
          TOTAL=$(.venv/bin/coverage report --format=total)
          {
            echo "## Unit Test Coverage: ${TOTAL}%"
            echo ""
            .venv/bin/coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML report
        if: always() && hashFiles('htmlcov/index.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: warn

      - name: Upload coverage XML
        if: always() && hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Validate command definitions
        run: .venv/bin/python scripts/validate_definitions.py

  integration-core:
    name: "Integration: Core Lifecycle"
    # Skip on PRs (run only on push to main and manual workflow_dispatch).
    # See #67.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y git-crypt
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          # Retry to ride out transient Ansible Galaxy CDN timeouts.
          for attempt in 1 2 3 4; do
            .venv/bin/ansible-galaxy collection install kubernetes.core && break
            if [ "$attempt" -eq 4 ]; then
              echo "ansible-galaxy install failed after 4 attempts" >&2
              exit 1
            fi
            echo "ansible-galaxy install attempt $attempt failed; retrying in $((attempt * 10))s..." >&2
            sleep $((attempt * 10))
          done
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      - name: Run core tests
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          lifecycle import upgrade version doctor host-management
        timeout-minutes: 20

  integration-features:
    name: "Integration: Features"
    if: github.event_name != 'pull_request'  # See #67
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y git-crypt
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          # Retry to ride out transient Ansible Galaxy CDN timeouts.
          for attempt in 1 2 3 4; do
            .venv/bin/ansible-galaxy collection install kubernetes.core && break
            if [ "$attempt" -eq 4 ]; then
              echo "ansible-galaxy install failed after 4 attempts" >&2
              exit 1
            fi
            echo "ansible-galaxy install attempt $attempt failed; retrying in $((attempt * 10))s..." >&2
            sleep $((attempt * 10))
          done
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      - name: Run feature tests
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          extension-skin wiki-farm config-side-effects backup backup-advanced
          sitemap maintenance
        timeout-minutes: 30

  integration-gitops:
    name: "Integration: GitOps"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y git-crypt
          sudo groupadd -f www-data
          sudo usermod -aG www-data $(whoami)
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          # Retry to ride out transient Ansible Galaxy CDN timeouts.
          for attempt in 1 2 3 4; do
            .venv/bin/ansible-galaxy collection install kubernetes.core && break
            if [ "$attempt" -eq 4 ]; then
              echo "ansible-galaxy install failed after 4 attempts" >&2
              exit 1
            fi
            echo "ansible-galaxy install attempt $attempt failed; retrying in $((attempt * 10))s..." >&2
            sleep $((attempt * 10))
          done
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      - name: Run gitops tests
        run: >-
          sg www-data -c '.venv/bin/python tests/integration/run_tests.py
          gitops gitops-join gitops-pull-diff config-set-gitops gitops-push-shared gitops-push-reporting'
        timeout-minutes: 30

  integration-k8s:
    name: "Integration: Kubernetes"
    if: github.event_name != 'pull_request'  # See #67
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-crypt
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          # Retry to ride out transient Ansible Galaxy CDN timeouts.
          for attempt in 1 2 3 4; do
            .venv/bin/ansible-galaxy collection install kubernetes.core && break
            if [ "$attempt" -eq 4 ]; then
              echo "ansible-galaxy install failed after 4 attempts" >&2
              exit 1
            fi
            echo "ansible-galaxy install attempt $attempt failed; retrying in $((attempt * 10))s..." >&2
            sleep $((attempt * 10))
          done
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      # Bootstrap the cluster via the product's own install path so CI
      # exercises 'canasta install k8s-cp' (which installs k3s + helm at the
      # pinned canasta_k3s_version / canasta_helm_version, writing
      # ~/.kube/config) instead of a separate, unpinned curl | sh that
      # depended on update.k3s.io.
      - name: Bootstrap k3s control plane via canasta
        run: ./canasta-native install k8s-cp
      - name: Run K8s tests
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          k8s-lifecycle
        timeout-minutes: 20
      # Reuse the same bootstrapped cluster (k8s-lifecycle deletes its instance
      # on cleanup, and the in-cluster registry was deployed at install) so this
      # adds only the build/push/pull path, not a second k3s bootstrap.
      - name: Run K8s build-from test
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          k8s-build-from
        timeout-minutes: 18

  # Separate job (own runner) so the CrowdSec enable — which drives several
  # Helm rollouts — gets a fresh, unloaded node and its own time budget rather
  # than serializing behind k8s-lifecycle on a shared 2-CPU runner.
  integration-k8s-crowdsec:
    name: "Integration: Kubernetes CrowdSec"
    if: github.event_name != 'pull_request'  # See #67
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-crypt
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          # Retry to ride out transient Ansible Galaxy CDN timeouts.
          for attempt in 1 2 3 4; do
            .venv/bin/ansible-galaxy collection install kubernetes.core && break
            if [ "$attempt" -eq 4 ]; then
              echo "ansible-galaxy install failed after 4 attempts" >&2
              exit 1
            fi
            echo "ansible-galaxy install attempt $attempt failed; retrying in $((attempt * 10))s..." >&2
            sleep $((attempt * 10))
          done
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      # Bootstrap the cluster via the product's own install path so CI
      # exercises 'canasta install k8s-cp' (which installs k3s + helm at the
      # pinned canasta_k3s_version / canasta_helm_version, writing
      # ~/.kube/config) instead of a separate, unpinned curl | sh that
      # depended on update.k3s.io.
      - name: Bootstrap k3s control plane via canasta
        run: ./canasta-native install k8s-cp
      - name: Run K8s CrowdSec test
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          k8s-crowdsec
        timeout-minutes: 35

  # Separate job (own runner) so the K8s backup Jobs run against a
  # fresh single-node cluster with their own time budget, in parallel with
  # the other k8s jobs rather than serializing behind them.
  integration-k8s-backup:
    name: "Integration: Kubernetes Backup"
    if: github.event_name != 'pull_request'  # See #67
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-crypt
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          # Retry to ride out transient Ansible Galaxy CDN timeouts.
          for attempt in 1 2 3 4; do
            .venv/bin/ansible-galaxy collection install kubernetes.core && break
            if [ "$attempt" -eq 4 ]; then
              echo "ansible-galaxy install failed after 4 attempts" >&2
              exit 1
            fi
            echo "ansible-galaxy install attempt $attempt failed; retrying in $((attempt * 10))s..." >&2
            sleep $((attempt * 10))
          done
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"
      # Bootstrap the cluster via the product's own install path so CI
      # exercises 'canasta install k8s-cp' (which installs k3s + helm at the
      # pinned canasta_k3s_version / canasta_helm_version, writing
      # ~/.kube/config) instead of a separate, unpinned curl | sh that
      # depended on update.k3s.io.
      - name: Bootstrap k3s control plane via canasta
        run: ./canasta-native install k8s-cp
      - name: Run K8s backup test
        run: >-
          .venv/bin/python tests/integration/run_tests.py
          k8s-backup
        timeout-minutes: 20

  remote-integration:
    name: Remote Host Integration Tests
    if: github.event_name != 'pull_request'  # See #67
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          # Retry to ride out transient Ansible Galaxy CDN timeouts.
          for attempt in 1 2 3 4; do
            .venv/bin/ansible-galaxy collection install kubernetes.core && break
            if [ "$attempt" -eq 4 ]; then
              echo "ansible-galaxy install failed after 4 attempts" >&2
              exit 1
            fi
            echo "ansible-galaxy install attempt $attempt failed; retrying in $((attempt * 10))s..." >&2
            sleep $((attempt * 10))
          done

      - name: Run remote integration tests
        run: tests/integration/remote/run_tests.sh
        timeout-minutes: 15

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t canasta-cli:test .

      - name: Test version command
        run: |
          OUTPUT=$(docker run --rm canasta-cli:test version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Canasta CLI v"

      - name: Test list command (empty registry)
        run: |
          OUTPUT=$(docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            canasta-cli:test list)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "No Canasta instances"

      - name: Test doctor command
        run: |
          OUTPUT=$(docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            canasta-cli:test doctor)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Docker"

      - name: Test help output
        run: |
          OUTPUT=$(docker run --rm canasta-cli:test --help)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "create"
          echo "$OUTPUT" | grep -q "backup"

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Lint chart with localhost domain
        run: >-
          helm lint roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=localhost'

      - name: Lint chart with real domain
        run: >-
          helm lint roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=example.com'

      - name: Template renders without errors (localhost)
        run: >-
          helm template test roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=localhost'
          > /dev/null

      - name: Template renders without errors (multi-domain)
        run: >-
          helm template test roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=example.com'
          --set 'domains[1]=docs.example.com'
          > /dev/null

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install yamllint

      # --strict matches `make lint`, so warnings (e.g. line-length) fail
      # here the same way they fail locally.
      - name: YAML lint
        run: >-
          .venv/bin/yamllint --strict -c .yamllint.yml
          meta/ roles/ playbooks/ inventory/ canasta.yml

      - name: Python unused-import check
        run: .venv/bin/ruff check --select F401 .

      - name: Validate definitions
        run: .venv/bin/python scripts/validate_definitions.py
