---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest-cov

      - name: Run unit tests with coverage
        run: |
          .venv/bin/pytest tests/unit/ -v \
            --cov=roles/common/library \
            --cov=roles/extensions_skins/library \
            --cov=scripts/generate_docs.py \
            --cov=scripts/validate_definitions.py \
            --cov=canasta.py \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Validate command definitions
        run: .venv/bin/python scripts/validate_definitions.py

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git-crypt

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | sudo sh -
          mkdir -p ~/.kube
          sudo k3s kubectl config view --raw > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          .venv/bin/ansible-galaxy collection install kubernetes.core

      - name: Configure git for CI
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@canasta.wiki"

      - name: Run integration tests
        run: .venv/bin/python tests/integration/run_tests.py
        timeout-minutes: 40

  remote-integration:
    name: Remote Host Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install kubernetes
          .venv/bin/ansible-galaxy collection install kubernetes.core

      - name: Run remote integration tests
        run: tests/integration/remote/run_tests.sh
        timeout-minutes: 15

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t canasta-ansible:test .

      - name: Test version command
        run: |
          OUTPUT=$(docker run --rm canasta-ansible:test version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Canasta CLI v"

      - name: Test list command (empty registry)
        run: |
          OUTPUT=$(docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            canasta-ansible:test list)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "No Canasta instances"

      - name: Test doctor command
        run: |
          OUTPUT=$(docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            canasta-ansible:test doctor)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Docker"

      - name: Test help output
        run: |
          OUTPUT=$(docker run --rm canasta-ansible:test --help)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "create"
          echo "$OUTPUT" | grep -q "backup"

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.20.1

      - name: Lint chart with localhost domain
        run: >-
          helm lint roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=localhost'

      - name: Lint chart with real domain
        run: >-
          helm lint roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=example.com'

      - name: Template renders without errors (localhost)
        run: >-
          helm template test roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=localhost'
          > /dev/null

      - name: Template renders without errors (multi-domain)
        run: >-
          helm template test roles/orchestrator/files/helm/canasta/
          --set instance.id=test
          --set 'domains[0]=example.com'
          --set 'domains[1]=docs.example.com'
          > /dev/null

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install yamllint

      - name: YAML lint
        run: >-
          .venv/bin/yamllint -c .yamllint.yml
          meta/ roles/ playbooks/ inventory/ canasta.yml

      - name: Validate definitions
        run: .venv/bin/python scripts/validate_definitions.py
