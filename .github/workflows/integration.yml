name: Integration Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Install git-crypt
      run: sudo apt-get update && sudo apt-get install -y git-crypt
    - name: Configure git for CI
      run: |
        git config --global user.name "CI"
        git config --global user.email "ci@canasta.wiki"
    - name: Add runner to www-data group
      # Canasta containers run as www-data, so bind-mounted directories
      # (e.g. config/) become owned by that group. The host user must be
      # in the www-data group to write files back into them.
      run: sudo usermod -aG www-data $(whoami)
    - name: Run unit tests with coverage
      run: go test -coverprofile=unit-coverage.out ./...
    - name: Run integration tests
      # sg runs the command under the www-data group (usermod doesn't
      # take effect in the current shell session).
      run: sg www-data -c "go test -tags integration -timeout 20m -v ./tests/integration/..."
      env:
        INTEGRATION_COVER_PROFILE: ${{ github.workspace }}/integration-coverage.out
    - name: Coverage summary
      if: always() && hashFiles('unit-coverage.out') != ''
      run: |
        UNIT_TOTAL=$(go tool cover -func=unit-coverage.out | tail -1 | awk '{print $NF}')

        if [ -f integration-coverage.out ]; then
          # Merge unit and integration profiles
          echo "mode: set" > combined-coverage.out
          tail -n +2 unit-coverage.out >> combined-coverage.out
          tail -n +2 integration-coverage.out >> combined-coverage.out
          INTEGRATION_TOTAL=$(go tool cover -func=integration-coverage.out | tail -1 | awk '{print $NF}')
          COMBINED_TOTAL=$(go tool cover -func=combined-coverage.out | tail -1 | awk '{print $NF}')
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scope | Coverage |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit | ${UNIT_TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration | ${INTEGRATION_TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Combined** | **${COMBINED_TOTAL}** |" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scope | Coverage |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit only | ${UNIT_TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration | _(not available)_ |" >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Upload unit coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-profile-unit
        path: unit-coverage.out
        if-no-files-found: warn
    - name: Upload integration coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-profile-integration
        path: integration-coverage.out
        if-no-files-found: warn
    - name: Upload combined coverage
      if: always() && hashFiles('combined-coverage.out') != ''
      uses: actions/upload-artifact@v4
      with:
        name: coverage-profile-combined
        path: combined-coverage.out
        if-no-files-found: warn
