# This workflow builds Canasta-CLI and publishes a release when the VERSION file changes.

name: Go build

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.read.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 2
    - name: Read CLI version from VERSION file
      id: read
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        echo "version=v${VERSION}" >> $GITHUB_OUTPUT
    - name: Check if VERSION changed
      id: check
      run: |
        if git diff HEAD~1 --name-only 2>/dev/null | grep -q '^VERSION$'; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
  build:
    runs-on: ubuntu-latest
    needs: version
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
    - uses: actions/checkout@v3
    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: '1.25'
    - name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        VERSION: ${{ needs.version.outputs.new_version }}
      run: sh build.sh
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: canasta-${{ matrix.goos }}-${{ matrix.goarch }}
        path: ./build/canasta-${{ matrix.goos }}-${{ matrix.goarch }}
  release:
    runs-on: ubuntu-latest
    needs: [version, build]
    if: needs.version.outputs.changed == 'true'
    steps:
    - name: Download executables
      uses: actions/download-artifact@v4
      with:
        path: ./build
        merge-multiple: true
    - name: Publish
      uses: softprops/action-gh-release@v1
      id: publish
      with:
        draft: false
        tag_name: ${{ needs.version.outputs.new_version }}
        fail_on_unmatched_files: true
        generate_release_notes: true
        append_body: true
        files: |
          ./build/canasta-linux-amd64
          ./build/canasta-linux-arm64
          ./build/canasta-darwin-amd64
          ./build/canasta-darwin-arm64
