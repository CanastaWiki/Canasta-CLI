[defaults]
# Optimized fact collection
gathering = smart
# Cache to disk
fact_caching = jsonfile
fact_caching_connection = /tmp/ans_cache
host_key_checking = False

inventory = inventory/localhost.yml
roles_path = roles
library = roles/common/library:roles/extensions_skins/library:roles/backup/library
# Overridden at runtime by canasta.py to canasta_minimal (non-verbose mode)
stdout_callback = default
callback_plugins = callback_plugins
# Suppressed to keep CLI output clean
deprecation_warnings = False
nocows = True
retry_files_enabled = False

# Mitogen strategy for faster SSH execution
# Install: pip install mitogen (already in requirements.txt)
strategy_plugins = /opt/canasta-ansible/.mitogen-strategy-plugins
strategy = mitogen

[ssh_connection]
control_path_dir = /tmp/.ansible-cp
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
# Faster module execution
pipelining = True

[privilege_escalation]
become = False
