---
# Validate passwords for problematic characters.
# Mirrors Go password validation from canasta.go.
# Warns but does not fail (matching Go behavior).
#
# Input: _password_vars (list of dicts with key/value to check)
#   e.g., [{key: "MYSQL_PASSWORD", value: "..."}, ...]

- name: Check passwords for problematic characters
  ansible.builtin.debug:
    msg: >-
      WARNING: {{ item.key }} contains characters that may cause issues
      (found in: = # $ " ' ` \ ! & | ; < >).
      Consider using only safe symbols: @ % ^ - _ + . , :
  when: item.value | regex_search('[=#$"' + "'" + '`\\\\!&|;<>]') is not none
  loop: "{{ _password_vars }}"
  loop_control:
    label: "{{ item.key }}"
