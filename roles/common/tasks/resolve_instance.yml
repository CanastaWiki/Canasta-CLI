---
# Resolve a Canasta instance from ID, host, or working directory.
# Registry lives on the controller node.
#
# Resolution order:
#   1. --id provided: look up by ID
#   2. Remote host, no --id: auto-resolve if one instance on host
#   3. Localhost, no --id: PWD-based resolution
#
# Input: id (optional)
# Output: instance_id, instance_path, instance_orchestrator,
#   instance_devmode, instance_managed_cluster
#
# Note: registry queries below all carry delegate_to: localhost so they
# run against the controller's registry regardless of the inbound
# connection state. We capture the inbound host/conn purely to drive the
# resolution-path branching (remote vs localhost) — we do not switch
# ansible_connection itself, which would have to be undone afterwards.

- name: Capture inbound connection state for resolution branching
  ansible.builtin.set_fact:
    _ri_orig_host: "{{ ansible_host | default('localhost') }}"
    _ri_orig_conn: "{{ ansible_connection | default('local') }}"

# Step 1: Determine which ID to look up
- name: Use provided ID
  ansible.builtin.set_fact:
    _resolved_id: "{{ id }}"
  when: id is defined and id != ''

- name: Resolve ID from host (remote, no ID)
  when:
    - id is not defined or id == ''
    - _ri_orig_host != 'localhost' or _ri_orig_conn == 'ssh'
  block:
    - name: Query instances on this host
      canasta_registry:
        state: query_all
        filter_host: "{{ _ri_orig_host }}"
      delegate_to: localhost
      vars:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      register: _host_instances

    - name: Fail if no instances on this host
      ansible.builtin.fail:
        msg: >-
          No Canasta instances registered on
          '{{ _ri_orig_host }}'.
      when: _host_instances.instances | length == 0

    - name: Fail if multiple instances on this host
      ansible.builtin.fail:
        msg: >-
          Multiple instances on '{{ _ri_orig_host }}'.
          Specify --id:
          {{ _host_instances.instances.keys()
             | list | join(', ') }}
      when: _host_instances.instances | length > 1

    - name: Set auto-resolved ID
      ansible.builtin.set_fact:
        _resolved_id: "{{ (_host_instances.instances | dict2items | first).key }}"
      when: _host_instances.instances | length == 1

- name: Resolve ID from working directory (localhost)
  when:
    - id is not defined or id == ''
    - _ri_orig_host == 'localhost' and _ri_orig_conn != 'ssh'
  block:
    - name: Look up by PWD
      canasta_registry:
        path: "{{ lookup('env', 'CANASTA_HOST_PWD') | default(lookup('env', 'PWD'), true) }}"
        state: query_by_path
      delegate_to: localhost
      vars:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      register: _pwd_lookup

    - name: Set PWD-resolved ID
      ansible.builtin.set_fact:
        _resolved_id: "{{ _pwd_lookup.instance.id }}"

# Step 2: Single query with the resolved ID
- name: Look up resolved instance
  canasta_registry:
    id: "{{ _resolved_id }}"
    state: query
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _instance_result

- name: Set instance facts
  ansible.builtin.set_fact:
    instance_id: "{{ _instance_result.instance.id }}"
    instance_path: "{{ _instance_result.instance.path }}"
    instance_orchestrator: "{{ _instance_result.instance.orchestrator | default('compose') }}"
    instance_devmode: "{{ _instance_result.instance.devMode | default(false) }}"
    instance_managed_cluster: "{{ _instance_result.instance.managedCluster | default(false) }}"
    _instance_host: "{{ _instance_result.instance.host | default('localhost') }}"

# Switch connection to the instance's registered host so commands
# run on the correct machine even without -H.
- name: Switch connection to instance host
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/switch_connection.yml"
