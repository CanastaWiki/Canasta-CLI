---
# Load all variables from an instance's .env file.
# Input: instance_path (str)
# Output fact: instance_env (dict)

- name: Read .env file
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _env_result

- name: Set instance_env fact
  ansible.builtin.set_fact:
    instance_env: "{{ _env_result.variables }}"
