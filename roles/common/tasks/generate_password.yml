---
# Generate a secure password matching Go CLI format.
# 30 chars, includes uppercase, digits, and symbols.
# Replaces '$' with '#' due to MediaWiki bug T355013.
#
# Output fact: _generated_password

- name: Generate secure password
  ansible.builtin.set_fact:
    _generated_password: >-
      {{ lookup('ansible.builtin.password', '/dev/null length=30 chars=ascii_letters,digits,!@#%^&*') | regex_replace('\$', '#') }}
