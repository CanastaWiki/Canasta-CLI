---
# Register the CrowdSec engine with the Central API (CAPI), which enables the
# community blocklist and is a prerequisite for console-enroll. With a
# persistent /etc/crowdsec volume the image does not self-register, so we do.
# Idempotent: skips once `cscli capi status` succeeds.
# Input: instance_path (the crowdsec engine must already be running)

# Called directly from start.yml (not via _preflight), so build the cscli
# prefix here. Idempotent — safe to include on every start.
- name: Build the cscli command prefix for this orchestrator
  ansible.builtin.include_tasks: _resolve_cscli.yml

- name: Check whether CrowdSec is registered with the Central API
  ansible.builtin.command:
    cmd: "{{ _cscli_prefix }} cscli capi status"
    chdir: "{{ _cscli_chdir | default(omit) }}"
  register: _crowdsec_capi_status
  changed_when: false
  failed_when: false

- name: Register the engine with the Central API
  when: _crowdsec_capi_status.rc != 0
  block:
    - name: Announce CAPI registration
      ansible.builtin.debug:
        msg: >-
          Registering the CrowdSec engine with the Central API so the
          community blocklist is active...

    # cscli writes the credentials to stdout; redirect them into the
    # credentials file. no_log so they never reach Ansible output.
    - name: Register CAPI and write the credentials file
      ansible.builtin.command:
        cmd: >-
          {{ _cscli_prefix }}
          sh -c 'cscli capi register > /etc/crowdsec/online_api_credentials.yaml'
        chdir: "{{ _cscli_chdir | default(omit) }}"
      changed_when: true
      no_log: true

    - name: Restart the engine so it loads the CAPI credentials
      ansible.builtin.include_tasks: _restart_engine.yml
