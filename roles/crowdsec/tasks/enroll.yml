---
# canasta crowdsec enroll - register the Caddy bouncer with the CrowdSec
# engine, persist its API key, and restart so it starts enforcing.
# Input: id (optional), force (bool)

- name: Preflight (resolve, Compose-only, crowdsec running)
  ansible.builtin.include_tasks: _preflight.yml

- name: Read current bouncer key from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: CROWDSEC_BOUNCER_API_KEY
  register: _crowdsec_key

- name: List registered bouncers
  ansible.builtin.command:
    cmd: "docker compose exec -T crowdsec cscli bouncers list -o json"
    chdir: "{{ instance_path }}"
  register: _crowdsec_bouncers
  changed_when: false

# cscli prints "null" (not "[]") when no bouncers exist, so coalesce to
# an empty list before parsing.
- name: Parse bouncer list
  ansible.builtin.set_fact:
    _crowdsec_bouncer_list: "{{ ((_crowdsec_bouncers.stdout | trim) or '[]') | from_json }}"

- name: Determine enrollment state
  ansible.builtin.set_fact:
    _crowdsec_existing: >-
      {{ 'canasta-caddy' in
         ((_crowdsec_bouncer_list or []) | map(attribute='name') | list) }}
    _crowdsec_have_key: "{{ _crowdsec_key.value | default('') | length > 0 }}"

- name: Report already enrolled (idempotent no-op)
  ansible.builtin.debug:
    msg: >-
      CrowdSec bouncer 'canasta-caddy' is already enrolled and a key is
      stored for instance '{{ instance_id }}'. Nothing to do — use
      --force to revoke it and issue a fresh key.
  when:
    - _crowdsec_existing | bool
    - _crowdsec_have_key | bool
    - not (force | default(false) | bool)

# Enroll when forced, when no bouncer is registered yet, or when one is
# registered but we have no stored key (cscli can't reveal an existing
# key, so the only way to recover is to revoke and re-issue).
- name: Enroll the bouncer
  when: >-
    (force | default(false) | bool)
    or (not (_crowdsec_existing | bool))
    or (not (_crowdsec_have_key | bool))
  block:
    - name: Revoke existing bouncer registration
      ansible.builtin.command:
        cmd: "docker compose exec -T crowdsec cscli bouncers delete canasta-caddy --ignore-missing"
        chdir: "{{ instance_path }}"
      changed_when: true
      when: _crowdsec_existing | bool

    - name: Register the bouncer and capture its API key
      ansible.builtin.command:
        cmd: "docker compose exec -T crowdsec cscli bouncers add canasta-caddy -o raw"
        chdir: "{{ instance_path }}"
      register: _crowdsec_add
      changed_when: true
      no_log: true

    - name: Announce key storage and restart
      ansible.builtin.debug:
        msg: >-
          Registered bouncer 'canasta-caddy'. Storing its key and
          restarting to activate it (the steps below are suppressed to
          keep the key out of the logs)...

    - name: Store the key, re-render the Caddyfile, and restart
      ansible.builtin.include_role:
        name: config
        tasks_from: set.yml
      vars:
        settings: "CROWDSEC_BOUNCER_API_KEY={{ _crowdsec_add.stdout | trim }}"
      no_log: true

    - name: Report success
      ansible.builtin.debug:
        msg: >-
          CrowdSec bouncer 'canasta-caddy' is enrolled and active for
          instance '{{ instance_id }}'.
