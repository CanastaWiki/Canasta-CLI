---
# Restart the CrowdSec engine to reload its config / freshly-written
# credentials. Compose: restart just the crowdsec service. K8s: the engine
# is a sidecar in the caddy pod, so roll the caddy deployment — this bounces
# Caddy too (coarser than Compose), but the bouncer reconnects and resumes
# enforcing once the engine is back. The caddy deployment uses the Recreate
# strategy when CrowdSec is on (the sidecar holds a ReadWriteOnce PVC that a
# surge pod could not co-mount), so the rollout is terminate-then-create; we
# wait for it to finish so callers can immediately exec into the new pod.
# Input: instance_id, instance_path, instance_orchestrator

- name: Restart the CrowdSec engine (Compose)
  ansible.builtin.command:
    cmd: "{{ compose_command }} restart crowdsec"
    chdir: "{{ instance_path }}"
  changed_when: true
  when: instance_orchestrator | default('compose') == 'compose'

- name: Restart the CrowdSec engine (Kubernetes)
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Roll the caddy deployment (hosts the crowdsec sidecar)
      ansible.builtin.command:
        cmd: >-
          kubectl rollout restart deployment/canasta-{{ instance_id }}-caddy
          -n canasta-{{ instance_id }}
      changed_when: true

    - name: Wait for the rollout to complete
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status deployment/canasta-{{ instance_id }}-caddy
          -n canasta-{{ instance_id }} --timeout=300s
      changed_when: false
