---
# Shared preflight for crowdsec subcommands: resolve the instance, refuse
# on non-Compose orchestrators, and verify the crowdsec service is up.
# Output: instance_id, instance_path, instance_orchestrator (+ the rest
# of resolve_instance's facts).

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Refuse on non-Compose orchestrators
  ansible.builtin.fail:
    msg: >-
      CrowdSec is a Docker Compose feature. Instance '{{ instance_id }}'
      runs on {{ instance_orchestrator }}; there is no CrowdSec
      integration for Kubernetes yet.
  when: instance_orchestrator | default('compose') not in ['compose']

- name: List running services
  ansible.builtin.command:
    cmd: "docker compose ps --services --filter status=running"
    chdir: "{{ instance_path }}"
  register: _crowdsec_running
  changed_when: false

- name: Refuse when the crowdsec service is not running
  ansible.builtin.fail:
    msg: >-
      The crowdsec service is not running for instance
      '{{ instance_id }}'. Enable it first with
      'canasta config set CANASTA_ENABLE_CROWDSEC=true', then retry.
  when: "'crowdsec' not in (_crowdsec_running.stdout_lines | default([]))"
