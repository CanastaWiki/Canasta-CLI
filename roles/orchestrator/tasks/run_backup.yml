---
# Run a restic command. Dispatches to Docker or Kubernetes.
#
# Input:
#   instance_path - path to the Canasta instance
#   backup_args - list of restic arguments
#   backup_volumes - dict of host_path: container_path to stage
#     (optional, only for backup create on Compose)
# Output:
#   _restic_result - command result

- name: Run backup (Kubernetes)
  ansible.builtin.include_tasks: k8s_run_backup.yml
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']

- name: Run backup (Compose)
  when: instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Set backup volume name
      ansible.builtin.set_fact:
        _bvol: "canasta-backup-{{ instance_path | basename }}"

    - name: Ensure backup volume exists
      ansible.builtin.command:
        cmd: "docker volume create {{ _bvol }}"
      changed_when: true

    - name: Stage files into backup volume
      when: >-
        backup_volumes is defined
        and backup_volumes | length > 0
      block:
        - name: Build and run staging container
          ansible.builtin.shell:
            cmd: |
              docker run --rm \
                -v {{ _bvol }}:/currentsnapshot \
              {% for src, dst in backup_volumes.items() %}
                -v {{ src }}:/src{{ loop.index0 }}:ro \
              {% endfor %}
                alpine sh -c \
                "rm -rf /currentsnapshot/* && \
              {% for src, dst in backup_volumes.items() %}
                mkdir -p $(dirname {{ dst }}) && cp -a /src{{ loop.index0 }} {{ dst }}{{ ' && ' if not loop.last else '' }} \
              {% endfor %}
                "
          changed_when: true

    - name: Read RESTIC_REPOSITORY from .env
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: RESTIC_REPOSITORY
      register: _backup_repo_env

    - name: Detect local repo (from .env or -r flag)
      ansible.builtin.set_fact:
        _backup_local_repo: >-
          {{ (_backup_repo_env.value | default('')
              is match('^/'))
             | ternary(_backup_repo_env.value, '') }}

    - name: Read RESTIC_PASSWORD from .env
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: RESTIC_PASSWORD
      register: _backup_pw_env
      no_log: true

    # Fail fast with a clear message instead of letting restic emit an
    # opaque error. Mirrors the Kubernetes path (k8s_run_backup.yml), so
    # both orchestrators behave the same way. backup has no -r override —
    # the repo always comes from .env — so requiring both here is safe.
    - name: Fail if restic repository or password is not configured
      ansible.builtin.fail:
        msg: "RESTIC_REPOSITORY and RESTIC_PASSWORD must be set in .env."
      when: >-
        (_backup_repo_env.value | default('')) == ''
        or (_backup_pw_env.value | default('')) == ''

    # Quoted values and CRLF endings are stripped by canasta_env on read
    # (so `canasta config get` looks fine) but pass through Docker's
    # --env-file literally, a common cause of restic "wrong password".
    # Surface it as an advisory rather than failing.
    - name: Check .env for quoted or CRLF values
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: lint
      register: _backup_env_lint

    - name: Build .env hygiene warning
      ansible.builtin.set_fact:
        _backup_env_warn: >-
          {{ ([] if _backup_env_lint.quoted_keys | length == 0
               else ['quoted values (' + (_backup_env_lint.quoted_keys | join(', ')) + ')'])
             + ([] if not _backup_env_lint.has_crlf else ['CRLF line endings']) }}

    - name: Warn about quoted or CRLF .env values
      ansible.builtin.debug:
        msg: >-
          Warning: {{ instance_path }}/.env has {{ _backup_env_warn | join(' and ') }}.
          Docker --env-file passes these to restic literally (unlike
          'canasta config get', which strips them) — a common cause of restic
          'wrong password' or backend auth failures. Remove surrounding quotes
          and use LF line endings.
      when: _backup_env_warn | length > 0

    - name: Run restic container
      ansible.builtin.shell:
        cmd: |
          docker run --rm -i \
            --env-file {{ instance_path }}/.env \
            -v {{ _bvol }}:/currentsnapshot \
          {% if _backup_local_repo %}
            -v {{ _backup_local_repo }}:{{ _backup_local_repo }} \
          {% endif %}
            restic/restic \
            --cache-dir /tmp/restic-cache \
            {{ backup_args | join(' ') }}
        chdir: "{{ instance_path }}"
      register: _compose_restic_result
      changed_when: true

    - name: Set restic result from Compose
      ansible.builtin.set_fact:
        _restic_result:
          stdout: "{{ _compose_restic_result.stdout }}"
          rc: "{{ _compose_restic_result.rc }}"
