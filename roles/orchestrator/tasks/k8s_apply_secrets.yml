---
# Create K8s Secrets for database credentials and MediaWiki secret key.
# Must run before helm_deploy.yml.
# Input: instance_id, _k8s_namespace, _rootdbpass, _wikidbpass, _mw_secret_key

- name: Create namespace for secrets
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ _k8s_namespace }}"

- name: Create DB credentials secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ instance_id }}-db-credentials"
        namespace: "{{ _k8s_namespace }}"
      type: Opaque
      stringData:
        MYSQL_ROOT_PASSWORD: "{{ _rootdbpass }}"
        MYSQL_PASSWORD: "{{ _wikidbpass }}"
  no_log: true

- name: Create MW secrets
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ instance_id }}-mw-secrets"
        namespace: "{{ _k8s_namespace }}"
      type: Opaque
      stringData:
        MW_SECRET_KEY: "{{ _mw_secret_key }}"
  no_log: true
