---
# Start containers for an instance.
# Dispatches to Compose or Kubernetes based on instance_orchestrator.
# Input: instance_path, instance_devmode (bool), instance_orchestrator

- name: Start (Docker Compose)
  when: instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Sync compose profiles
      ansible.builtin.include_tasks: sync_compose_profiles.yml

    - name: Check for docker-compose.override.yml
      ansible.builtin.stat:
        path: "{{ instance_path }}/docker-compose.override.yml"
      register: _override_exists

    - name: Build compose file arguments
      ansible.builtin.set_fact:
        _compose_files: >-
          {{ ['-f', 'docker-compose.yml'] +
             (_override_exists.stat.exists | ternary(['-f', 'docker-compose.override.yml'], [])) +
             ((instance_devmode | default(false) | bool) | ternary(['-f', 'docker-compose.dev.yml'], [])) }}

    - name: Report starting containers
      ansible.builtin.debug:
        msg: "Starting containers..."

    - name: Start containers
      ansible.builtin.command:
        cmd: "docker compose {{ _compose_files | join(' ') }} up -d"
        chdir: "{{ instance_path }}"
      register: _start_result
      changed_when: true
      failed_when: false

    # When docker compose up fails (typically an unhealthy container),
    # capture per-service logs and state before we bail out. The caller
    # usually rolls back (docker compose down) on failure, which wipes
    # the containers — so any post-hoc dump from the controller sees
    # nothing. Capturing here, before propagating the error, is the
    # only reliable way to see WHY a container was unhealthy.
    - name: Capture compose state on failure
      ansible.builtin.command:
        cmd: "docker compose {{ _compose_files | join(' ') }} ps -a"
        chdir: "{{ instance_path }}"
      register: _start_ps
      changed_when: false
      failed_when: false
      when: _start_result.rc != 0

    - name: Capture compose logs on failure
      ansible.builtin.command:
        cmd: "docker compose {{ _compose_files | join(' ') }} logs --tail=200 --no-color"
        chdir: "{{ instance_path }}"
      register: _start_logs
      changed_when: false
      failed_when: false
      when: _start_result.rc != 0

    # Ansible's default callback swallows stderr/stdout for failed
    # command modules under the compact "[ERROR]: Task failed: ..."
    # rendering. Register with failed_when: false and fail explicitly
    # so the full output is visible in CI/operator logs.
    - name: Fail with full output if docker compose up failed
      ansible.builtin.fail:
        msg: |-
          docker compose up exited with rc={{ _start_result.rc }}
          --- STDOUT ---
          {{ _start_result.stdout | default('(empty)') }}
          --- STDERR ---
          {{ _start_result.stderr | default('(empty)') }}
          --- docker compose ps -a ---
          {{ _start_ps.stdout | default('(not captured)') }}
          --- docker compose logs (last 200) ---
          {{ _start_logs.stdout | default('(not captured)') }}
      when: _start_result.rc != 0

    # Wait for the web container to finish booting before returning.
    # /run-all.sh in the canasta image runs `composer update`
    # synchronously before starting apache; install.php and any other
    # `docker compose exec web php …` task that runs immediately after
    # `up -d` will race composer and crash with "vendor/composer/...
    # bootstrap.php: No such file or directory" if vendor is mid-write.
    # The CanastaBase HEALTHCHECK probes /server-status, which only
    # responds once both composer AND apache have finished — so
    # "healthy" is the right gate. Custom images that do not declare a
    # HEALTHCHECK skip the wait (we trust them to define their own
    # readiness contract).
    - name: Get web container id
      ansible.builtin.command:
        cmd: "docker compose {{ _compose_files | join(' ') }} ps -q web"
        chdir: "{{ instance_path }}"
      register: _start_web_cid
      changed_when: false

    - name: Probe whether web declares a healthcheck
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - "-f"
          - "{% raw %}{{if .State.Health}}has{{end}}{% endraw %}"
          - "{{ _start_web_cid.stdout | trim }}"
      register: _start_web_has_health
      changed_when: false
      when: _start_web_cid.stdout | trim != ''

    # Up to 60 retries × 10s = 10 min — comfortably above the
    # CanastaBase healthcheck's 5 min --start-period plus a slow
    # first-time composer install.
    - name: Wait for web container to report healthy
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - "-f"
          - "{% raw %}{{.State.Health.Status}}{% endraw %}"
          - "{{ _start_web_cid.stdout | trim }}"
      register: _start_web_health
      changed_when: false
      retries: 60
      delay: 10
      until: _start_web_health.stdout | trim == 'healthy'
      when:
        - _start_web_cid.stdout | trim != ''
        - _start_web_has_health.stdout | default('') | trim == 'has'

- name: Start (Kubernetes)
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Set K8s namespace
      ansible.builtin.set_fact:
        _k8s_namespace: "canasta-{{ instance_id }}"

    # Slurp values.yaml from the target host once and parse it. All
    # three downstream reads (web.replicaCount, db.enabled,
    # argocd.syncPolicy) used to call lookup('file', instance_path ~
    # '/values.yaml'), which runs on the controller — broken when
    # controller and target are different hosts (#514). Same fix shape
    # PR #115 used for init_kubernetes.yml and push_kubernetes.yml.
    - name: Read values.yaml from target
      ansible.builtin.slurp:
        src: "{{ instance_path }}/values.yaml"
      register: _start_values_raw

    - name: Parse values.yaml
      ansible.builtin.set_fact:
        _start_values: "{{ _start_values_raw.content | b64decode | from_yaml }}"

    - name: Sync config to ConfigMaps
      ansible.builtin.include_tasks: k8s_sync_config.yml

    - name: Check if instance is scaled to zero
      ansible.builtin.command:
        cmd: >-
          kubectl get deployment canasta-{{ instance_id }}-web
          -n {{ _k8s_namespace }}
          -o jsonpath={.spec.replicas}
      register: _current_replicas
      changed_when: false
      ignore_errors: true  # OK if deployment doesn't exist yet

    - name: Apply values and upgrade Helm release
      ansible.builtin.include_tasks: helm_deploy.yml

    - name: Restore replica counts after stop
      when: (_current_replicas.stdout | default('0')) == '0'
      block:
        - name: Read web replica count from values
          ansible.builtin.set_fact:
            _web_replicas: "{{ _start_values.get('web', {}).get('replicaCount', 1) }}"

        # External-DB instances with Elasticsearch disabled have no
        # StatefulSets; 'kubectl scale --all' errors with "no objects
        # passed to scale". Check first and skip if none exist.
        - name: Check for statefulsets before scaling
          ansible.builtin.command:
            cmd: "kubectl get statefulset -n {{ _k8s_namespace }} -o name"
          register: _start_sts_list
          changed_when: false

        - name: Scale up statefulsets
          ansible.builtin.command:
            cmd: >-
              kubectl scale statefulset --all --replicas=1
              -n {{ _k8s_namespace }}
          changed_when: true
          when: _start_sts_list.stdout_lines | length > 0

        - name: Scale up web deployment
          ansible.builtin.command:
            cmd: >-
              kubectl scale deployment canasta-{{ instance_id }}-web
              --replicas={{ _web_replicas }}
              -n {{ _k8s_namespace }}
          changed_when: true

        - name: Scale up remaining deployments
          ansible.builtin.command:
            cmd: >-
              kubectl scale deployment
              canasta-{{ instance_id }}-caddy
              canasta-{{ instance_id }}-jobrunner
              canasta-{{ instance_id }}-varnish
              --replicas=1
              -n {{ _k8s_namespace }}
          changed_when: true
          ignore_errors: true  # OK if some deployments don't exist

    # Skip the DB readiness wait when the instance uses an external
    # database (db.enabled: false). In that case there's no bundled
    # -db StatefulSet and the rollout-status call errors with NotFound.
    - name: Read db.enabled from values.yaml
      ansible.builtin.set_fact:
        _db_enabled: "{{ _start_values.get('db', {}).get('enabled', true) }}"

    - name: Wait for DB readiness
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status statefulset/canasta-{{ instance_id }}-db
          -n {{ _k8s_namespace }} --timeout=300s
      changed_when: false
      when: _db_enabled | bool

    - name: Wait for web readiness
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status deployment/canasta-{{ instance_id }}-web
          -n {{ _k8s_namespace }} --timeout=300s
      changed_when: false

    # Re-enable Argo CD auto-sync after start. The stop flow suspends
    # sync to prevent selfHeal from reverting the scale-to-zero. We
    # read the sync policy from the instance's values.yaml so we
    # restore whatever the user configured, not a hardcoded default.
    - name: Check if Argo CD Application exists for this instance
      ansible.builtin.command:
        cmd: >-
          kubectl get application canasta-{{ instance_id }}
          -n {{ argocd_namespace | default('argocd') }}
          -o jsonpath={.metadata.name}
      register: _start_argocd_app
      changed_when: false
      ignore_errors: true  # OK if no Argo CD app exists

    - name: Re-enable Argo CD auto-sync
      when: _start_argocd_app.rc == 0
      block:
        - name: Read sync policy from values.yaml
          ansible.builtin.set_fact:
            _argocd_sync_policy: "{{ _start_values.get('argocd', {}).get('syncPolicy', {}) }}"

        - name: Build sync policy patch
          ansible.builtin.set_fact:
            _sync_patch:
              spec:
                syncPolicy:
                  automated:
                    selfHeal: "{{ _argocd_sync_policy.get('selfHeal', true) }}"
                    prune: "{{ _argocd_sync_policy.get('prune', true) }}"
                  syncOptions:
                    - CreateNamespace=true

        - name: Patch Application to restore auto-sync
          ansible.builtin.command:
            cmd: >-
              kubectl patch application canasta-{{ instance_id }}
              -n {{ argocd_namespace | default('argocd') }}
              --type merge -p '{{ _sync_patch | to_json }}'
          changed_when: true
