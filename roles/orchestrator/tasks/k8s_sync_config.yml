---
# Sync instance config directory to Kubernetes ConfigMaps.
# Creates/updates per-container ConfigMaps from the instance's config files.
# Input: instance_path, instance_id
#
# ConfigMaps created:
#   canasta-<id>-web-config     — wikis.yaml, .env, settings/*, composer.local.json
#   canasta-<id>-env            — allowlisted runtime env vars parsed from .env
#   canasta-<id>-caddy-config   — Caddyfile, Caddyfile.site
#   canasta-<id>-varnish-config — default.vcl
#   canasta-<id>-db-config      — my.cnf

- name: Set K8s namespace and pod env allowlist
  ansible.builtin.set_fact:
    _k8s_namespace: "canasta-{{ instance_id }}"
    # The subset of .env keys that should land in the web/jobrunner
    # pod's environment on K8s. Mirrors the Compose template's
    # `environment:` block for the web service. Secrets
    # (MYSQL_PASSWORD, MW_SECRET_KEY) are NOT in this list — they flow
    # through K8s Secrets instead. MW_SITE_SERVER, MW_SITE_FQDN, and
    # CANASTA_ENABLE_VARNISH also stay out because they're sourced from
    # values.yaml fields that double-duty as K8s-level config (Ingress
    # hostnames, Varnish deployment gate).
    #
    # This is an allowlist by design, not a gap: Compose likewise passes
    # only a curated `environment:` block, so an arbitrary app-defined
    # key (e.g. `config set --force MY_APP_KEY=...`) is NOT exported to
    # the web container's getenv() on either orchestrator. NON-SECRET .env
    # keys still reach the web tier via the ConfigMap mounted at
    # /mediawiki/config/.env (read by a settings fragment under
    # config/settings/global/ or .../wikis/<id>/, synced to both
    # orchestrators). SECRET-classified keys are stripped from that
    # ConfigMap .env (see the filter below) and reach pods only via
    # secretKeyRef from K8s Secrets — so a secret an app expects in the
    # process environment must be wired as a Secret, not read from .env.
    # (Compose still delivers secret .env keys to the container env; this
    # is a deliberate K8s-side hardening divergence.)
    _k8s_pod_env_allowlist:
      - PHP_UPLOAD_MAX_FILESIZE
      - PHP_POST_MAX_SIZE
      - PHP_MAX_INPUT_VARS
      - CANASTA_ENABLE_WIKI_DIRECTORY
      - CANASTA_ENABLE_VERY_SHORT_URLS
      - MW_SITEMAP_PAUSE_DAYS

# --- Gather config files ---

- name: Read .env
  ansible.builtin.slurp:
    src: "{{ instance_path }}/.env"
  register: _sync_env

- name: Read all .env entries as a dict (for pod env allowlist)
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _sync_env_dict
  no_log: true

- name: Read wikis.yaml
  ansible.builtin.slurp:
    src: "{{ instance_path }}/config/wikis.yaml"
  register: _sync_wikis

- name: Check if composer.local.json exists
  ansible.builtin.stat:
    path: "{{ instance_path }}/config/composer.local.json"
  register: _sync_composer_stat

- name: Read composer.local.json
  ansible.builtin.slurp:
    src: "{{ instance_path }}/config/composer.local.json"
  register: _sync_composer
  when: _sync_composer_stat.stat.exists

- name: Find all settings files
  ansible.builtin.find:
    paths: "{{ instance_path }}/config/settings"
    recurse: true
    file_type: file
    excludes: ["README"]
  register: _sync_settings_files

- name: Read each settings file
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  register: _sync_settings_contents
  loop: "{{ _sync_settings_files.files }}"
  loop_control:
    label: "{{ item.path | regex_replace('^.*/config/settings/', 'settings/') }}"

# Strip EVERY secret from the .env before embedding it in the web/jobrunner
# ConfigMap (and, on gitops, the committed values). Pods receive secrets only
# via secretKeyRef from K8s Secrets; this ConfigMap-backed /config/.env is
# never sourced for them, so stripping the full secret surface is safe and
# keeps all secrets out of the gitops repo. Classification is the canonical
# one (canasta_secret_key_regex) so no key can slip through a stale list.
- name: Filter secret-bearing keys out of .env for ConfigMap embedding
  ansible.builtin.set_fact:
    _sync_env_no_secrets: >-
      {{ (_sync_env.content | b64decode).splitlines()
         | reject('match', canasta_secret_key_regex)
         | join('\n') + '\n' }}

- name: Build web config data
  ansible.builtin.set_fact:
    _web_config_data: >-
      {{
        {'.env': _sync_env_no_secrets,
         'wikis.yaml': _sync_wikis.content | b64decode}
        | combine(
          (_sync_composer_stat.stat.exists | default(false))
          | ternary({'composer.local.json': _sync_composer.content | default('') | b64decode}, {}))
        | combine(
          dict(_sync_settings_contents.results
               | map(attribute='item')
               | zip(_sync_settings_contents.results)
               | map('list')
               | map(attribute='0.path')
               | map('regex_replace', '^.*/config/settings/', 'settings--')
               | map('regex_replace', '/', '--')
               | zip(_sync_settings_contents.results | map(attribute='content') | map('b64decode'))
               | list))
      }}

# Extract the allowlisted keys from .env into a plain dict. Keys not
# present in .env are skipped entirely — the pod then gets whatever
# default the image has built in, matching Compose behavior for
# unset vars.
- name: Build pod env config data
  ansible.builtin.set_fact:
    _env_config_data: >-
      {{ _sync_env_dict.variables | default({}) | dict2items
         | selectattr('key', 'in', _k8s_pod_env_allowlist)
         | items2dict }}

# --- Caddy config ---

- name: Read Caddyfile
  ansible.builtin.slurp:
    src: "{{ instance_path }}/config/Caddyfile"
  register: _sync_caddyfile

- name: Check optional caddy config files
  ansible.builtin.stat:
    path: "{{ item }}"
  register: _sync_optional_stats
  loop:
    - "{{ instance_path }}/config/Caddyfile.site"

- name: Set optional file existence flags
  ansible.builtin.set_fact:
    _has_caddyfile_site: "{{ _sync_optional_stats.results[0].stat.exists }}"

- name: Read Caddyfile.site
  ansible.builtin.slurp:
    src: "{{ instance_path }}/config/Caddyfile.site"
  register: _sync_caddyfile_site
  when: _has_caddyfile_site | bool

- name: Build caddy config data
  ansible.builtin.set_fact:
    _caddy_config_data: >-
      {{
        {'Caddyfile': _sync_caddyfile.content | b64decode}
        | combine((_has_caddyfile_site | bool)
          | ternary({'Caddyfile.site': _sync_caddyfile_site.content | default('') | b64decode}, {}))
      }}

# --- Varnish config ---
#
# default.vcl is the per-instance Varnish config — same file Compose
# uses, mounted from the operator's instance directory. Reading it
# here (instead of the Helm chart's bundled files/default.vcl) means:
#   - one canonical default.vcl in the repo
#     (instance_template/config/default.vcl)
#   - K8s operators get the same per-instance VCL customization
#     story as Compose: edit ~/canasta/<id>/config/default.vcl,
#     run canasta restart, the new VCL lands.

- name: Read default.vcl
  ansible.builtin.slurp:
    src: "{{ instance_path }}/config/default.vcl"
  register: _sync_default_vcl

- name: Build varnish config data
  ansible.builtin.set_fact:
    _varnish_config_data:
      default.vcl: "{{ _sync_default_vcl.content | b64decode }}"

# --- CrowdSec config ---
# Mirror the Compose acquisition + whitelist files into a ConfigMap the
# crowdsec sidecar mounts (see configmap-crowdsec.yaml). Backfill them first
# for instances that enabled CrowdSec after create, the same materialization
# concern ensure_crowdsec_config.yml handles for Compose.

- name: Determine CrowdSec enablement
  ansible.builtin.set_fact:
    _crowdsec_enabled_k8s: "{{ _sync_env_dict.variables.CANASTA_ENABLE_CROWDSEC | default('false') | lower == 'true' }}"

- name: Default crowdsec config data to empty
  ansible.builtin.set_fact:
    _crowdsec_config_data: {}

- name: Sync CrowdSec config when enabled
  when: _crowdsec_enabled_k8s | bool
  block:
    - name: Backfill crowdsec acquisition + whitelist files
      ansible.builtin.include_tasks: ensure_crowdsec_config.yml

    - name: Read crowdsec acquisition file
      ansible.builtin.slurp:
        src: "{{ instance_path }}/config/crowdsec/acquis.yaml"
      register: _sync_crowdsec_acquis

    - name: Read crowdsec whitelist file
      ansible.builtin.slurp:
        src: "{{ instance_path }}/config/crowdsec/whitelists.yaml"
      register: _sync_crowdsec_whitelists

    - name: Build crowdsec config data
      ansible.builtin.set_fact:
        _crowdsec_config_data:
          acquis.yaml: "{{ _sync_crowdsec_acquis.content | b64decode }}"
          whitelists.yaml: "{{ _sync_crowdsec_whitelists.content | b64decode }}"

# --- Backup environment Secret ---
# The backup Job (k8s_run_backup.yml) needs restic + DB env to land on
# the backup containers (scheduled runs go through the same Job via the
# host crontab). Build a single Secret
# from .env so envFrom: secretRef gives both flows everything they
# need — including cloud-backend creds (#497) and external-DB
# host/user (#498) — without per-task plumbing.
#
# Filter to backup-relevant prefixes plus the explicit MYSQL_HOST/
# USER/PASSWORD that the dump-databases init container uses. Other
# .env entries (MW_SITE_FQDN, CANASTA_ENABLE_*, …) stay out of this
# Secret — they're not relevant to backup, and a leaner Secret is
# easier to inspect with kubectl describe.
- name: Build backup env data
  ansible.builtin.set_fact:
    _backup_env_data: >-
      {{ _sync_env_dict.variables | default({}) | dict2items
         | selectattr('key', 'match',
             '^(' ~ canasta_backup_backend_prefixes | join('|')
             ~ '|MYSQL_HOST$|MYSQL_USER$|MYSQL_PASSWORD$)')
         | items2dict }}
  no_log: true

- name: Apply backup env Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "canasta-{{ instance_id }}-backup-env"
        namespace: "{{ _k8s_namespace }}"
      type: Opaque
      stringData: "{{ _backup_env_data }}"
  when: _backup_env_data | length > 0
  no_log: true

# --- CrowdSec bouncer-key Secret ---
# The caddy container reads CROWDSEC_BOUNCER_API_KEY via secretKeyRef from
# this Secret (deployment-caddy.yaml). It is created here — in the restart
# path — rather than k8s_apply_secrets.yml (create-time only) so that a key
# the bouncer enroll just minted reaches the running pod on the next start.
# Absent until enrollment: the secretKeyRef is optional, so Caddy starts
# key-less and only emits the crowdsec directive once a key exists.
- name: Build crowdsec bouncer key data
  ansible.builtin.set_fact:
    _crowdsec_key_data: >-
      {{ {'CROWDSEC_BOUNCER_API_KEY': _sync_env_dict.variables.CROWDSEC_BOUNCER_API_KEY}
         if (_crowdsec_enabled_k8s | bool
             and (_sync_env_dict.variables.CROWDSEC_BOUNCER_API_KEY | default('') | length) > 0)
         else {} }}
  no_log: true

- name: Apply crowdsec bouncer key Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "canasta-{{ instance_id }}-crowdsec"
        namespace: "{{ _k8s_namespace }}"
      type: Opaque
      stringData: "{{ _crowdsec_key_data }}"
  when: _crowdsec_key_data | length > 0
  no_log: true

# --- App secrets Secret ---
# Sidecar env keys listed in sidecars[].envSecret are sourced from this Secret
# via secretKeyRef (templates/sidecars.yaml). Values live in the gitignored
# config/secrets.env (written by `canasta config set --secret`), never in
# values.yaml or the gitops repo. Created here — in the sync/restart path, like
# the crowdsec key above — so a secret set after create reaches the pod on the
# next start. Absent until a secret is set: the block is skipped, so existing
# instances get no Secret (purely additive).
- name: Check for config/secrets.env
  ansible.builtin.stat:
    path: "{{ instance_path }}/config/secrets.env"
  register: _app_secrets_stat

- name: Read app secrets
  canasta_env:
    path: "{{ instance_path }}/config/secrets.env"
    state: read_all
  register: _app_secrets_dict
  when: _app_secrets_stat.stat.exists
  no_log: true

- name: Apply app secrets Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ instance_id }}-app-secrets"
        namespace: "{{ _k8s_namespace }}"
      type: Opaque
      stringData: "{{ _app_secrets_dict.variables | default({}) }}"
  when:
    - _app_secrets_stat.stat.exists
    - (_app_secrets_dict.variables | default({})) | length > 0
  no_log: true

# Web/jobrunner secrets: config/secrets-web lists the app-secret keys (names
# only) that should reach the web + jobrunner pods, set with
# `config set --secret --web`. They render as secretKeyRef env on those pods
# (deployment-web.yaml / deployment-jobrunner.yaml) via .Values.appSecretEnv.
- name: Check for config/secrets-web
  ansible.builtin.stat:
    path: "{{ instance_path }}/config/secrets-web"
  register: _app_secrets_web_stat

- name: Read web-exposed secret keys
  ansible.builtin.slurp:
    src: "{{ instance_path }}/config/secrets-web"
  register: _app_secrets_web_raw
  when: _app_secrets_web_stat.stat.exists

- name: Build appSecretEnv list
  ansible.builtin.set_fact:
    _app_secret_env: >-
      {{ ((_app_secrets_web_raw.content | b64decode).split('\n')
          | map('trim') | select() | reject('match', '^#') | list | unique)
         if _app_secrets_web_stat.stat.exists else [] }}

# --- Write configData into values.yaml ---
# The Helm chart templates render ConfigMaps from configData values.
# This allows both Ansible-driven and Argo CD-driven workflows to use
# the same mechanism.
#
# my.cnf is still NOT synced here — it ships as the chart's
# files/my.cnf and is small enough that operator customization
# isn't a real use case yet. If that changes, mirror the varnish
# pattern above.

- name: Write configData to separate values file
  ansible.builtin.copy:
    content: >-
      {{ {'configData': {
            'web': _web_config_data,
            'env': _env_config_data,
            'caddy': _caddy_config_data,
            'varnish': _varnish_config_data,
            'crowdsec': _crowdsec_config_data,
          },
          'appSecretEnv': _app_secret_env | default([])} | to_nice_yaml(indent=2) }}
    dest: "{{ instance_path }}/values-configdata.yaml"
    mode: "0644"
