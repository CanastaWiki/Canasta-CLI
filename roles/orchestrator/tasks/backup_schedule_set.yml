---
# canasta backup schedule set.
#
# The schedule is durable instance state: it is persisted to
# config/backup-schedule.yml (which the backup captures, on both
# orchestrators) and then materialized as a crontab entry. restore and
# gitops pull re-materialize the crontab from that file.
#
# Input: instance_id, instance_path, instance_orchestrator,
#        cron_expression, purge_older_than (optional)

- name: Persist the backup schedule to instance config
  ansible.builtin.copy:
    dest: "{{ instance_path }}/config/backup-schedule.yml"
    content: >-
      {{ ({'cron_expression': cron_expression}
          | combine({'purge_older_than': purge_older_than}
                    if (purge_older_than is defined and purge_older_than != '')
                    else {})) | to_nice_yaml }}
    mode: "0644"

- name: Materialize the schedule as a crontab entry
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/backup_schedule_apply.yml
