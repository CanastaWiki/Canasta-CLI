---
# Remove an instance's backup-schedule crontab entry on the host where the
# instance runs (Compose: the instance's host; K8s: the control-plane node).
# Also tears down any legacy in-cluster CronJob from before scheduling was
# unified on the crontab.
#
# Reused by: schedule remove, and the rematerialize step after restore /
# gitops pull when no schedule is persisted.
# Input: instance_id, instance_orchestrator

# A local containerized run edits the host crontab file the wrapper
# mounted (CANASTA_HOST_CRONTAB); native and remote edit the live crontab
# (remote over the connection resolve_instance switched to).
- name: Select crontab target
  ansible.builtin.set_fact:
    _sched_use_file: >-
      {{ (lookup('env', 'CANASTA_HOST_CRONTAB') != '')
         and (target_host is not defined)
         and (_instance_host | default('localhost') == 'localhost') }}

- name: Remove cron schedule (native / remote)
  ansible.builtin.cron:
    name: "canasta-backup-{{ instance_id }}"
    state: absent
  when: not _sched_use_file

- name: Remove cron schedule from the host crontab file
  ansible.builtin.blockinfile:
    path: "{{ lookup('env', 'CANASTA_HOST_CRONTAB') }}"
    marker: "# {mark} canasta-backup-{{ instance_id }}"
    state: absent
  when: _sched_use_file

# Migration: remove any legacy in-cluster CronJob from before scheduling
# moved to the crontab. Best-effort — connection is on the cp node.
- name: Remove legacy backup CronJob (Kubernetes)
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: CronJob
    name: "canasta-backup-{{ instance_id }}"
    namespace: "canasta-{{ instance_id }}"
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  ignore_errors: true  # OK if no CronJob / no cluster access
