---
# Generate kustomization.yaml for Kubernetes deployments.
# Equivalent of rewrite_caddy.yml for Compose.
# Input: instance_path, instance_id, instance_managed_cluster

- name: Set K8s namespace
  ansible.builtin.set_fact:
    _k8s_namespace: "{{ instance_path | basename }}"
    _managed_cluster: "{{ instance_managed_cluster | default(false) | bool }}"

- name: Read .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _kust_env

- name: Set feature flags
  ansible.builtin.set_fact:
    _varnish_enabled: "{{ _kust_env.variables.CANASTA_ENABLE_VARNISH | default('true') | lower == 'true' }}"
    _observable: "{{ _kust_env.variables.CANASTA_ENABLE_OBSERVABILITY | default('false') | lower == 'true' }}"
    _elasticsearch_enabled: "{{ _kust_env.variables.CANASTA_ENABLE_ELASTICSEARCH | default('false') | lower == 'true' }}"

- name: Parse CANASTA_IMAGE for kustomize image override (split on LAST colon)
  ansible.builtin.set_fact:
    _canasta_image_name: "{{ _kust_env.variables.CANASTA_IMAGE | default('') | regex_replace(':[^:]*$', '') }}"
    _canasta_image_tag: "{{ _kust_env.variables.CANASTA_IMAGE | default('') | regex_search('[^:]+$') | default('') }}"
  when: >-
    _kust_env.variables.CANASTA_IMAGE is defined and
    _kust_env.variables.CANASTA_IMAGE != '' and
    _kust_env.variables.CANASTA_IMAGE != canasta_default_image and
    ':' in _kust_env.variables.CANASTA_IMAGE

- name: Parse CANASTA_IMAGE without tag
  ansible.builtin.set_fact:
    _canasta_image_name: "{{ _kust_env.variables.CANASTA_IMAGE | default('') }}"
    _canasta_image_tag: ""
  when: >-
    _kust_env.variables.CANASTA_IMAGE is defined and
    _kust_env.variables.CANASTA_IMAGE != '' and
    _kust_env.variables.CANASTA_IMAGE != canasta_default_image and
    ':' not in _kust_env.variables.CANASTA_IMAGE

- name: Check for LocalSettings.php
  ansible.builtin.stat:
    path: "{{ instance_path }}/config/LocalSettings.php"
  register: _ls_check

- name: Set LocalSettings flag
  ansible.builtin.set_fact:
    _localsettings_exists: "{{ _ls_check.stat.exists }}"

- name: Scan global settings files
  ansible.builtin.find:
    paths: "{{ instance_path }}/config/settings/global"
    file_type: file
    excludes: ["README", ".gitkeep", ".gitignore"]
  register: _global_files

- name: Build global settings file list
  ansible.builtin.set_fact:
    _global_settings_files: "{{ _global_files.files | map(attribute='path') | map('relpath', instance_path) | list }}"

- name: Read wikis.yaml for per-wiki settings
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _kust_wikis

- name: Build per-wiki settings info
  ansible.builtin.set_fact:
    _kustomize_wikis: []

- name: Scan per-wiki settings directories
  ansible.builtin.include_tasks: _scan_wiki_settings.yml
  loop: "{{ _kust_wikis.wiki_ids }}"
  loop_control:
    loop_var: _scan_wiki_id

- name: Write kustomization.yaml
  ansible.builtin.template:
    src: "{{ role_path }}/templates/kustomization.yaml.j2"
    dest: "{{ instance_path }}/kustomization.yaml"
    mode: "0644"
