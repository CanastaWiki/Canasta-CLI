---
# Generate OpenSearch credentials if observability is enabled.
# Mirrors Go EnsureObservabilityCredentials().
# Input: instance_path

- name: Read .env for observability check
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _env_obs

- name: Check if observability is enabled
  ansible.builtin.set_fact:
    _obs_enabled: "{{ _env_obs.variables.CANASTA_ENABLE_OBSERVABILITY | default('false') | lower == 'true' }}"

- name: Generate observability credentials
  when: _obs_enabled | bool
  block:
    - name: Set OS_USER if empty
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: OS_USER
        value: admin
      when: _env_obs.variables.OS_USER | default('') == ''

    - name: Generate OS_PASSWORD if empty
      when: _env_obs.variables.OS_PASSWORD | default('') == ''
      block:
        - name: Generate password for OpenSearch
          ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/common/tasks/generate_password.yml"

        - name: Set OS_PASSWORD
          canasta_env:
            path: "{{ instance_path }}/.env"
            state: set
            key: OS_PASSWORD
            value: "{{ _generated_password }}"

    - name: Generate OS_PASSWORD_HASH if empty
      when: _env_obs.variables.OS_PASSWORD_HASH | default('') == ''
      block:
        - name: Read current OS_PASSWORD
          canasta_env:
            path: "{{ instance_path }}/.env"
            state: read
            key: OS_PASSWORD
          register: _os_pass

        - name: Generate bcrypt hash
          ansible.builtin.command:
            cmd: "python3 -c \"import bcrypt; print(bcrypt.hashpw(b'{{ _os_pass.value }}', bcrypt.gensalt()).decode())\""
          register: _bcrypt_result
          changed_when: false
          no_log: true

        - name: Set OS_PASSWORD_HASH
          canasta_env:
            path: "{{ instance_path }}/.env"
            state: set
            key: OS_PASSWORD_HASH
            value: "{{ _bcrypt_result.stdout | trim }}"
          no_log: true
