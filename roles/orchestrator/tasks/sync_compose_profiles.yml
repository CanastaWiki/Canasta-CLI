---
# Sync COMPOSE_PROFILES with feature flags in .env.
# Mirrors Go syncComposeProfiles().
# Input: instance_path

- name: Read .env for profile sync
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _env_profiles

- name: Parse current profiles
  ansible.builtin.set_fact:
    _current_profiles: >-
      {{ (_env_profiles.variables.COMPOSE_PROFILES | default(''))
         | split(',') | map('trim') | reject('equalto', '') | list }}

- name: Compute desired profiles
  ansible.builtin.set_fact:
    _desired_profiles: >-
      {{
        (_current_profiles | reject('in', ['observable', 'elasticsearch', 'varnish', 'crowdsec']) | list) +
        ((_env_profiles.variables.CANASTA_ENABLE_OBSERVABILITY | default('false') | lower == 'true') | ternary(['observable'], [])) +
        ((_env_profiles.variables.CANASTA_ENABLE_ELASTICSEARCH | default('false') | lower == 'true') | ternary(['elasticsearch'], [])) +
        ((_env_profiles.variables.CANASTA_ENABLE_VARNISH | default('true') | lower == 'true') | ternary(['varnish'], [])) +
        ((_env_profiles.variables.CANASTA_ENABLE_CROWDSEC | default('false') | lower == 'true') | ternary(['crowdsec'], []))
      }}

- name: Update COMPOSE_PROFILES in .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: set
    key: COMPOSE_PROFILES
    value: "{{ _desired_profiles | join(',') }}"
  when: _desired_profiles | sort != _current_profiles | sort

# The caddy service runs the plugin image when a plugin feature is on:
# CrowdSec (the bouncer), or a provider trusted-proxy mode
# (cloudflare/imperva, which need caddy-cdn-ranges). An explicit CIDR list
# uses Caddy's built-in 'static' source and runs on stock Caddy.
# CANASTA_CADDY_IMAGE is treated as Canasta-managed when it is empty or
# already holds the managed image — a custom value the operator set is
# left untouched. Mirrors _CADDY_PLUGIN_IMAGE in direct_commands/_helpers.py.
- name: Reconcile CANASTA_CADDY_IMAGE for plugin features
  vars:
    _crowdsec_on: "{{ _env_profiles.variables.CANASTA_ENABLE_CROWDSEC | default('false') | lower == 'true' }}"
    _tp_mode: "{{ _env_profiles.variables.CADDY_TRUSTED_PROXIES | default('') | trim | lower }}"
    _plugin_needed: "{{ _crowdsec_on or (_tp_mode in ['cloudflare', 'imperva']) }}"
    _current_caddy_image: "{{ _env_profiles.variables.CANASTA_CADDY_IMAGE | default('') }}"
    _plugin_caddy_image: "ghcr.io/canastawiki/canasta-caddy:2.10.2"
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: set
    key: CANASTA_CADDY_IMAGE
    value: "{{ _plugin_needed | ternary(_plugin_caddy_image, '') }}"
  when:
    - _current_caddy_image in ['', _plugin_caddy_image]
    - _current_caddy_image != (_plugin_needed | ternary(_plugin_caddy_image, ''))
