---
# Generate the main Caddyfile from wikis.yaml and .env settings.
# Mirrors Go RewriteCaddy().
# Input: instance_path

- name: Read wikis.yaml for Caddyfile generation
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _wikis_caddy

- name: Read .env for Caddyfile settings
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _env_caddy

- name: Determine Caddyfile parameters
  ansible.builtin.set_fact:
    _http_only: "{{ _env_caddy.variables.CADDY_AUTO_HTTPS | default('on') | lower == 'off' }}"
    _observable: "{{ _env_caddy.variables.CANASTA_ENABLE_OBSERVABILITY | default('false') | lower == 'true' }}"
    _varnish_enabled: "{{ _env_caddy.variables.CANASTA_ENABLE_VARNISH | default('true') | lower == 'true' }}"
    _staging_certs: "{{ _env_caddy.variables.CANASTA_STAGING_CERTS | default('false') | lower == 'true' }}"
    _os_user: "{{ _env_caddy.variables.OS_USER | default('admin') }}"
    _os_password_hash: "{{ _env_caddy.variables.OS_PASSWORD_HASH | default('') }}"
    # CrowdSec is only "active" (directive rendered) when the feature is
    # enabled AND a bouncer API key is present. Enabling the flag without
    # a key leaves Caddy in a clean degraded state — the bouncer image
    # runs but no crowdsec directive is emitted, so Caddy starts normally
    # and blocks nothing until the operator enrolls a bouncer. This is
    # the guard that prevents the unconditional-key startup failure that
    # got the original implementation reverted.
    _crowdsec_active: >-
      {{ (_env_caddy.variables.CANASTA_ENABLE_CROWDSEC | default('false') | lower == 'true')
         and (_env_caddy.variables.CROWDSEC_BOUNCER_API_KEY | default('') | length > 0) }}

- name: Refuse to render Caddyfile with empty observability credentials
  ansible.builtin.fail:
    msg: >-
      CANASTA_ENABLE_OBSERVABILITY is true but OS_PASSWORD_HASH is empty
      in .env. Rendering the Caddyfile now would produce a basicauth
      block with no password and crash the caddy container on next
      start. Run 'canasta config set CANASTA_ENABLE_OBSERVABILITY=true'
      to regenerate the credentials.
  when:
    - _observable | bool
    - _os_password_hash | length == 0

- name: Determine reverse proxy backend
  ansible.builtin.set_fact:
    _backend: "{{ (_varnish_enabled | bool) | ternary('varnish:80', 'web:80') }}"

# Trusted-proxy handling: when Caddy sits behind a CDN/proxy (Cloudflare,
# Imperva, an LB), recover the real client IP. 'cloudflare'/'imperva' are
# first-class modes that lock trusted_proxies to that provider's edge
# ranges and read its dedicated client-IP header — locking the ranges is
# what stops a direct-to-origin client from spoofing the header. Anything
# else is treated as an explicit comma-separated CIDR list using
# X-Forwarded-For (strict, right-to-left).
- name: Determine trusted-proxy mode
  ansible.builtin.set_fact:
    _tp_raw: "{{ _env_caddy.variables.CADDY_TRUSTED_PROXIES | default('') | trim }}"

- name: Normalize trusted-proxy mode
  ansible.builtin.set_fact:
    _tp_mode: "{{ _tp_raw | lower }}"
    _trusted_proxies_enabled: "{{ (_tp_raw | length) > 0 }}"

- name: Load provider edge ranges for trusted proxies
  ansible.builtin.include_vars:
    file: "{{ canasta_root }}/roles/orchestrator/vars/{{ _tp_mode }}_ips.yml"
  when: _tp_mode in ['cloudflare', 'imperva']

- name: Resolve trusted-proxy CIDRs, header, and strict mode
  ansible.builtin.set_fact:
    _trusted_proxies_cidrs: >-
      {{ cloudflare_ip_ranges if _tp_mode == 'cloudflare'
         else imperva_ip_ranges if _tp_mode == 'imperva'
         else (_tp_raw | split(',') | map('trim') | reject('equalto', '') | list) }}
    _trusted_proxies_headers: >-
      {{ 'Cf-Connecting-Ip' if _tp_mode == 'cloudflare'
         else 'Incap-Client-IP' if _tp_mode == 'imperva'
         else 'X-Forwarded-For' }}
    # Strict (right-to-left XFF) only matters for the generic X-Forwarded-For
    # path. The provider modes read a single-value dedicated header the
    # provider sets, so strict is moot there.
    _trusted_proxies_strict: "{{ _tp_mode not in ['cloudflare', 'imperva'] }}"
  when: _trusted_proxies_enabled | bool

- name: Extract unique server names from wiki URLs
  ansible.builtin.set_fact:
    _server_names: >-
      {{ _wikis_caddy.wikis | map(attribute='url') |
         map('regex_replace', '/.*$', '') |
         map('regex_replace', ':[0-9]+$', '') |
         unique | list }}

- name: Build site address
  ansible.builtin.set_fact:
    _site_address: >-
      {{ _server_names | map('regex_replace', '^(.*)$', ((_http_only | bool) | ternary('http://\1', '\1'))) | join(', ') }}

- name: Write Caddyfile from template
  ansible.builtin.template:
    src: "{{ canasta_root }}/roles/orchestrator/templates/Caddyfile.j2"
    dest: "{{ instance_path }}/config/Caddyfile"
    mode: "0644"
    # The Canasta web container's run-all.sh rsyncs $MW_ORIGIN_FILES
    # over the bind-mounted instance_path with --chown=www-data:www-data,
    # which leaves the host's config/ directory not writable by the
    # host runner user (only the existing Caddyfile is). Ansible's
    # default atomic write needs to create a temp file in the parent
    # directory and would fail with "Destination ... not writable".
    # unsafe_writes lets Ansible fall back to a direct overwrite of
    # the existing Caddyfile, which the runner *can* do because it
    # owns the file itself. The atomicity loss is fine — we're not
    # racing any other writer here.
    unsafe_writes: true
