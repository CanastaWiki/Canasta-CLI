---
# Bump the instance's configured image to the new default for the
# orchestrator. Kubernetes: update values.yaml image.tag. Compose:
# update CANASTA_IMAGE in .env (only when it's the default ghcr.io
# image and not a custom/local build).
# Input: instance_path, instance_orchestrator, canasta_default_image,
#        _upgrade_inst, _mig

# --- Update K8s values.yaml image tag ---
# Skip for build_from instances: their image is the registry-qualified local
# build (set at create), not a ghcr.io version tag — bumping it would point the
# pod at a non-existent tag. The rebuilt image is re-pushed under the same ref
# and re-pulled on restart (image.pullPolicy: Always for build_from).
- name: Update Kubernetes image tag in values.yaml
  when:
    - instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
    - _upgrade_inst.instance.buildFrom | default('') == ''
  block:
    - name: Read current values.yaml
      ansible.builtin.slurp:
        src: "{{ instance_path }}/values.yaml"
      register: _upgrade_values_raw

    - name: Update image tag
      ansible.builtin.set_fact:
        _upgrade_values: "{{ _upgrade_values_raw.content | b64decode | from_yaml }}"

    - name: Build updated values
      ansible.builtin.set_fact:
        _upgrade_new_values: >-
          {{ _upgrade_values | combine({
            'image': {
              'repository': _upgrade_values.image.repository
                | default('ghcr.io/canastawiki/canasta'),
              'tag': canasta_default_image
                | regex_replace('^[^:]+:', '')
            }
          }, recursive=True) }}

    - name: Write updated values.yaml
      ansible.builtin.copy:
        content: "{{ _upgrade_new_values | to_nice_yaml }}"
        dest: "{{ instance_path }}/values.yaml"
        mode: "0644"

    # On a gitops K8s instance, render_kubernetes.yml regenerates the deployed
    # values from values.template.yaml overlaid with hosts/<host>/vars.yaml's
    # image_tag — so the values.yaml write above is reverted on the next pull
    # unless image_tag is updated too. Update it to the bumped tag (stripped of
    # the repo prefix, matching how init/join record it). No-op off gitops.
    - name: Check if instance is gitops-managed
      ansible.builtin.stat:
        path: "{{ instance_path }}/.gitops-host"
      register: _upgrade_k8s_gitops_stat

    - name: Read gitops host name
      ansible.builtin.slurp:
        src: "{{ instance_path }}/.gitops-host"
      register: _upgrade_k8s_host
      when: _upgrade_k8s_gitops_stat.stat.exists | default(false)

    - name: Persist image_tag to gitops vars.yaml (durable across pulls)
      ansible.builtin.lineinfile:
        path: >-
          {{ instance_path }}/hosts/{{ _upgrade_k8s_host.content
             | b64decode | trim }}/vars.yaml
        regexp: "^image_tag:"
        line: "image_tag: {{ canasta_default_image | regex_replace('^[^:]+:', '') }}"
        state: present
      when: _upgrade_k8s_gitops_stat.stat.exists | default(false)

# --- Update Compose CANASTA_IMAGE tag ---
# Bump the tag if it's the default ghcr.io image,
# leave it alone if user set a custom/local-build image.
- name: Update Compose image tag
  when:
    - instance_orchestrator | default('compose') == 'compose'
    - _upgrade_inst.instance.buildFrom | default('') == ''
    # CANASTA_IMAGE was already read by the migration probe; reuse
    # those values instead of re-reading .env.
    - _mig.env_present.CANASTA_IMAGE
    - _mig.env.CANASTA_IMAGE is match('^ghcr\\.io/canastawiki/canasta:')
    - _mig.env.CANASTA_IMAGE != canasta_default_image
  block:
    - name: Update CANASTA_IMAGE to latest default tag
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: CANASTA_IMAGE
        value: "{{ canasta_default_image }}"

    # On a gitops instance the .env above is re-rendered from env.template on
    # the next pull, which would revert the tag. Persist it to the gitops
    # source (env.template placeholder + vars.yaml) via the same path config
    # set uses, so the upgrade survives the next pull. No-op off gitops.
    - name: Check if instance is gitops-managed
      ansible.builtin.stat:
        path: "{{ instance_path }}/.gitops-host"
      register: _upgrade_image_gitops_stat

    - name: Persist CANASTA_IMAGE to gitops source (durable across pulls)
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/config_update_gitops_vars.yml
      vars:
        _config_settings: "CANASTA_IMAGE={{ canasta_default_image }}"
        _config_gitops_stat: "{{ _upgrade_image_gitops_stat }}"
      when: _upgrade_image_gitops_stat.stat.exists | default(false)
