---
# Remove the backup staging directory after a snapshot.
#
# Compose-only work. The K8s path's dump-databases init container uses
# an emptyDir that's torn down with the Job — nothing to clean up, so
# this is a no-op on Kubernetes.
#
# Input: instance_path, instance_orchestrator

- name: Clean up backup staging directory (Compose)
  ansible.builtin.include_tasks:
    file: exec.yml
    # Apply to the included tasks — OK if backup dir doesn't exist.
    apply:
      ignore_errors: true
  vars:
    exec_service: web
    exec_command: "rm -rf /mediawiki/config/backup"
  when: instance_orchestrator | default('compose') == 'compose'
