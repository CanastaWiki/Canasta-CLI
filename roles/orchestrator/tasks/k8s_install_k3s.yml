---
# Install k3s on the target host.
# Input: install_k3s (bool)
# Idempotent — checks if k3s is already running.

# gather_facts is false globally — collect ansible_env.HOME for
# kubeconfig path.
- name: Gather minimal facts for HOME directory
  ansible.builtin.setup:
    filter: ansible_env

- name: Check if k3s is already running
  ansible.builtin.command:
    cmd: k3s kubectl cluster-info
  register: _k3s_running
  changed_when: false
  ignore_errors: true  # OK if k3s not installed yet

- name: Skip if k3s already running
  ansible.builtin.debug:
    msg: "k3s is already installed."
  when: _k3s_running.rc == 0

- name: Install k3s
  when: _k3s_running.rc != 0
  block:
    - name: Download and install k3s
      ansible.builtin.shell:
        cmd: "curl -sfL https://get.k3s.io | sh -"
      changed_when: true

    - name: Make k3s kubeconfig readable (before verification)
      ansible.builtin.file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: "0644"
      become: true
      retries: 10
      delay: 3
      until: _chmod_result is succeeded
      register: _chmod_result

    - name: Wait for k3s to be ready
      ansible.builtin.command:
        cmd: k3s kubectl cluster-info
      register: _k3s_ready
      until: _k3s_ready.rc == 0
      retries: 30
      delay: 5
      changed_when: false

# k3s bundles kubectl as 'k3s kubectl' but many tools (Helm, Ansible
# k8s modules) expect a standalone 'kubectl' binary on the PATH.
- name: Create kubectl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  become: true

- name: Check if helm is installed
  ansible.builtin.command:
    cmd: helm version --short
  register: _helm_installed
  changed_when: false
  ignore_errors: true

- name: Install helm
  ansible.builtin.shell:
    cmd: "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
  changed_when: true
  when: _helm_installed.rc != 0

# Ansible k8s modules require the Python kubernetes library.
- name: Check if Python kubernetes library is available
  ansible.builtin.command:
    cmd: "python3 -c 'import kubernetes'"
  register: _k8s_python
  changed_when: false
  ignore_errors: true

- name: Install Python kubernetes library
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
  become: true
  when: _k8s_python.rc != 0

# k3s kubeconfig permissions were already set in the install block
# above (before the wait-for-ready check). No need to repeat here.

- name: Ensure kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: "0700"

- name: Write kubeconfig
  ansible.builtin.shell:
    cmd: "sudo k3s kubectl config view --raw > {{ ansible_env.HOME }}/.kube/config"
  changed_when: true

- name: Set kubeconfig permissions
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube/config"
    mode: "0600"

- name: Report k3s status
  ansible.builtin.debug:
    msg: "k3s is running and kubeconfig is configured."
