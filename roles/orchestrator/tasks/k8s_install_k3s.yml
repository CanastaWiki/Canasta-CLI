---
# Install k3s on the target host.
# Input: install_k3s (bool)
# Idempotent — checks if k3s is already running.

# gather_facts is false globally — collect ansible_env.HOME for
# kubeconfig path.
- name: Gather minimal facts for HOME directory
  ansible.builtin.setup:
    filter: ansible_env

- name: Check if k3s is already running
  ansible.builtin.command:
    cmd: k3s kubectl cluster-info
  register: _k3s_running
  changed_when: false
  ignore_errors: true  # OK if k3s not installed yet

- name: Skip if k3s already running
  ansible.builtin.debug:
    msg: "k3s is already installed."
  when: _k3s_running.rc == 0

- name: Install k3s
  when: _k3s_running.rc != 0
  block:
    - name: Report installing Kubernetes
      ansible.builtin.debug:
        msg: "Installing Kubernetes (k3s)..."

    # When --public-ip is provided, each address is appended to the
    # k3s API server's cert via INSTALL_K3S_EXEC="--tls-san <addr>".
    # Empty string when not provided (k3s uses its default cert SANs:
    # 127.0.0.1, the node's internal IP, kubernetes.default.*).
    # --write-kubeconfig-mode 0644 persists a readable kubeconfig in the
    # k3s unit, so a k3s restart doesn't revert /etc/rancher/k3s/k3s.yaml
    # to root-only 0600 — which breaks every kubectl/helm task that runs
    # as the non-root SSH user (the one-time chmod below only covers the
    # fresh-install window, not subsequent restarts).
    - name: Build k3s install exec args
      ansible.builtin.set_fact:
        _k3s_install_exec: >-
          --write-kubeconfig-mode 0644
          {{ (public_ip | default([]))
             | map('regex_replace', '^(.*)$', '--tls-san \1')
             | join(' ') }}

    - name: Report public IPs being added to API server cert
      ansible.builtin.debug:
        msg: "Adding to k3s API server TLS cert: {{ public_ip | join(', ') }}"
      when: (public_ip | default([])) | length > 0

    # INSTALL_K3S_VERSION pins the release so the installer downloads it
    # directly from GitHub instead of asking update.k3s.io to resolve a
    # channel — removing that single point of failure and keeping every
    # node in the cluster on the same version (see canasta_k3s_version).
    # Launched detached and polled (resilient_exec): the installer downloads
    # and sets up k3s over a minute or more, and a controller-side SSH reset
    # mid-install would otherwise abort it. The k3s installer is idempotent,
    # so a re-run after a reset is safe.
    - name: Download and install k3s
      ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/resilient_exec.yml"
      vars:
        rx_name: "install k3s"
        rx_async: 600
        rx_cmd: >-
          curl -sfL --retry 3 --retry-delay 5 https://get.k3s.io |
          INSTALL_K3S_VERSION={{ canasta_k3s_version | quote }}
          INSTALL_K3S_EXEC={{ _k3s_install_exec | quote }} sh -

    - name: Make k3s kubeconfig readable (before verification)
      ansible.builtin.file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: "0644"
      become: true
      retries: 10
      delay: 3
      until: _chmod_result is succeeded
      register: _chmod_result

    - name: Wait for k3s to be ready
      ansible.builtin.command:
        cmd: k3s kubectl cluster-info
      register: _k3s_ready
      until: _k3s_ready.rc == 0
      retries: 30
      delay: 5
      changed_when: false

# Preserve the real client IP at the ingress. The k3s-bundled Traefik
# LoadBalancer defaults to externalTrafficPolicy: Cluster, which SNATs the
# source IP before it reaches Traefik/Caddy — breaking CrowdSec (all traffic
# looks private and is whitelisted) and accurate access logs. Dropping a k3s
# HelmChartConfig flips it to Local durably; k3s auto-applies manifests from
# this dir and the helm-controller reconciles Traefik (redeploys it on an
# existing cluster). Runs for fresh and existing clusters (outside the
# install-only block above).
- name: Preserve client IP — set Traefik externalTrafficPolicy=Local
  ansible.builtin.copy:
    src: traefik-externaltrafficpolicy.yaml
    dest: /var/lib/rancher/k3s/server/manifests/canasta-traefik-config.yaml
    mode: "0644"
  become: true

# k3s bundles kubectl as 'k3s kubectl' but many tools (Helm, Ansible
# k8s modules) expect a standalone 'kubectl' binary on the PATH.
- name: Create kubectl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  become: true

# In-cluster image registry (registry:2 at the fixed ClusterIP 10.43.0.2:5000)
# + the per-node certs.d trust DaemonSet, for locally built images (canasta
# create --build-from, custom service/sidecar images).
- name: Ensure the in-cluster image registry and per-node trust
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/k8s_ensure_registry.yml"
  vars:
    # Deploy best-effort at install — don't block cluster bootstrap on the
    # registry becoming ready (it's only needed for a later build-from push,
    # where create/upgrade wait for it).
    registry_wait: false

- name: Check if helm is installed
  ansible.builtin.command:
    cmd: helm version --short
  register: _helm_installed
  changed_when: false
  ignore_errors: true

# Launched detached and polled (resilient_exec) like the k3s install above.
- name: Install helm
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/resilient_exec.yml"
  vars:
    rx_name: "install helm"
    rx_async: 300
    rx_cmd: >-
      curl -fsSL --retry 3 --retry-delay 5
      https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
      | DESIRED_VERSION={{ canasta_helm_version | quote }} bash
  when: _helm_installed.rc != 0

# Ansible k8s modules require the Python kubernetes library.
- name: Check if Python kubernetes library is available
  ansible.builtin.command:
    cmd: "python3 -c 'import kubernetes'"
  register: _k8s_python
  changed_when: false
  ignore_errors: true

- name: Install Python kubernetes library
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: _k8s_python.rc != 0

# k3s kubeconfig permissions were already set in the install block
# above (before the wait-for-ready check). No need to repeat here.

- name: Ensure kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube"
    state: directory
    mode: "0700"

- name: Write kubeconfig
  ansible.builtin.shell:
    cmd: "sudo k3s kubectl config view --raw > {{ ansible_env.HOME }}/.kube/config"
  changed_when: true

- name: Set kubeconfig permissions
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.kube/config"
    mode: "0600"

- name: Report k3s status
  ansible.builtin.debug:
    msg: "k3s is running and kubeconfig is configured."
