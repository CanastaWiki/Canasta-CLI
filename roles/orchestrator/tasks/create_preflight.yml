---
# Pre-flight environment checks for `canasta create`, dispatched here by
# the orchestrator role so it owns the Compose-vs-Kubernetes difference
# (the caller, create's _preflight.yml, stays orchestrator-agnostic).
#
# Only Compose has early host probes that must run before any state
# mutation. Kubernetes preflight lives in k8s_preflight.yml and runs
# later, inside create's _validate_inputs.yml, coupled to the namespace
# stale-state check (it must confirm kubectl reachability immediately
# before it) and reused by the storage-setup playbooks — so there is no
# Kubernetes branch here.
#
# At this stage the raw extra-var `orchestrator` is authoritative; the
# `instance_orchestrator` fact isn't set until later in create.
- name: Compose create pre-flight checks
  when: orchestrator | default('compose') == 'compose'
  block:
    # Auto-detect rootless container socket on the target before the
    # first docker call fires. Only runs when the operator didn't pass
    # --docker-host; the play-level env expression in canasta.yml picks
    # up `_detected_docker_host` next-in-line. Probe is silent / cheap
    # even when nothing rootless is installed (`stdout` ends up empty).
    - name: Detect rootless container socket on target
      ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/detect_docker_socket.yml"
      when: (docker_host | default('')) == ''

    - name: Check Docker is available
      ansible.builtin.command:
        cmd: docker info
      register: _docker_check
      changed_when: false
      ignore_errors: true  # OK if Docker not installed

    - name: Fail if Docker not available
      ansible.builtin.fail:
        msg: >-
          Docker is not available on this host.
          Run 'canasta doctor' to check all dependencies.
      when: _docker_check.rc | default(0) != 0

    # Port 80/443 conflict detection for Compose. Compose's caddy
    # service binds host ports 80 and 443; if anything else is
    # already serving on them, `docker compose up` will either fail
    # the bind or — worse — appear to start while external traffic
    # silently lands on the foreign service.
    #
    # Two probes catch the common cases:
    #  1. `ss -tln` for a userspace listener (apache, nginx, haproxy,
    #     a docker-proxy from another canasta).
    #  2. `systemctl is-active k3s k3s-agent` for the k3s/Traefik
    #     case, where the LoadBalancer installs PREROUTING NAT rules
    #     ahead of Docker's chain — so port 80/443 traffic to the
    #     external IP gets routed to Traefik even though `ss` shows
    #     no host-level listener.
    #
    # Both probes hard-fail with a remediation hint. Neither needs
    # sudo. The k3s probe also catches a stopped-but-not-cleaned k3s
    # (rules may still be present after `systemctl stop` alone), so
    # the message points at k3s-killall too.
    - name: Probe for userspace listener on port 80
      ansible.builtin.command:
        argv:
          - ss
          - -tlnH
          - sport = :80
      register: _port80_listener
      changed_when: false
      failed_when: false

    - name: Probe for userspace listener on port 443
      ansible.builtin.command:
        argv:
          - ss
          - -tlnH
          - sport = :443
      register: _port443_listener
      changed_when: false
      failed_when: false

    - name: Fail if port 80 is already in use
      ansible.builtin.fail:
        msg: >-
          Port 80 is already in use on this host:
          {{ _port80_listener.stdout | trim }}.
          `canasta create` (Compose) needs ports 80 and 443 free for
          the caddy service. Stop the conflicting service or use a
          different host.
      when: _port80_listener.stdout | default('') | trim | length > 0

    - name: Fail if port 443 is already in use
      ansible.builtin.fail:
        msg: >-
          Port 443 is already in use on this host:
          {{ _port443_listener.stdout | trim }}.
          `canasta create` (Compose) needs ports 80 and 443 free for
          the caddy service. Stop the conflicting service or use a
          different host.
      when: _port443_listener.stdout | default('') | trim | length > 0

    - name: Probe whether k3s is running
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - k3s
          - k3s-agent
      register: _k3s_active
      changed_when: false
      failed_when: false

    # `systemctl is-active` prints one line per service. Treat any
    # 'active' line as a positive — even if only k3s-agent is active.
    - name: Fail if k3s is running
      ansible.builtin.fail:
        msg: >-
          k3s is running on this host. Its Traefik LoadBalancer
          installs iptables PREROUTING rules that intercept traffic
          to the host's external IP on ports 80 and 443 BEFORE
          Docker's NAT can claim them — Compose's caddy will appear
          to start but external requests will land on Traefik (and
          404). Stop k3s with 'sudo systemctl stop k3s' followed by
          'sudo /usr/local/bin/k3s-killall.sh' (the latter also
          flushes the lingering iptables rules), or use a different
          host for Compose installs.
      when: >-
        _k3s_active.stdout_lines | default([])
        | select('eq', 'active') | length > 0

    # Compose-only host memory preflight. The K8s path has its own
    # per-node memory check in k8s_preflight.yml — running this on a K8s
    # create would measure the controller host, not the cluster nodes,
    # which is the wrong thing.
    #
    # Threshold is 3500 MiB rather than a round 4096 MiB because cloud
    # instances marketed as "4 GiB" actually expose ~3700-3900 MiB to the
    # kernel after BIOS/UEFI/hypervisor reserves. AWS c7i-flex.large
    # (4 GiB advertised) reports ~3826 MiB MemTotal, for example. The
    # 3500 MiB floor is comfortably above what 2 GiB instances report
    # (~1700-1900 MiB) and below what real 4 GiB cloud instances report.
    - name: Check target host total memory (minimum 3500 MiB)
      ansible.builtin.command:
        cmd: >-
          python3 -c "import os;
          mem_mib = os.sysconf('SC_PAGE_SIZE')
          * os.sysconf('SC_PHYS_PAGES') // (1024**2);
          exit(0 if mem_mib >= 3500 else 1)"
      register: _mem_check
      changed_when: false
      ignore_errors: true  # OK if memory check unavailable

    - name: Fail if target host has less than 3500 MiB total memory
      ansible.builtin.fail:
        msg: >-
          Canasta requires at least 3500 MiB of total memory on the target
          host (in practice, a 4 GiB instance class or larger — cloud
          instances marketed as 4 GiB report ~3700-3900 MiB after kernel
          and firmware reserves). The host has less than that.
      when: _mem_check.rc | default(0) != 0

    # Compose-only host-gateway compatibility probe. The web service maps
    # gateway.docker.internal to the magic "host-gateway" value, which
    # podman only learned in 4.4 — on podman < 4.4, `compose up` aborts with
    # "invalid IP address in add-host: host-gateway". When the target runs an
    # older podman, resolve the bridge gateway IP ourselves so _env_update.yml
    # can pin HOST_GATEWAY in .env. The probe stays empty (and HOST_GATEWAY
    # unset, so the magic value is used) for Docker and podman >= 4.4.
    - name: Probe podman version for host-gateway support
      ansible.builtin.shell:
        cmd: |
          {% raw %}set -o pipefail
          command -v podman >/dev/null 2>&1 || exit 0
          ver=$(podman --version 2>/dev/null | awk '{print $3}')
          [ -n "$ver" ] || exit 0
          # Emit the bridge gateway only when podman is older than 4.4.0.
          if [ "$(printf '%s\n4.4.0\n' "$ver" | sort -V | head -n1)" = "$ver" ] \
             && [ "$ver" != "4.4.0" ]; then
              podman network inspect podman \
                  --format '{{range .Subnets}}{{.Gateway}}{{end}}' 2>/dev/null
          fi{% endraw %}
      register: _host_gateway_probe
      changed_when: false
      failed_when: false

    - name: Record host-gateway fallback IP
      ansible.builtin.set_fact:
        _host_gateway_fallback: "{{ _host_gateway_probe.stdout | default('') | trim }}"

    # --- Compose-only storage preflight ---
    # Canasta images are ~2.3 GB; with database volumes, logs, and build
    # cache, container storage can exhaust a small root partition. Warn
    # early so the operator can configure storage on a larger volume.
    - name: Get Docker root directory
      ansible.builtin.shell:
        cmd: "set -o pipefail && docker info 2>/dev/null | awk -F': ' '/Docker Root Dir/{print $2}'"
      register: _docker_root_dir
      changed_when: false
      failed_when: false

    - name: Check available disk space on Docker storage
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail && df --output=avail
          "$(docker info 2>/dev/null | awk -F': ' '/Docker Root Dir/{print $2}')"
          2>/dev/null | tail -1
      register: _docker_storage_avail
      changed_when: false
      failed_when: false
      when: _docker_root_dir.stdout | trim | length > 0

    - name: Warn if Docker storage has less than 20 GB free
      ansible.builtin.debug:
        msg: >-
          WARNING: Container storage at {{ _docker_root_dir.stdout }}
          has only {{ (_docker_storage_avail.stdout | trim | int / (1024 * 1024)) | round(1) }}
          GB free (recommended minimum: 20 GB). Canasta images are ~2.3 GB
          and database/migration operations need additional space. Configure
          container storage on a larger volume; see the setup guide for
          storage configuration options.
      when:
        - _docker_storage_avail.stdout is defined
        - _docker_storage_avail.stdout | trim | length > 0
        - (_docker_storage_avail.stdout | trim | int) < 20 * 1024 * 1024
