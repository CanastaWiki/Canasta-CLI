---
# Copy stack files to the instance directory.
# Dispatches to Compose or Kubernetes based on instance_orchestrator.
# The managed docker-compose.yml is force-refreshed when stack_files_force
# is set (upgrade), so compose changes (e.g. a new crowdsec service) reach
# instances created on an older version. All other files are no-clobber to
# preserve operator-owned content (override, scripts, logstash configs).
# Input: instance_path, instance_orchestrator, stack_files_force (bool)

- name: Write Compose stack files
  when: instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Report writing stack files
      ansible.builtin.debug:
        msg: "Writing Compose stack files..."

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: "{{ role_path }}/files/compose/docker-compose.yml"
        dest: "{{ instance_path }}/docker-compose.yml"
        force: "{{ stack_files_force | default(false) | bool }}"
        mode: "0644"
      register: _compose_stack_copy

    - name: Copy docker-compose.override.yml.example
      ansible.builtin.copy:
        src: "{{ role_path }}/files/compose/docker-compose.override.yml.example"
        dest: "{{ instance_path }}/docker-compose.override.yml.example"
        force: false
        mode: "0644"

    - name: Copy logstash pipeline configs
      ansible.builtin.copy:
        src: "{{ role_path }}/files/compose/config/logstash/"
        dest: "{{ instance_path }}/config/logstash/"
        force: false
        mode: "0644"

    - name: Copy observable-init script
      ansible.builtin.copy:
        src: "{{ role_path }}/files/compose/scripts/"
        dest: "{{ instance_path }}/scripts/"
        force: false
        mode: "0755"

- name: Write Kubernetes stack files
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Report writing stack files
      ansible.builtin.debug:
        msg: "Writing Kubernetes stack files..."

    - name: Create instance directories for Kubernetes
      ansible.builtin.file:
        path: "{{ instance_path }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - wikis
        - argocd

    - name: Scaffold values.yaml from chart defaults
      ansible.builtin.copy:
        src: "{{ role_path }}/files/helm/canasta/values.yaml"
        dest: "{{ instance_path }}/values.yaml"
        force: false
        mode: "0644"
