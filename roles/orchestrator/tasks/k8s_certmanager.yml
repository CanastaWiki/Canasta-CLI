---
# Install cert-manager and create a Let's Encrypt ClusterIssuer.
# Idempotent — skips if cert-manager is already running.
# Input: enable_tls (email address for Let's Encrypt)

- name: Check if cert-manager is already installed
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: cert-manager
    namespace: cert-manager
  register: _cm_check
  ignore_errors: true  # OK if cert-manager not installed

- name: Install cert-manager
  when: _cm_check.resources | default([]) | length == 0
  block:
    # GitHub occasionally returns 5xx for releases asset URLs, which
    # would otherwise abort canasta create after the validate-inputs
    # step. Retry a few times before giving up — kubectl apply is
    # idempotent against the cluster, so re-running on a partial
    # success is safe.
    - name: Apply cert-manager CRDs and deployment
      ansible.builtin.command:
        cmd: >-
          kubectl apply -f
          https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
      register: _cm_apply
      changed_when: true
      until: _cm_apply.rc == 0
      retries: 4
      delay: 5

    # Wait on the Deployments, not on their Pods. `kubectl wait
    # --for=condition=Ready pod -l ...` runs the moment kubectl apply
    # returns — but the Deployment controller hasn't created the Pods
    # yet, so the label selector matches zero pods and kubectl wait
    # exits non-zero with "error: no matching resources found".
    # Deployments themselves are created synchronously by kubectl
    # apply, so waiting on `condition=Available` for the Deployment
    # tolerates the brief gap between apply and pod creation, then
    # blocks until the rollout has minimum replicas Ready.
    - name: Wait for cert-manager Deployments to become Available
      ansible.builtin.command:
        cmd: >-
          kubectl wait --for=condition=Available
          deployment -l app.kubernetes.io/instance=cert-manager
          -n cert-manager --timeout=180s
      changed_when: false

    # Even after the webhook Deployment is Available, there's a brief
    # window where the cert-manager admission webhook hasn't fully
    # registered with the API server. ClusterIssuers created during
    # that window get rejected with `failed calling webhook
    # "webhook.cert-manager.io"`. Probe with a server-side dry-run
    # of a benign SelfSigned ClusterIssuer — that traverses the
    # admission webhook but doesn't persist anything — and retry
    # until it succeeds. Replaces the prior fixed 10-second sleep,
    # which both took longer than necessary in the common case and
    # wasn't long enough on slower clusters.
    - name: Wait for cert-manager admission webhook to register
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - --dry-run=server
          - -f
          - "-"
        stdin: |
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: canasta-webhook-probe
          spec:
            selfSigned: {}
      register: _webhook_probe
      until: _webhook_probe.rc == 0
      retries: 30
      delay: 2
      changed_when: false

# Always create BOTH the production and staging ClusterIssuers
# (idempotent). That way switching CANASTA_STAGING_CERTS later is
# just a values.yaml + Ingress annotation change — no need to
# re-run cert-manager install.
- name: Create Let's Encrypt production ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod
      spec:
        acme:
          server: https://acme-v02.api.letsencrypt.org/directory
          email: "{{ tls_email | default('') }}"
          privateKeySecretRef:
            name: letsencrypt-prod
          solvers:
            - http01:
                ingress: {}

- name: Create Let's Encrypt staging ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-staging
      spec:
        acme:
          server: https://acme-staging-v02.api.letsencrypt.org/directory
          email: "{{ tls_email | default('') }}"
          privateKeySecretRef:
            name: letsencrypt-staging
          solvers:
            - http01:
                ingress: {}
