---
# Install Argo CD into the cluster via its official Helm chart.
# Idempotent — checks if Argo CD is already installed.
# Input: argocd_namespace (default: argocd)

- name: Check if Argo CD is already installed
  ansible.builtin.command:
    cmd: "kubectl get deployment argocd-server -n {{ argocd_namespace | default('argocd') }}"
  register: _argocd_check
  changed_when: false
  ignore_errors: true  # OK if Argo CD not installed yet

- name: Install Argo CD
  when: _argocd_check.rc != 0
  block:
    - name: Report installing Argo CD
      ansible.builtin.debug:
        msg: "Installing Argo CD..."

    - name: Add Argo CD Helm repository
      kubernetes.core.helm_repository:
        name: argo
        repo_url: https://argoproj.github.io/argo-helm

    # Stage the chart values as a file so the helm invocation below can be a
    # plain CLI command (no --set dotted-key escaping) and run through
    # resilient_exec.
    - name: Stage Argo CD Helm values on the target
      ansible.builtin.copy:
        dest: /tmp/canasta-argocd-values.yaml
        mode: "0600"
        content: |
          server:
            insecure: false
          configs:
            params:
              server.insecure: false

    # Launched detached and polled (resilient_exec) so a controller-side SSH
    # reset during the up-to-10m `--wait` doesn't abort an install still
    # progressing on the target. helm upgrade --install is idempotent.
    #
    # The helm-sops CMP sidecar for encrypted secrets is NOT added here — it is
    # overlaid onto this release at `gitops init --encrypt-secrets`
    # (k8s_ensure_sops_sidecar.yml) so create stays orchestration-agnostic.
    - name: Install Argo CD via Helm
      ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/resilient_exec.yml"
      vars:
        rx_name: "install Argo CD"
        rx_async: 720
        rx_cmd: >-
          helm upgrade --install argocd argo/argo-cd
          --namespace {{ argocd_namespace | default('argocd') }} --create-namespace
          --wait --timeout 10m
          -f /tmp/canasta-argocd-values.yaml

    - name: Report Argo CD installed
      ansible.builtin.debug:
        msg: "Argo CD installed in namespace '{{ argocd_namespace | default('argocd') }}'."

- name: Report Argo CD already present
  ansible.builtin.debug:
    msg: "Argo CD is already running in namespace '{{ argocd_namespace | default('argocd') }}'."
  when: _argocd_check.rc == 0
