---
# Restore an instance from a restic snapshot. Dispatches Compose vs K8s.
#
# Compose: optional safety backup -> restic restore into the backup
#   volume -> copy files to host -> preserve DB password -> import DB
#   dumps -> re-render gitops templates.
# Kubernetes: delegate to restore_k8s.yml (pod-based restore + DB and
#   Secret handling) -> preserve DB password in the restored .env.
#
# Input: instance_id, instance_path, instance_orchestrator,
#        _resolved_snapshot, _restore_dbpass, snapshot, skip_safety_backup

# --- Compose restore path ---
- name: Restore (Compose)
  when: instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Take safety backup before restore
      when: not (skip_safety_backup | default(false) | bool)
      block:
        - name: Read wiki IDs for safety DB dump
          canasta_wikis_yaml:
            instance_path: "{{ instance_path }}"
            state: read
          register: _safety_wikis

        - name: Create backup staging directory
          ansible.builtin.include_tasks: exec.yml
          vars:
            exec_service: web
            exec_command: "mkdir -p /mediawiki/config/backup"

        # A wiki listed in wikis.yaml may have no database (dropped or corrupted
        # — the very disaster a restore recovers from). Dumping a missing DB
        # fails mariadb-dump and would abort the whole restore, so dump only the
        # wikis whose database is present and warn about the rest.
        - name: List existing databases for the safety backup
          ansible.builtin.include_tasks: exec.yml
          vars:
            exec_service: web
            exec_no_log: true
            exec_command: >-
              mariadb -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}"
              -p{{ _restore_dbpass.value | quote }} -N -e "SHOW DATABASES"

        - name: Partition wikis into present and missing databases
          ansible.builtin.set_fact:
            _safety_present_wikis: >-
              {{ _safety_wikis.wiki_ids
                 | intersect(exec_result.stdout_lines | default([])) }}
            _safety_missing_wikis: >-
              {{ _safety_wikis.wiki_ids
                 | difference(exec_result.stdout_lines | default([])) }}

        - name: Warn about wikis skipped from the safety backup
          ansible.builtin.debug:
            msg: >-
              Skipping the pre-restore safety backup for wiki(s)
              {{ _safety_missing_wikis | join(', ') }}: no database present.
          when: _safety_missing_wikis | length > 0

        - name: Dump each present wiki database for safety backup
          ansible.builtin.include_tasks: exec.yml
          vars:
            exec_service: web
            exec_no_log: true
            exec_command: >-
              mariadb-dump -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}"
              -p{{ _restore_dbpass.value | quote }}
              --single-transaction
              --databases {{ item | quote }}
              > /mediawiki/config/backup/db_{{ item | quote }}.sql
          loop: "{{ _safety_present_wikis }}"
          no_log: true

        - name: Build safety backup volume map
          ansible.builtin.set_fact:
            _safety_volumes: >-
              {{ {
                instance_path + '/config': '/currentsnapshot/config',
                instance_path + '/extensions': '/currentsnapshot/extensions',
                instance_path + '/images': '/currentsnapshot/images',
                instance_path + '/skins': '/currentsnapshot/skins',
                instance_path + '/public_assets': '/currentsnapshot/public_assets',
                instance_path + '/.env': '/currentsnapshot/.env'
              } }}

        - name: Check for optional files (safety)
          ansible.builtin.stat:
            path: "{{ instance_path }}/{{ item }}"
          register: _safety_opt_files
          loop:
            - docker-compose.override.yml
            - my.cnf

        - name: Add optional files to safety staging
          ansible.builtin.set_fact:
            _safety_volumes: >-
              {{ _safety_volumes | combine(
                 {instance_path + '/' + item.item:
                  '/currentsnapshot/' + item.item}) }}
          loop: "{{ _safety_opt_files.results }}"
          when: item.stat.exists
          loop_control:
            label: "{{ item.item }}"

        - name: Discover custom Docker build inputs for safety backup
          ansible.builtin.include_tasks: backup_discover_build_paths.yml

        - name: Add custom build inputs to safety staging
          ansible.builtin.set_fact:
            _safety_volumes: "{{ _safety_volumes | combine(_build_staging_map) }}"

        - name: Run safety backup with staged files
          ansible.builtin.include_tasks: run_backup.yml
          vars:
            backup_args:
              - "--tag"
              - "safety-before-restore"
              - "backup"
              - "/currentsnapshot"
            backup_volumes: "{{ _safety_volumes }}"

        - name: Clean up safety DB dump directory
          ansible.builtin.include_tasks:
            file: exec.yml
            # Apply to the included tasks — best-effort cleanup.
            apply:
              ignore_errors: true
          vars:
            exec_service: web
            exec_command: "rm -rf /mediawiki/config/backup"

    # The safety backup above stages the CURRENT instance into this same volume,
    # and `restic restore` does not prune its target — so any file present now
    # but absent from the snapshot would survive the restore and be copied back
    # to the host (a restore that doesn't fully revert). Clear the volume first
    # so it reflects only the snapshot. Runs for full and single-wiki restores.
    - name: Clear backup volume before restore
      ansible.builtin.command:
        cmd: >-
          {{ inspect_command }} run --rm
          -v "canasta-backup-{{ instance_path | basename }}:/currentsnapshot"
          alpine sh -c 'rm -rf /currentsnapshot/* /currentsnapshot/.[!.]* 2>/dev/null || true'
      changed_when: true

    - name: Restore snapshot into backup volume
      ansible.builtin.include_tasks: run_backup.yml
      vars:
        backup_args:
          - "restore"
          - "{{ _resolved_snapshot }}"
          - "--target"
          - "/"

    # The standard MediaWiki dirs are replaced wholesale (rm -rf then copy) so a
    # restore doesn't leave stale files behind. Everything else the snapshot holds
    # - .env, docker-compose.override.yml, my.cnf, and any custom build inputs
    # (Dockerfile, build context dirs) staged by backup_discover_build_paths.yml - is
    # copied back generically, so the restore round-trips whatever was captured.
    #
    # cp -a preserves the snapshot's NUMERIC uids. On a cross-host restore those
    # ids need not map to a real user here, so restored top-level files (notably
    # .env, mode 0600) come back owned by an unmapped uid and become unreadable
    # by the CLI user — which aborts the very next step (preserving the DB
    # password) and leaves the instance broken. Normalize the restored top-level
    # files to the instance dir's owner (the CLI user), mirroring 'gitops join';
    # the web entrypoint re-establishes www-data on the content dirs at the
    # post-restore restart.
    - name: Copy files from volume to host
      when: wiki is not defined
      ansible.builtin.shell:
        cmd: |
          {{ inspect_command }} run --rm \
            -v "canasta-backup-{{ instance_path | basename }}:/currentsnapshot:ro" \
            -v "{{ instance_path }}:/install" \
            alpine sh -c '
            std="config extensions images skins public_assets";
            for d in $std; do
              if [ -d /currentsnapshot/$d ]; then
                mkdir -p /install/$d &&
                rm -rf /install/$d/* /install/$d/.[!.]* 2>/dev/null;
                cp -a /currentsnapshot/$d/. /install/$d/;
              fi;
            done;
            for e in /currentsnapshot/* /currentsnapshot/.[!.]*; do
              [ -e "$e" ] || continue;
              name=$(basename "$e");
              skip=0;
              for d in $std; do [ "$name" = "$d" ] && skip=1; done;
              [ "$skip" = "1" ] && continue;
              [ -d "$e" ] && rm -rf "/install/$name";
              cp -a "$e" "/install/$name";
            done;
            own=$(stat -c "%u:%g" /install);
            for f in /install/* /install/.[!.]*; do
              [ -f "$f" ] && chown "$own" "$f";
            done'
      changed_when: true

    # Single-wiki restore (-w) brings back only the target wiki's per-wiki
    # files (settings, images, public assets) and its DB dump. Shared state —
    # global config, extensions, skins, .env, and other wikis' data — is left
    # untouched. The wiki id reaches the container via -e (env), never spliced
    # into the single-quoted sh -c payload.
    - name: Confirm the target wiki is present in the snapshot
      when: wiki is defined
      ansible.builtin.shell:
        cmd: >-
          {{ inspect_command }} run --rm
          -e W={{ wiki | quote }}
          -v "canasta-backup-{{ instance_path | basename }}:/currentsnapshot:ro"
          alpine sh -c 'test -f "/currentsnapshot/config/backup/db_$W.sql"'
      register: _restore_wiki_in_snapshot
      changed_when: false
      failed_when: false

    - name: Fail when the target wiki is absent from the snapshot
      when:
        - wiki is defined
        - _restore_wiki_in_snapshot.rc != 0
      ansible.builtin.fail:
        msg: >-
          Snapshot {{ _resolved_snapshot }} contains no backup for wiki
          '{{ wiki }}' (no db_{{ wiki }}.sql). Nothing to restore.

    - name: Copy single wiki's files from volume to host
      when: wiki is defined
      ansible.builtin.shell:
        cmd: |
          {{ inspect_command }} run --rm \
            -e W={{ wiki | quote }} \
            -v "canasta-backup-{{ instance_path | basename }}:/currentsnapshot:ro" \
            -v "{{ instance_path }}:/install" \
            alpine sh -c '
            for rel in "config/settings/wikis/$W" "images/$W" "public_assets/$W"; do
              if [ -d "/currentsnapshot/$rel" ]; then
                mkdir -p "/install/$rel";
                rm -rf "/install/$rel"/* "/install/$rel"/.[!.]* 2>/dev/null;
                cp -a "/currentsnapshot/$rel/." "/install/$rel/";
              fi;
            done;
            mkdir -p /install/config/backup;
            cp -a "/currentsnapshot/config/backup/db_$W.sql" /install/config/backup/db_$W.sql'
      changed_when: true

    # Full restore round-trips the source host's .env; single-wiki leaves the
    # running instance's .env (and its DB password) untouched.
    - name: Preserve DB password in restored .env
      when: wiki is not defined
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: MYSQL_PASSWORD
        value: "{{ _restore_dbpass.value }}"
      no_log: true

    - name: Read wiki IDs for DB restore
      when: wiki is not defined
      canasta_wikis_yaml:
        instance_path: "{{ instance_path }}"
        state: read
      register: _restore_wikis

    - name: Import each wiki database dump
      when: wiki is not defined
      ansible.builtin.include_tasks: exec.yml
      vars:
        exec_service: web
        exec_no_log: true
        exec_command: >-
          mariadb -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}"
          -p{{ _restore_dbpass.value | quote }}
          < /mediawiki/config/backup/db_{{ item | quote }}.sql
      loop: "{{ _restore_wikis.wiki_ids }}"
      no_log: true

    - name: Import the single restored wiki's database dump
      when: wiki is defined
      ansible.builtin.include_tasks: exec.yml
      vars:
        exec_service: web
        exec_no_log: true
        exec_command: >-
          mariadb -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}"
          -p{{ _restore_dbpass.value | quote }}
          < /mediawiki/config/backup/db_{{ wiki | quote }}.sql

    - name: Clean up backup dump directory
      ansible.builtin.include_tasks:
        file: exec.yml
        # Apply to the included tasks — OK if backup dir doesn't exist.
        apply:
          ignore_errors: true
      vars:
        exec_service: web
        exec_command: "rm -rf /mediawiki/config/backup"

    # When the instance is under gitops, the snapshot just restored contains
    # the SOURCE host's rendered files (.env, wikis.yaml, Caddyfile). On this
    # host those need to be re-rendered from the templates + current host
    # vars, otherwise Caddy tries to issue a cert for the source host's FQDN,
    # MediaWiki serves URLs pointing at the wrong host, etc.
    - name: Detect gitops instance
      ansible.builtin.stat:
        path: "{{ instance_path }}/.gitops-host"
      register: _restore_gitops_stat

    # git-crypt's key and filters live in .git, which backup does not capture,
    # so a restored/migrated checkout can come back locked: hosts/**/vars.yaml
    # are ciphertext and the re-render below (which parses them) would crash.
    # Detect the lock via the magic header (od, no decode) and warn+skip rather
    # than fail the whole restore, which already succeeded.
    - name: Check git-crypt lock state
      ansible.builtin.shell:
        cmd: "head -c 10 hosts/hosts.yaml 2>/dev/null | od -An -tx1 | tr -d ' \\n'"
      args:
        chdir: "{{ instance_path }}"
        executable: /bin/bash
      register: _restore_gitcrypt_hdr
      changed_when: false
      failed_when: false
      when:
        - wiki is not defined
        - _restore_gitops_stat.stat.exists | default(false)

    - name: Set git-crypt locked fact
      ansible.builtin.set_fact:
        _restore_gitcrypt_locked: >-
          {{ (_restore_gitcrypt_hdr.stdout | default('')) == '00474954435259505400' }}

    - name: Warn that git-crypt is locked (re-render skipped)
      ansible.builtin.debug:
        msg: |-
          WARNING: git-crypt is locked in this checkout, so hosts/**/vars.yaml
          are still encrypted and the gitops config was NOT re-rendered for
          this host. The data restore itself completed. Unlock and re-render:

            git-crypt unlock /path/to/gitops.key
            canasta gitops pull -i {{ instance_id }}
      when: _restore_gitcrypt_locked | default(false)

    # Single-wiki restore does not touch shared rendered files (.env,
    # wikis.yaml, Caddyfile), so there is nothing to re-render.
    - name: Re-render gitops templates against this host's vars
      ansible.builtin.include_role:
        name: gitops
        tasks_from: render_compose.yml
      when:
        - wiki is not defined
        - _restore_gitops_stat.stat.exists | default(false)
        - not (_restore_gitcrypt_locked | default(false))

    - name: Regenerate orchestrator config (e.g. Caddyfile)
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: update_config.yml
      when:
        - wiki is not defined
        - _restore_gitops_stat.stat.exists | default(false)
        - not (_restore_gitcrypt_locked | default(false))

# --- Kubernetes restore path ---
- name: Restore (Kubernetes)
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    # Uses include_tasks (dynamic) so kubernetes.core.k8s is only parsed
    # when actually running K8s. Compose-only controllers no longer need
    # the kubernetes.core collection installed.
    - name: Restore (Kubernetes pod-based restore + DB/Secret handling)
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/backup/tasks/restore_k8s.yml

    # Full restore round-trips the source host's .env; single-wiki leaves the
    # running instance's .env (and its DB password) untouched.
    - name: Preserve DB password in restored .env
      when: wiki is not defined
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: MYSQL_PASSWORD
        value: "{{ _restore_dbpass.value }}"
      no_log: true
