---
# Destroy Docker Compose containers AND volumes for an instance.
# Input: instance_path

- name: Destroy containers and volumes
  ansible.builtin.command:
    cmd: "docker compose down -v"
    chdir: "{{ instance_path }}"
  changed_when: true
  ignore_errors: true

- name: Get instance directory basename
  ansible.builtin.set_fact:
    _instance_basename: "{{ instance_path | basename }}"

- name: Remove backup staging volume
  ansible.builtin.command:
    cmd: "docker volume rm {{ _instance_basename }}-backup"
  changed_when: true
  ignore_errors: true
