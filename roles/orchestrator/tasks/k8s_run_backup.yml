---
# Run a restic command in a temporary Kubernetes Job.
# K8s equivalent of run_backup.yml (Docker version).
#
# Input:
#   instance_path, instance_id
#   backup_args - list of restic arguments
# Output:
#   _restic_result - dict with .stdout and .rc

- name: Set K8s namespace
  ansible.builtin.set_fact:
    _k8s_namespace: "canasta-{{ instance_id }}"

- name: Read restic env vars from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _backup_env
  no_log: true

- name: Set restic env vars
  ansible.builtin.set_fact:
    _restic_repo: "{{ _backup_env.variables.RESTIC_REPOSITORY | default('') }}"
    _restic_password: "{{ _backup_env.variables.RESTIC_PASSWORD | default('') }}"
  no_log: true

- name: Fail if restic not configured
  ansible.builtin.fail:
    msg: "RESTIC_REPOSITORY and RESTIC_PASSWORD must be set in .env."
  when: _restic_repo == '' or _restic_password == ''

- name: Detect local restic repository
  ansible.builtin.set_fact:
    _restic_local_repo: "{{ _restic_repo is match('^/') }}"

# Detect 'backup' verb in backup_args. The on-demand Job is also used
# for non-snapshot operations (forget, snapshots, init, unlock, etc.);
# only true backup operations need the DB-dump and Secret-dump init
# containers. See #513 for the bug this closes — pre-fix, on-demand
# 'canasta backup create' on K8s captured static files only and
# silently lost the wiki database.
- name: Detect backup operation
  ansible.builtin.set_fact:
    _is_backup_op: "{{ 'backup' in backup_args }}"

- name: Read DB password for dump-databases (backup ops only)
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  register: _backup_dbpass
  when: _is_backup_op | bool
  no_log: true

- name: Create RBAC for backup Pods (backup ops only)
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/backup/tasks/_k8s_backup_rbac.yml
  when: _is_backup_op | bool

- name: Generate unique job name
  ansible.builtin.set_fact:
    _backup_job_name: "restic-{{ lookup('pipe', 'date +%s') }}"

- name: Build volume mounts list
  ansible.builtin.set_fact:
    _restic_volume_mounts:
      - { name: web-config, mountPath: /currentsnapshot/config, readOnly: true }
      - { name: images, mountPath: /currentsnapshot/images, readOnly: true }
      - { name: extensions, mountPath: /currentsnapshot/extensions, readOnly: true }
      - { name: skins, mountPath: /currentsnapshot/skins, readOnly: true }
      - { name: public-assets, mountPath: /currentsnapshot/public_assets, readOnly: true }

- name: Add local repo volume mount
  ansible.builtin.set_fact:
    _restic_volume_mounts: >-
      {{ _restic_volume_mounts + [{'name': 'local-repo',
         'mountPath': _restic_repo}] }}
  when: _restic_local_repo | bool

- name: Build volumes list
  ansible.builtin.set_fact:
    _restic_volumes:
      - name: web-config
        configMap:
          name: "canasta-{{ instance_id }}-web-config"
          optional: true
      - name: images
        persistentVolumeClaim:
          claimName: "canasta-{{ instance_id }}-images"
      - name: extensions
        persistentVolumeClaim:
          claimName: "canasta-{{ instance_id }}-extensions"
      - name: skins
        persistentVolumeClaim:
          claimName: "canasta-{{ instance_id }}-skins"
      - name: public-assets
        persistentVolumeClaim:
          claimName: "canasta-{{ instance_id }}-public-assets"

- name: Add local repo hostPath volume
  ansible.builtin.set_fact:
    _restic_volumes: >-
      {{ _restic_volumes + [{'name': 'local-repo',
         'hostPath': {'path': _restic_repo, 'type': 'DirectoryOrCreate'}}] }}
  when: _restic_local_repo | bool

# Backup ops add a 'dumps' emptyDir + mount-on-mount over the
# web-config ConfigMap subdir at /currentsnapshot/config/backup. The
# init containers write SQL dumps and the Secret manifest there;
# restic captures the merged tree. Same mount-on-mount pattern the
# scheduled CronJob uses (see roles/backup/tasks/schedule_set.yml).
- name: Add dumps volume + mount-on-mount for backup ops
  when: _is_backup_op | bool
  ansible.builtin.set_fact:
    _restic_volumes: "{{ _restic_volumes + [{'name': 'dumps', 'emptyDir': {}}] }}"
    _restic_volume_mounts: >-
      {{ _restic_volume_mounts + [{'name': 'dumps',
         'mountPath': '/currentsnapshot/config/backup', 'readOnly': true}] }}

# Build the init container list. Empty for non-backup ops (forget,
# snapshots, etc. don't need DB or Secret dumps). For backup ops:
# 1) dump-databases (mariadb-dump → /currentsnapshot/config/backup/db_*.sql)
# 2) dump-secrets (canasta-managed K8s Secrets → secrets-<id>.yaml)
- name: Default empty init containers
  ansible.builtin.set_fact:
    _backup_init_containers: []

- name: Build init containers for backup ops
  when: _is_backup_op | bool
  ansible.builtin.set_fact:
    _backup_init_containers:
      # canasta-<id>-backup-env carries MYSQL_HOST, MYSQL_USER,
      # MYSQL_PASSWORD per #498. Internal-db falls back to the
      # 'db' / 'root' defaults baked into the script.
      - name: dump-databases
        image: "{{ _backup_env.variables.CANASTA_IMAGE | default('ghcr.io/canastawiki/canasta:latest') }}"
        command:
          - sh
          - -c
          - |
            EXCLUDE='^(information_schema|performance_schema|mysql|sys)$'
            for db in $(mariadb -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}" -p"$MYSQL_PASSWORD" \
              -N -e "SHOW DATABASES" | grep -vE "$EXCLUDE"); do
              mariadb-dump -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}" -p"$MYSQL_PASSWORD" \
                --single-transaction --databases "$db" \
                > "/currentsnapshot/config/backup/db_${db}.sql"
            done
        envFrom:
          - secretRef:
              name: "canasta-{{ instance_id }}-backup-env"
        volumeMounts:
          - name: dumps
            mountPath: /currentsnapshot/config/backup
      # Captures canasta-managed Secrets so a fresh-cluster restore
      # can bring back MYSQL_PASSWORD / MW_SECRET_KEY (#510). Same
      # by-name dump strategy the scheduled CronJob uses.
      - name: dump-secrets
        image: bitnami/kubectl:latest
        command:
          - sh
          - -c
          - |
            kubectl get secret \
              {{ instance_id }}-db-credentials \
              {{ instance_id }}-mw-secrets \
              -n canasta-{{ instance_id }} \
              -o yaml \
              > /currentsnapshot/config/backup/secrets-{{ instance_id }}.yaml
        volumeMounts:
          - name: dumps
            mountPath: /currentsnapshot/config/backup

- name: Create restic Job
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: "{{ _backup_job_name }}"
        namespace: "{{ _k8s_namespace }}"
      spec:
        backoffLimit: 0
        ttlSecondsAfterFinished: 300
        template:
          spec:
            restartPolicy: Never
            # Both init containers (when present) and the restic
            # main container can use the dedicated backup SA. For
            # non-backup ops the SA is unused and harmless.
            serviceAccountName: "{{ (_is_backup_op | bool) | ternary('canasta-backup-' + instance_id, omit) }}"
            initContainers: "{{ _backup_init_containers }}"
            containers:
              - name: restic
                image: restic/restic:latest
                command:
                  - sh
                  - -c
                  - "restic --cache-dir /tmp/restic-cache {{ backup_args | join(' ') }}"
                # canasta-<id>-backup-env carries RESTIC_*, AWS_*,
                # B2_*, AZURE_*, GOOGLE_*, OS_*, ST_* — every cloud-
                # backend credential restic might need (#497). Mirrors
                # what Compose's --env-file pattern provides.
                envFrom:
                  - secretRef:
                      name: "canasta-{{ instance_id }}-backup-env"
                volumeMounts: "{{ _restic_volume_mounts }}"
            volumes: "{{ _restic_volumes }}"

- name: Wait for restic Job to complete
  kubernetes.core.k8s_info:
    api_version: batch/v1
    kind: Job
    name: "{{ _backup_job_name }}"
    namespace: "{{ _k8s_namespace }}"
  register: _backup_job_status
  until: >-
    _backup_job_status.resources | length > 0 and
    (_backup_job_status.resources[0].status.succeeded | default(0) > 0 or
     _backup_job_status.resources[0].status.failed | default(0) > 0)
  retries: 120
  delay: 5

- name: Get restic Job pod name
  ansible.builtin.command:
    cmd: >-
      kubectl get pods -n {{ _k8s_namespace }}
      -l job-name={{ _backup_job_name }}
      -o jsonpath='{.items[0].metadata.name}'
  register: _backup_pod_name
  changed_when: false

- name: Get restic output
  ansible.builtin.command:
    cmd: "kubectl logs -n {{ _k8s_namespace }} {{ _backup_pod_name.stdout | trim }}"
  register: _restic_log
  changed_when: false

- name: Set restic result
  ansible.builtin.set_fact:
    _restic_result:
      stdout: "{{ _restic_log.stdout }}"
      rc: "{{ (_backup_job_status.resources[0].status.succeeded | default(0) > 0) | ternary(0, 1) }}"

- name: Delete completed Job
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    name: "{{ _backup_job_name }}"
    namespace: "{{ _k8s_namespace }}"
  ignore_errors: true  # OK if job already cleaned up by TTL
