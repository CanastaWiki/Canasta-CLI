---
# Execute a command inside a container/pod.
# Input:
#   instance_path (str)
#   instance_orchestrator (str) - compose or kubernetes
#   exec_service (str) - service name (default: web)
#   exec_command (str) - command to run
# Output:
#   exec_result (registered result)

- name: "Execute in {{ exec_service | default('web') }} (Compose): {{ exec_command | truncate(80) }}"
  ansible.builtin.command:
    cmd: "docker compose exec -T {{ exec_service | default('web') }} /bin/bash -c {{ exec_command | quote }}"
    chdir: "{{ instance_path }}"
  register: exec_result
  changed_when: false
  when: instance_orchestrator | default('compose') == 'compose'

- name: "Execute in {{ exec_service | default('web') }} (Kubernetes): {{ exec_command | truncate(80) }}"
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Set K8s namespace
      ansible.builtin.set_fact:
        _k8s_namespace: "{{ instance_path | basename }}"

    - name: Get running pod
      ansible.builtin.include_tasks: k8s_get_pod.yml
      vars:
        _k8s_service: "{{ exec_service | default('web') }}"

    - name: Execute command in pod
      ansible.builtin.command:
        cmd: "kubectl exec {{ _k8s_pod_name }} -n {{ _k8s_namespace }} -- /bin/bash -c {{ exec_command | quote }}"
      register: exec_result
      changed_when: false
