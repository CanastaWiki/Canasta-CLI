---
# Remove an instance's backup schedule.
# Dispatches to Compose (host crontab) or Kubernetes (CronJob).
# Input: instance_id, instance_orchestrator

- name: Remove backup schedule (Compose)
  ansible.builtin.cron:
    name: "canasta-backup-{{ instance_id }}"
    state: absent
  when: instance_orchestrator | default('compose') == 'compose'

- name: Remove backup schedule (Kubernetes)
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: CronJob
    name: "canasta-backup-{{ instance_id }}"
    namespace: "canasta-{{ instance_id }}"
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  ignore_errors: true  # OK if CronJob doesn't exist
