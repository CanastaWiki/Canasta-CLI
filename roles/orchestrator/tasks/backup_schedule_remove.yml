---
# canasta backup schedule remove.
#
# Drops the durable schedule state (config/backup-schedule.yml) so it is no
# longer re-materialized after restore / gitops pull, then removes the
# crontab entry.
# Input: instance_id, instance_path, instance_orchestrator

- name: Drop the persisted backup schedule from instance config
  ansible.builtin.file:
    path: "{{ instance_path }}/config/backup-schedule.yml"
    state: absent

- name: Remove the schedule's crontab entry
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/backup_schedule_unapply.yml
