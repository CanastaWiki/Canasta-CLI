---
# Stop containers for an instance.
# Input: instance_path, instance_devmode (bool), instance_orchestrator

- name: Stop (Docker Compose)
  when: instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Check for docker-compose.override.yml
      ansible.builtin.stat:
        path: "{{ instance_path }}/docker-compose.override.yml"
      register: _override_exists

    - name: Build compose file arguments
      ansible.builtin.set_fact:
        _compose_files: >-
          {{ ['-f', 'docker-compose.yml'] +
             ((_override_exists.stat.exists) | ternary(['-f', 'docker-compose.override.yml'], [])) +
             ((instance_devmode | default(false) | bool) | ternary(['-f', 'docker-compose.dev.yml'], [])) }}

    - name: Stop containers
      ansible.builtin.command:
        cmd: "docker compose {{ _compose_files | join(' ') }} down"
        chdir: "{{ instance_path }}"
      changed_when: true

- name: Stop (Kubernetes)
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Set K8s namespace
      ansible.builtin.set_fact:
        _k8s_namespace: "canasta-{{ instance_id }}"

    # Suspend Argo CD auto-sync before scaling to zero. If we don't,
    # selfHeal detects the scale-to-zero as drift and immediately
    # reverts it by re-creating the pods. See #70.
    - name: Check if Argo CD Application exists for this instance
      ansible.builtin.command:
        cmd: >-
          kubectl get application canasta-{{ instance_id }}
          -n {{ argocd_namespace | default('argocd') }}
          -o jsonpath={.metadata.name}
      register: _stop_argocd_app
      changed_when: false
      ignore_errors: true

    - name: Suspend Argo CD auto-sync
      ansible.builtin.command:
        cmd: >-
          kubectl patch application canasta-{{ instance_id }}
          -n {{ argocd_namespace | default('argocd') }}
          --type merge -p '{"spec":{"syncPolicy":null}}'
      changed_when: true
      when: _stop_argocd_app.rc == 0

    - name: Scale down all deployments
      ansible.builtin.command:
        cmd: "kubectl scale deployment --all --replicas=0 -n {{ _k8s_namespace }}"
      changed_when: true

    - name: Scale down all statefulsets
      ansible.builtin.command:
        cmd: "kubectl scale statefulset --all --replicas=0 -n {{ _k8s_namespace }}"
      changed_when: true
