---
# Initialize orchestrator configuration for a new instance.
# Common steps (Caddyfile, observability) plus orchestrator-specific config.
# Input: instance_path, instance_orchestrator

- name: Create Caddyfile.site from template (no-clobber)
  ansible.builtin.copy:
    src: "{{ canasta_root }}/instance_template/config/Caddyfile.site"
    dest: "{{ instance_path }}/config/Caddyfile.site"
    force: false
    mode: "0644"

- name: Create Caddyfile.global from template (no-clobber)
  ansible.builtin.copy:
    src: "{{ canasta_root }}/instance_template/config/Caddyfile.global"
    dest: "{{ instance_path }}/config/Caddyfile.global"
    force: false
    mode: "0644"

- name: Generate observability credentials if enabled
  ansible.builtin.include_tasks: ensure_observability_credentials.yml

- name: Generate Caddyfile
  ansible.builtin.include_tasks: rewrite_caddy.yml

- name: Compose-specific init
  when: instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Sync compose profiles
      ansible.builtin.include_tasks: sync_compose_profiles.yml

- name: Kubernetes-specific init
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  ansible.builtin.debug:
    msg: "Kubernetes configuration managed via Helm values.yaml"
