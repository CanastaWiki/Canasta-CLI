{{/*
This template validates that the required Secrets exist.
Actual Secret creation is handled by Ansible via k8s_apply_secrets.yml
before Helm install. Secrets are never stored in values.yaml.
*/}}
{{- $dbSecret := (lookup "v1" "Secret" (include "canasta.namespace" .) (include "canasta.dbSecretName" .)) }}
{{- $mwSecret := (lookup "v1" "Secret" (include "canasta.namespace" .) (include "canasta.mwSecretName" .)) }}

{{- if and (not $dbSecret) (not ($.Release.IsInstall)) }}
{{- fail (printf "Required Secret '%s' not found in namespace '%s'. Run Ansible k8s_apply_secrets.yml first." (include "canasta.dbSecretName" .) (include "canasta.namespace" .)) }}
{{- end }}

{{- if and (not $mwSecret) (not ($.Release.IsInstall)) }}
{{- fail (printf "Required Secret '%s' not found in namespace '%s'. Run Ansible k8s_apply_secrets.yml first." (include "canasta.mwSecretName" .) (include "canasta.namespace" .)) }}
{{- end }}
