apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "canasta.fullname" . }}-images
  namespace: {{ include "canasta.namespace" . }}
  labels:
    {{- include "canasta.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.persistence.images.storageClass }}
  storageClassName: {{ .Values.persistence.images.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.images.size }}
