apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "canasta.fullname" . }}-caddy
  namespace: {{ include "canasta.namespace" . }}
  labels:
    {{- include "canasta.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  replicas: 1
  {{- if .Values.crowdsec.enabled }}
  # The crowdsec sidecar holds a ReadWriteOnce PVC, which a rolling-update
  # surge pod could not co-mount with the outgoing pod — recreate instead.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "canasta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: caddy
  template:
    metadata:
      labels:
        {{- include "canasta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: caddy
      annotations:
        checksum/caddy-config: {{ .Values.configData.caddy | toJson | sha256sum }}
    spec:
      {{- if .Values.crowdsec.enabled }}
      initContainers:
        # K8s PVCs do not prepopulate from the image the way Docker named
        # volumes do, so an empty /etc/crowdsec PVC would mask the image's
        # baked-in config and parsers. Seed it once (cp -n preserves the
        # LAPI/bouncer/CAPI credentials the engine writes on later boots),
        # then drop in the per-instance acquisition + whitelist from the
        # ConfigMap (overwritten every start so operator edits land).
        - name: seed-crowdsec-config
          image: {{ .Values.crowdsec.image }}
          command:
            - sh
            - -c
            - |
              cp -rn /etc/crowdsec/. /seed/ 2>/dev/null || true
              mkdir -p /seed/acquis.d /seed/parsers/s02-enrich
              cp /cm/acquis.yaml /seed/acquis.d/caddy.yaml
              cp /cm/whitelists.yaml /seed/parsers/s02-enrich/canasta-whitelists.yaml
          volumeMounts:
            - name: crowdsec-data
              mountPath: /seed
              subPath: etc
            - name: crowdsec-config
              mountPath: /cm
              readOnly: true
      {{- end }}
      containers:
        - name: caddy
          image: {{ .Values.caddy.image | default "caddy:2.10.2-alpine" }}
          {{- if .Values.crowdsec.enabled }}
          # The Caddyfile reads the bouncer key via {env.CROWDSEC_BOUNCER_API_KEY}.
          # optional: true lets Caddy start key-less before the bouncer is
          # enrolled — the Caddyfile only emits the crowdsec directive once a
          # key exists (rewrite_caddy.yml's _crowdsec_active guard), so a
          # missing key is a clean no-op, not a startup failure.
          env:
            - name: CROWDSEC_BOUNCER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "canasta.fullname" . }}-crowdsec
                  key: CROWDSEC_BOUNCER_API_KEY
                  optional: true
          {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile.site
              subPath: Caddyfile.site
              readOnly: true
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile.global
              subPath: Caddyfile.global
              readOnly: true
            - name: caddy-data
              mountPath: /data
            {{- if .Values.crowdsec.enabled }}
            - name: caddy-logs
              mountPath: /var/log/caddy
            {{- end }}
          {{- with .Values.caddy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
        {{- if .Values.crowdsec.enabled }}
        # CrowdSec detection engine (LAPI on :8080). Runs as a sidecar so it
        # reads Caddy's access log over the shared caddy-logs volume (mirrors
        # the Compose caddy-logs mount). It parses the log, correlates attack
        # patterns, and publishes decisions the caddy-crowdsec-bouncer
        # enforces. The crowdsec Service routes crowdsec:8080 back to this pod.
        - name: crowdsec
          image: {{ .Values.crowdsec.image }}
          env:
            # Installed by the image entrypoint on start; idempotent against
            # the persisted /etc/crowdsec. The caddy collection ships the
            # Caddy log parser plus base HTTP attack scenarios.
            - name: COLLECTIONS
              value: {{ .Values.crowdsec.collections | quote }}
          ports:
            - name: lapi
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: crowdsec-data
              mountPath: /etc/crowdsec
              subPath: etc
            - name: crowdsec-data
              mountPath: /var/lib/crowdsec/data
              subPath: data
            - name: caddy-logs
              mountPath: /var/log/caddy
              readOnly: true
          {{- with .Values.crowdsec.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: lapi
            periodSeconds: 10
        {{- end }}
      volumes:
        - name: caddy-config
          configMap:
            name: {{ include "canasta.fullname" . }}-caddy-config
        - name: caddy-data
          emptyDir: {}
        {{- if .Values.crowdsec.enabled }}
        - name: crowdsec-data
          persistentVolumeClaim:
            claimName: {{ include "canasta.fullname" . }}-crowdsec
        - name: crowdsec-config
          configMap:
            name: {{ include "canasta.fullname" . }}-crowdsec-config
        - name: caddy-logs
          emptyDir: {}
        {{- end }}
