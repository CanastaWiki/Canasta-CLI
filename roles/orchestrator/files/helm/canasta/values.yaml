# Default values for the Canasta Helm chart.

# Instance identity
instance:
  id: ""

# Canasta image
image:
  repository: ghcr.io/canastawiki/canasta
  tag: ""               # defaults to chart appVersion if empty
  pullPolicy: IfNotPresent

# Domains for ingress routing (all domains used by wikis in this instance)
# Wiki farm config (wiki IDs, paths, names) lives in wikis.yaml on the config PVC.
domains:
  - localhost

# Web tier
web:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Caddy (reverse proxy + wiki farm routing)
caddy:
  image: caddy:2.10.2-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Varnish cache
varnish:
  enabled: true
  image: varnish:7.0.2-alpine
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Database (MariaDB)
db:
  image: mariadb:11.4
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Elasticsearch (optional)
elasticsearch:
  enabled: false
  image: elasticsearch:7.17.9
  storage: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Job runner
jobrunner:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Ingress
ingress:
  enabled: true
  className: ""
  tls: true
  annotations: {}
  certManager:
    enabled: false
    issuer: letsencrypt-prod

# Persistent volumes
# For multi-node clusters, set storageClass to a ReadWriteMany provisioner
# (e.g. nfs, efs). See 'canasta storage setup' for help configuring shared storage.
persistence:
  images:
    size: 10Gi
    storageClass: ""
  extensions:
    size: 1Gi
    storageClass: ""
  skins:
    size: 1Gi
    storageClass: ""
  publicAssets:
    size: 1Gi
    storageClass: ""

# Secrets — names of K8s Secrets created by Ansible (not stored here)
secrets:
  dbSecretName: ""      # set by Ansible: <instance_id>-db-credentials
  mwSecretName: ""      # set by Ansible: <instance_id>-mw-secrets

# Argo CD
argocd:
  namespace: argocd
  repoURL: ""
  targetRevision: HEAD
  syncPolicy:
    automated: true
    selfHeal: true
    prune: true
