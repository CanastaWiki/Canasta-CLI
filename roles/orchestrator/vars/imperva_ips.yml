---
# Imperva (Incapsula) Cloud WAF edge IP ranges.
#
# Source of truth: https://my.imperva.com/api/integration/v1/ips (open,
# no auth; returns {ipRanges, ipv6Ranges}). Used by rewrite_caddy.yml
# when CADDY_TRUSTED_PROXIES=imperva to lock Caddy's trusted_proxies to
# Imperva's edge, so the real client IP is read from the Incap-Client-IP
# header only for requests that actually came through Imperva. Trusting
# the header without locking these ranges would let any client spoof
# their IP.
#
# Regenerate with scripts/update_proxy_ips.py. The proxy-ips workflow
# runs that monthly and opens a PR when the published list changes.
# Last synced: 2026-06-08.
imperva_ip_ranges:
  - "199.83.128.0/21"
  - "198.143.32.0/19"
  - "149.126.72.0/21"
  - "103.28.248.0/22"
  - "185.11.124.0/22"
