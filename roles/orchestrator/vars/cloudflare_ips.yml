---
# Cloudflare published edge IP ranges (https://www.cloudflare.com/ips/).
#
# Used by rewrite_caddy.yml when CADDY_TRUSTED_PROXIES=cloudflare to lock
# Caddy's trusted_proxies to Cloudflare's edge, so the real client IP is
# read from CF-Connecting-IP only for requests that actually came through
# Cloudflare. Trusting the header without locking these ranges would let
# any client spoof their IP.
#
# Regenerate with scripts/update_proxy_ips.py. The proxy-ips workflow
# runs that monthly and opens a PR when the published list changes.
# Last synced: 2026-06-08.
