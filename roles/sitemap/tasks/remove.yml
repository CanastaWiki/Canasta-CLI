---
# canasta sitemap remove - Remove XML sitemaps.
# Uses correct path: /mediawiki/public_assets/<wiki>/sitemap
# Input: id (optional), wiki (optional)

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Get wiki list
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _sitemap_wikis

- name: Determine wikis for sitemap removal
  ansible.builtin.set_fact:
    _sitemap_targets: "{{ [wiki] if (wiki | default('') != '') else _sitemap_wikis.wiki_ids }}"

- name: Remove sitemaps for each wiki
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: web
    exec_command: "rm -rf /mediawiki/public_assets/{{ item | quote }}/sitemap"
  loop: "{{ _sitemap_targets }}"

- name: Report sitemaps removed
  ansible.builtin.debug:
    msg: "Sitemaps removed for: {{ _sitemap_targets | join(', ') }}"
