---
# Generate sitemap for a single wiki.
# Input: _sitemap_wiki (str), instance_path, _sitemap_server

- name: "Create sitemap directory for {{ _sitemap_wiki }}"
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "mkdir -p /mediawiki/public_assets/{{ _sitemap_wiki | quote }}/sitemap"

- name: "Generate sitemap for {{ _sitemap_wiki }}"
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: >-
      php maintenance/generateSitemap.php
      --wiki={{ _sitemap_wiki | quote }}
      --fspath=/mediawiki/public_assets/{{ _sitemap_wiki | quote }}/sitemap
      --urlpath=/sitemap/{{ _sitemap_wiki | quote }}
      --server={{ _sitemap_server.value | quote }}
      --skip-redirects

- name: "Set ownership for {{ _sitemap_wiki }} sitemap"
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "chown -R www-data:www-data /mediawiki/public_assets/{{ _sitemap_wiki | quote }}/sitemap"
