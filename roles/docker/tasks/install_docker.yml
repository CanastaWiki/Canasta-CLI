---
# Install Docker and Docker Compose from distribution repositories.
# Assumes running as root or with sudo.

- name: Gather distribution facts
  ansible.builtin.setup:
    gather_subset:
      - distribution

- name: Check for apt package manager
  ansible.builtin.stat:
    path: /usr/bin/apt
  register: _apt_exists

- name: Check for dnf package manager
  ansible.builtin.stat:
    path: /usr/bin/dnf
  register: _dnf_exists

- name: Handle Debian and derivatives
  when: _apt_exists.stat.exists
  block:
    - name: Debug
      ansible.builtin.debug:
        msg: Install pre-reqs

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Debug
      ansible.builtin.debug:
        msg: Add docker repo

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Debug
      ansible.builtin.debug:
        msg: Install docker packages

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

- name: Handle Red Hat and derivatives
  when: _dnf_exists.stat.exists
  block:
    - name: Install prerequisites
      ansible.builtin.dnf:
        name:
          - dnf-plugins-core
          - python3
        state: present

    - name: Add Docker repository
      ansible.builtin.command:
        cmd: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      changed_when: true

    - name: Install Docker packages
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
