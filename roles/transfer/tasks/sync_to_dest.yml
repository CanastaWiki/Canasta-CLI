---
# Sync instance directory from source to destination host.
# Input: _source_host, _source_instance_path, _dest_host, _dest_instance_path

- name: Create destination instance directory
  ansible.builtin.file:
    path: "{{ _dest_instance_path }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ _dest_host }}"

- name: Set rsync excludes
  ansible.builtin.set_fact:
    _rsync_excludes: >-
      --exclude=docker-compose.yml
      --exclude=docker-compose.override.yml.example
      --exclude=docker-compose.dev.yml
      --exclude=Dockerfile.xdebug
      --exclude=argocd/
      --exclude=scripts/
      --exclude=.git/
      --exclude=.vscode/
      --exclude=.idea/
      --exclude=mediawiki-code/
      --exclude=config/Caddyfile
      --exclude=admin-password_*

- name: Sync instance files (remote)
  ansible.builtin.command:
    cmd: >-
      rsync -az {{ _rsync_excludes }}
      {{ _source_instance_path | quote }}/
      {{ _dest_host }}:{{ _dest_instance_path | quote }}/
  delegate_to: "{{ _source_host }}"
  changed_when: true
  when: _source_host != _dest_host

- name: Sync instance files (local)
  ansible.builtin.command:
    cmd: >-
      rsync -a {{ _rsync_excludes }}
      {{ _source_instance_path | quote }}/
      {{ _dest_instance_path | quote }}/
  delegate_to: "{{ _source_host }}"
  changed_when: true
  when: _source_host == _dest_host
