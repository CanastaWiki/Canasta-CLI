---
# Set up and start the transferred instance on the destination host.
# Input: _dest_host, _dest_instance_path, _dest_id, _dest_domain (optional),
#        _dest_orchestrator, _transfer_wikis (from dump step)

- name: Write fresh stack files on destination
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: write_stack_files.yml
  vars:
    instance_path: "{{ _dest_instance_path }}"
    instance_orchestrator: "{{ _dest_orchestrator }}"

- name: Update domain in .env if new domain specified
  when: _dest_domain is defined and _dest_domain != ''
  block:
    - name: Update MW_SITE_SERVER
      canasta_env:
        path: "{{ _dest_instance_path }}/.env"
        state: set
        key: MW_SITE_SERVER
        value: "https://{{ _dest_domain }}"
      delegate_to: "{{ _dest_host }}"

    - name: Update MW_SITE_FQDN
      canasta_env:
        path: "{{ _dest_instance_path }}/.env"
        state: set
        key: MW_SITE_FQDN
        value: "{{ _dest_domain }}"
      delegate_to: "{{ _dest_host }}"

    - name: Update wikis.yaml with new domain
      canasta_wikis_yaml:
        instance_path: "{{ _dest_instance_path }}"
        state: read
      delegate_to: "{{ _dest_host }}"
      register: _dest_wikis_current

    # Rewrite wikis.yaml URLs with new domain (preserve wiki IDs and paths)
    - name: Read raw wikis for URL update
      ansible.builtin.slurp:
        src: "{{ _dest_instance_path }}/config/wikis.yaml"
      delegate_to: "{{ _dest_host }}"
      register: _dest_wikis_raw

    - name: Rewrite wiki URLs with new domain
      ansible.builtin.copy:
        content: |
          wikis:
          {% for w in _dest_wikis_current.wikis %}
          {% set old_path = w.url | regex_replace('^[^/]*', '') %}
            - id: {{ w.id }}
              url: {{ _dest_domain }}{{ old_path }}
              name: "{{ w.name }}"
          {% endfor %}
        dest: "{{ _dest_instance_path }}/config/wikis.yaml"
        mode: "0644"
      delegate_to: "{{ _dest_host }}"

- name: Initialize orchestrator config on destination
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: init_config.yml
  vars:
    instance_path: "{{ _dest_instance_path }}"
    instance_orchestrator: "{{ _dest_orchestrator }}"

- name: Start containers on destination
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: start.yml
  vars:
    instance_path: "{{ _dest_instance_path }}"
    instance_orchestrator: "{{ _dest_orchestrator }}"
    instance_devmode: false
    instance_managed_cluster: false

- name: Wait for database on destination
  ansible.builtin.include_role:
    name: mediawiki
    tasks_from: wait_for_db.yml
  vars:
    instance_path: "{{ _dest_instance_path }}"
    instance_orchestrator: "{{ _dest_orchestrator }}"

- name: Read DB password from destination .env
  canasta_env:
    path: "{{ _dest_instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  delegate_to: "{{ _dest_host }}"
  register: _dest_dbpass
  no_log: true

- name: Import each wiki database
  ansible.builtin.include_role:
    name: mediawiki
    tasks_from: import_database.yml
  vars:
    instance_path: "{{ _dest_instance_path }}"
    instance_orchestrator: "{{ _dest_orchestrator }}"
    import_wiki_id: "{{ item }}"
    import_database_path: "{{ _dest_instance_path }}/transfer/{{ item }}.sql"
    import_db_password: "{{ _dest_dbpass.value }}"
  loop: "{{ _transfer_wikis.wiki_ids }}"

- name: Clean up transfer directory on destination
  ansible.builtin.file:
    path: "{{ _dest_instance_path }}/transfer"
    state: absent
  delegate_to: "{{ _dest_host }}"

- name: Register instance on controller
  canasta_registry:
    id: "{{ _dest_id }}"
    path: "{{ _dest_instance_path }}"
    orchestrator: "{{ _dest_orchestrator }}"
    host: "{{ _dest_host }}"
    state: present
  delegate_to: localhost
