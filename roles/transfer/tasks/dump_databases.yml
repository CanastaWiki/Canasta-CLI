---
# Dump all wiki databases to transfer/ directory on the source host.
# Input: _source_instance_path, _source_host, _dest_orchestrator
# Output: SQL files in _source_instance_path/transfer/

- name: Create transfer directory on source
  ansible.builtin.file:
    path: "{{ _source_instance_path }}/transfer"
    state: directory
    mode: "0755"
  delegate_to: "{{ _source_host }}"

- name: Read wiki list from source
  canasta_wikis_yaml:
    instance_path: "{{ _source_instance_path }}"
    state: read
  delegate_to: "{{ _source_host }}"
  register: _transfer_wikis

- name: Read DB password from source
  canasta_env:
    path: "{{ _source_instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  delegate_to: "{{ _source_host }}"
  register: _transfer_dbpass
  no_log: true

# --- Compose: docker compose exec ---
- name: Dump each wiki database (Compose)
  ansible.builtin.shell:
    cmd: >-
      docker compose exec -T db mariadb-dump -u root
      -p{{ _transfer_dbpass.value | quote }}
      --single-transaction --databases {{ item | quote }}
      > {{ _source_instance_path }}/transfer/{{ item | quote }}.sql
    chdir: "{{ _source_instance_path }}"
  delegate_to: "{{ _source_host }}"
  changed_when: true
  no_log: true
  loop: "{{ _transfer_wikis.wiki_ids }}"
  when: _dest_orchestrator | default('compose') == 'compose'

# --- Kubernetes: kubectl exec ---
- name: Dump each wiki database (Kubernetes)
  ansible.builtin.shell:
    cmd: >-
      kubectl exec -n canasta-{{ _source_id }}
      $(kubectl get pod -n canasta-{{ _source_id }}
      -l app.kubernetes.io/component=db
      --field-selector=status.phase=Running
      -o jsonpath='{.items[0].metadata.name}')
      -- mariadb-dump -u root
      -p{{ _transfer_dbpass.value | quote }}
      --single-transaction --databases {{ item | quote }}
      > {{ _source_instance_path }}/transfer/{{ item | quote }}.sql
  delegate_to: "{{ _source_host }}"
  changed_when: true
  no_log: true
  loop: "{{ _transfer_wikis.wiki_ids }}"
  when: _dest_orchestrator | default('compose') in ['kubernetes', 'k8s']
