---
# canasta devmode disable - Full implementation matching Go devmode.DisableDevMode().
# Restores extensions/skins from symlinks to real directories.
# Input: id (optional)

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Not applicable for Kubernetes
  ansible.builtin.fail:
    msg: >-
      'canasta devmode disable' is not applicable for the kubernetes orchestrator.
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']

- name: Check in dev mode
  ansible.builtin.fail:
    msg: "Instance '{{ instance_id }}' is not in development mode."
  when: not (instance_devmode | bool)

- name: Stop containers
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: stop.yml

# --- Restore user directories from symlinks ---
- name: Restore extensions directory
  ansible.builtin.include_tasks: _restore_user_dir.yml
  vars:
    _dir_name: extensions
    _mw_subdir: user-extensions

- name: Restore skins directory
  ansible.builtin.include_tasks: _restore_user_dir.yml
  vars:
    _dir_name: skins
    _mw_subdir: user-skins

# --- Update registry and restart ---
- name: Update controller registry to non-dev mode
  canasta_registry:
    id: "{{ instance_id }}"
    path: "{{ instance_path }}"
    orchestrator: "{{ instance_orchestrator }}"
    dev_mode: false
    state: present
  delegate_to: localhost

- name: Update target host registry to non-dev mode
  canasta_registry:
    id: "{{ instance_id }}"
    path: "{{ instance_path }}"
    orchestrator: "{{ instance_orchestrator }}"
    dev_mode: false
    state: present
  when: inventory_hostname != "localhost"

- name: Set dev mode fact
  ansible.builtin.set_fact:
    instance_devmode: false

- name: Start containers in normal mode
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: start.yml

- name: Report dev mode disabled
  ansible.builtin.debug:
    msg: "Development mode disabled for '{{ instance_id }}'."
