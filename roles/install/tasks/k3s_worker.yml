---
# Install k3s on the target host as a worker (agent) joined to an
# existing control plane.
#
# Resolves --cp-host (a registered Canasta host name) to its SSH
# target by reading the controller's hosts.yml, then SSHs to the
# control plane to fetch:
#   - the k3s join token (/var/lib/rancher/k3s/server/node-token)
#   - the cluster-internal API IP (k3s kubectl get node ...)
# and finally invokes k8s_install_k3s_agent.yml on this host with
# those values to actually do the join.

# --- Resolve cp-host short name to SSH target ---

- name: Resolve cp-host SSH target from hosts.yml
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_cp_host_ssh.yml"

# --- Confirm cp-host actually has a running k3s server ---
#
# Without this, a misconfigured invocation (cp-host doesn't have k3s
# installed yet, cp-host is a worker not a cp, k3s service stopped,
# SSH key changed) hits the token-fetch task below and fails with a
# generic "Module failed: non-zero return code" — which `no_log: true`
# below then censors entirely, leaving the operator with `exit=2` and
# no diagnostic. Catch the common misuse cases here, before the
# sensitive task runs, so we can produce an actionable message.
- name: Probe cp-host for active k3s server
  ansible.builtin.command:
    argv:
      - ssh
      - -o
      - StrictHostKeyChecking=accept-new
      - "{{ _cp_ssh_target }}"
      - systemctl is-active k3s
  delegate_to: localhost
  vars:
    ansible_connection: local
  register: _cp_k3s_active
  changed_when: false
  failed_when: false

- name: Fail if cp-host has no active k3s control plane
  ansible.builtin.fail:
    msg: |-
      Host '{{ cp_host }}' is not running a k3s control plane
      (systemctl is-active k3s returned: {{ (_cp_k3s_active.stdout | default('') | trim) or 'no output (SSH or sudo failure)' }}).

      Common causes:
        - You haven't installed k3s on '{{ cp_host }}' yet. Run
            canasta install k8s-cp --host {{ cp_host }}
          first, then retry this worker install.
        - The cp-host you specified is itself a worker, not a control plane.
          The cp-host argument must point at the cluster's control-plane node.
        - The k3s service is installed but stopped. Start it on '{{ cp_host }}'
          (sudo systemctl start k3s) and retry.
  when: >-
    _cp_k3s_active.rc != 0
    or (_cp_k3s_active.stdout | default('') | trim) != 'active'

# --- SSH to cp-host, fetch token + cluster-internal IP ---

- name: Fetch k3s join token from cp-host
  ansible.builtin.command:
    argv:
      - ssh
      - -o
      - StrictHostKeyChecking=accept-new
      - "{{ _cp_ssh_target }}"
      - sudo cat /var/lib/rancher/k3s/server/node-token
  delegate_to: localhost
  vars:
    ansible_connection: local
  register: _cp_token_raw
  changed_when: false
  no_log: true  # token is sensitive

- name: Fetch cluster-internal IP of cp-host (via k3s kubectl)
  ansible.builtin.command:
    argv:
      - ssh
      - -o
      - StrictHostKeyChecking=accept-new
      - "{{ _cp_ssh_target }}"
      - >-
        k3s kubectl get nodes
        -l node-role.kubernetes.io/control-plane=true
        -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'
  delegate_to: localhost
  vars:
    ansible_connection: local
  register: _cp_internal_ip_raw
  changed_when: false

- name: Set k3s join parameters
  ansible.builtin.set_fact:
    _k3s_server_url: "https://{{ _cp_internal_ip_raw.stdout | trim }}:6443"
    _k3s_join_token: "{{ _cp_token_raw.stdout | trim }}"
  no_log: true

- name: Validate fetched values
  ansible.builtin.fail:
    msg: >-
      Failed to discover cluster info from cp-host '{{ cp_host }}'.
      Check that k3s is installed and running there
      ('canasta --host {{ cp_host }} install k8s-cp').
  when:
    - (_cp_internal_ip_raw.stdout | trim | length == 0)
      or (_cp_token_raw.stdout | trim | length == 0)

# The agent task itself prints "Joining k3s cluster at ..." inside
# its install block (gated on a real install), so we don't duplicate
# that message here.

# --- Run the agent install with the resolved values ---

- name: Install k3s agent
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: k8s_install_k3s_agent.yml
  vars:
    server: "{{ _k3s_server_url }}"
    token: "{{ _k3s_join_token }}"

# --- Final visibility: show cluster nodes from cp ---
# After the agent installs, the new worker may take a few seconds to
# appear in the cp's view (kubelet registration). Retry briefly so the
# printed table reflects the new node when possible; surface whatever
# state the cp sees if it hasn't shown up by the timeout.
- name: Wait briefly for the new worker to register on cp
  ansible.builtin.command:
    argv:
      - ssh
      - -o
      - StrictHostKeyChecking=accept-new
      - "{{ _cp_ssh_target }}"
      - sudo k3s kubectl get nodes -o wide
  delegate_to: localhost
  vars:
    ansible_connection: local
  register: _cp_post_join_nodes
  changed_when: false
  retries: 6
  delay: 5
  until: >-
    (_cp_post_join_nodes.stdout | regex_findall('Ready') | length)
    >= ((_cp_post_join_nodes.stdout_lines | length) - 1)
  failed_when: false  # Show whatever state we got, even if not all Ready

- name: Show cluster nodes from cp
  ansible.builtin.debug:
    msg: "{{ _cp_post_join_nodes.stdout_lines }}"
