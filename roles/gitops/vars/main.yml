---
# Which keys gitops placeholders (secrets + host-specific) is decided by the
# canonical classifier in vars/secret_classification.yml:
# canasta_secret_key_regex for secrets, and canasta_host_specific_nonsecret for
# the per-host toggles / ports / URLs a gitops render must preserve
# (CANASTA_ENABLE_*, CADDY_TRUSTED_PROXIES, ...). CANASTA_CADDY_IMAGE and
# COMPOSE_PROFILES are intentionally neither — both are re-derived from the
# feature flags on every start, so storing them would freeze a reconciled value.

# Keys (lowercase) whose values belong in hosts/_shared/vars.yaml
# rather than per-host vars.yaml. Auto-migrated on gitops push.
#
# Default policy: per-host. A key only joins this list when sharing it
# across hosts is the right default — the value is opaque secret
# material that doesn't change between dev / staging / prod, like API
# credentials and encryption passwords.
#
# Environment-identifying values — bucket names, repository URLs,
# regions, endpoints, hostnames — stay per-host so dev / staging /
# prod can address different infrastructure under one gitops repo.
gitops_shared_keys:
  - aws_access_key_id
  - aws_secret_access_key
  - restic_password
  - smtp_password
  - smtp_user

# Environment applied to every git command in the Compose-side gitops
# flows (init, push, pull, join). accept-new lets the first contact
# with a forge (github.com etc.) silently add its host key instead of
# failing with "Host key verification failed".
#
# When the operator passes --ssh-key, git authenticates with that
# private key (`-i <ssh_key>`). Otherwise, pair with ForwardAgent=yes
# in ANSIBLE_SSH_ARGS (set by canasta.py) so the operator's local
# ssh-agent reaches the target host and authenticates against private
# repos without per-host deploy keys. The Kubernetes gitops flows
# generate their own deploy key and override GIT_SSH_COMMAND with
# `-i <key>`, so this default doesn't apply there.
gitops_git_env:
  GIT_SSH_COMMAND: >-
    ssh{{ (ssh_key | default('') | length > 0)
    | ternary(' -i ' ~ (ssh_key | default('')), '') }}
    -o StrictHostKeyChecking=accept-new
    -o UserKnownHostsFile=~/.ssh/known_hosts
