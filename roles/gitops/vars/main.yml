---
# Keys whose values are secrets or host-specific; rendered as
# {{ placeholder }} in env.template and stored in hosts/<host>/vars.yaml.
gitops_placeholder_keys:
  - MYSQL_PASSWORD
  - WIKI_DB_PASSWORD
  - MW_SECRET_KEY
  - RESTIC_REPOSITORY
  - RESTIC_PASSWORD
  - MW_SITE_SERVER
  - MW_SITE_FQDN
  - HTTPS_PORT
  - HTTP_PORT

# Keys whose name starts with any of these prefixes are treated as
# credentials and get placeholders in env.template.
gitops_secret_prefix_pattern: "^(AWS_|AZURE_|B2_|GOOGLE_|OS_|ST_|RCLONE_|SMTP_)"

# Credential-class prefixes (lowercase) whose values belong in
# hosts/_shared/vars.yaml rather than per-host vars.yaml. Auto-migrated
# on gitops push.
gitops_shared_credential_prefixes:
  - restic_
  - aws_
  - azure_
  - b2_
  - google_
  - os_
  - st_
  - rclone_
  - smtp_

# Environment applied to every git command in the Compose-side gitops
# flows (init, push, pull, join). accept-new lets the first contact
# with a forge (github.com etc.) silently add its host key instead of
# failing with "Host key verification failed". Pair with
# ForwardAgent=yes in ANSIBLE_SSH_ARGS (set by canasta.py) so the
# operator's local ssh-agent reaches the target host and authenticates
# against private repos without per-host deploy keys. The Kubernetes
# gitops flows generate their own deploy key and override
# GIT_SSH_COMMAND with `-i <key>`, so this default doesn't apply
# there.
gitops_git_env:
  GIT_SSH_COMMAND: >-
    ssh -o StrictHostKeyChecking=accept-new
    -o UserKnownHostsFile=~/.ssh/known_hosts
