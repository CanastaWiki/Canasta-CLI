---
# GitOps diff (Kubernetes).
# Shows git-level diff on values/config files plus Argo CD live diff.
# Requires: instance_path, instance_id (set by dispatcher)

# --- Git diffs ---
- name: Set diff format
  ansible.builtin.set_fact:
    _kdiff_fmt: "{{ '--stat' if (stat is defined and stat | bool) else '-p' }}"

- name: Get uncommitted file list
  ansible.builtin.command:
    cmd: "git diff --name-only HEAD"
    chdir: "{{ instance_path }}"
  register: _kdiff_uncommitted_names
  changed_when: false

- name: Get uncommitted changes
  ansible.builtin.command:
    cmd: "git diff {{ _kdiff_fmt }} HEAD"
    chdir: "{{ instance_path }}"
  register: _kdiff_uncommitted
  changed_when: false

- name: Get local unpushed file list
  ansible.builtin.command:
    cmd: "git diff --name-only @{upstream}...HEAD"
    chdir: "{{ instance_path }}"
  register: _kdiff_local_names
  changed_when: false
  ignore_errors: true  # OK if no upstream configured

- name: Get local unpushed changes
  ansible.builtin.command:
    cmd: "git diff {{ _kdiff_fmt }} @{upstream}...HEAD"
    chdir: "{{ instance_path }}"
  register: _kdiff_local
  changed_when: false
  ignore_errors: true  # OK if no upstream configured

- name: Get remote unpulled file list
  ansible.builtin.command:
    cmd: "git diff --name-only HEAD...@{upstream}"
    chdir: "{{ instance_path }}"
  register: _kdiff_remote_names
  changed_when: false
  ignore_errors: true  # OK if no upstream configured

- name: Get remote unpulled changes
  ansible.builtin.command:
    cmd: "git diff {{ _kdiff_fmt }} HEAD...@{upstream}"
    chdir: "{{ instance_path }}"
  register: _kdiff_remote
  changed_when: false
  ignore_errors: true  # OK if no upstream configured

# --- Submodule changes ---
- name: Check submodule status
  ansible.builtin.command:
    cmd: git submodule status
    chdir: "{{ instance_path }}"
  register: _kdiff_submodules
  changed_when: false
  ignore_errors: true  # OK if no submodules configured

# --- Argo CD live diff ---
- name: Render Helm template to temp file
  ansible.builtin.command:
    cmd: >-
      helm template canasta-{{ instance_id }}
      {{ canasta_root }}/roles/orchestrator/files/helm/canasta
      -f {{ instance_path }}/values.yaml
  register: _kdiff_rendered
  changed_when: false
  ignore_errors: true  # OK if Helm chart not available

- name: Write rendered manifest
  ansible.builtin.copy:
    content: "{{ _kdiff_rendered.stdout }}"
    dest: "/tmp/canasta-diff-{{ instance_id }}.yaml"
    mode: "0600"
  when: _kdiff_rendered is succeeded

- name: Get live cluster diff
  ansible.builtin.command:
    cmd: "kubectl diff -n canasta-{{ instance_id }} -f /tmp/canasta-diff-{{ instance_id }}.yaml"
  register: _kdiff_cluster
  changed_when: false
  ignore_errors: true  # rc=1 means there are differences
  when: _kdiff_rendered is succeeded

- name: Clean up temp manifest
  ansible.builtin.file:
    path: "/tmp/canasta-diff-{{ instance_id }}.yaml"
    state: absent

# --- Display ---
- name: Display diff
  ansible.builtin.debug:
    msg: |-
      Uncommitted changes: {{ _kdiff_uncommitted_names.stdout_lines | default([]) | length }} file(s)
      {{ _kdiff_uncommitted.stdout | default('') }}

      Local changes (not yet pushed): {{ _kdiff_local_names.stdout_lines | default([]) | length }} file(s)
      {{ _kdiff_local.stdout | default('') }}

      Remote changes (would be applied on pull): {{ _kdiff_remote_names.stdout_lines | default([]) | length }} file(s)
      {{ _kdiff_remote.stdout | default('') }}
      {% set subs = _kdiff_submodules.stdout_lines | default([]) | select('match', '^[+]') | list %}
      {% if subs | length > 0 %}
      Submodules with changes:
      {% for s in subs %}
        {{ s.split()[1] | default(s) }}
      {% endfor %}
      {% endif %}
      {% if _kdiff_cluster is defined and _kdiff_cluster.stdout | default('') | trim | length > 0 %}

      Live cluster diff (desired vs current):
      {{ _kdiff_cluster.stdout }}
      {% endif %}
