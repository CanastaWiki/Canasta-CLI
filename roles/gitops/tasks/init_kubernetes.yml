---
# GitOps init (Kubernetes) — multi-environment aware.
# Repo structure:
#   values.template.yaml    ← shared, with {{placeholder}} syntax
#   hosts/hosts.yaml        ← host registry
#   hosts/{name}/vars.yaml  ← per-host values (cleartext, no secrets)
#   hosts/{name}/rendered-values.yaml  ← rendered for Argo CD
#   Chart.yaml, templates/  ← shared Helm chart
#
# No git-crypt: K8s secrets (MYSQL_PASSWORD, MW_SECRET_KEY) live in
# K8s Secrets, not in the gitops repo. The repo is therefore safe
# to be cleartext, which Argo CD requires anyway (it has no
# git-crypt support and can't decrypt encrypted values files).
# See #507 / #508 for the original switch and #509 for the
# scaffolding cleanup.
#
# Input: host_name, role, repo, key, force, pull_requests
#   key is the SSH deploy key path basename (private at <key>.ssh,
#   public at <key>.ssh.pub). It carries no git-crypt meaning on K8s;
#   with SOPS enabled it doubles as the operator age key's portable DR
#   path (<key>.age) — see _init_sops.yml.
# Requires: instance_path, instance_id (set by dispatcher)

# The --encrypt-secrets flag is the on-switch for SOPS secret encryption.
# It drives gitops_sops_secrets, which gates the Argo app's plugin source,
# the operator-key work, and the repo-server sidecar below.
- name: Enable SOPS secret encryption when --encrypt-secrets is set
  ansible.builtin.set_fact:
    gitops_sops_secrets: "{{ encrypt_secrets | default(false) | bool }}"

# --- Validate prerequisites ---
- name: Check git is installed
  ansible.builtin.command:
    cmd: git --version
  register: _git_check
  changed_when: false
  ignore_errors: true

- name: Fail if git is not installed
  ansible.builtin.fail:
    msg: >-
      git is not installed on the gitops target host.
      Install it via your distro's package manager
      (e.g. `apt install git` on Debian/Ubuntu).
  when: _git_check.rc | default(1) != 0

- name: Set git user.name on target host
  ansible.builtin.command:
    cmd: "git config --global user.name '{{ git_user_name }}'"
  changed_when: true
  when: git_user_name is defined and git_user_name != ''

- name: Set git user.email on target host
  ansible.builtin.command:
    cmd: "git config --global user.email '{{ git_user_email }}'"
  changed_when: true
  when: git_user_email is defined and git_user_email != ''

- name: Check git identity is configured
  ansible.builtin.command:
    cmd: "git config user.name"
  register: _git_identity
  changed_when: false
  ignore_errors: true

- name: Fail if git identity not configured
  ansible.builtin.fail:
    msg: >-
      Git user identity is not configured for this canasta gitops setup.
      Pass --git-user-name and --git-user-email to this command.
  when: _git_identity.rc != 0

- name: Reinit — wipe partial gitops state before re-running init
  ansible.builtin.include_tasks: _reinit_cleanup.yml
  when: reinit | default(false) | bool

- name: Check for existing .git directory
  ansible.builtin.stat:
    path: "{{ instance_path }}/.git"
  register: _gitops_existing

- name: Fail if git repo already exists
  ansible.builtin.fail:
    msg: >-
      GitOps already initialized ({{ instance_path }}/.git exists).
      Use 'gitops join' to attach this host to an existing remote
      repo, or pass --reinit to wipe the local gitops state and
      retry (typical when a previous init died mid-run before the
      git push succeeded).
  when: _gitops_existing.stat.exists

# --- SSH deploy key ---
# The deploy key is generated on the controller (where {{ key }} is a
# user-supplied controller-local path) and then mirrored to a fixed
# spot inside the target's instance directory for git operations to
# pick up. Earlier code assumed controller and target were the same
# host: ssh-keygen ran on the play target against a controller path,
# which usually did not exist there. See #474.
- name: Set SSH key paths
  ansible.builtin.set_fact:
    # Controller-local path. The user reads the public side of this
    # to register a deploy key on the forge.
    _ssh_key_path: "{{ key }}.ssh"
    # Target-local path. git on the target reads this via
    # GIT_SSH_COMMAND unless --ssh-key overrides it. .gitops-deploy-key
    # is in .gitignore.default so it never gets committed.
    _ssh_key_target_path: "{{ instance_path }}/.gitops-deploy-key"

# Save/switch/restore the connection state around the controller-side
# operations. delegate_to: localhost + vars: { ansible_connection:
# local } does NOT reliably override the host-level set_fact that
# switch_connection.yml plants — same failure mode 0d392a6 and
# b7d3ed2 fixed for resolve_instance and delete deregistration. Use
# the proven dance with `block`/`always:` so a failure between
# switch and restore can't leave the play stuck on the controller.
- name: Save connection state before controller-side key work
  ansible.builtin.set_fact:
    _gki_saved:
      host: "{{ ansible_host | default('localhost') }}"
      conn: "{{ ansible_connection | default('local') }}"
      user: "{{ ansible_user | default('') }}"
      python: "{{ ansible_python_interpreter | default(ansible_playbook_python) }}"

- block:
    - name: Switch to local for SSH key generation
      ansible.builtin.set_fact:
        ansible_host: "localhost"
        ansible_connection: "local"
        ansible_user: ""
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: Ensure SSH key parent directory exists on controller
      ansible.builtin.file:
        path: "{{ _ssh_key_path | dirname }}"
        state: directory
        mode: "0700"

    - name: Check if SSH deploy key already exists on controller
      ansible.builtin.stat:
        path: "{{ _ssh_key_path }}"
      register: _gitops_key_exists

    - name: Read existing SSH deploy key from controller
      ansible.builtin.slurp:
        src: "{{ _ssh_key_path }}"
      register: _gitops_ssh_key_existing
      when: _gitops_key_exists.stat.exists
      no_log: true

    - name: Check if existing file is a real SSH key
      ansible.builtin.set_fact:
        _existing_is_ssh_key: >-
          {{ _gitops_key_exists.stat.exists and
             (_gitops_ssh_key_existing.content | default('') | b64decode)
             is search('-----BEGIN') }}

    - name: Generate SSH deploy key pair on controller
      ansible.builtin.command:
        cmd: >-
          ssh-keygen -t ed25519
          -f {{ _ssh_key_path }}
          -N ''
          -C 'canasta-{{ instance_id }}'
      when: not (_existing_is_ssh_key | bool)

    - name: Read the SSH deploy private key from controller
      ansible.builtin.slurp:
        src: "{{ _ssh_key_path }}"
      register: _gitops_ssh_key
      no_log: true

    - name: Read the SSH deploy public key for display
      ansible.builtin.slurp:
        src: "{{ _ssh_key_path }}.pub"
      register: _gitops_ssh_pubkey
  always:
    - name: Restore connection state after key generation
      ansible.builtin.set_fact:
        ansible_host: "{{ _gki_saved.host }}"
        ansible_connection: "{{ _gki_saved.conn }}"
        ansible_user: "{{ _gki_saved.user }}"
        ansible_python_interpreter: "{{ _gki_saved.python }}"

- name: Stage SSH deploy private key on target for git operations
  ansible.builtin.copy:
    content: "{{ _gitops_ssh_key.content | b64decode }}"
    dest: "{{ _ssh_key_target_path }}"
    mode: "0600"
  no_log: true

# Probe whether the deploy key is already authorized on the remote. If it
# is (the operator pre-installed it, or --ssh-key points at a registered
# key), there's nothing to add — skip the manual prompt entirely. This is
# also what lets `gitops init` run unattended. BatchMode keeps the probe
# itself from blocking on an SSH prompt.
- name: Probe whether the deploy key is already authorized
  ansible.builtin.command:
    cmd: "git ls-remote {{ repo }}"
  environment:
    GIT_SSH_COMMAND: >-
      ssh -i {{ ssh_key | default(_ssh_key_target_path, true) }}
      -o StrictHostKeyChecking=accept-new
      -o UserKnownHostsFile=~/.ssh/known_hosts
      -o BatchMode=yes
  register: _gitops_keyprobe
  changed_when: false
  ignore_errors: true

- name: Determine whether the deploy key already works
  ansible.builtin.set_fact:
    _deploy_key_authorized: "{{ _gitops_keyprobe.rc == 0 }}"

- name: Display public key for deploy key setup
  ansible.builtin.debug:
    msg: >-
      SSH deploy key {{ (_existing_is_ssh_key | bool) | ternary('found', 'generated') }}.
      Add this public key as a deploy key (with WRITE access) on your git repository.
      Repository: {{ repo }}
      GitHub: go to Settings > Deploy keys > Add deploy key.
      Public key: {{ _gitops_ssh_pubkey.content | b64decode | trim }}
  when: not (_deploy_key_authorized | bool)

# Unattended runs (--non-interactive) can't pause for a human to register
# the key, so fail fast with the public key + guidance instead of hanging.
- name: Fail fast when the deploy key is not yet authorized (non-interactive)
  ansible.builtin.fail:
    msg: >-
      The gitops deploy key is not authorized on {{ repo }} and
      --non-interactive was set, so init cannot pause for you to add it.
      Register this public key as a deploy key with WRITE access, then
      re-run: {{ _gitops_ssh_pubkey.content | b64decode | trim }}
  when:
    - not (_deploy_key_authorized | bool)
    - non_interactive | default(false) | bool

- name: Pause for user to add deploy key to git repository
  ansible.builtin.pause:
    prompt: "Press Enter after you have added the deploy key to your repository (or Ctrl+C then A to abort)"
  when:
    - not (_deploy_key_authorized | bool)
    - not (non_interactive | default(false) | bool)

- name: Check remote is empty
  ansible.builtin.command:
    cmd: "git ls-remote {{ repo }}"
  environment:
    GIT_SSH_COMMAND: >-
      ssh -i {{ ssh_key | default(_ssh_key_target_path, true) }}
      -o StrictHostKeyChecking=accept-new
      -o UserKnownHostsFile=~/.ssh/known_hosts
  register: _gitops_remote
  changed_when: false
  ignore_errors: true

- name: Fail if remote is not empty
  ansible.builtin.fail:
    msg: >-
      Remote repository is not empty. Use --force to push anyway
      (this will overwrite the remote).
  when:
    - _gitops_remote.stdout | trim | length > 0
    - not (force | default(false) | bool)

# --- Copy Helm chart into instance directory ---
- name: Copy Chart.yaml into instance directory
  ansible.builtin.copy:
    src: "{{ canasta_root }}/roles/orchestrator/files/helm/canasta/Chart.yaml"
    dest: "{{ instance_path }}/Chart.yaml"
    mode: preserve

- name: Copy Helm templates into instance directory
  ansible.builtin.copy:
    src: "{{ canasta_root }}/roles/orchestrator/files/helm/canasta/templates/"
    dest: "{{ instance_path }}/templates/"
    mode: preserve

- name: Read instance values.yaml from remote
  ansible.builtin.slurp:
    src: "{{ instance_path }}/values.yaml"
  register: _gitops_instance_values

- name: Merge chart defaults with instance values
  ansible.builtin.set_fact:
    _merged_values: >-
      {{ lookup('file', canasta_root ~ '/roles/orchestrator/files/helm/canasta/values.yaml')
         | from_yaml
         | combine(_gitops_instance_values.content | b64decode | from_yaml, recursive=True) }}

- name: Write merged values.yaml
  ansible.builtin.copy:
    content: "{{ _merged_values | to_nice_yaml(indent=2) }}"
    dest: "{{ instance_path }}/values.yaml"
    mode: "0644"

# --- Sync config files into values.yaml ---
- name: Set K8s namespace for config sync
  ansible.builtin.set_fact:
    _k8s_namespace: "canasta-{{ instance_id }}"

- name: Sync config files
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/k8s_sync_config.yml"

- name: Render sidecars to Helm values
  canasta_render_sidecars:
    instance_path: "{{ instance_path }}"
    orchestrator: kubernetes

- name: Read values.yaml after config sync
  ansible.builtin.slurp:
    src: "{{ instance_path }}/values.yaml"
  register: _gitops_values_synced

- name: Read values-configdata.yaml
  ansible.builtin.slurp:
    src: "{{ instance_path }}/values-configdata.yaml"
  register: _gitops_configdata

- name: Read values-sidecars.yaml
  ansible.builtin.slurp:
    src: "{{ instance_path }}/values-sidecars.yaml"
  register: _gitops_sidecars

- name: Merge configData + sidecars into values
  ansible.builtin.set_fact:
    _final_values: >-
      {{ _gitops_values_synced.content | b64decode | from_yaml
         | combine(_gitops_configdata.content | b64decode | from_yaml, recursive=True)
         | combine(_gitops_sidecars.content | b64decode | from_yaml, recursive=True) }}

# --- Extract per-environment values into template + vars ---
- name: Define K8s placeholder keys
  ansible.builtin.set_fact:
    _k8s_placeholder_keys:
      - domains
      - instance.id
      - image.tag
      - secrets.dbSecretName
      - secrets.mwSecretName
      - ingress.className
      - ingress.tls
      - web.replicaCount

- name: Generate values.template.yaml
  ansible.builtin.copy:
    content: |
      {{ _final_values | to_nice_yaml(indent=2) }}
    dest: "{{ instance_path }}/values.template.yaml"
    mode: "0644"

- name: Create hosts directory
  ansible.builtin.file:
    path: "{{ instance_path }}/hosts/{{ host_name }}"
    state: directory
    mode: "0755"
    recurse: true

- name: Extract per-host vars from values
  ansible.builtin.copy:
    content: |
      # Per-environment values for {{ host_name }}
      domains:
      {% for d in _final_values.domains | default(['localhost']) %}
        - "{{ d }}"
      {% endfor %}
      instance_id: "{{ instance_id }}"
      image_tag: "{{ _final_values.image.tag | default('') }}"
      db_secret_name: "{{ _final_values.secrets.dbSecretName | default('') }}"
      mw_secret_name: "{{ _final_values.secrets.mwSecretName | default('') }}"
      ingress_class: "{{ _final_values.ingress.className | default('') }}"
      ingress_tls: {{ _final_values.ingress.tls | default(true) | lower }}
      web_replica_count: {{ _final_values.web.replicaCount | default(1) }}
    dest: "{{ instance_path }}/hosts/{{ host_name }}/vars.yaml"
    mode: "0644"
  no_log: true

- name: Write rendered-values.yaml (initial render = current values)
  ansible.builtin.copy:
    content: "{{ _final_values | to_nice_yaml(indent=2) }}"
    dest: "{{ instance_path }}/hosts/{{ host_name }}/rendered-values.yaml"
    mode: "0644"

# --- Initialize git repository ---
- name: Initialize git repository
  ansible.builtin.command:
    cmd: "git init -b main"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Configure git pull strategy
  ansible.builtin.command:
    cmd: "git config pull.rebase false"
    chdir: "{{ instance_path }}"
  changed_when: true

# Source the canonical gitignore.default so the security-critical
# entries (.gitops-deploy-key, admin-password_*, config/wikis.yaml,
# etc.) cannot drift out of the K8s path. K8s-only additions are
# appended after — never replace the shared list. See #505 for the
# regression this guards against.
- name: Write .gitignore (canonical base + K8s additions)
  ansible.builtin.copy:
    content: |
      {{ lookup('file', role_path + '/files/gitignore.default') }}

      # K8s-specific additions
      _initdb/
      docker-compose*.yml
      my.cnf
      scripts/
      values-configdata.yaml
      values-sidecars.yaml
    dest: "{{ instance_path }}/.gitignore"
    mode: "0644"

# K8s gitops repo carries no secrets after #508 — MYSQL_PASSWORD
# and MW_SECRET_KEY are pulled at deploy time from K8s Secrets
# (<id>-db-credentials, <id>-mw-secrets) via secretKeyRef, and
# k8s_sync_config.yml strips them out of the configData.web['.env']
# blob before rendering. With no secret-bearing files left, no
# git-crypt filter is needed and the entire git-crypt scaffolding
# (init, export, key transfer to the controller, target-side
# cleanup) was removed in #509. Compose's gitops path still uses
# git-crypt — this is a K8s-specific simplification.
- name: Create hosts.yaml
  ansible.builtin.copy:
    content: |
      hosts:
        - name: {{ host_name }}
          role: {{ role | default('both') }}
          pull_requests: {{ pull_requests | default(false) | bool | lower }}
    dest: "{{ instance_path }}/hosts/hosts.yaml"
    mode: "0644"

# --- Create Argo CD application manifest ---
- name: Create argocd directory
  ansible.builtin.file:
    path: "{{ instance_path }}/argocd"
    state: directory
    mode: "0755"

- name: Generate Argo CD Application manifest
  ansible.builtin.copy:
    content: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: canasta-{{ instance_id }}
        namespace: {{ argocd_namespace | default('argocd') }}
      spec:
        project: default
        source:
          repoURL: {{ repo }}
          targetRevision: HEAD
          path: .
      {% if gitops_sops_secrets | default(false) | bool %}
          plugin:
            name: helm-sops
            env:
              - name: HELM_ARGS
                value: "-f hosts/{{ host_name }}/rendered-values.yaml"
              # Scope decryption to THIS host's secrets, not every host's.
              - name: SECRETS_DIR
                value: "hosts/{{ host_name }}/secrets"
      {% else %}
          helm:
            valueFiles:
              - hosts/{{ host_name }}/rendered-values.yaml
      {% endif %}
        destination:
          server: https://kubernetes.default.svc
          namespace: canasta-{{ instance_id }}
        syncPolicy:
          automated:
            selfHeal: true
            prune: true
          syncOptions:
            - CreateNamespace=true
    dest: "{{ instance_path }}/argocd/application.yaml"
    mode: "0644"

# --- SOPS+age secret encryption (gated on --encrypt-secrets) ---
# Provision the operator age key + .sops.yaml + sops-age Secret, then add the
# helm-sops CMP sidecar to the (already-installed) Argo CD repo-server so it can
# decrypt at render time. The Argo Application above already points at the
# plugin source when enabled; the initial commit below carries .sops.yaml.
- name: Provision the operator age key and .sops.yaml
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/gitops/tasks/_init_sops.yml"
  when: gitops_sops_secrets | default(false) | bool

- name: Ensure the Argo CD repo-server has the helm-sops sidecar
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/k8s_ensure_sops_sidecar.yml"
  when: gitops_sops_secrets | default(false) | bool

# --- Save host identity ---
- name: Save .gitops-host
  ansible.builtin.copy:
    content: "{{ host_name }}"
    dest: "{{ instance_path }}/.gitops-host"
    mode: "0644"

# --- Convert extensions/skins git repos to submodules ---
# extensions/ and skins/ are the source of truth for the user-extensions
# and user-skins PVCs (roles/orchestrator/tasks/k8s_sync_user_dirs.yml),
# so they must be tracked. A loose git checkout under them is promoted to a
# proper submodule (pinned to its current commit) — otherwise `git add -A`
# below would record it as a bare gitlink whose files never get tracked.
- name: Find git repos in extensions
  ansible.builtin.find:
    paths: "{{ instance_path }}/extensions"
    patterns: ".git"
    file_type: directory
    hidden: true
    recurse: false
    depth: 2
  register: _ext_git_repos

- name: Convert extension git repos to submodules
  ansible.builtin.include_tasks: _convert_submodule.yml
  loop: "{{ _ext_git_repos.files | map(attribute='path') | map('dirname') | list }}"
  loop_control:
    loop_var: _repo_path

- name: Find git repos in skins
  ansible.builtin.find:
    paths: "{{ instance_path }}/skins"
    patterns: ".git"
    file_type: directory
    hidden: true
    recurse: false
    depth: 2
  register: _skin_git_repos

- name: Convert skin git repos to submodules
  ansible.builtin.include_tasks: _convert_submodule.yml
  loop: "{{ _skin_git_repos.files | map(attribute='path') | map('dirname') | list }}"
  loop_control:
    loop_var: _repo_path

# --- Initial commit and push ---
- name: Stage all files
  ansible.builtin.command:
    cmd: "git add -A"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Initial commit
  ansible.builtin.command:
    cmd: "git -c commit.gpgsign=false commit -m 'Initial gitops configuration'"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Add remote
  ansible.builtin.command:
    cmd: "git remote add origin {{ repo }}"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Push to remote
  ansible.builtin.command:
    cmd: "git push -u origin main {{ (force | default(false) | bool) | ternary('--force', '') }}"
    chdir: "{{ instance_path }}"
  environment:
    GIT_SSH_COMMAND: >-
      ssh -i {{ ssh_key | default(_ssh_key_target_path, true) }}
      -o StrictHostKeyChecking=accept-new
      -o UserKnownHostsFile=~/.ssh/known_hosts
  changed_when: true

# --- Create Argo CD repo credential Secret ---
- name: Apply Argo CD repo credential Secret + known-hosts trust
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/gitops/tasks/_apply_argo_repo_secret.yml"

# --- Register Argo CD Application ---
# force: replace rather than merge, so switching source type on reinit
# (e.g. helm -> plugin when enabling --encrypt-secrets) drops the old
# source block. A plain apply leaves both, and Argo refuses an
# Application with two source types (ComparisonError, no reconcile).
- name: Apply Argo CD Application to cluster
  kubernetes.core.k8s:
    state: present
    force: true
    src: "{{ instance_path }}/argocd/application.yaml"

- name: Report gitops initialized
  ansible.builtin.debug:
    msg: >-
      GitOps initialized for '{{ instance_id }}' (environment: {{ host_name }}).
      Git-crypt key: {{ key }}
      SSH deploy key: {{ _ssh_key_path }}
      Argo CD Application points to hosts/{{ host_name }}/rendered-values.yaml.
      Store both keys securely — they are needed for additional environments.
