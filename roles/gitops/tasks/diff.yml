---
# Matches Go CLI gitops diff with categorized output.

- name: Resolve instance
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/common/tasks/resolve_instance.yml

# Uncommitted changes (working tree vs index)
- name: Get uncommitted changes
  ansible.builtin.command:
    cmd: git diff --name-only
    chdir: "{{ instance_path }}"
  register: _gdiff_uncommitted
  changed_when: false

# Local changes (committed but not pushed)
- name: Get local unpushed changes
  ansible.builtin.command:
    cmd: git diff --name-only HEAD @{upstream}
    chdir: "{{ instance_path }}"
  register: _gdiff_local
  changed_when: false
  ignore_errors: true

# Remote changes (on remote but not pulled)
- name: Get remote changes
  ansible.builtin.command:
    cmd: git diff --name-only @{upstream} HEAD
    chdir: "{{ instance_path }}"
  register: _gdiff_remote
  changed_when: false
  ignore_errors: true

# Submodule changes
- name: Check submodule status
  ansible.builtin.command:
    cmd: git submodule status
    chdir: "{{ instance_path }}"
  register: _gdiff_submodules
  changed_when: false
  ignore_errors: true

- name: Display diff
  ansible.builtin.debug:
    msg: |-
      {% set uc = _gdiff_uncommitted.stdout
         | default('') | trim %}
      {% set uc_files = uc.split('\n')
         if uc else [] %}
      {% set lc = _gdiff_local.stdout
         | default('') | trim %}
      {% set lc_files = lc.split('\n')
         if lc else [] %}
      {% set rc = _gdiff_remote.stdout
         | default('') | trim %}
      {% set rc_files = rc.split('\n')
         if rc else [] %}
      Uncommitted changes: {{ uc_files | length }} file(s)
      {% for f in uc_files | sort %}
        {{ f }}
      {% endfor %}

      Local changes (not yet pushed): {{ lc_files | length }} file(s)
      {% for f in lc_files | sort %}
        {{ f }}
      {% endfor %}

      Remote changes (would be applied on pull): {{ rc_files | length }} file(s)
      {% for f in rc_files | sort %}
        {{ f }}
      {% endfor %}

      {% set subs = _gdiff_submodules.stdout_lines
         | default([])
         | select('match', '^[+]')
         | list %}
      {% if subs | length > 0 %}
      Submodules that would be updated:
      {% for s in subs %}
        {{ s.split()[1] | default(s) }}
      {% endfor %}

      {% endif %}
      {% set needs_restart = (lc_files + rc_files)
         | select('match', '.*\\.(env|yml|yaml)$')
         | list | length > 0 %}
      {% set needs_update = (lc_files + rc_files)
         | select('match', '.*\\.php$')
         | list | length > 0 %}
      {% if needs_restart %}
      A restart would be needed after pulling.
      {% endif %}
      {% if needs_update %}
      A maintenance update may be needed after pulling.
      {% endif %}
