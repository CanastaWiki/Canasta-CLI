---
# GitOps push (Compose) — commit staged changes and push to remote.
# Matches Go CLI's push flow: validates role, accepts message, supports
# the staged-changes-only model.
# Requires: instance_path, instance_id (set by dispatcher)
# Optional: message (commit message, defaults to 'Configuration update')

# --- Validate role allows push ---
- name: Read hosts.yaml
  ansible.builtin.slurp:
    src: "{{ instance_path }}/hosts/hosts.yaml"
  register: _push_hosts_raw

- name: Read .gitops-host
  ansible.builtin.slurp:
    src: "{{ instance_path }}/.gitops-host"
  register: _push_host_raw

- name: Parse host config
  ansible.builtin.set_fact:
    _push_hostname: "{{ _push_host_raw.content | b64decode | trim }}"
    _push_hosts: "{{ _push_hosts_raw.content | b64decode | from_yaml }}"

- name: Find current host config
  ansible.builtin.set_fact:
    _push_host_entry: >-
      {{ _push_hosts.hosts | default([])
          | selectattr('name', 'equalto', _push_hostname)
          | first | default({}) }}
    _push_role: >-
      {{ (_push_hosts.hosts | default([])
          | selectattr('name', 'equalto', _push_hostname)
          | first | default({})).get('role', 'both') }}
    _push_pr_mode: >-
      {{ (_push_hosts.hosts | default([])
          | selectattr('name', 'equalto', _push_hostname)
          | first | default({})).get('pull_requests', false) | bool }}

- name: Fail if role does not allow push
  ansible.builtin.fail:
    msg: >-
      Host '{{ _push_hostname }}' has role '{{ _push_role }}' which
      does not allow pushing. Only 'source' and 'both' roles can push.
  when: _push_role not in ['source', 'both']

# --- Auto-migrate shared-category keys to _shared/vars.yaml ---
# Keys matching backup/cloud/mail credential prefixes belong in the
# shared file so all hosts inherit them. On every push, any such key
# present in host vars.yaml is moved to _shared/vars.yaml (host's
# value wins on merge) and removed from host vars.yaml. This also
# keeps _shared in sync when 'canasta config set' updates a key
# that already lived there.
- name: Read host vars
  ansible.builtin.slurp:
    src: "{{ instance_path }}/hosts/{{ _push_hostname }}/vars.yaml"
  register: _push_host_vars_raw

- name: Check for _shared/vars.yaml
  ansible.builtin.stat:
    path: "{{ instance_path }}/hosts/_shared/vars.yaml"
  register: _push_shared_stat

- name: Read existing shared vars
  ansible.builtin.slurp:
    src: "{{ instance_path }}/hosts/_shared/vars.yaml"
  register: _push_shared_vars_raw
  when: _push_shared_stat.stat.exists

- name: Migrate shared-category keys
  ansible.builtin.set_fact:
    _push_host_vars: "{{ _push_host_vars_raw.content | b64decode | from_yaml }}"
    _push_shared_vars: >-
      {{ (_push_shared_stat.stat.exists
          | ternary(_push_shared_vars_raw.content | b64decode | from_yaml, {})) }}

- name: Identify keys to migrate
  ansible.builtin.set_fact:
    _push_keys_to_migrate: >-
      {{ _push_host_vars | dict2items
         | selectattr('key', 'match', '(' + gitops_shared_credential_prefixes | join('|') + ')')
         | list }}

- name: Write migrated shared vars
  when: _push_keys_to_migrate | length > 0
  block:
    - name: Create _shared directory
      ansible.builtin.file:
        path: "{{ instance_path }}/hosts/_shared"
        state: directory
        mode: "0755"

    - name: Merge migrated keys into shared vars
      ansible.builtin.copy:
        content: >-
          {{ _push_shared_vars
             | combine(dict(_push_keys_to_migrate
                            | map(attribute='key')
                            | zip(_push_keys_to_migrate
                                  | map(attribute='value'))
                            | list))
             | to_nice_yaml(indent=2) }}
        dest: "{{ instance_path }}/hosts/_shared/vars.yaml"
        mode: "0644"
      no_log: true

    - name: Remove migrated keys from host vars
      ansible.builtin.copy:
        content: >-
          {{ _push_host_vars | dict2items
             | rejectattr('key', 'match', '(' + gitops_shared_credential_prefixes | join('|') + ')')
             | items2dict
             | to_nice_yaml(indent=2) }}
        dest: "{{ instance_path }}/hosts/{{ _push_hostname }}/vars.yaml"
        mode: "0644"
      no_log: true

    - name: Stage migrated vars files
      ansible.builtin.command:
        cmd: "git add hosts/_shared/vars.yaml hosts/{{ _push_hostname }}/vars.yaml"
        chdir: "{{ instance_path }}"
      changed_when: true

    - name: Report migration
      ansible.builtin.debug:
        msg: "Migrated {{ _push_keys_to_migrate | length }} shared credential key(s) to hosts/_shared/vars.yaml."

# --- PR mode prereq check ---
- name: Check gh CLI is installed (PR mode)
  ansible.builtin.command:
    cmd: "gh --version"
  register: _gh_check
  changed_when: false
  ignore_errors: true
  when: _push_pr_mode | bool

- name: Fail if gh not installed (PR mode)
  ansible.builtin.fail:
    msg: >-
      pull_requests is enabled but the GitHub CLI (gh) is not installed.
      Install it: brew install gh / sudo apt install gh
      See https://cli.github.com/
  when:
    - _push_pr_mode | bool
    - _gh_check.rc | default(0) != 0

# --- Commit and push ---
# Note: no 'git add -A' here. Users stage changes explicitly via
# 'canasta gitops add' (which runs git add -A). Push only commits
# what's already staged and pushes any unpushed commits.

- name: Check for staged changes
  ansible.builtin.command:
    cmd: "git diff --cached --quiet"
    chdir: "{{ instance_path }}"
  register: _push_staged
  changed_when: false
  ignore_errors: true  # rc=1 means there are changes

- name: Report no changes
  ansible.builtin.debug:
    msg: "No changes to push."
  when: _push_staged.rc == 0

- name: End play if nothing staged
  ansible.builtin.meta: end_play
  when: _push_staged.rc == 0

# --- Direct push (default) ---
- name: Direct push to main
  when: not (_push_pr_mode | bool)
  block:
    - name: Commit staged changes
      ansible.builtin.command:
        cmd: >-
          git commit -m "{{ message | default('Configuration update') }}"
        chdir: "{{ instance_path }}"
      changed_when: true

    - name: Push to main
      ansible.builtin.command:
        cmd: "git push origin main"
        chdir: "{{ instance_path }}"
      environment: "{{ gitops_git_env }}"
      changed_when: true

    - name: Report pushed
      ansible.builtin.debug:
        msg: "Configuration pushed."

# --- Pull request mode ---
- name: Push via pull request
  when: _push_pr_mode | bool
  block:
    - name: Generate branch name
      ansible.builtin.set_fact:
        _push_branch: "gitops-{{ _push_hostname }}-{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

    - name: Create feature branch
      ansible.builtin.command:
        cmd: "git checkout -b {{ _push_branch }}"
        chdir: "{{ instance_path }}"
      changed_when: true

    - name: Commit staged changes
      ansible.builtin.command:
        cmd: >-
          git commit -m "{{ message | default('Configuration update') }}"
        chdir: "{{ instance_path }}"
      register: _pr_commit
      changed_when: true

    - name: Push feature branch
      ansible.builtin.command:
        cmd: "git push origin {{ _push_branch }}"
        chdir: "{{ instance_path }}"
      environment: "{{ gitops_git_env }}"
      changed_when: true

    - name: Create pull request
      ansible.builtin.command:
        cmd: >-
          gh pr create
          --title "{{ message | default('Configuration update') }}"
          --body "Gitops push from host {{ _push_hostname }}."
        chdir: "{{ instance_path }}"
      register: _pr_result
      changed_when: true

    - name: Switch back to main
      ansible.builtin.command:
        cmd: "git checkout main"
        chdir: "{{ instance_path }}"
      changed_when: false

    - name: Report pull request created
      ansible.builtin.debug:
        msg: "Pull request created: {{ _pr_result.stdout | trim }}"
