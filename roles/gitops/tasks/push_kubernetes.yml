---
# GitOps push (Kubernetes).
# Pushes values.yaml and config changes to the remote repo.
# Argo CD detects the change and applies it automatically.
# Requires: instance_path (set by dispatcher)

- name: Stage all changes
  ansible.builtin.command:
    cmd: "git add -A"
    chdir: "{{ instance_path }}"
  changed_when: false

- name: Check for staged changes
  ansible.builtin.command:
    cmd: "git diff --cached --quiet"
    chdir: "{{ instance_path }}"
  register: _git_staged
  changed_when: false
  ignore_errors: true

- name: Commit and push
  when: _git_staged.rc != 0
  block:
    - name: Commit changes
      ansible.builtin.command:
        cmd: "git commit -m 'Configuration update'"
        chdir: "{{ instance_path }}"
      changed_when: true

    - name: Push to remote
      ansible.builtin.command:
        cmd: "git push"
        chdir: "{{ instance_path }}"
      changed_when: true

- name: Report result
  ansible.builtin.debug:
    msg: >-
      {{ (_git_staged.rc != 0)
         | ternary('Configuration pushed. Argo CD will sync shortly.',
                   'No changes to push.') }}
