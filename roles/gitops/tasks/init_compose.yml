---
# GitOps init (Compose) - Full 13-step workflow matching Go implementation.
# Input: id, host_name, role, repo, key, force, pull_requests
# Requires: instance_path, instance_id (set by dispatcher)

# --- Step 1: Validate prerequisites ---
- name: Check git is installed
  ansible.builtin.command:
    cmd: "git --version"
  changed_when: false

- name: Check git-crypt is installed
  ansible.builtin.command:
    cmd: "git-crypt --version"
  changed_when: false

# --- Step 1b: Configure git identity if provided ---
- name: Set git user.name on target host
  ansible.builtin.command:
    cmd: "git config --global user.name '{{ git_user_name }}'"
  changed_when: true
  when: git_user_name is defined and git_user_name != ''

- name: Set git user.email on target host
  ansible.builtin.command:
    cmd: "git config --global user.email '{{ git_user_email }}'"
  changed_when: true
  when: git_user_email is defined and git_user_email != ''

- name: Check git identity is configured
  ansible.builtin.command:
    cmd: "git config user.name"
  register: _git_identity
  changed_when: false
  ignore_errors: true  # OK if not set — we'll fail below

- name: Fail if git identity not configured
  ansible.builtin.fail:
    msg: >-
      Git user identity is not configured on the target host. Either
      pass --git-user-name and --git-user-email to this command, or
      run 'git config --global user.name "Your Name"' and
      'git config --global user.email "you@example.com"' on the host.
  when: _git_identity.rc != 0

# --- Step 2: Check no existing repo ---
- name: Check for existing .git directory
  ansible.builtin.stat:
    path: "{{ instance_path }}/.git"
  register: _existing_git

- name: Fail if git repo already exists
  ansible.builtin.fail:
    msg: "GitOps already initialized ({{ instance_path }}/.git exists). Use 'gitops join' to join an existing repo."
  when: _existing_git.stat.exists

# --- Step 3: Key file overwrite check skipped ---
# The key is fetched to the controller at --key path after export.
# The fetch module handles overwriting if the file already exists.

# --- Step 4: Validate remote is empty (unless --force) ---
- name: Check remote is empty
  ansible.builtin.command:
    cmd: "git ls-remote {{ repo }}"
  register: _remote_check
  changed_when: false
  ignore_errors: true  # OK if remote unreachable
  when: not (force | default(false) | bool)

- name: Fail if remote is not empty
  ansible.builtin.fail:
    msg: "Remote '{{ repo }}' is not empty. Use --force to push to a non-empty remote."
  when:
    - not (force | default(false) | bool)
    - _remote_check is defined
    - _remote_check.stdout | default('') | trim | length > 0

# --- Step 5: Remove legacy .gitignore files ---
- name: Remove legacy .gitignore files
  ansible.builtin.file:
    path: "{{ instance_path }}/{{ item }}"
    state: absent
  loop:
    - extensions/.gitignore
    - skins/.gitignore
    - config/.gitignore

# --- Step 6: Initialize git repo ---
- name: Initialize git repository
  ansible.builtin.command:
    cmd: "git init -b main"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Configure git pull strategy
  ansible.builtin.command:
    cmd: "git config pull.rebase false"
    chdir: "{{ instance_path }}"
  changed_when: true

# --- Step 7: Write .gitignore and .gitattributes ---
- name: Write .gitignore
  ansible.builtin.copy:
    src: "{{ role_path }}/files/gitignore.default"
    dest: "{{ instance_path }}/.gitignore"
    mode: "0644"

- name: Write .gitattributes
  ansible.builtin.copy:
    src: "{{ role_path }}/files/gitattributes.default"
    dest: "{{ instance_path }}/.gitattributes"
    mode: "0644"

# --- Step 8: Initialize git-crypt and export key ---
- name: Initialize git-crypt
  ansible.builtin.command:
    cmd: "git-crypt init"
    chdir: "{{ instance_path }}"
  changed_when: true

# Export to a temp path on the remote host, then transfer to the
# controller at the --key path. Uses slurp to read the binary key
# from the remote, then a controller-side script to write it.
# Neither fetch nor delegate_to:localhost work here because the play
# targets localhost with connection switched to SSH via set_fact —
# both still route through the SSH connection to the remote host.
- name: Export git-crypt key on remote host
  ansible.builtin.command:
    cmd: "git-crypt export-key /tmp/canasta-gitcrypt-key"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Read git-crypt key from remote host
  ansible.builtin.slurp:
    src: "/tmp/canasta-gitcrypt-key"
  register: _gitcrypt_key_b64

- name: Save connection state before local key write
  ansible.builtin.set_fact:
    _saved_conn: "{{ ansible_connection }}"
    _saved_host: "{{ ansible_host }}"
    _saved_user: "{{ ansible_user | default('') }}"
    _saved_python: "{{ ansible_python_interpreter | default(ansible_playbook_python) }}"

- name: Switch to local connection for key write
  ansible.builtin.set_fact:
    ansible_connection: local
    ansible_host: localhost
    ansible_user: ""
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

- name: Write git-crypt key to controller
  ansible.builtin.copy:
    content: "{{ _gitcrypt_key_b64.content | b64decode }}"
    dest: "{{ key }}"
    mode: "0600"

- name: Restore connection after key write
  ansible.builtin.set_fact:
    ansible_connection: "{{ _saved_conn }}"
    ansible_host: "{{ _saved_host }}"
    ansible_user: "{{ _saved_user }}"
    ansible_python_interpreter: "{{ _saved_python }}"

- name: Remove temp key from remote host
  ansible.builtin.file:
    path: "/tmp/canasta-gitcrypt-key"
    state: absent

# --- Step 9: Create env.template and wikis.yaml.template ---
# env.template replaces secret/host-specific values with {{placeholder}} syntax.
# Other values are kept as literals. Placeholder key list and secret
# prefixes are defined in roles/gitops/vars/main.yml.

- name: Read raw .env file for template extraction
  ansible.builtin.slurp:
    src: "{{ instance_path }}/.env"
  register: _gitops_env_raw

- name: Read .env as dict for vars
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _gitops_env

- name: Generate env.template with placeholder syntax
  ansible.builtin.copy:
    content: |
      {% for line in (_gitops_env_raw.content | b64decode).split('\n') %}
      {% if line | trim == '' or line | trim | regex_search('^#') %}
      {{ line }}
      {% elif '=' in line %}
      {% set key = line.split('=', 1)[0] %}
      {% if key in gitops_placeholder_keys or key | regex_search(gitops_secret_prefix_pattern) %}
      {{ key }}={{ '{{' }}{{ key | lower }}{{ '}}' }}
      {% else %}
      {{ line }}
      {% endif %}
      {% else %}
      {{ line }}
      {% endif %}
      {% endfor %}
    dest: "{{ instance_path }}/env.template"
    mode: "0644"

- name: Check if wikis.yaml exists
  ansible.builtin.stat:
    path: "{{ instance_path }}/config/wikis.yaml"
  register: _gitops_wikis_check

- name: Read wikis for template generation
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _gitops_wikis_data
  when: _gitops_wikis_check.stat.exists

- name: Generate wikis.yaml.template with URL placeholders
  ansible.builtin.copy:
    content: |
      wikis:
      {% for w in _gitops_wikis_data.wikis | default([]) %}
        - id: {{ w.id }}
          url: {{ '{{' }}wiki_url_{{ w.id }}{{ '}}' }}
          name: "{{ w.name }}"
      {% endfor %}
    dest: "{{ instance_path }}/wikis.yaml.template"
    mode: "0644"
  when: _gitops_wikis_check.stat.exists

# --- Step 10: Create hosts.yaml ---
- name: Create hosts directory
  ansible.builtin.file:
    path: "{{ instance_path }}/hosts"
    state: directory
    mode: "0755"

- name: Create hosts.yaml
  ansible.builtin.copy:
    content: |
      hosts:
        - name: {{ host_name }}
          role: {{ role | default('both') }}
          pull_requests: {{ pull_requests | default(false) | bool | lower }}
    dest: "{{ instance_path }}/hosts/hosts.yaml"
    mode: "0644"

# --- Step 11: Create vars.yaml with host-specific values + admin passwords ---
- name: Create host vars directory
  ansible.builtin.file:
    path: "{{ instance_path }}/hosts/{{ host_name }}"
    state: directory
    mode: "0755"

- name: Read wikis for admin password extraction
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _gitops_wikis

- name: Build vars content (placeholder values + wiki URLs + admin passwords)
  ansible.builtin.copy:
    content: |
      # Host-specific values for placeholder keys in env.template
      {% for k in gitops_placeholder_keys %}
      {% if k in _gitops_env.variables %}
      {{ k | lower }}: "{{ _gitops_env.variables[k] }}"
      {% endif %}
      {% endfor %}
      # Secret-prefix keys
      {% for k, v in _gitops_env.variables.items() %}
      {% if k | regex_search(gitops_secret_prefix_pattern) %}
      {{ k | lower }}: "{{ v }}"
      {% endif %}
      {% endfor %}
      # Wiki URL placeholders
      {% for w in _gitops_wikis.wikis | default([]) %}
      wiki_url_{{ w.id }}: "{{ w.url }}"
      {% endfor %}
      # Admin passwords
      {% for wid in _gitops_wikis.wiki_ids | default([]) %}
      {% set pw_file = instance_path + '/admin-password_' + wid %}
      admin_password_{{ wid }}: "{{ lookup('file', pw_file, errors='ignore') | default('') }}"
      {% endfor %}
    dest: "{{ instance_path }}/hosts/{{ host_name }}/vars.yaml"
    mode: "0644"
  no_log: true

# --- Step 12: Save local host identity ---
- name: Save .gitops-host identity
  ansible.builtin.copy:
    content: "{{ host_name }}"
    dest: "{{ instance_path }}/.gitops-host"
    mode: "0644"

# --- Step 13: Convert extensions/skins git repos to submodules ---
- name: Find git repos in extensions
  ansible.builtin.find:
    paths: "{{ instance_path }}/extensions"
    patterns: ".git"
    file_type: directory
    hidden: true
    recurse: false
    depth: 2
  register: _ext_git_repos

- name: Convert extension git repos to submodules
  ansible.builtin.include_tasks: _convert_submodule.yml
  loop: "{{ _ext_git_repos.files | map(attribute='path') | map('dirname') | list }}"
  loop_control:
    loop_var: _repo_path

- name: Find git repos in skins
  ansible.builtin.find:
    paths: "{{ instance_path }}/skins"
    patterns: ".git"
    file_type: directory
    hidden: true
    recurse: false
    depth: 2
  register: _skin_git_repos

- name: Convert skin git repos to submodules
  ansible.builtin.include_tasks: _convert_submodule.yml
  loop: "{{ _skin_git_repos.files | map(attribute='path') | map('dirname') | list }}"
  loop_control:
    loop_var: _repo_path

# --- Step 14: Initial commit and push ---
- name: Stage all files
  ansible.builtin.command:
    cmd: "git add -A"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Initial commit
  ansible.builtin.command:
    cmd: "git commit -m 'Initial gitops configuration'"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Add remote
  ansible.builtin.command:
    cmd: "git remote add origin {{ repo }}"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Push to remote
  ansible.builtin.command:
    cmd: "git push {{ (force | default(false) | bool) | ternary('--force', '') }} -u origin main"
    chdir: "{{ instance_path }}"
  changed_when: true

- name: Report gitops initialized
  ansible.builtin.debug:
    msg: "GitOps initialized for '{{ instance_id }}'. Key exported to {{ key }}"
