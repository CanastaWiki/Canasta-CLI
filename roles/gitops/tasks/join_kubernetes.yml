---
# GitOps join (Kubernetes) — connect a K8s instance to an existing
# gitops repository as a new environment.
#
# Clones the repo, creates per-host vars from the instance's current
# values.yaml, renders rendered-values.yaml, creates an Argo CD
# Application pointing at the new rendered file.
#
# No git-crypt: K8s gitops repos are cleartext (see #508 / #509).
# The Compose join path (gitops/tasks/join.yml) still uses git-crypt
# unlock since Compose's repo encrypts hosts/<host>/vars.yaml.
#
# Input: host_name, role, repo, key, force
#   key is the SSH deploy key path basename (private at <key>.ssh,
#   public at <key>.ssh.pub). Despite the name, no git-crypt meaning
#   on K8s.
# Requires: instance_path, instance_id (set by dispatcher)

# --- Validate prerequisites ---
- name: Check git is installed
  ansible.builtin.command:
    cmd: "git --version"
  changed_when: false

- name: Check for existing .git directory
  ansible.builtin.stat:
    path: "{{ instance_path }}/.git"
  register: _join_existing_git

# Without --reinit a pre-existing .git means the instance is already
# connected, so we stop. Under --reinit we leave that .git in place and
# wipe it only *after* the clone below succeeds (the cleanup step just
# before the .git move), so a failed clone can't strand the instance
# with no repo (#663).
- name: Fail if git repo already exists
  ansible.builtin.fail:
    msg: >-
      GitOps already initialized ({{ instance_path }}/.git exists).
      This instance is already connected to a gitops repository.
      Pass --reinit to wipe the local gitops state and re-clone
      from the remote (typical when a previous init or join died
      mid-run).
  when: >-
    _join_existing_git.stat.exists
    and not (reinit | default(false) | bool)

# --- Stage SSH deploy key on the target ---
# The SSH deploy key was generated by the original `gitops init`
# (see init_kubernetes.yml). The operator passes --key as the
# basename — `<key>.ssh` is the private key, `<key>.ssh.pub` is
# the public side they registered as a deploy key on the forge.
# The private key gets mirrored to the target so git operations
# there can authenticate against the forge.
# --ssh-key, when passed, overrides _ssh_key_target_path in the
# GIT_SSH_COMMAND below; otherwise the staged deploy key is used.
- name: Set SSH key paths
  ansible.builtin.set_fact:
    _ssh_key_path: "{{ key }}.ssh"
    _ssh_key_target_path: "{{ instance_path }}/.gitops-deploy-key"

# The deploy key lives on the controller, but by this point resolve_instance
# has switched the play's connection to the instance host. delegate_to:
# localhost + vars: ansible_connection: local does NOT reliably override that
# host-level switch, so the slurp would run on the target and fail to find the
# controller path (silently — no_log + the minimal stdout callback hide it).
# Use the save/switch-to-local/restore dance instead, the same shape
# init_kubernetes.yml uses for its controller-side key work.
- name: Save connection state before controller-side key read
  ansible.builtin.set_fact:
    _gjk_saved:
      host: "{{ ansible_host | default('localhost') }}"
      conn: "{{ ansible_connection | default('local') }}"
      user: "{{ ansible_user | default('') }}"
      python: "{{ ansible_python_interpreter | default(ansible_playbook_python) }}"

- block:
    - name: Switch to local for SSH key read
      ansible.builtin.set_fact:
        ansible_host: "localhost"
        ansible_connection: "local"
        ansible_user: ""
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: Read SSH deploy key from controller
      ansible.builtin.slurp:
        src: "{{ _ssh_key_path }}"
      register: _gitops_ssh_key
      no_log: true
  always:
    - name: Restore connection state after key read
      ansible.builtin.set_fact:
        ansible_host: "{{ _gjk_saved.host }}"
        ansible_connection: "{{ _gjk_saved.conn }}"
        ansible_user: "{{ _gjk_saved.user }}"
        ansible_python_interpreter: "{{ _gjk_saved.python }}"

- name: Stage SSH deploy private key on target for git operations
  ansible.builtin.copy:
    content: "{{ _gitops_ssh_key.content | b64decode }}"
    dest: "{{ _ssh_key_target_path }}"
    mode: "0600"
  no_log: true

# --- Clone repo to temp location ---
- name: Create temp directory for clone
  ansible.builtin.tempfile:
    state: directory
    prefix: "canasta-join-"
  register: _join_tmpdir

- name: Clone gitops repository
  ansible.builtin.command:
    cmd: "git clone -b main {{ repo }} ."
    chdir: "{{ _join_tmpdir.path }}"
  environment:
    GIT_SSH_COMMAND: >-
      ssh -i {{ ssh_key | default(_ssh_key_target_path, true) }}
      -o StrictHostKeyChecking=accept-new
      -o UserKnownHostsFile=~/.ssh/known_hosts
  changed_when: true

# SOPS-managed repos aren't joinable yet: the joining cluster is a separate
# cluster that would need the operator age key imported and its own helm-sops
# sidecar, and pushing from it would otherwise encrypt Secrets to a recipient
# it can't decrypt. Detect from the fresh clone and refuse before mutating the
# instance, rather than produce a broken hybrid. (Full join+SOPS is a
# follow-up; it needs multi-cluster validation.)
- name: Detect a SOPS-managed repo in the clone
  ansible.builtin.stat:
    path: "{{ _join_tmpdir.path }}/.sops.yaml"
  register: _join_sops_marker

- name: Refuse to join a SOPS-managed gitops repo
  ansible.builtin.fail:
    msg: >-
      This gitops repository uses SOPS secret encryption (.sops.yaml present),
      which `gitops join` does not yet support. Set up the additional
      environment with `gitops init --encrypt-secrets` on its own host, or
      manage it from the initializing controller.
  when: _join_sops_marker.stat.exists

# --- Validate host name not already in config ---
- name: Read hosts.yaml from cloned repo
  ansible.builtin.slurp:
    src: "{{ _join_tmpdir.path }}/hosts/hosts.yaml"
  register: _join_hosts_raw

- name: Parse hosts config
  ansible.builtin.set_fact:
    _join_hosts: "{{ _join_hosts_raw.content | b64decode | from_yaml }}"

# A normal join onboards a new environment, so a name already in the repo
# is a conflict. Under --reinit it's the opposite: the environment is
# already registered and we're re-attaching it (its prior join died after
# the push, or its local gitops state was lost), so the write below
# upserts the existing entry instead. See #571.
- name: Fail if host name already exists
  ansible.builtin.fail:
    msg: >-
      Environment '{{ host_name }}' already exists in the gitops repository.
      Choose a different name, remove the existing environment first, or
      pass --reinit to re-attach this environment.
  when: >-
    not (reinit | default(false) | bool)
    and _join_hosts.hosts | default([])
    | selectattr('name', 'equalto', host_name)
    | list | length > 0

# --- Move .git into instance directory ---
# Under --reinit the instance still holds the previous attempt's gitops
# files (.git, hosts/, templates, ...). The clone has now succeeded, so
# wipe them and move the fresh .git into a clean tree. Deferring the
# cleanup until here keeps the old .git intact if the clone fails (#663).
- name: Reinit — wipe previous gitops state now that the clone succeeded
  ansible.builtin.include_tasks: _reinit_cleanup.yml
  when: reinit | default(false) | bool

- name: Move .git from temp clone to instance
  ansible.builtin.command:
    cmd: "mv {{ _join_tmpdir.path }}/.git {{ instance_path }}/.git"
  changed_when: true

# Mirror the Compose join: a blind `git checkout HEAD -- .` rewrites
# every tracked path and can fail to unlink pre-existing, differently
# owned files (#571). Materialize .gitattributes first so git-crypt
# decrypts hosts/** on checkout, then rewrite only the files that differ
# and surface a permission failure as an actionable message.
# Compose gitops repos carry a .gitattributes that drives git-crypt
# decryption on checkout. K8s gitops repos are cleartext (secrets live in
# K8s Secrets, not the repo), so they have no .gitattributes — make this a
# no-op there rather than a hard failure on a missing pathspec.
- name: Materialize .gitattributes so git-crypt filters apply on checkout
  ansible.builtin.command:
    cmd: "git checkout HEAD -- .gitattributes"
    chdir: "{{ instance_path }}"
  changed_when: true
  failed_when: false

- name: Find tracked files whose content differs from the repo
  ansible.builtin.command:
    cmd: "git diff --name-only HEAD"
    chdir: "{{ instance_path }}"
  register: _join_diff
  changed_when: false

- name: Check out only the differing files (decrypted via git-crypt)
  ansible.builtin.command:
    cmd: "git checkout HEAD -- {{ item | quote }}"
    chdir: "{{ instance_path }}"
  loop: "{{ _join_diff.stdout_lines }}"
  register: _join_checkout
  changed_when: true
  failed_when: false

- name: Fail with guidance if any file could not be replaced
  vars:
    _join_blocked: >-
      {{ _join_checkout.results | default([])
         | selectattr('rc', 'defined') | selectattr('rc', 'ne', 0)
         | map(attribute='item') | list }}
  ansible.builtin.fail:
    msg: |
      Could not replace these tracked files while joining the gitops
      repository (permission denied):

        {{ _join_blocked | join('\n        ') }}

      They are likely owned by a different user than the account running
      the join. Make the instance directory writable by your user, then
      retry with --reinit:

        sudo chown -R "$(id -un):$(id -gn)" {{ instance_path }}
        canasta gitops join ... --reinit
  when: _join_blocked | length > 0

- name: Configure git pull strategy
  ansible.builtin.command:
    cmd: "git config pull.rebase false"
    chdir: "{{ instance_path }}"
  changed_when: true

# --- Extract per-host vars from current values.yaml ---
- name: Read current values.yaml
  ansible.builtin.slurp:
    src: "{{ instance_path }}/values.yaml"
  register: _join_values_raw

- name: Parse values
  ansible.builtin.set_fact:
    _join_values: "{{ _join_values_raw.content | b64decode | from_yaml }}"

# --- Add host to config and write vars ---
# Upsert: drop any existing entry with this name before appending, so a
# --reinit re-attach replaces the environment in place rather than
# duplicating it.
- name: Add host to hosts.yaml
  ansible.builtin.copy:
    content: |
      {{ _join_hosts
         | combine({'hosts': (_join_hosts.hosts | default([])
                    | rejectattr('name', 'equalto', host_name) | list)
                    + [{'name': host_name,
                        'role': role | default('both')}]},
                   recursive=True)
         | to_nice_yaml(indent=2) }}
    dest: "{{ instance_path }}/hosts/hosts.yaml"
    mode: "0644"

- name: Create host vars directory
  ansible.builtin.file:
    path: "{{ instance_path }}/hosts/{{ host_name }}"
    state: directory
    mode: "0755"

- name: Write host vars from current values
  ansible.builtin.copy:
    content: |
      # Per-environment values for {{ host_name }}
      domains:
      {% for d in _join_values.domains | default(['localhost']) %}
        - "{{ d }}"
      {% endfor %}
      instance_id: "{{ instance_id }}"
      image_tag: "{{ _join_values.image.tag | default('') }}"
      db_secret_name: "{{ _join_values.secrets.dbSecretName | default('') }}"
      mw_secret_name: "{{ _join_values.secrets.mwSecretName | default('') }}"
      ingress_class: "{{ _join_values.ingress.className | default('') }}"
      ingress_tls: {{ _join_values.ingress.tls | default(true) | lower }}
      web_replica_count: {{ _join_values.web.replicaCount | default(1) }}
    dest: "{{ instance_path }}/hosts/{{ host_name }}/vars.yaml"
    mode: "0644"
  no_log: true

# --- Save host identity (before render, which reads it) ---
- name: Save .gitops-host identity
  ansible.builtin.copy:
    content: "{{ host_name }}"
    dest: "{{ instance_path }}/.gitops-host"
    mode: "0644"

# --- Render values for this environment ---
- name: Render values from template + vars
  ansible.builtin.include_tasks: render_kubernetes.yml

# --- Create Argo CD Application for this environment ---
- name: Create argocd directory
  ansible.builtin.file:
    path: "{{ instance_path }}/argocd"
    state: directory
    mode: "0755"

- name: Generate Argo CD Application manifest
  ansible.builtin.copy:
    content: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: canasta-{{ instance_id }}
        namespace: {{ argocd_namespace | default('argocd') }}
      spec:
        project: default
        source:
          repoURL: {{ repo }}
          targetRevision: HEAD
          path: .
          helm:
            valueFiles:
              - hosts/{{ host_name }}/rendered-values.yaml
        destination:
          server: https://kubernetes.default.svc
          namespace: canasta-{{ instance_id }}
        syncPolicy:
          automated:
            selfHeal: true
            prune: true
          syncOptions:
            - CreateNamespace=true
    dest: "{{ instance_path }}/argocd/application.yaml"
    mode: "0644"

# Argo CD on the new host needs the deploy key to clone the repo (and, for
# a self-hosted host, its key trusted), just as init sets up on the first
# host. Without this the Application can't authenticate and never syncs.
- name: Apply Argo CD repo credential Secret + known-hosts trust
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/gitops/tasks/_apply_argo_repo_secret.yml"

- name: Apply Argo CD Application to cluster
  kubernetes.core.k8s:
    state: present
    src: "{{ instance_path }}/argocd/application.yaml"

# --- Commit and push ---
- name: Stage all changes
  ansible.builtin.command:
    cmd: "git add -A"
    chdir: "{{ instance_path }}"
  changed_when: true

# A clean --reinit re-attach can reproduce the exact tree already in the
# repo, leaving nothing staged. Skip the commit in that case so the join
# doesn't abort on git's "nothing to commit" exit status. (--quiet exits
# non-zero when there *are* staged changes.)
- name: Check for staged changes
  ansible.builtin.command:
    cmd: "git diff --cached --quiet"
    chdir: "{{ instance_path }}"
  register: _join_staged
  changed_when: false
  failed_when: false

# The commit runs on the target host, which usually has no git identity
# configured (unlike init, which commits on the controller). Set the
# identity inline so the commit never aborts with "Author identity
# unknown" — overridable by --git-user-name / --git-user-email.
- name: Commit
  ansible.builtin.command:
    cmd: >-
      git -c commit.gpgsign=false
      -c user.name={{ (git_user_name | default('Canasta GitOps', true)) | quote }}
      -c user.email={{ (git_user_email | default('canasta-gitops@' ~ host_name, true)) | quote }}
      commit -m 'Add environment {{ host_name }}'
    chdir: "{{ instance_path }}"
  changed_when: true
  when: _join_staged.rc != 0

- name: Push to remote
  ansible.builtin.command:
    cmd: "git push {{ (force | default(false) | bool) | ternary('--force', '') }}"
    chdir: "{{ instance_path }}"
  environment:
    GIT_SSH_COMMAND: >-
      ssh -i {{ ssh_key | default(_ssh_key_target_path, true) }}
      -o StrictHostKeyChecking=accept-new
      -o UserKnownHostsFile=~/.ssh/known_hosts
  changed_when: true

# --- Clean up ---
- name: Remove temp clone directory
  ansible.builtin.file:
    path: "{{ _join_tmpdir.path }}"
    state: absent

- name: Report gitops joined
  ansible.builtin.debug:
    msg: >-
      Joined gitops repository for '{{ instance_id }}' as
      environment '{{ host_name }}'.
      Argo CD Application points to hosts/{{ host_name }}/rendered-values.yaml.
