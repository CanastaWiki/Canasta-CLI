---
# Update the gitops vars.yaml for a single KEY=VALUE setting.
# Input: _config_setting (str), _config_placeholder_map (dict),
#        _config_host_raw, instance_path

- name: Parse key and value
  ansible.builtin.set_fact:
    _ugv_key: "{{ _config_setting.split('=', 1)[0] }}"
    _ugv_value: "{{ _config_setting.split('=', 1)[1] | default('') }}"

- name: Look up placeholder name
  ansible.builtin.set_fact:
    _ugv_placeholder: "{{ _config_placeholder_map[_ugv_key] | default('') }}"

- name: Update vars.yaml if key has a gitops placeholder
  when: _ugv_placeholder != ''
  block:
    - name: Determine vars file path
      ansible.builtin.set_fact:
        _ugv_vars_file: >-
          {{ instance_path }}/hosts/{{ _config_host_raw.content | b64decode | trim }}/vars.yaml

    # The slurped vars file and the combined fact both carry secret
    # values (vars.yaml holds passwords/keys), so suppress them when the
    # key being set is a secret. The write below is always no_log.
    - name: Read current vars
      ansible.builtin.slurp:
        src: "{{ _ugv_vars_file }}"
      register: _ugv_vars_raw
      no_log: "{{ _ugv_key is search(canasta_secret_key_pattern) }}"

    - name: Update var value
      ansible.builtin.set_fact:
        _ugv_updated_vars: >-
          {{ (_ugv_vars_raw.content | b64decode | from_yaml)
             | combine({_ugv_placeholder: _ugv_value}) }}
      no_log: "{{ _ugv_key is search(canasta_secret_key_pattern) }}"

    - name: Write updated vars.yaml
      ansible.builtin.copy:
        content: "{{ _ugv_updated_vars | to_nice_yaml(indent=2) }}"
        dest: "{{ _ugv_vars_file }}"
        mode: "0644"
      no_log: true

    - name: Stage updated vars.yaml
      ansible.builtin.command:
        cmd: "git add {{ _ugv_vars_file }}"
        chdir: "{{ instance_path }}"
      changed_when: true

# A key with no gitops placeholder lives as a literal in env.template (or is
# absent). Update that literal so the change reaches the durable source; a
# gitops pull / config regenerate re-renders .env from env.template, so a
# literal left stale reverts the value on the next render.
- name: Update env.template literal when key has no placeholder
  when: _ugv_placeholder == ''
  block:
    - name: Set the literal in env.template
      ansible.builtin.lineinfile:
        path: "{{ instance_path }}/env.template"
        regexp: "^{{ _ugv_key }}="
        line: "{{ _ugv_key }}={{ _ugv_value }}"
        state: present

    - name: Stage updated env.template
      ansible.builtin.command:
        cmd: "git add env.template"
        chdir: "{{ instance_path }}"
      changed_when: true
