---
# Ensure env.template has a placeholder line for a single credential key.
# Input: _ep_setting (str: "KEY=VALUE" or "KEY=...")
# Requires: instance_path + the canonical classifier
#           (canasta_secret_key_regex, canasta_host_specific_nonsecret)

- name: Parse key
  ansible.builtin.set_fact:
    _ep_key: "{{ _ep_setting.split('=', 1)[0] }}"

- name: Decide whether key should be a placeholder
  ansible.builtin.set_fact:
    _ep_needs_placeholder: >-
      {{ (_ep_key | regex_search(canasta_secret_key_regex)) is not none
         or _ep_key in canasta_host_specific_nonsecret }}

- name: Add placeholder line to env.template
  ansible.builtin.lineinfile:
    path: "{{ instance_path }}/env.template"
    regexp: "^{{ _ep_key }}="
    line: "{{ _ep_key }}={{ '{{' }}{{ _ep_key | lower }}{{ '}}' }}"
    state: present
  when: _ep_needs_placeholder
  register: _ep_lineinfile

# Stage env.template alongside the edit, matching _update_gitops_var.yml.
# Without this, a placeholder added for a new credential key is left
# unstaged and silently omitted from the next 'gitops push'.
- name: Stage updated env.template
  ansible.builtin.command:
    cmd: "git add env.template"
    chdir: "{{ instance_path }}"
  when: _ep_needs_placeholder and _ep_lineinfile is changed
  changed_when: true
