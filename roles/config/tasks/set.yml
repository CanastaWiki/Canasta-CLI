---
# canasta config set - Change configuration values.
# Input: id (optional), settings (str: "KEY=VALUE KEY2=VALUE2"), no_restart (bool), force (bool)

# Top-level `canasta config set` needs this; the internal caller (crowdsec
# bouncer_enroll storing the API key during a start/upgrade auto-enroll)
# already resolved the instance, and re-resolving from CWD would pick the
# wrong directory when the CLI was invoked outside the instance dir.
- name: Resolve instance (skip if caller already resolved it)
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"
  when: instance_path is not defined

# Internal callers (crowdsec bouncer_enroll storing the API key) run during
# a config-set-triggered restart, where `settings` is an Ansible extra-var
# and so cannot be overridden by include_role vars (extra-vars outrank them).
# They pass config_settings_override instead; everything below reads this
# resolved value rather than `settings` directly. Without it, the nested
# config set re-applies the outer setting (e.g. CANASTA_ENABLE_CROWDSEC),
# never stores the key, and the auto-enroll restart loops forever.
- name: Resolve settings string (allow internal override of the extra-var)
  ansible.builtin.set_fact:
    _config_settings: "{{ config_settings_override | default(settings) }}"

- name: Require --secret with --web
  ansible.builtin.fail:
    msg: "--web only applies to secret values; pass it together with --secret."
  when:
    - web | default(false) | bool
    - not (secret | default(false) | bool)

# Dispatch: --secret writes opaque values to the gitignored config/secrets.env
# (no .env validation/side effects); otherwise the normal .env config path.
- name: Set opaque secret values (config/secrets.env)
  ansible.builtin.include_tasks: _set_secret.yml
  when: secret | default(false) | bool

- name: Set .env config values
  ansible.builtin.include_tasks: _set_config.yml
  when: not (secret | default(false) | bool)

- name: Restart instance to apply changes
  when: not (no_restart | default(false) | bool)
  ansible.builtin.include_role:
    name: instance_lifecycle
    tasks_from: restart.yml

- name: Report settings applied
  ansible.builtin.debug:
    msg: "Settings updated.{{ (no_restart | default(false) | bool) | ternary(' Restart skipped — run `canasta reconcile` to apply the changes to the running instance.', '') }}"
