---
# canasta config set - Change configuration values.
# Input: id (optional), settings (str: "KEY=VALUE KEY2=VALUE2"), no_restart (bool), force (bool)

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Validate, apply side effects, and set each key
  ansible.builtin.include_tasks: _set_single.yml
  loop: "{{ settings.split() }}"
  loop_control:
    loop_var: _setting
    label: "{{ _setting.split('=', 1)[0] }}"

# If the instance is gitops-managed, update vars.yaml so the change
# survives the next gitops pull (which re-renders .env from template).
- name: Check for gitops instance
  ansible.builtin.stat:
    path: "{{ instance_path }}/.gitops-host"
  register: _config_gitops_stat

- name: Update gitops vars for changed keys
  when:
    - _config_gitops_stat.stat.exists | default(false)
    - instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Read .gitops-host
      ansible.builtin.slurp:
        src: "{{ instance_path }}/.gitops-host"
      register: _config_host_raw

    - name: Build key-to-placeholder map from env.template
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import json, re
          with open('{{ instance_path }}/env.template') as f:
              lines = f.readlines()
          m = {}
          for line in lines:
              match = re.match(r'^([A-Z][^=]*)=\{\{([^}]+)\}\}', line.strip())
              if match:
                  m[match.group(1)] = match.group(2)
          print(json.dumps(m))
          "
      register: _config_map_raw
      changed_when: false

    - name: Parse placeholder map
      ansible.builtin.set_fact:
        _config_placeholder_map: "{{ _config_map_raw.stdout | from_json }}"

    - name: Update vars.yaml for each changed key
      ansible.builtin.include_tasks: _update_gitops_var.yml
      loop: "{{ settings.split() }}"
      loop_control:
        loop_var: _config_setting
        label: "{{ _config_setting.split('=', 1)[0] }}"

- name: Regenerate Caddyfile after config change
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: update_config.yml

- name: Restart instance to apply changes
  when: not (no_restart | default(false) | bool)
  ansible.builtin.include_role:
    name: instance_lifecycle
    tasks_from: restart.yml

- name: Report settings applied
  ansible.builtin.debug:
    msg: "Settings updated.{{ (no_restart | default(false) | bool) | ternary(' Restart skipped.', '') }}"
