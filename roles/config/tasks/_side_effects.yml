---
# Apply side effects when specific config keys are changed.
# Input: _config_key (str), _config_value (str), instance_path

- name: Validate port is numeric
  ansible.builtin.fail:
    msg: "{{ _config_key }} must be a number (got '{{ _config_value }}')"
  when:
    - _config_key in ['HTTP_PORT', 'HTTPS_PORT']
    - _config_value | regex_search('^[0-9]+$') is none

- name: Validate port range for HTTP_PORT/HTTPS_PORT
  ansible.builtin.fail:
    msg: "{{ _config_key }} must be between 1 and 65535 (got '{{ _config_value }}')"
  when:
    - _config_key in ['HTTP_PORT', 'HTTPS_PORT']
    - _config_value | regex_search('^[0-9]+$') is not none
    - _config_value | int < 1 or _config_value | int > 65535

- name: Validate CADDY_AUTO_HTTPS value
  ansible.builtin.fail:
    msg: "CADDY_AUTO_HTTPS must be 'on' or 'off' (got '{{ _config_value }}')"
  when:
    - _config_key == 'CADDY_AUTO_HTTPS'
    - _config_value | lower not in ['on', 'off']

# Two incompatible-feature combinations are caught here at config-set
# time, before the misconfiguration can land in .env. The runtime
# FarmConfigLoader.php in the canasta image catches the same conditions
# at request time as a safety net for hand-edited configs, but the
# user-facing UX of failing fast at the CLI is much friendlier than
# discovering the problem when the container restart-loops on next
# start.
- name: Validate CANASTA_ENABLE_VERY_SHORT_URLS=true does not collide with current state
  when:
    - _config_key == 'CANASTA_ENABLE_VERY_SHORT_URLS'
    - _config_value | lower == 'true'
  block:
    - name: Read wikis.yaml to check for path-based wikis
      canasta_wikis_yaml:
        instance_path: "{{ instance_path }}"
        state: read
      register: _se_vsu_wikis

    - name: Find any wikis with a path component in their URL
      ansible.builtin.set_fact:
        _path_based_wiki_ids: >-
          {{ _se_vsu_wikis.wikis | default([])
             | selectattr('url', 'search', '/')
             | map(attribute='id') | list }}

    - name: Fail if any wiki has a path-based URL
      ansible.builtin.fail:
        msg: >-
          Cannot enable very short URLs: the following wikis have
          path-based URLs:
          {{ _path_based_wiki_ids | join(', ') }}.
          Each wiki must be on a unique hostname when
          CANASTA_ENABLE_VERY_SHORT_URLS=true. Either remove these
          wikis first or change them to hostname-only URLs.
      when: _path_based_wiki_ids | length > 0

    - name: Read CANASTA_ENABLE_WIKI_DIRECTORY from .env
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: CANASTA_ENABLE_WIKI_DIRECTORY
      register: _se_vsu_wd

    - name: Fail if wiki directory is enabled
      ansible.builtin.fail:
        msg: >-
          Cannot enable very short URLs while
          CANASTA_ENABLE_WIKI_DIRECTORY is true. The wiki directory
          is served at /wikis, which collides with a page titled
          'Wikis' on any wiki using root-relative short URLs.
          Either disable the directory first
          (canasta config set CANASTA_ENABLE_WIKI_DIRECTORY=false)
          or leave very short URLs off.
      when: _se_vsu_wd.value | default('false') | lower == 'true'

# Mirror image: enabling the wiki directory while very short URLs are
# on hits the same conflict.
- name: Validate CANASTA_ENABLE_WIKI_DIRECTORY=true does not collide with very short URLs
  when:
    - _config_key == 'CANASTA_ENABLE_WIKI_DIRECTORY'
    - _config_value | lower == 'true'
  block:
    - name: Read CANASTA_ENABLE_VERY_SHORT_URLS from .env
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: CANASTA_ENABLE_VERY_SHORT_URLS
      register: _se_wd_vsu

    - name: Fail if very short URLs are enabled
      ansible.builtin.fail:
        msg: >-
          Cannot enable wiki directory while
          CANASTA_ENABLE_VERY_SHORT_URLS is true. The wiki directory
          is served at /wikis, which collides with a page titled
          'Wikis' on any wiki using root-relative short URLs.
          Either disable very short URLs first
          (canasta config set CANASTA_ENABLE_VERY_SHORT_URLS=false)
          or leave the directory disabled.
      when: _se_wd_vsu.value | default('false') | lower == 'true'

- name: Apply HTTP_PORT/HTTPS_PORT side effects
  when: _config_key in ['HTTP_PORT', 'HTTPS_PORT']
  block:
    - name: Read CADDY_AUTO_HTTPS to determine active scheme
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: CADDY_AUTO_HTTPS
      register: _se_caddy_auto_https

    - name: Determine active port key for this instance
      ansible.builtin.set_fact:
        _active_port_key: "{{ (_se_caddy_auto_https.value | default('on') | lower == 'off') | ternary('HTTP_PORT', 'HTTPS_PORT') }}"
        _active_scheme: "{{ (_se_caddy_auto_https.value | default('on') | lower == 'off') | ternary('http', 'https') }}"
        _default_port: "{{ (_se_caddy_auto_https.value | default('on') | lower == 'off') | ternary('80', '443') }}"

    # Only the "active" port (HTTP_PORT when http-only, HTTPS_PORT otherwise)
    # is reflected in wikis.yaml and MW_SITE_*. Changing the inactive port
    # only affects docker port mappings.
    - name: Apply wikis.yaml/.env updates for active port
      when: _config_key == _active_port_key
      block:
        - name: Read wikis.yaml for port update
          canasta_wikis_yaml:
            instance_path: "{{ instance_path }}"
            state: read
          register: _se_wikis

        - name: Extract domain (strip path and existing port)
          ansible.builtin.set_fact:
            _base_domain: "{{ _se_wikis.wikis[0].url | regex_replace('/.*$', '') | regex_replace(':[0-9]+$', '') }}"
          when: _se_wikis.wikis | length > 0

        - name: Compute new domain suffix
          ansible.builtin.set_fact:
            _port_suffix: "{{ (_config_value == _default_port) | ternary('', ':' + _config_value) }}"
          when: _se_wikis.wikis | length > 0

        - name: Update wikis.yaml URLs with new port
          canasta_wikis_yaml:
            instance_path: "{{ instance_path }}"
            state: update_port
            port: "{{ _config_value }}"
            default_port: "{{ _default_port }}"
          when: _se_wikis.wikis | length > 0

        - name: Update MW_SITE_SERVER with new port
          canasta_env:
            path: "{{ instance_path }}/.env"
            state: set
            key: MW_SITE_SERVER
            value: "{{ _active_scheme }}://{{ _base_domain }}{{ _port_suffix }}"
          when: _se_wikis.wikis | length > 0

        - name: Update MW_SITE_FQDN with new port (domain only, no scheme)
          canasta_env:
            path: "{{ instance_path }}/.env"
            state: set
            key: MW_SITE_FQDN
            value: "{{ _base_domain }}{{ _port_suffix }}"
          when: _se_wikis.wikis | length > 0

# Kubernetes port changes: Ingress handles port routing, no cluster
# recreation needed. The change takes effect on next helm upgrade.

# Toggling CADDY_AUTO_HTTPS flips which port is "active" (the one
# reflected in wikis.yaml and MW_SITE_*). The HTTP_PORT/HTTPS_PORT
# handler above only fires when the port values change; we need a
# parallel handler for when the *scheme* changes but the port values
# don't.
- name: Apply CADDY_AUTO_HTTPS side effects
  when: _config_key == 'CADDY_AUTO_HTTPS'
  block:
    - name: Read both HTTP_PORT and HTTPS_PORT from .env
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read_all
      register: _se_caddy_env

    - name: Compute new active scheme/port/default
      vars:
        _new_http_only: "{{ _config_value | lower == 'off' }}"
      ansible.builtin.set_fact:
        _active_scheme: "{{ _new_http_only | ternary('http', 'https') }}"
        _active_port: >-
          {{ _new_http_only
             | ternary(
                 _se_caddy_env.variables.HTTP_PORT | default('80'),
                 _se_caddy_env.variables.HTTPS_PORT | default('443')) }}
        _default_port: "{{ _new_http_only | ternary('80', '443') }}"

    - name: Read wikis.yaml for scheme update
      canasta_wikis_yaml:
        instance_path: "{{ instance_path }}"
        state: read
      register: _se_caddy_wikis

    - name: Apply wikis.yaml/.env updates for new active scheme
      when: _se_caddy_wikis.wikis | length > 0
      block:
        - name: Extract domain (strip path and existing port)
          ansible.builtin.set_fact:
            _base_domain: "{{ _se_caddy_wikis.wikis[0].url | regex_replace('/.*$', '') | regex_replace(':[0-9]+$', '') }}"

        - name: Compute new domain suffix
          ansible.builtin.set_fact:
            _port_suffix: "{{ (_active_port == _default_port) | ternary('', ':' + _active_port) }}"

        - name: Update wikis.yaml URLs with new active port
          canasta_wikis_yaml:
            instance_path: "{{ instance_path }}"
            state: update_port
            port: "{{ _active_port }}"
            default_port: "{{ _default_port }}"

        - name: Update MW_SITE_SERVER with new scheme and port
          canasta_env:
            path: "{{ instance_path }}/.env"
            state: set
            key: MW_SITE_SERVER
            value: "{{ _active_scheme }}://{{ _base_domain }}{{ _port_suffix }}"

        - name: Update MW_SITE_FQDN with new port
          canasta_env:
            path: "{{ instance_path }}/.env"
            state: set
            key: MW_SITE_FQDN
            value: "{{ _base_domain }}{{ _port_suffix }}"

- name: Apply MW_SITE_FQDN side effects
  when: _config_key == 'MW_SITE_FQDN'
  block:
    - name: Update wikis.yaml URLs with new domain
      canasta_wikis_yaml:
        instance_path: "{{ instance_path }}"
        state: update_domain
        domain: "{{ _config_value }}"

    - name: Read current MW_SITE_SERVER to preserve scheme
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: MW_SITE_SERVER
      register: _current_server

    - name: Determine scheme from current MW_SITE_SERVER
      ansible.builtin.set_fact:
        _server_scheme: "{{ (_current_server.value | default('https://') | regex_search('^https?://')) or 'https://' }}"

    - name: Update MW_SITE_SERVER to match new FQDN
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: MW_SITE_SERVER
        value: "{{ _server_scheme }}{{ _config_value }}"

- name: Sync COMPOSE_PROFILES when feature flags change
  when:
    - instance_orchestrator | default('compose') == 'compose'
    - _config_key in ['CANASTA_ENABLE_ELASTICSEARCH', 'CANASTA_ENABLE_VARNISH', 'CANASTA_ENABLE_OBSERVABILITY']
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/sync_compose_profiles.yml

- name: Apply CANASTA_ENABLE_OBSERVABILITY side effects
  when: _config_key == 'CANASTA_ENABLE_OBSERVABILITY' and _config_value | lower == 'true'
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: ensure_observability_credentials.yml

# --- Kubernetes values.yaml propagation ---
# On K8s, certain env keys are sourced from values.yaml fields that
# double-duty as cluster-level configuration (Ingress hostnames,
# deployment gates, etc.). When these keys change via config set, we
# must also update the corresponding values.yaml field so the change
# reaches the cluster on the next helm upgrade (which the restart
# that config set triggers will do). Without this, the value lands
# in .env on the controller but the running pods and K8s resources
# never see it.
#
# Mapping table:
#   MW_SITE_FQDN         → domains: [<value>]
#   CANASTA_ENABLE_VARNISH → varnish.enabled: <bool>
#   CANASTA_ENABLE_ELASTICSEARCH → elasticsearch.enabled: <bool>
#
# External DB keys (USE_EXTERNAL_DB, MYSQL_*) are intentionally NOT
# propagated here — _validate_key.yml blocks them as immutable after
# create. The values.yaml mapping is populated at create time only
# (see roles/create/tasks/main.yml and templates/k8s_values.yaml.j2).
- name: Propagate config key to K8s values.yaml
  when:
    - instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
    - _config_key in ['MW_SITE_FQDN', 'CANASTA_ENABLE_VARNISH', 'CANASTA_ENABLE_ELASTICSEARCH']
  block:
    - name: Read current values.yaml
      ansible.builtin.slurp:
        src: "{{ instance_path }}/values.yaml"
      register: _k8s_values_raw

    - name: Parse current values
      ansible.builtin.set_fact:
        _k8s_values: "{{ _k8s_values_raw.content | b64decode | from_yaml }}"

    - name: Build values.yaml override for MW_SITE_FQDN
      ansible.builtin.set_fact:
        _k8s_override: "{{ {'domains': [_config_value | regex_replace(':[0-9]+$', '')]} }}"
      when: _config_key == 'MW_SITE_FQDN'

    - name: Build values.yaml override for CANASTA_ENABLE_VARNISH
      ansible.builtin.set_fact:
        _k8s_override: "{{ {'varnish': {'enabled': _config_value | lower == 'true'}} }}"
      when: _config_key == 'CANASTA_ENABLE_VARNISH'

    - name: Build values.yaml override for CANASTA_ENABLE_ELASTICSEARCH
      ansible.builtin.set_fact:
        _k8s_override: "{{ {'elasticsearch': {'enabled': _config_value | lower == 'true'}} }}"
      when: _config_key == 'CANASTA_ENABLE_ELASTICSEARCH'

    - name: Write updated values.yaml
      ansible.builtin.copy:
        content: >-
          {{ _k8s_values
             | combine(_k8s_override, recursive=True)
             | to_nice_yaml(indent=2) }}
        dest: "{{ instance_path }}/values.yaml"
        mode: "0644"

# --- MW_SITE_SERVER domain change cascade ---
# When the domain changes, update MW_SITE_FQDN, wikis.yaml URLs,
# and (via the existing update_config.yml in set.yml) Caddyfile.
- name: Cascade MW_SITE_SERVER domain change
  when: _config_key == 'MW_SITE_SERVER'
  block:
    - name: Extract new FQDN from MW_SITE_SERVER
      ansible.builtin.set_fact:
        _new_fqdn: "{{ _config_value | regex_replace('^https?://', '') }}"

    - name: Read current MW_SITE_FQDN
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: MW_SITE_FQDN
      register: _se_old_fqdn

    - name: Update MW_SITE_FQDN
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: MW_SITE_FQDN
        value: "{{ _new_fqdn }}"

    - name: Update wikis.yaml URLs with new domain
      ansible.builtin.replace:
        path: "{{ instance_path }}/config/wikis.yaml"
        regexp: "{{ _se_old_fqdn.value | regex_escape() }}"
        replace: "{{ _new_fqdn }}"
      when: _se_old_fqdn.found and _se_old_fqdn.value != _new_fqdn
