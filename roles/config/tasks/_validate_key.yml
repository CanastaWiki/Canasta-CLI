---
# Validate a config key against the known keys list.
# Input: _config_key (str), force (bool)

# Database infrastructure keys are set at create time and cannot be
# changed afterward — all wikis in the instance share the same DB
# connection, and changing it would orphan existing data.
- name: Block immutable database keys
  ansible.builtin.fail:
    msg: >-
      '{{ _config_key }}' cannot be changed after instance creation.
      Delete the instance and recreate with the new database configuration.
  when: _config_key in ['USE_EXTERNAL_DB', 'MYSQL_HOST', 'MYSQL_PORT', 'MYSQL_USER', 'MYSQL_SSL']

# Secret-bearing keys on Kubernetes live in K8s Secret resources
# (<id>-db-credentials, <id>-mw-secrets); pods read via secretKeyRef
# and never see .env directly. Updating .env via 'canasta config set'
# leaves the K8s Secret at its old value, so the running wiki keeps
# authenticating with the previous credential — a silent no-op that
# misleads operators who expect rotation. Block these keys on K8s
# and point at the kubectl-based rotation flow. Compose reads .env
# directly at container start, so the same keys are mutable there
# (config set + canasta restart propagates).
# Input validation, not action dispatch — there is no Compose-equivalent
# action to dispatch to, so this orchestrator check stays here by design.
- name: Block secret-bearing keys on Kubernetes (K8s Secret is the source of truth)
  ansible.builtin.fail:
    msg: |
      '{{ _config_key }}' cannot be set via 'canasta config set' on a
      Kubernetes instance. The wiki's pods read this value from a K8s
      Secret via secretKeyRef; updating .env alone leaves the running
      wiki authenticating with the previous value.

      To rotate this credential:
        1. Update the value at its source (e.g., on the database server
           for MYSQL_PASSWORD; generate a fresh random value for
           MW_SECRET_KEY — note that rotating MW_SECRET_KEY invalidates
           all sessions and password-reset tokens).
        2. Update the K8s Secret in the cluster:
             kubectl create secret generic <id>-db-credentials \
               --from-literal=MYSQL_PASSWORD='<new-value>' \
               --dry-run=client -o yaml | kubectl apply -f -
           (Use <id>-mw-secrets and key MW_SECRET_KEY for the MW key.)
        3. Restart the wiki pods so they pick up the new value:
             canasta restart -i {{ id | default('<id>') }}
  when:
    - instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
    - _config_key in ['MYSQL_PASSWORD', 'WIKI_DB_PASSWORD', 'MYSQL_ROOT_PASSWORD', 'MW_SECRET_KEY']

# Listening ports are a Compose-only concept. On Kubernetes the Ingress
# always serves on 80/443 and there is no per-instance port field in the
# Helm chart, so a port change can never reach the cluster. Worse, the
# Compose port side effects (_side_effects.yml) carry no orchestrator
# guard, so on K8s they would rewrite MW_SITE_SERVER / MW_SITE_FQDN in
# .env with a :port suffix nothing serves. Block the keys on K8s rather
# than let the change silently mislead the operator.
# Input validation, not action dispatch — kept here by design.
- name: Block port keys on Kubernetes (Ingress serves 80/443)
  ansible.builtin.fail:
    msg: |
      '{{ _config_key }}' cannot be set via 'canasta config set' on a
      Kubernetes instance. The Ingress always serves on ports 80 and 443;
      there is no configurable listening port for a Kubernetes instance.

      To expose the wiki on a different external port, configure it at the
      load balancer or Ingress controller in front of the cluster.
  when:
    - instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
    - _config_key in ['HTTP_PORT', 'HTTPS_PORT']

- name: Check if key is recognized
  ansible.builtin.fail:
    msg: >-
      Unrecognized key '{{ _config_key }}'.
      Use --force to set unrecognized keys.
      Known keys: {{ canasta_known_keys | map(attribute='name') | join(', ') }}
      (Also accepted: keys starting with {{ canasta_known_prefixes | join(', ') }})
  when:
    - not (force | default(false) | bool)
    - _config_key not in (canasta_known_keys | map(attribute='name') | list)
    - not (_config_key | regex_search('^(' + canasta_known_prefixes | join('|') + ')'))
