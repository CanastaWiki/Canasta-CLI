---
# Install a single wiki via install.php.
# Called in a loop from install.yml.
# Input: _wiki (dict with id, url, name), _wiki_idx (int),
#   instance_path, instance_orchestrator,
#   install_admin_name, install_admin_password,
#   install_root_db_password, install_wiki_db_username,
#   install_wiki_db_password

- name: Extract domain from wiki URL
  ansible.builtin.set_fact:
    _install_domain: >-
      {{ _wiki.url | regex_replace('/.*$', '') }}

- name: "Run install.php for wiki '{{ _wiki.id }}'"
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
  vars:
    exec_service: web
    exec_command: >-
      env -u MW_SECRET_KEY php maintenance/install.php
      --skins='Vector'
      --dbserver=db
      --dbname={{ _wiki.id }}
      --confpath=/tmp/canasta-install/
      --scriptpath=/w
      --server=https://{{ _install_domain }}
      --installdbuser='root'
      --installdbpass={{ install_root_db_password | quote }}
      --dbuser={{ install_wiki_db_username | quote }}
      --dbpass={{ install_wiki_db_password | quote }}
      --pass={{ install_admin_password | quote }}
      {{ _wiki.id | quote }} {{ install_admin_name | quote }}

- name: Save admin password to file
  ansible.builtin.copy:
    content: "{{ install_admin_password }}"
    dest: "{{ instance_path }}/config/admin-password_{{ _wiki.id }}"
    mode: "0600"
  no_log: true

- name: Report admin password saved
  ansible.builtin.debug:
    msg: "Saving password to {{ instance_path }}/config/admin-password_{{ _wiki.id }}"

- name: Extract MW_SECRET_KEY from first wiki
  when: _wiki_idx == 0
  block:
    - name: Build extract command based on orchestrator
      ansible.builtin.set_fact:
        _extract_cmd: >-
          docker compose exec -T web grep -oP
          'wgSecretKey\s*=\s*"\K[0-9a-fA-F]+'
          /tmp/canasta-install/LocalSettings.php
        _extract_chdir: "{{ instance_path }}"
      when: instance_orchestrator | default('compose') == 'compose'

    - name: Get K8s pod for extraction
      ansible.builtin.command:
        cmd: >-
          kubectl get pods
          -n {{ instance_path | basename }}
          -l app=web
          --field-selector=status.phase=Running
          -o jsonpath={.items[0].metadata.name}
      register: _k8s_pod
      changed_when: false
      when: >-
        instance_orchestrator | default('compose')
        in ['kubernetes', 'k8s']

    - name: Build K8s extract command
      ansible.builtin.set_fact:
        _extract_cmd: >-
          kubectl exec {{ _k8s_pod.stdout | trim }}
          -n {{ instance_path | basename }} --
          grep -oP 'wgSecretKey\s*=\s*"\K[0-9a-fA-F]+'
          /tmp/canasta-install/LocalSettings.php
        _extract_chdir: null
      when: >-
        instance_orchestrator | default('compose')
        in ['kubernetes', 'k8s']

    - name: Extract secret key from LocalSettings.php
      ansible.builtin.command:
        cmd: "{{ _extract_cmd }}"
        chdir: "{{ _extract_chdir | default(omit) }}"
      register: _secret_key_result
      changed_when: false

    - name: Save MW_SECRET_KEY to .env
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: MW_SECRET_KEY
        value: "{{ _secret_key_result.stdout | trim }}"
      no_log: true

    - name: Delete LocalSettings.php (Compose)
      ansible.builtin.command:
        cmd: >-
          docker compose exec -T web
          rm -f /tmp/canasta-install/LocalSettings.php
        chdir: "{{ instance_path }}"
      changed_when: true
      when: instance_orchestrator | default('compose') == 'compose'

    - name: Delete LocalSettings.php (Kubernetes)
      ansible.builtin.command:
        cmd: >-
          kubectl exec {{ _k8s_pod.stdout | default('') | trim }}
          -n {{ instance_path | basename }} --
          rm -f /tmp/canasta-install/LocalSettings.php
      changed_when: true
      when: >-
        instance_orchestrator | default('compose')
        in ['kubernetes', 'k8s']

- name: Pause between wiki installations
  ansible.builtin.pause:
    seconds: 1
  when: _wiki_idx is defined and _wiki_idx < (install_wikis | length) - 1
