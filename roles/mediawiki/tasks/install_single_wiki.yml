---
# Install a single wiki via install.php.
# Called in a loop from install.yml.
# Input: _wiki (dict with id, url, name), _wiki_idx (int),
#   instance_path, instance_orchestrator,
#   install_admin_name, install_admin_password,
#   install_root_db_password, install_wiki_db_username,
#   install_wiki_db_password

- name: Extract domain from wiki URL
  ansible.builtin.set_fact:
    _install_domain: >-
      {{ _wiki.url | regex_replace('/.*$', '') }}

- name: Read DB connection from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _install_env
  no_log: true  # .env includes MYSQL_PASSWORD

- name: Set DB server for install
  ansible.builtin.set_fact:
    _install_dbserver: >-
      {{ _install_env.variables.MYSQL_HOST | default('db') }}:{{ _install_env.variables.MYSQL_PORT | default('3306') }}

- name: "Run install.php for wiki '{{ _wiki.id }}'"
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
  vars:
    exec_service: web
    exec_no_log: true
    exec_long: true
    exec_command: >-
      env -u MW_SECRET_KEY php maintenance/install.php
      --skins='Vector'
      --dbserver={{ _install_dbserver }}
      --dbname={{ _wiki.id }}
      --confpath=/tmp/canasta-install/
      --scriptpath=/w
      --server=https://{{ _install_domain }}
      --installdbuser={{ _install_env.variables.MYSQL_USER | default('root', true) | quote }}
      --installdbpass={{ install_root_db_password | quote }}
      --dbuser={{ install_wiki_db_username | quote }}
      --dbpass={{ install_wiki_db_password | quote }}
      --pass={{ install_admin_password | quote }}
      {{ _wiki.id | quote }} {{ install_admin_name | quote }}

- name: Save admin password to file
  ansible.builtin.copy:
    content: "{{ install_admin_password }}"
    dest: "{{ instance_path }}/admin-password_{{ _wiki.id }}"
    mode: "0600"
  no_log: true

- name: Report admin password saved
  ansible.builtin.debug:
    msg: "Saving password to {{ instance_path }}/admin-password_{{ _wiki.id }}"

- name: Extract MW_SECRET_KEY from first wiki
  when: _wiki_idx == 0
  block:
    # Exec in the web container/pod via the orchestrator's exec primitive,
    # which dispatches Compose vs K8s (and resolves the running web pod).
    - name: Extract secret key from LocalSettings.php
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
      vars:
        exec_service: web
        exec_no_log: true
        exec_command: "grep -oP 'wgSecretKey\\s*=\\s*\"\\K[0-9a-fA-F]+' /tmp/canasta-install/LocalSettings.php"

    - name: Save MW_SECRET_KEY to .env
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: MW_SECRET_KEY
        value: "{{ exec_result.stdout | trim }}"
      no_log: true

    - name: Delete LocalSettings.php
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
      vars:
        exec_service: web
        exec_command: "rm -f /tmp/canasta-install/LocalSettings.php"

- name: Pause between wiki installations
  ansible.builtin.pause:
    seconds: 1
  when: _wiki_idx is defined and _wiki_idx < (install_wikis | length) - 1
