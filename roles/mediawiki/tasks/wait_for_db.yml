---
# Wait for the database to be ready.
# Mirrors Go mediawiki.WaitForDB().
# Input: instance_path

- name: Read DB connection from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _wait_db_env

- name: Set DB host and port
  ansible.builtin.set_fact:
    _db_host: "{{ _wait_db_env.variables.MYSQL_HOST | default('db') }}"
    _db_port: "{{ _wait_db_env.variables.MYSQL_PORT | default('3306') }}"

- name: Wait for database to accept connections
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: web
    # Default 60s. Compose's bundled MariaDB usually answers in
    # under 5s after `docker compose up`; the longer timeout is
    # padding for K8s + external DB scenarios where a freshly-
    # scheduled pod has to (a) finish its initContainers, (b) DNS-
    # resolve a managed-database endpoint via VPC DNS, and (c)
    # establish the first TCP connection over the cluster network.
    # 10s wasn't enough for EKS + RDS in testing.
    exec_command: "/wait-for-it.sh -t {{ canasta_db_wait_timeout | default(60) }} {{ _db_host }}:{{ _db_port }}"
