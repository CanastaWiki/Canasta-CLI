---
# Import a SQL dump into a wiki database.
# Input: instance_path, instance_orchestrator, instance_id,
#        import_wiki_id, import_database_path, import_db_password

- name: Check if database file is gzipped
  ansible.builtin.set_fact:
    _is_gzipped: "{{ import_database_path | regex_search('\\.gz$') is not none }}"
    _import_container_file: "/tmp/import.sql{{ (import_database_path | regex_search('\\.gz$') is not none) | ternary('.gz', '') }}"

- name: Create database if it does not exist
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: db
    exec_command: "mariadb -u root -p'{{ import_db_password }}' -e 'CREATE DATABASE IF NOT EXISTS `{{ import_wiki_id }}`'"
    exec_no_log: true

# Transfer the dump file from the controller to the target host if remote.
# For localhost this is a no-op (same filesystem). For remote hosts, ansible
# copies the file via SCP so the path doesn't need to exist on the remote.
- name: Transfer database dump to target host
  ansible.builtin.copy:
    src: "{{ import_database_path }}"
    dest: "/tmp/canasta-import{{ _is_gzipped | bool | ternary('.sql.gz', '.sql') }}"
    mode: "0644"
  register: _import_transferred

- name: Copy database dump to container (Compose)
  ansible.builtin.command:
    cmd: >-
      docker compose cp /tmp/canasta-import{{ _is_gzipped | bool | ternary('.sql.gz', '.sql') }}
      {{ ('db:' + _import_container_file) | quote }}
    chdir: "{{ instance_path }}"
  changed_when: true
  when: instance_orchestrator | default('compose') == 'compose'

- name: Clean up transferred dump from target host
  ansible.builtin.file:
    path: "/tmp/canasta-import{{ _is_gzipped | bool | ternary('.sql.gz', '.sql') }}"
    state: absent

- name: Copy database dump to container (Kubernetes)
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Get DB pod name for import
      ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/k8s_get_pod.yml"
      vars:
        _k8s_namespace: "canasta-{{ instance_id }}"
        _k8s_component: db

    - name: Copy dump via kubectl cp
      ansible.builtin.command:
        cmd: "kubectl cp /tmp/canasta-import{{ _is_gzipped | bool | ternary('.sql.gz', '.sql') }} canasta-{{ instance_id }}/{{ _k8s_pod_name }}:{{ _import_container_file }}"
      changed_when: true

- name: Import gzipped database
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: db
    exec_command: "gunzip -c /tmp/import.sql.gz | mariadb -u root -p'{{ import_db_password }}' '{{ import_wiki_id }}'"
    exec_no_log: true
  when: _is_gzipped | bool

- name: Import plain SQL database
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: db
    exec_command: "mariadb -u root -p'{{ import_db_password }}' '{{ import_wiki_id }}' < /tmp/import.sql"
    exec_no_log: true
  when: not (_is_gzipped | bool)

- name: Clean up temp dump file
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
  vars:
    exec_service: db
    exec_command: "rm -f /tmp/import.sql /tmp/import.sql.gz"
