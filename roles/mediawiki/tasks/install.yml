---
# Run MediaWiki install.php for each wiki.
# Mirrors Go mediawiki.Install().
#
# Input:
#   instance_path, install_wiki_ids (list), install_wikis (list of dicts),
#   install_admin_name, install_admin_password,
#   install_root_db_password, install_wiki_db_username, install_wiki_db_password

- name: Create temp install directory in container
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "mkdir -p /tmp/canasta-install/"

- name: Install each wiki
  ansible.builtin.include_tasks: install_single_wiki.yml
  loop: "{{ install_wikis }}"
  loop_control:
    index_var: _wiki_idx
    loop_var: _wiki
    label: "{{ _wiki.id }}"

- name: Clean up temp install directory
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "rm -rf /tmp/canasta-install/"
