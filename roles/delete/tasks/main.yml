---
# Delete a Canasta instance.
# Matches Go delete command: cleans images inside container, removes backup schedule,
# then destroys containers/volumes and removes directory.
# Input: id, yes (bool - skip confirmation)
#
# If the instance is not in the registry, we attempt to clean up Kubernetes
# resources by convention (namespace canasta-{id}, Helm release canasta-{id}).
# Compose instances require a path, so they cannot be cleaned up without a
# registry entry.

- name: Resolve instance by current directory if no ID given
  when: id is not defined or id == ''
  block:
    - name: Look up instance by path
      canasta_registry:
        path: "{{ lookup('env', 'PWD') }}"
        state: query_by_path
      delegate_to: localhost
      vars:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      register: _delete_pwd_query
      ignore_errors: true  # OK if instance not in registry

    - name: Fail if no instance found for current directory
      ansible.builtin.fail:
        msg: >-
          No Canasta instance found for the current directory.
          Provide --id explicitly or run from inside an instance directory.
      when: _delete_pwd_query is failed

    - name: Use resolved ID
      ansible.builtin.set_fact:
        id: "{{ _delete_pwd_query.instance.id }}"

- name: Try to resolve instance from registry
  canasta_registry:
    id: "{{ id }}"
    state: query
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _delete_query
  ignore_errors: true  # OK if instance not in registry

- name: Set instance facts from registry
  ansible.builtin.set_fact:
    instance_id: "{{ _delete_query.instance.id }}"
    instance_path: "{{ _delete_query.instance.path }}"
    instance_orchestrator: >-
      {{ _delete_query.instance.orchestrator | default('compose') }}
    instance_devmode: >-
      {{ _delete_query.instance.devMode | default(false) }}
    instance_managed_cluster: >-
      {{ _delete_query.instance.managedCluster | default(false) }}
    _instance_registered: true
    _instance_host: >-
      {{ _delete_query.instance.host | default('localhost') }}
  when: _delete_query is succeeded

# Switch connection to the instance's registered host.
- name: Switch connection to instance host
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/switch_connection.yml"
  when: _delete_query is succeeded

- name: Discover unregistered instance
  when: _delete_query is failed
  block:
    - name: Check if kubectl is available
      ansible.builtin.command:
        cmd: "kubectl version --client"
      register: _kubectl_check
      changed_when: false
      ignore_errors: true  # OK if kubectl not installed

    - name: Fail if no kubectl (Compose instance not in registry)
      ansible.builtin.fail:
        msg: "Instance '{{ id }}' not found in the registry."
      when: _kubectl_check is failed

    - name: Check for Helm release
      ansible.builtin.command:
        cmd: "helm status canasta-{{ id }} -n canasta-{{ id }}"
      register: _helm_status
      changed_when: false
      ignore_errors: true  # OK if no Helm release exists

    - name: Check for Kubernetes namespace
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "canasta-{{ id }}"
      register: _ns_check
      ignore_errors: true  # OK if namespace doesn't exist

    - name: Set Kubernetes facts for unregistered instance
      ansible.builtin.set_fact:
        instance_id: "{{ id }}"
        instance_path: ""
        instance_orchestrator: "kubernetes"
        instance_devmode: false
        instance_managed_cluster: false
        _instance_registered: false
      when: >-
        (_helm_status is succeeded) or
        (_ns_check.resources | default([]) | length > 0)

    - name: Fail if no K8s resources found
      ansible.builtin.fail:
        msg: "Instance '{{ id }}' not found in the registry or Kubernetes."
      when: >-
        (_helm_status is not succeeded) and
        (_ns_check.resources | default([]) | length == 0)

- name: Require confirmation for delete
  ansible.builtin.fail:
    msg: >-
      {{ 'Deleting instance ''' ~ instance_id ~ ''' at ' ~ instance_path ~ '.'
         if _instance_registered | default(false) | bool
         else 'Deleting unregistered instance ''' ~ instance_id ~ ''' (Kubernetes resources only).' }}
      Use --yes to confirm.
  when: not (yes | default(false) | bool)

# If the instance directory is already gone (e.g., previous partial
# delete), just deregister and skip all cleanup.
- name: Check if instance directory exists
  ansible.builtin.stat:
    path: "{{ instance_path }}"
  register: _inst_dir
  when: instance_path | default('') | length > 0

- name: Handle already-removed instance
  when:
    - instance_path | default('') | length > 0
    - not (_inst_dir.stat.exists | default(false))
    - _instance_registered | default(false) | bool
  block:
    - name: Switch to local for controller deregistration
      ansible.builtin.set_fact:
        _saved_host: "{{ ansible_host | default('localhost') }}"
        _saved_conn: "{{ ansible_connection | default('local') }}"
        _saved_user: "{{ ansible_user | default('') }}"
        _saved_python: "{{ ansible_python_interpreter | default('auto') }}"
        ansible_host: "localhost"
        ansible_connection: "local"
        ansible_user: ""
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: Deregister already-removed instance from controller
      canasta_registry:
        id: "{{ instance_id }}"
        state: absent

    - name: Restore connection for target deregistration
      ansible.builtin.set_fact:
        ansible_host: "{{ _saved_host }}"
        ansible_connection: "{{ _saved_conn }}"
        ansible_user: "{{ _saved_user }}"
        ansible_python_interpreter: "{{ _saved_python }}"

    - name: Deregister already-removed instance from target host
      canasta_registry:
        id: "{{ instance_id }}"
        state: absent
      when: _instance_host | default('localhost') != 'localhost'

    - name: Report deletion
      ansible.builtin.debug:
        msg: "Instance '{{ instance_id }}' deleted from registry."

    - name: End play for already-removed instance
      ansible.builtin.meta: end_play

# Deregister FIRST so the instance is removed from the registry even
# if subsequent cleanup steps fail (e.g., directory already gone from
# a previous partial delete). Better to have an orphaned directory
# than an orphaned registry entry.
- name: Temporarily switch to local for controller deregistration
  ansible.builtin.set_fact:
    _saved_ansible_host: "{{ ansible_host | default('localhost') }}"
    _saved_ansible_connection: "{{ ansible_connection | default('local') }}"
    _saved_ansible_user: "{{ ansible_user | default('') }}"
    _saved_ansible_python: "{{ ansible_python_interpreter | default('auto') }}"
    ansible_host: "localhost"
    ansible_connection: "local"
    ansible_user: ""
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

- name: Deregister instance from controller
  canasta_registry:
    id: "{{ instance_id }}"
    state: absent

- name: Restore connection after controller deregistration
  ansible.builtin.set_fact:
    ansible_host: "{{ _saved_ansible_host }}"
    ansible_connection: "{{ _saved_ansible_connection }}"
    ansible_user: "{{ _saved_ansible_user }}"
    ansible_python_interpreter: "{{ _saved_ansible_python }}"

- name: Deregister instance from target host
  canasta_registry:
    id: "{{ instance_id }}"
    state: absent
  when: _instance_host | default('localhost') != 'localhost'

# Clean up container-owned files (important on Linux where files are
# owned by www-data). Uses 'docker compose run' instead of 'exec' so
# it works even when containers are stopped or unhealthy.
- name: Clean up container-owned files (Compose)
  ansible.builtin.command:
    cmd: >-
      docker compose run --rm --no-deps -T web
      find /mediawiki/images /mediawiki/config /mediawiki/public_assets
      -mindepth 1 -delete
    chdir: "{{ instance_path }}"
  when: instance_orchestrator | default('compose') == 'compose'
  changed_when: true
  ignore_errors: true  # OK if containers already removed

- name: Clean up container-owned files (Kubernetes)
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Check if K8s pods are running
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: check_running.yml
      ignore_errors: true  # OK if pods not running

    - name: Remove files inside K8s pod
      ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
      vars:
        exec_service: web
        exec_command: "find /mediawiki/images /mediawiki/config /mediawiki/public_assets -mindepth 1 -delete 2>/dev/null || true"
      ignore_errors: true  # OK if dirs already empty or missing
      when: _container_running | default(false) | bool

# Remove backup schedule from crontab
- name: Remove backup schedule
  ansible.builtin.cron:
    name: "canasta-backup-{{ instance_id }}"
    state: absent
  ignore_errors: true  # OK if no crontab entry exists

- name: Remove Argo CD Application if present
  kubernetes.core.k8s:
    state: absent
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "canasta-{{ instance_id }}"
    namespace: "{{ argocd_namespace | default('argocd') }}"
  ignore_errors: true  # OK if Argo CD not installed
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']

- name: Destroy containers and volumes
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: destroy.yml
  ignore_errors: true  # OK if already destroyed

- name: Remove instance directory contents
  ansible.builtin.command:
    cmd: "find {{ instance_path | quote }} -mindepth 1 -delete"
    chdir: "/"
  changed_when: true
  when: instance_path | default('') | length > 0
  ignore_errors: true  # OK if some files can't be removed
  register: _rmdir_contents

- name: Remove empty instance directory
  ansible.builtin.command:
    cmd: "rmdir {{ instance_path | quote }}"
    chdir: "/"
  changed_when: true
  when: instance_path | default('') | length > 0
  ignore_errors: true  # OK if dir is cwd or already gone
  register: _rmdir

- name: Warn if directory could not be removed
  ansible.builtin.debug:
    msg: >-
      Instance '{{ instance_id }}' deleted from registry. Note: the
      instance directory '{{ instance_path }}' could not be fully removed
      (likely because it is the current working directory). Run 'cd ..'
      then 'rmdir {{ instance_path }}' to clean it up.
  when:
    - instance_path | default('') | length > 0
    - _rmdir is failed

- name: Report deletion
  ansible.builtin.debug:
    msg: "Instance '{{ instance_id }}' deleted."
  when: not (_rmdir is failed)
