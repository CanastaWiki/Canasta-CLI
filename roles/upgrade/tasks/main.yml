---
# Upgrade a single Canasta instance.
# Runs all migrations, handles MySQL-to-MariaDB, rebuilds custom images,
# refreshes stack files, pulls images, restarts.
# Input: instance_path, instance_id, instance_orchestrator, instance_devmode,
#        instance_managed_cluster

# --- Check instance directory exists ---
- name: Check if instance directory exists
  ansible.builtin.stat:
    path: "{{ instance_path }}"
  register: _upgrade_dir

- name: Skip upgrade if instance directory is missing
  when: not (_upgrade_dir.stat.exists | default(false))
  block:
    - name: Report missing instance
      ansible.builtin.debug:
        msg: >-
          Instance '{{ instance_id }}' directory not found at
          {{ instance_path }}. Skipping upgrade.

    - name: End upgrade for missing instance
      ansible.builtin.meta: end_role

# --- Migrations ---
- name: Report checking migrations
  ansible.builtin.debug:
    msg: "Checking for config migrations..."

- name: Run migrations
  ansible.builtin.include_tasks: "migrations/{{ _migration }}"
  loop:
    - extract_secret_key.yml
    - migrate_directory_structure.yml
    - fix_vector_default_skin.yml
    - remove_empty_composer_local.yml
    - remove_legacy_git_dir.yml
    - remove_skip_binary_as_hex.yml
    - backfill_canasta_image.yml
    - backfill_compose_profiles.yml
  loop_control:
    loop_var: _migration

# --- MySQL to MariaDB migration (Compose only) ---
- name: MySQL-to-MariaDB migration
  ansible.builtin.include_tasks: migrations/mysql_to_mariadb.yml
  when: instance_orchestrator | default('compose') == 'compose'

# --- Rebuild custom image if instance was built from source ---
- name: Check for BuildFrom in registry
  canasta_registry:
    id: "{{ instance_id }}"
    state: query
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _upgrade_inst

- name: Rebuild from source if BuildFrom is set
  when: _upgrade_inst.instance.buildFrom | default('') != ''
  block:
    - name: Rebuild image from source
      ansible.builtin.include_role:
        name: imagebuild
        tasks_from: build_from_source.yml
      vars:
        build_from: "{{ _upgrade_inst.instance.buildFrom }}"

    - name: Push rebuilt image to registry (if K8s with build_from)
      ansible.builtin.command:
        cmd: "docker push {{ _built_image }}"
      changed_when: true
      when:
        - instance_orchestrator | default('compose') in ['kubernetes', 'k8s']

# --- Refresh config ---
- name: Refresh stack files (no-clobber)
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: write_stack_files.yml

- name: Initialize orchestrator config
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: init_config.yml

# --- Update K8s values.yaml image tag ---
- name: Update Kubernetes image tag in values.yaml
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Read current values.yaml
      ansible.builtin.slurp:
        src: "{{ instance_path }}/values.yaml"
      register: _upgrade_values_raw

    - name: Update image tag
      ansible.builtin.set_fact:
        _upgrade_values: "{{ _upgrade_values_raw.content | b64decode | from_yaml }}"

    - name: Build updated values
      ansible.builtin.set_fact:
        _upgrade_new_values: >-
          {{ _upgrade_values | combine({
            'image': {
              'repository': _upgrade_values.image.repository
                | default('ghcr.io/canastawiki/canasta'),
              'tag': canasta_default_image
                | regex_replace('^[^:]+:', '')
            }
          }, recursive=True) }}

    - name: Write updated values.yaml
      ansible.builtin.copy:
        content: "{{ _upgrade_new_values | to_nice_yaml }}"
        dest: "{{ instance_path }}/values.yaml"
        mode: "0644"

# --- Update Compose CANASTA_IMAGE tag ---
# Match Go CLI behavior: bump the tag if it's the default ghcr.io image,
# leave it alone if user set a custom/local-build image.
- name: Update Compose image tag
  when:
    - instance_orchestrator | default('compose') == 'compose'
    - _upgrade_inst.instance.buildFrom | default('') == ''
  block:
    - name: Read current CANASTA_IMAGE
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: CANASTA_IMAGE
      register: _upgrade_current_image

    - name: Update CANASTA_IMAGE to latest default tag
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: CANASTA_IMAGE
        value: "{{ canasta_default_image }}"
      when:
        - _upgrade_current_image.found
        - _upgrade_current_image.value is match('^ghcr\\.io/canastawiki/canasta:')
        - _upgrade_current_image.value != canasta_default_image

# --- Pull and restart ---
- name: Report pulling images
  ansible.builtin.debug:
    msg: "Pulling Canasta container images..."
  when: _upgrade_inst.instance.buildFrom | default('') == ''

- name: Pull latest images
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: pull.yml
  when: _upgrade_inst.instance.buildFrom | default('') == ''

- name: Check if new images were pulled
  ansible.builtin.set_fact:
    _images_updated: "{{ _pull_changed | default(false) | bool }}"

# Also check if the running web container's image differs from what
# .env configures. Catches the case where a prior upgrade pulled the
# new image but failed to restart (e.g., due to the old detection bug).
- name: Check running container image vs configured (Compose)
  when:
    - instance_orchestrator | default('compose') == 'compose'
    - not (_images_updated | bool)
  block:
    - name: Get running web container image ID
      ansible.builtin.shell:
        cmd: >-
          docker compose ps web --format {% raw %}'{{.Image}}'{% endraw %}
        chdir: "{{ instance_path }}"
      register: _running_image
      changed_when: false
      ignore_errors: true

    - name: Read configured CANASTA_IMAGE
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: CANASTA_IMAGE
      register: _configured_image

    - name: Pull configured image if not on disk (handles buildable services skipped by docker compose pull)
      ansible.builtin.command:
        cmd: "docker pull {{ _configured_image.value }}"
      register: _ensure_pull
      changed_when: "'Downloaded newer image' in (_ensure_pull.stdout | default(''))"
      ignore_errors: true
      when: _configured_image.found

    - name: Get configured image ID
      ansible.builtin.command:
        cmd: "docker image inspect {{ _configured_image.value }} --format {% raw %}{{.Id}}{% endraw %}"
      register: _configured_id
      changed_when: false
      ignore_errors: true

    - name: Get running image ID
      ansible.builtin.command:
        cmd: "docker image inspect {{ _running_image.stdout | trim }} --format {% raw %}{{.Id}}{% endraw %}"
      register: _running_id
      changed_when: false
      ignore_errors: true
      when: _running_image is succeeded

    - name: Flag restart if running image differs from configured
      ansible.builtin.set_fact:
        _images_updated: true
      when:
        - _configured_id is succeeded
        - _running_id is succeeded
        - (_configured_id.stdout | default('')) != (_running_id.stdout | default(''))

    - name: Rebuild buildable services if image was bumped
      ansible.builtin.command:
        cmd: "docker compose build --build-arg CANASTA_IMAGE={{ _configured_image.value }} web"
        chdir: "{{ instance_path }}"
      changed_when: true
      ignore_errors: true
      when:
        - _images_updated | bool
        - _configured_image.found

- name: Restart containers
  when: _images_updated | bool
  block:
    - name: Report restarting
      ansible.builtin.debug:
        msg: "Restarting containers..."

    - name: Stop containers
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: stop.yml

    - name: Start containers
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: start.yml

    - name: Flush MediaWiki cache
      ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
      vars:
        exec_service: web
        exec_command: "touch /var/www/mediawiki/w/LocalSettings.php"
      ignore_errors: true  # OK if container not ready yet

    - name: Report instance upgraded
      ansible.builtin.debug:
        msg: "Canasta upgraded successfully!"

- name: Report already up to date
  ansible.builtin.debug:
    msg: "Already up to date — no restart needed."
  when: not (_images_updated | bool)
