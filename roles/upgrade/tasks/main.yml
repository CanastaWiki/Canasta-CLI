---
# Upgrade a single Canasta instance.
# Runs all migrations, handles MySQL-to-MariaDB, rebuilds custom images,
# refreshes stack files, pulls images, restarts.
# Input: instance_path, instance_id, instance_orchestrator, instance_devmode,
#        instance_managed_cluster

# --- Check instance directory exists ---
- name: Check if instance directory exists
  ansible.builtin.stat:
    path: "{{ instance_path }}"
  register: _upgrade_dir

- name: Skip upgrade if instance directory is missing
  when: not (_upgrade_dir.stat.exists | default(false))
  block:
    - name: Report missing instance
      ansible.builtin.debug:
        msg: >-
          Instance '{{ instance_id }}' directory not found at
          {{ instance_path }}. Skipping upgrade.

    - name: End upgrade for missing instance
      ansible.builtin.meta: end_role

# --- Migrations ---
- name: Report checking migrations
  ansible.builtin.debug:
    msg: "Checking for config migrations..."

# Single round-trip that gathers every stat / find / .env-read each
# migration would otherwise do for itself. Each migration consults
# `_mig` and skips entirely on no-op, collapsing what used to be
# ~12-15 round-trips on a steady-state upgrade into one.
- name: Probe migration-relevant state
  ansible.builtin.include_tasks: pre_migration_probe.yml

- name: Run migrations
  ansible.builtin.include_tasks: "migrations/{{ _migration }}"
  loop:
    - extract_secret_key.yml
    - migrate_directory_structure.yml
    - fix_vector_default_skin.yml
    - remove_empty_composer_local.yml
    - remove_legacy_git_dir.yml
    - remove_skip_binary_as_hex.yml
    - backfill_canasta_image.yml
    - backfill_compose_profiles.yml
    - backfill_hosts_yaml.yml
  loop_control:
    loop_var: _migration

# --- DB migrations (orchestrator-specific; Compose runs MySQL->MariaDB) ---
- name: Run orchestrator DB migrations
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/upgrade_db_migration.yml

# Self-heal the cluster: deploy the in-cluster registry + per-node trust if a
# cluster installed before this support lacks them. Idempotent (a no-op once
# present), no k3s restart. Runs for every k8s instance so the registry is
# guaranteed present after upgrading — both for build_from below and going
# forward — without a separate `canasta install k8s-cp` step.
- name: Ensure the in-cluster image registry (Kubernetes)
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/k8s_ensure_registry.yml
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']

# --- Rebuild custom image if instance was built from source ---
- name: Check for BuildFrom in registry
  canasta_registry:
    id: "{{ instance_id }}"
    state: query
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _upgrade_inst

- name: Rebuild from source if BuildFrom is set
  when: _upgrade_inst.instance.buildFrom | default('') != ''
  block:
    - name: Rebuild image from source
      ansible.builtin.include_role:
        name: imagebuild
        tasks_from: build_from_source.yml
      vars:
        build_from: "{{ _upgrade_inst.instance.buildFrom }}"

    - name: Publish rebuilt image for the orchestrator
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/upgrade_publish_rebuilt_image.yml

# --- Refresh config ---
# Force-refresh the managed docker-compose.yml so compose changes (e.g. a
# newly added crowdsec service) reach instances created on an older
# version. User-adjacent files stay no-clobber inside write_stack_files.
- name: Refresh stack files (force-refresh managed compose)
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: write_stack_files.yml
  vars:
    stack_files_force: true

- name: Initialize orchestrator config
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: init_config.yml

# --- Bump configured image tag (orchestrator-specific) ---
# K8s updates values.yaml image.tag; Compose updates CANASTA_IMAGE in .env.
- name: Update configured image tag
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/upgrade_image_tag.yml

# --- Pull and restart ---
- name: Report pulling images
  ansible.builtin.debug:
    msg: "Pulling Canasta container images..."
  when: _upgrade_inst.instance.buildFrom | default('') == ''

- name: Pull latest images
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: pull.yml
  when: _upgrade_inst.instance.buildFrom | default('') == ''

- name: Check if new images were pulled
  ansible.builtin.set_fact:
    _images_updated: "{{ _pull_changed | default(false) | bool }}"

# --- Rebuild buildable services (orchestrator-specific; Compose only) ---
# Compose detects services with a `build:` directive and rebuilds them
# when an image change is detected; updates the shared _images_updated
# fact. K8s builds + pushes custom images instead, so this is a no-op.
- name: Rebuild buildable services if needed
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/upgrade_rebuild_buildable.yml

# A compose-only change (e.g. gaining the crowdsec service) must also
# trigger a recreate, not just an image bump. A build_from instance always
# rebuilt its image above, so it must restart to redeploy the new build
# (no registry pull happened, so _images_updated is false for it).
- name: Decide whether a restart is needed
  ansible.builtin.set_fact:
    _restart_needed: >-
      {{ (_images_updated | bool)
         or (_compose_stack_copy is defined and _compose_stack_copy is changed)
         or (_upgrade_inst.instance.buildFrom | default('') != '') }}

- name: Restart containers
  when: _restart_needed | bool
  block:
    - name: Report restarting
      ansible.builtin.debug:
        msg: "Restarting containers..."

    - name: Stop containers
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: stop.yml

    - name: Start containers
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: start.yml

    - name: Flush MediaWiki cache
      ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/exec.yml"
      vars:
        exec_service: web
        exec_command: "touch /var/www/mediawiki/w/LocalSettings.php"
      ignore_errors: true  # OK if container not ready yet

    - name: Report instance upgraded
      ansible.builtin.debug:
        msg: "Canasta upgraded successfully!"

- name: Report already up to date
  ansible.builtin.debug:
    msg: "Already up to date — no restart needed."
  when: not (_restart_needed | bool)
