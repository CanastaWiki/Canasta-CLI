---
# Migration: Remove skip-binary-as-hex from my.cnf in non-[mysql] sections.
# This setting is valid for mysql client but breaks mariadb-admin health checks.

- name: Display a progress message
  ansible.builtin.debug:
    msg: "Checking my.cnf..."

# Only slurp + recompute when my.cnf actually mentions
# skip-binary-as-hex; the probe pre-checked, so the steady-state
# upgrade pays no extra round-trips.
- name: Remove skip-binary-as-hex from non-mysql sections
  when:
    - _mig.files.mycnf
    - _mig.files.mycnf_has_skip_binary_as_hex
  block:
    - name: Read my.cnf
      ansible.builtin.slurp:
        src: "{{ instance_path }}/my.cnf"
      register: _mycnf_content

    - name: Compute cleaned my.cnf content
      ansible.builtin.set_fact:
        _mycnf_original: "{{ _mycnf_content.content | b64decode }}"
        _mycnf_cleaned: |
          {% set ns = namespace(section='') %}
          {% for line in (_mycnf_content.content | b64decode | regex_replace('\n+$', '')).split('\n') %}
          {% if line | regex_search('^\[.*\]') %}
          {% set ns.section = line | regex_replace('^\[|\]$', '') | trim %}
          {{ line }}
          {% elif 'skip-binary-as-hex' in line and ns.section != 'mysql' %}
          {% else %}
          {{ line }}
          {% endif %}
          {% endfor %}

    - name: Write cleaned my.cnf (only if it changed)
      ansible.builtin.copy:
        content: "{{ _mycnf_cleaned }}"
        dest: "{{ instance_path }}/my.cnf"
        mode: "0644"
      when: _mycnf_original != _mycnf_cleaned
