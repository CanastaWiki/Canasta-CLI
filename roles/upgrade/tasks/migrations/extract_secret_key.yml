---
# Migration: Extract $wgSecretKey from PHP config files into .env.
# Searches LocalSettings.php, CommonSettings.php, per-wiki LocalSettings.

- name: Check if MW_SECRET_KEY already in .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MW_SECRET_KEY
  register: _sk_check

- name: Extract secret key if not in .env
  when: not _sk_check.found or _sk_check.value == ''
  block:
    - name: Search for wgSecretKey in PHP files
      ansible.builtin.shell:
        cmd: >-
          grep -roEh '\$wgSecretKey\s*=\s*["'"'"'][a-fA-F0-9]+["'"'"']' config/ 2>/dev/null |
          head -1 | grep -oE '[a-fA-F0-9]{32,}' || true
        chdir: "{{ instance_path }}"
      register: _sk_grep
      changed_when: false

    - name: Save extracted secret key
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: MW_SECRET_KEY
        value: "{{ _sk_grep.stdout | trim }}"
      when: _sk_grep.stdout | trim | length > 0

    - name: Generate new secret key if not found
      when: _sk_grep.stdout | trim | length == 0
      block:
        - name: Generate random hex key
          ansible.builtin.command:
            cmd: "python3 -c \"import secrets; print(secrets.token_hex(32))\""
          register: _sk_gen
          changed_when: false

        - name: Save generated secret key
          canasta_env:
            path: "{{ instance_path }}/.env"
            state: set
            key: MW_SECRET_KEY
            value: "{{ _sk_gen.stdout | trim }}"
