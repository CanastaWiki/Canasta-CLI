---
# canasta maintenance exec - Execute arbitrary command in container.
# Input: id (optional), exec_args (str)

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Execute command in container
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "{{ exec_args }}"

- name: Display output
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout }}"
  when: exec_result.stdout | default('') | length > 0
