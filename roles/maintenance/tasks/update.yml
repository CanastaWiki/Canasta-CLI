---
# canasta maintenance update - Run update.php, runJobs.php, rebuildData.php.
# Matches Go behavior: no --quick flag, checks SMW exists before running.
# Input: id (optional), wiki (optional), skip_jobs (bool), skip_smw (bool)

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Get wiki list
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _maint_wikis

- name: Determine wikis to update
  ansible.builtin.set_fact:
    _update_wikis: "{{ (wiki is defined and wiki != '') | ternary([wiki], _maint_wikis.wiki_ids) }}"

- name: Run update.php for each wiki
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "php maintenance/update.php --wiki={{ item | quote }}"
  loop: "{{ _update_wikis }}"

- name: Run runJobs.php for each wiki
  when: not (skip_jobs | default(false) | bool)
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "php maintenance/runJobs.php --wiki={{ item | quote }}"
  loop: "{{ _update_wikis }}"

- name: Check if SMW is installed
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "test -f extensions/SemanticMediaWiki/maintenance/rebuildData.php && echo yes || echo no"
  register: _smw_check
  when: not (skip_smw | default(false) | bool)

- name: Run SMW rebuildData.php for each wiki
  when:
    - not (skip_smw | default(false) | bool)
    - exec_result.stdout | default('') | trim == 'yes'
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "php extensions/SemanticMediaWiki/maintenance/rebuildData.php --wiki={{ item | quote }}"
  loop: "{{ _update_wikis }}"
  ignore_errors: true

- name: Report complete
  ansible.builtin.debug:
    msg: "Maintenance update complete for: {{ _update_wikis | join(', ') }}"
