---
# canasta maintenance script - Run arbitrary maintenance scripts.
# Input: id (optional), wiki (optional), script_args (str)

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ playbook_dir }}/roles/common/tasks/resolve_instance.yml"

- name: Build script command
  ansible.builtin.set_fact:
    _script_cmd: "php maintenance/{{ script_args }}{{ (wiki is defined and wiki != '') | ternary(' --wiki=' + (wiki | default('')), '') }}"

- name: Run maintenance script
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "{{ _script_cmd }}"

- name: Display output
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout }}"
  when: exec_result.stdout | default('') | length > 0
