---
# Run a maintenance command and display its output.
# Input: _maint_cmd (str), _maint_label (str),
#   instance_path, instance_orchestrator

- name: "Run {{ _maint_label }}"
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
  vars:
    exec_service: web
    exec_command: "{{ _maint_cmd }}"

- name: "Output: {{ _maint_label }}"
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout }}"
  when: exec_result.stdout | default('') | trim | length > 0
