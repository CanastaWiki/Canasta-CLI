---
# Restart a Canasta instance.
# Input: id (optional)

# Top-level `canasta restart` needs this; nested callers
# (config set/unset, add, backup restore) already passed through
# resolve_instance.yml at their own entry point. Re-running it here
# would do a needless registry round-trip.
- name: Resolve instance (skip if caller already resolved it)
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"
  when: instance_path is not defined

- name: Stop containers
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: stop.yml

# Regenerate the Caddyfile so a plain `canasta restart` picks up edits to
# Caddyfile.global (now inlined, not live-imported) and to wikis.yaml/domains.
# Compose only: on k8s the Caddyfile is applied via helm on start.
- name: Regenerate Caddyfile before start (Compose)
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: update_config.yml
  when: instance_orchestrator | default('compose') == 'compose'

- name: Start containers
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: start.yml

- name: Report restarted
  ansible.builtin.debug:
    msg: "Instance '{{ instance_id }}' restarted."
