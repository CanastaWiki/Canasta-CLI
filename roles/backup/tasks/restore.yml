---
# Restore matching Go CLI's restoreFull():
# 1. Restic restore into backup volume / K8s temporary pod
# 2. Copy files from volume to host (Compose) or extract + sync (K8s)
# 3. Preserve DB passwords in restored .env
# 4. Import each wiki's database dump

- name: Resolve instance
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/common/tasks/resolve_instance.yml

- name: Save current DB password before restore
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  register: _restore_dbpass
  no_log: true

# Resolve 'latest' to a concrete snapshot ID, filtering out
# safety-before-restore snapshots. Restic's own "latest" keyword
# doesn't know about our tags — without this filter, running restore
# a second time picks up the safety snapshot just created (which is
# internal and typically empty) instead of the user's most recent
# real backup.
#
# Note: `snapshot` is passed via -e extra vars (precedence 22), which
# shadows any set_fact (precedence 20). We resolve into a *new* fact
# (`_resolved_snapshot`) and use that everywhere downstream instead of
# trying to rebind `snapshot` itself.
- name: Resolve 'latest' snapshot (excluding internal safety snapshots)
  when: snapshot == 'latest'
  block:
    - name: List all snapshots as JSON
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/run_backup.yml
      vars:
        backup_args:
          - "snapshots"
          - "--json"

    - name: Pick latest non-safety snapshot
      ansible.builtin.set_fact:
        _resolved_snapshot: "{{ item.short_id }}"
      loop: "{{ (_restic_result.stdout | from_json) | sort(attribute='time') }}"
      when: "'safety-before-restore' not in (item.tags | default([]))"
      loop_control:
        label: "{{ item.short_id }} ({{ item.time }})"

    - name: Fail if no non-safety snapshot exists
      ansible.builtin.fail:
        msg: >-
          No backup snapshots found (excluding safety-before-restore
          snapshots). Create a backup first with 'canasta backup create'.
      when: _resolved_snapshot is not defined

- name: Set effective snapshot ID
  ansible.builtin.set_fact:
    _resolved_snapshot: "{{ snapshot }}"
  when: _resolved_snapshot is not defined

- name: Take safety backup before restore (Compose)
  when:
    - not (skip_safety_backup | default(false) | bool)
    - instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Read wiki IDs for safety DB dump
      canasta_wikis_yaml:
        instance_path: "{{ instance_path }}"
        state: read
      register: _safety_wikis

    - name: Create backup staging directory
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
      vars:
        exec_service: web
        exec_command: "mkdir -p /mediawiki/config/backup"

    - name: Dump each wiki database for safety backup
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
      vars:
        exec_service: web
        exec_no_log: true
        exec_command: >-
          mariadb-dump -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}"
          -p{{ _restore_dbpass.value | quote }}
          --single-transaction
          --databases {{ item | quote }}
          > /mediawiki/config/backup/db_{{ item | quote }}.sql
      loop: "{{ _safety_wikis.wiki_ids }}"
      no_log: true

    - name: Build safety backup volume map
      ansible.builtin.set_fact:
        _safety_volumes: >-
          {{ {
            instance_path + '/config': '/currentsnapshot/config',
            instance_path + '/extensions': '/currentsnapshot/extensions',
            instance_path + '/images': '/currentsnapshot/images',
            instance_path + '/skins': '/currentsnapshot/skins',
            instance_path + '/public_assets': '/currentsnapshot/public_assets',
            instance_path + '/.env': '/currentsnapshot/.env'
          } }}

    - name: Check for optional files (safety)
      ansible.builtin.stat:
        path: "{{ instance_path }}/{{ item }}"
      register: _safety_opt_files
      loop:
        - docker-compose.override.yml
        - my.cnf

    - name: Add optional files to safety staging
      ansible.builtin.set_fact:
        _safety_volumes: >-
          {{ _safety_volumes | combine(
             {instance_path + '/' + item.item:
              '/currentsnapshot/' + item.item}) }}
      loop: "{{ _safety_opt_files.results }}"
      when: item.stat.exists
      loop_control:
        label: "{{ item.item }}"

    - name: Run safety backup with staged files
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/run_backup.yml
      vars:
        backup_args:
          - "--tag"
          - "safety-before-restore"
          - "backup"
          - "/currentsnapshot"
        backup_volumes: "{{ _safety_volumes }}"

    - name: Clean up safety DB dump directory
      ansible.builtin.include_tasks: >-
        {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
      vars:
        exec_service: web
        exec_command: "rm -rf /mediawiki/config/backup"
      ignore_errors: true

# --- Kubernetes restore path ---
# Uses include_tasks (dynamic) so kubernetes.core.k8s is only parsed
# when actually running K8s. Compose-only controllers no longer need
# the kubernetes.core collection installed.
- name: Restore (Kubernetes)
  ansible.builtin.include_tasks: restore_k8s.yml
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']

# --- Compose restore path (unchanged from original) ---
- name: Restore snapshot into backup volume
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/run_backup.yml
  vars:
    backup_args:
      - "restore"
      - "{{ _resolved_snapshot }}"
      - "--target"
      - "/"
  when: instance_orchestrator | default('compose') == 'compose'

- name: Copy files from volume to host
  ansible.builtin.shell:
    cmd: |
      docker run --rm \
        -v "canasta-backup-{{ instance_path | basename }}:/currentsnapshot:ro" \
        -v "{{ instance_path }}:/install" \
        alpine sh -c "
        for d in config extensions images skins public_assets; do
          if [ -d /currentsnapshot/\$d ]; then
            mkdir -p /install/\$d &&
            rm -rf /install/\$d/* \
              /install/\$d/.[!.]* 2>/dev/null;
            cp -a /currentsnapshot/\$d/. /install/\$d/;
          fi;
        done;
        for f in .env docker-compose.override.yml my.cnf; do
          if [ -f /currentsnapshot/\$f ]; then
            cp -a /currentsnapshot/\$f /install/\$f;
          fi;
        done"
  changed_when: true
  when: instance_orchestrator | default('compose') == 'compose'

- name: Preserve DB password in restored .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: set
    key: MYSQL_PASSWORD
    value: "{{ _restore_dbpass.value }}"
  no_log: true

- name: Read wiki IDs for DB restore
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _restore_wikis
  when: instance_orchestrator | default('compose') == 'compose'

- name: Import each wiki database dump
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
  vars:
    exec_service: web
    exec_no_log: true
    exec_command: >-
      mariadb -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}"
      -p{{ _restore_dbpass.value | quote }}
      < /mediawiki/config/backup/db_{{ item | quote }}.sql
  loop: "{{ _restore_wikis.wiki_ids }}"
  no_log: true
  when: instance_orchestrator | default('compose') == 'compose'

- name: Clean up backup dump directory
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
  vars:
    exec_service: web
    exec_command: "rm -rf /mediawiki/config/backup"
  ignore_errors: true  # OK if backup dir doesn't exist
  when: instance_orchestrator | default('compose') == 'compose'

# When the instance is under gitops, the snapshot just restored contains
# the SOURCE host's rendered files (.env, wikis.yaml, Caddyfile). On this
# host those need to be re-rendered from the templates + current host
# vars, otherwise Caddy tries to issue a cert for the source host's FQDN,
# MediaWiki serves URLs pointing at the wrong host, etc.
- name: Detect gitops instance
  ansible.builtin.stat:
    path: "{{ instance_path }}/.gitops-host"
  register: _restore_gitops_stat
  when: instance_orchestrator | default('compose') == 'compose'

- name: Re-render gitops templates against this host's vars
  ansible.builtin.include_role:
    name: gitops
    tasks_from: render_compose.yml
  when:
    - instance_orchestrator | default('compose') == 'compose'
    - _restore_gitops_stat.stat.exists | default(false)

- name: Regenerate orchestrator config (e.g. Caddyfile)
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: update_config.yml
  when:
    - instance_orchestrator | default('compose') == 'compose'
    - _restore_gitops_stat.stat.exists | default(false)

- name: Restart instance after restore
  ansible.builtin.include_role:
    name: instance_lifecycle
    tasks_from: restart.yml

- name: Display result
  ansible.builtin.debug:
    msg: "Restored from snapshot {{ _resolved_snapshot }}."
