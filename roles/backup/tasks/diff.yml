---
- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Compare snapshots
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: "{{ canasta_backup_service }}"
    exec_command: "restic diff {{ snapshot }} {{ snapshot2 }}"

- name: Display diff
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout }}"
