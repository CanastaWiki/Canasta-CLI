---
- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Validate cron expression has 5 fields
  ansible.builtin.fail:
    msg: "Cron expression must have exactly 5 fields (minute hour day month weekday), got: '{{ cron_expression }}'"
  when: cron_expression.split() | length != 5

# --- Compose: host crontab ---
- name: Set backup schedule (Compose)
  when: instance_orchestrator | default('compose') == 'compose'
  block:
    - name: Build backup command for cron
      ansible.builtin.set_fact:
        _cron_base: "canasta backup create -i {{ instance_id }} --tag scheduled"
        _cron_purge: >-
          {{ (purge_older_than is defined and purge_older_than != '')
             | ternary('&& canasta backup purge -i ' + instance_id + ' --keep-within ' + (purge_older_than | default('')), '') }}
        _cron_log: '>> "{{ instance_path }}/backup.log" 2>&1'

    - name: Assemble cron command
      ansible.builtin.set_fact:
        _cron_cmd: "{{ (_cron_base + ' ' + _cron_purge + ' ' + _cron_log) | regex_replace('\\s+', ' ') | trim }}"

    - name: Set cron schedule
      ansible.builtin.cron:
        name: "canasta-backup-{{ instance_id }}"
        job: "{{ _cron_cmd }}"
        minute: "{{ cron_expression.split()[0] }}"
        hour: "{{ cron_expression.split()[1] }}"
        day: "{{ cron_expression.split()[2] }}"
        month: "{{ cron_expression.split()[3] }}"
        weekday: "{{ cron_expression.split()[4] }}"

# --- Kubernetes: CronJob ---
- name: Set backup schedule (Kubernetes)
  when: instance_orchestrator | default('compose') in ['kubernetes', 'k8s']
  block:
    - name: Read restic env vars
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read_all
      register: _sched_env
      no_log: true

    # Local-path restic repos (RESTIC_REPOSITORY beginning with /)
    # need a hostPath bind on the restic container so the container's
    # view of that path matches the host. Cloud-backend repos don't —
    # they're URIs, not filesystem paths. Mirrors the same detection
    # in k8s_run_backup.yml's on-demand backup.
    - name: Detect local restic repository
      ansible.builtin.set_fact:
        _sched_restic_repo: "{{ _sched_env.variables.RESTIC_REPOSITORY | default('') }}"
        _sched_local_repo: >-
          {{ (_sched_env.variables.RESTIC_REPOSITORY | default('')) is match('^/') }}

    - name: Build restic command
      ansible.builtin.set_fact:
        _k8s_backup_cmd: >-
          restic --cache-dir /tmp/restic-cache
          --tag scheduled backup /currentsnapshot
          {{ (purge_older_than is defined and purge_older_than != '')
             | ternary('&& restic --cache-dir /tmp/restic-cache forget --prune --keep-within ' +
               (purge_older_than | default('')), '') }}

    # SA + Role + RoleBinding for backup Pods (used by both the
    # CronJob path here and the on-demand Job in k8s_run_backup.yml).
    # Extracted to a shared task file so both paths stay in lockstep
    # — see #513 for the on-demand path's mirror of this logic.
    - name: Create RBAC for backup Pods
      ansible.builtin.include_tasks: _k8s_backup_rbac.yml

    - name: Create backup CronJob
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: "canasta-backup-{{ instance_id }}"
            namespace: "canasta-{{ instance_id }}"
          spec:
            schedule: "{{ cron_expression }}"
            concurrencyPolicy: Forbid
            # Keep the last 3 successes (enough to confirm "the last
            # few backups completed") and 7 failures (a week of daily
            # failures stays around long enough for the operator to
            # notice — the K8s default of 1 silently rotates failure
            # context off the cluster too quickly).
            successfulJobsHistoryLimit: 3
            failedJobsHistoryLimit: 7
            jobTemplate:
              spec:
                backoffLimit: 1
                ttlSecondsAfterFinished: 86400
                template:
                  spec:
                    restartPolicy: Never
                    # The dump-secrets init container needs RBAC to
                    # read the canasta-<id>-{db-credentials,mw-secrets}
                    # Secrets. Without a dedicated SA, the Pod runs as
                    # 'default' which has no Secret read permission.
                    serviceAccountName: "canasta-backup-{{ instance_id }}"
                    initContainers:
                      - name: dump-databases
                        image: "{{ _sched_env.variables.CANASTA_IMAGE | default('ghcr.io/canastawiki/canasta:latest') }}"
                        command:
                          - sh
                          - -c
                          - |
                            EXCLUDE='^(information_schema|performance_schema|mysql|sys)$'
                            for db in $(mariadb -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}" -p"$MYSQL_PASSWORD" \
                              -N -e "SHOW DATABASES" | grep -vE "$EXCLUDE"); do
                              mariadb-dump -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}" -p"$MYSQL_PASSWORD" \
                                --single-transaction --databases "$db" \
                                > "/currentsnapshot/config/backup/db_${db}.sql"
                            done
                        # canasta-<id>-backup-env carries MYSQL_HOST,
                        # MYSQL_USER, and MYSQL_PASSWORD. Internal-db
                        # instances fall back to the in-script defaults
                        # (db / root) when the Secret omits them;
                        # external-db instances pick up the values from
                        # .env (#498).
                        envFrom:
                          - secretRef:
                              name: "canasta-{{ instance_id }}-backup-env"
                        # The dumps emptyDir is mounted AT
                        # /currentsnapshot/config/backup so the SQL
                        # files land at the same path the on-demand
                        # path uses. restore_k8s.yml looks there for
                        # files matching db_*.sql, so keeping the
                        # paths aligned means scheduled-snapshot
                        # restore Just Works without a path-flavor
                        # branch in the restore flow.
                        volumeMounts:
                          - name: dumps
                            mountPath: /currentsnapshot/config/backup
                      # Dump canasta-managed K8s Secrets into the same
                      # snapshot tree so a fresh-cluster restore can
                      # bring back MYSQL_PASSWORD / MW_SECRET_KEY. Without
                      # this, restic preserves the database content and
                      # PVCs, but a freshly-deployed wiki pod can't
                      # authenticate against the restored DB and all
                      # MW sessions / password-reset tokens become
                      # unrecoverable. See #510.
                      #
                      # We dump by explicit name (not label-selector)
                      # so this works against existing instances that
                      # pre-date the canasta-managed-by label
                      # convention. The resulting file is YAML with a
                      # 'kind: List' wrapper that 'kubectl apply -f'
                      # treats as a multi-document apply.
                      - name: dump-secrets
                        image: bitnami/kubectl:latest
                        command:
                          - sh
                          - -c
                          - |
                            kubectl get secret \
                              {{ instance_id }}-db-credentials \
                              {{ instance_id }}-mw-secrets \
                              -n canasta-{{ instance_id }} \
                              -o yaml \
                              > /currentsnapshot/config/backup/secrets-{{ instance_id }}.yaml
                        volumeMounts:
                          - name: dumps
                            mountPath: /currentsnapshot/config/backup
                    containers:
                      - name: restic
                        image: restic/restic:latest
                        command: ["sh", "-c", "{{ _k8s_backup_cmd }}"]
                        # canasta-<id>-backup-env carries every cloud-
                        # backend credential restic might need (RESTIC_*,
                        # AWS_*, B2_*, AZURE_*, GOOGLE_*, OS_*, ST_*) —
                        # see #497.
                        envFrom:
                          - secretRef:
                              name: "canasta-{{ instance_id }}-backup-env"
                        # Mount the dumps scratch volume under the
                        # /currentsnapshot tree so restic captures the
                        # SQL files as part of the snapshot. Restored
                        # snapshots will contain
                        # /currentsnapshot/db-dumps/db_<wiki>.sql, which
                        # the restore flow can replay against the wiki
                        # DB on first boot.
                        # The dumps emptyDir mounts on TOP of the
                        # web-config ConfigMap subdir (K8s allows
                        # mount-on-mount). Restic sees a merged tree:
                        # ConfigMap content at /currentsnapshot/config,
                        # SQL dumps at /currentsnapshot/config/backup.
                        volumeMounts:
                          - name: web-config
                            mountPath: /currentsnapshot/config
                            readOnly: true
                          - name: dumps
                            mountPath: /currentsnapshot/config/backup
                            readOnly: true
                          - name: images
                            mountPath: /currentsnapshot/images
                            readOnly: true
                          - name: extensions
                            mountPath: /currentsnapshot/extensions
                            readOnly: true
                          - name: skins
                            mountPath: /currentsnapshot/skins
                            readOnly: true
                          - name: public-assets
                            mountPath: /currentsnapshot/public_assets
                            readOnly: true
                    volumes:
                      - name: web-config
                        configMap:
                          name: "canasta-{{ instance_id }}-web-config"
                          optional: true
                      # Pod-lifetime scratch dir for the DB dumps. The
                      # init container writes db_*.sql here; the restic
                      # container reads them from
                      # /currentsnapshot/db-dumps.
                      - name: dumps
                        emptyDir: {}
                      - name: images
                        persistentVolumeClaim:
                          claimName: "canasta-{{ instance_id }}-images"
                      - name: extensions
                        persistentVolumeClaim:
                          claimName: "canasta-{{ instance_id }}-extensions"
                      - name: skins
                        persistentVolumeClaim:
                          claimName: "canasta-{{ instance_id }}-skins"
                      - name: public-assets
                        persistentVolumeClaim:
                          claimName: "canasta-{{ instance_id }}-public-assets"

    # Local-path restic repos need a hostPath mount on the restic
    # container; cloud-backend repos don't. Patch the local-repo
    # volume + mount into the CronJob via strategic-merge so a
    # second `canasta backup schedule set` doesn't duplicate the
    # entries (volumes are keyed by .name; volumeMounts by
    # .mountPath — strategic merge replaces by key).
    - name: Patch local-repo volume into CronJob (local-path repo only)
      kubernetes.core.k8s:
        state: patched
        kind: CronJob
        api_version: batch/v1
        name: "canasta-backup-{{ instance_id }}"
        namespace: "canasta-{{ instance_id }}"
        definition:
          spec:
            jobTemplate:
              spec:
                template:
                  spec:
                    volumes:
                      - name: local-repo
                        hostPath:
                          path: "{{ _sched_restic_repo }}"
                          type: DirectoryOrCreate
                    containers:
                      - name: restic
                        volumeMounts:
                          - name: local-repo
                            mountPath: "{{ _sched_restic_repo }}"
      when: _sched_local_repo | bool

- name: Report schedule set
  ansible.builtin.debug:
    msg: "Backup schedule set: {{ cron_expression }}"
