---
# Kubernetes restore path — extracted from restore.yml so the
# kubernetes.core.k8s module reference is only parsed when this file
# is dynamically included (via include_tasks with a when guard).
# Compose-only controllers no longer need the collection installed.
#
# Inputs: instance_path, instance_id, _resolved_snapshot, _restore_dbpass

- name: Set K8s namespace
  ansible.builtin.set_fact:
    _k8s_namespace: "canasta-{{ instance_id }}"

- name: Read restic env vars
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _restore_env
  no_log: true

- name: Create restore pod
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: restic-restore
        namespace: "{{ _k8s_namespace }}"
      spec:
        restartPolicy: Never
        containers:
          - name: restic
            image: restic/restic:latest
            command:
              - sh
              - -c
              - |
                restic --cache-dir /tmp/restic-cache restore {{ _resolved_snapshot }} --target / && \
                touch /tmp/restore-done && \
                sleep 3600
            # canasta-<id>-backup-env carries every cloud-backend
            # credential restic might need (RESTIC_*, AWS_*, B2_*,
            # AZURE_*, GOOGLE_*, OS_*, ST_*) — same Secret the on-
            # demand backup Job and scheduled CronJob use (#497).
            envFrom:
              - secretRef:
                  name: "canasta-{{ instance_id }}-backup-env"
            volumeMounts:
              - name: restore-data
                mountPath: /currentsnapshot
              - name: local-repo
                mountPath: "{{ _restore_env.variables.RESTIC_REPOSITORY }}"
        volumes:
          - name: restore-data
            emptyDir: {}
          - name: local-repo
            hostPath:
              path: "{{ _restore_env.variables.RESTIC_REPOSITORY }}"
              type: DirectoryOrCreate

- name: Wait for restore pod to be running
  ansible.builtin.command:
    cmd: >-
      kubectl wait pod/restic-restore
      -n {{ _k8s_namespace }}
      --for=condition=Ready
      --timeout=120s
  changed_when: false

- name: Wait for restore to complete
  ansible.builtin.command:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      sh -c "while ! test -f /tmp/restore-done; do sleep 2; done"
  changed_when: false
  timeout: 600

- name: Copy restored config to host
  ansible.builtin.shell:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      tar cf - -C /currentsnapshot/config . 2>/dev/null |
      tar xf - -C "{{ instance_path }}/config/"
  changed_when: true
  ignore_errors: true

- name: Copy restored .env to host
  ansible.builtin.shell:
    cmd: >-
      kubectl cp {{ _k8s_namespace }}/restic-restore:/currentsnapshot/.env
      "{{ instance_path }}/.env"
  changed_when: true
  ignore_errors: true

- name: Get DB pod name
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/k8s_get_pod.yml
  vars:
    _k8s_component: db

- name: Find DB dump files in restore pod
  ansible.builtin.command:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      ls /currentsnapshot/config/backup/
  register: _restore_db_files
  changed_when: false
  ignore_errors: true

- name: Import each DB dump
  when: _restore_db_files is succeeded and _restore_db_files.stdout | trim | length > 0
  ansible.builtin.shell:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      cat /currentsnapshot/config/backup/{{ item }} |
      kubectl exec -i -n {{ _k8s_namespace }} {{ _k8s_pod_name }} --
      mariadb -u root -p"{{ _restore_dbpass.value }}"
  loop: >-
    {{ _restore_db_files.stdout_lines | default([])
       | select('match', '^db_.*\\.sql$') | list }}
  no_log: true

# Restore the canasta-managed K8s Secrets if the snapshot includes
# them (#510). Older snapshots taken before #510 don't have the
# secrets file — that's the 'select match secrets-*.yaml' filter,
# which evaluates to empty for those.
#
# Two-step restore mirrors Compose's restore.yml policy
# (clone-friendly):
#
#   1. Apply the snapshot's secrets file blanket — so MW_SECRET_KEY
#      lands at the snapshot's value. MediaWiki uses MW_SECRET_KEY to
#      derive HMACs for sessions, password-reset tokens, etc.; the
#      restored wiki content was encrypted with that key, so the new
#      pod must use the same key to decrypt.
#   2. Patch MYSQL_PASSWORD and MYSQL_ROOT_PASSWORD back to the values
#      they had on the running cluster BEFORE the restore. The
#      running DB pod's mysql.user table has password hashes set when
#      the pod first started (canasta create) — those hashes match
#      the cluster's CURRENT plaintext password, not the snapshot's.
#      Without this preservation step, a clone-into-fresh-cluster
#      restore would auth-mismatch on the next web pod restart.
#
# Compose handles this in restore.yml via 'Save current DB password
# before restore' + 'Preserve DB password in restored .env'. The K8s
# equivalent is below.
- name: Find canasta-managed Secret manifest in snapshot
  ansible.builtin.set_fact:
    _restore_secrets_filename: >-
      {{ (_restore_db_files.stdout_lines | default([])
          | select('match', '^secrets-.+\\.yaml$') | list | first) | default('') }}

- name: Save current DB credentials before secret restore (clone-friendly)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ instance_id }}-db-credentials"
    namespace: "{{ _k8s_namespace }}"
  register: _restore_current_db_secret
  when: _restore_secrets_filename != ''
  no_log: true

- name: Capture current DB password values
  ansible.builtin.set_fact:
    _restore_current_mysql_pwd: >-
      {{ ((_restore_current_db_secret.resources | default([]) | first | default({}))
          .data.MYSQL_PASSWORD | default('')) | b64decode }}
    _restore_current_mysql_root_pwd: >-
      {{ ((_restore_current_db_secret.resources | default([]) | first | default({}))
          .data.MYSQL_ROOT_PASSWORD | default('')) | b64decode }}
  when: _restore_secrets_filename != ''
  no_log: true

- name: Restore canasta-managed K8s Secrets from snapshot
  when: _restore_secrets_filename != ''
  ansible.builtin.shell:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      cat /currentsnapshot/config/backup/{{ _restore_secrets_filename }} |
      kubectl apply -n {{ _k8s_namespace }} -f -
  changed_when: true
  no_log: true

# Preserve the running cluster's DB credentials over the snapshot's
# values. The strategic-merge patch updates only MYSQL_PASSWORD and
# MYSQL_ROOT_PASSWORD; everything else from the snapshot's Secret
# (notably no other keys exist in db-credentials by design) is
# unchanged. We re-set BOTH because the wiki user account in
# mysql.user was hashed against the current root password during
# pod init.
- name: Preserve current DB password in restored Secret
  kubernetes.core.k8s:
    state: patched
    api_version: v1
    kind: Secret
    name: "{{ instance_id }}-db-credentials"
    namespace: "{{ _k8s_namespace }}"
    definition:
      stringData:
        MYSQL_PASSWORD: "{{ _restore_current_mysql_pwd }}"
        MYSQL_ROOT_PASSWORD: "{{ _restore_current_mysql_root_pwd }}"
  when: _restore_secrets_filename != ''
        and _restore_current_mysql_pwd != ''
  no_log: true

- name: Delete restore pod
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Pod
    name: restic-restore
    namespace: "{{ _k8s_namespace }}"

# Re-render gitops templates after restore. The snapshot contains the
# SOURCE host's rendered .env and config. On this host those need to
# be re-rendered from templates + current host vars.
- name: Detect gitops instance
  ansible.builtin.stat:
    path: "{{ instance_path }}/.gitops-host"
  register: _restore_k8s_gitops_stat

- name: Re-render gitops templates against this host's vars
  ansible.builtin.include_role:
    name: gitops
    tasks_from: render_compose.yml
  when: _restore_k8s_gitops_stat.stat.exists | default(false)

- name: Sync config to ConfigMaps
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/k8s_sync_config.yml
