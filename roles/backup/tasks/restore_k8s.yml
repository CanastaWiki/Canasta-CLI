---
# Kubernetes restore path — extracted from restore.yml so the
# kubernetes.core.k8s module reference is only parsed when this file
# is dynamically included (via include_tasks with a when guard).
# Compose-only controllers no longer need the collection installed.
#
# Restores everything the k8s backup captures: config (-> host -> ConfigMaps),
# .env, the DB (streamed into the web pod), managed Secrets, uploaded media
# (the images PVC, mounted into the restore pod so restic lands it directly),
# and the extensions/skins/public_assets dirs (-> host; the post-restore
# restart's k8s_sync_user_dirs mirrors them into their PVCs). Parity with the
# Compose restore, which round-trips the same set to the host.
#
# Inputs: instance_path, instance_id, _resolved_snapshot, _restore_dbpass

- name: Set K8s namespace
  ansible.builtin.set_fact:
    _k8s_namespace: "canasta-{{ instance_id }}"

- name: Read restic env vars
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _restore_env
  no_log: true

# Cloud-backend RESTIC_REPOSITORY values are URIs (s3:..., b2:...,
# azure:..., gs:...), not filesystem paths. Mounting them as a
# hostPath fails container init with 'no such file or directory'.
# Only local-path repos (RESTIC_REPOSITORY beginning with /) need
# the hostPath bind. Mirrors the same detection in schedule_set.yml
# and k8s_run_backup.yml for the backup direction. See #519.
- name: Detect local restic repository
  ansible.builtin.set_fact:
    _restore_local_repo: >-
      {{ (_restore_env.variables.RESTIC_REPOSITORY | default('')) is match('^/') }}

# Pin a local-path restore to the control-plane node — the same node the
# backup Job pins to — so the restore reads the repo that backup wrote.
# Without this the restore pod could land on a node with no repo (an empty
# DirectoryOrCreate hostPath) and find nothing. Cloud backends need no pin.
- name: Pin local-path restore to the control-plane node
  ansible.builtin.set_fact:
    _restore_node_selector: >-
      {{ {'node-role.kubernetes.io/control-plane': 'true'}
         if (_restore_local_repo | bool) else {} }}

- name: Build restore pod volume mounts
  ansible.builtin.set_fact:
    _restore_volume_mounts:
      - { name: restore-data, mountPath: /currentsnapshot }
      # The images PVC is the sole source of truth for uploaded media —
      # nothing syncs it from the controller (unlike extensions/skins/
      # public_assets, which k8s_sync_user_dirs mirrors from the host dir).
      # Mount it writable at the snapshot's images path so `restic restore
      # --target /` lands the backed-up media directly in the PVC; without
      # this the restore brings back config + DB but silently drops all
      # uploads (the backup captures them — see k8s_run_backup.yml).
      - { name: images, mountPath: /currentsnapshot/images }

- name: Add local-repo mount when RESTIC_REPOSITORY is a path
  ansible.builtin.set_fact:
    _restore_volume_mounts: >-
      {{ _restore_volume_mounts + [{'name': 'local-repo',
         'mountPath': _restore_env.variables.RESTIC_REPOSITORY}] }}
  when: _restore_local_repo | bool

- name: Build restore pod volumes
  ansible.builtin.set_fact:
    _restore_volumes:
      - name: restore-data
        emptyDir: {}
      - name: images
        persistentVolumeClaim:
          claimName: "canasta-{{ instance_id }}-images"

- name: Add local-repo hostPath volume when RESTIC_REPOSITORY is a path
  ansible.builtin.set_fact:
    _restore_volumes: >-
      {{ _restore_volumes + [{'name': 'local-repo',
         'hostPath': {'path': _restore_env.variables.RESTIC_REPOSITORY,
                      'type': 'DirectoryOrCreate'}}] }}
  when: _restore_local_repo | bool

# Single-wiki restore (-w) constrains restic to the target wiki's paths so it
# never writes other wikis' media into the shared images PVC — restic does not
# prune the restore target, so their existing files stay put. Limiting the DB
# dump to db_<id>.sql also means the downstream DB-import and Secret-restore
# steps self-scope: only that wiki's dump (and no secrets-*.yaml) lands in the
# pod. A full restore uses no filter.
- name: Build restic include filters for single-wiki restore
  ansible.builtin.set_fact:
    _restore_include: >-
      {{ ' --include /currentsnapshot/config/settings/wikis/' ~ wiki
         ~ ' --include /currentsnapshot/config/backup/db_' ~ wiki ~ '.sql'
         ~ ' --include /currentsnapshot/images/' ~ wiki
         ~ ' --include /currentsnapshot/public_assets/' ~ wiki }}
  when: wiki is defined

- name: Default to a full (unfiltered) restore
  ansible.builtin.set_fact:
    _restore_include: ""
  when: wiki is not defined

# If a previous restore failed mid-run, the restic-restore pod may
# still exist. kubernetes.core.k8s state: present then refuses to
# update it because Pod spec changes are forbidden post-creation
# (immutable fields). Delete first to make this idempotent.
- name: Clean up any stale restic-restore pod from a prior failed run
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Pod
    name: restic-restore
    namespace: "{{ _k8s_namespace }}"
    wait: true
    wait_timeout: 60

# Refresh the backup-env Secret from .env so the restore pod's restic +
# DB creds are current even after `config set --no-restart`. The full
# k8s_sync_config runs later in this file, but the restore pod needs the
# Secret now.
- name: Apply backup-env Secret before the restore pod
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/orchestrator/tasks/k8s_apply_backup_env_secret.yml"

- name: Create restore pod
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: restic-restore
        namespace: "{{ _k8s_namespace }}"
      spec:
        restartPolicy: Never
        # Pin to the control-plane node for a local-path repo so the restore
        # reads the same hostPath the backup wrote; empty ({}) for cloud
        # backends imposes no constraint.
        nodeSelector: "{{ _restore_node_selector }}"
        containers:
          - name: restic
            image: restic/restic:latest
            command:
              - sh
              - -c
              - |
                # Full restore: empty the images PVC (mounted at
                # /currentsnapshot/images) first so it exactly matches the
                # snapshot. Single-wiki restore must NOT — the PVC is shared
                # across the farm's wikis and restic's --include already scopes
                # the write to just this wiki's subdir.
                {% if wiki is not defined %}
                rm -rf /currentsnapshot/images/* /currentsnapshot/images/.[!.]* 2>/dev/null || true
                {% endif %}
                # Capture restic's rc + output so the controller can tell a
                # real failure (restic prints "Fatal:") from the benign exit 1
                # on EBS-backed PVCs whose selinux xattrs the overlay fs
                # rejects. Sentinel still fires unconditionally so the wait
                # can't hang; the controller inspects the rc + log below.
                restic --cache-dir /tmp/restic-cache \
                  restore {{ _resolved_snapshot }}{{ _restore_include }} \
                  --target / > /tmp/restore-log 2>&1
                echo $? > /tmp/restore-rc
                touch /tmp/restore-done
                sleep 3600
            # canasta-<id>-backup-env carries every cloud-backend
            # credential restic might need (RESTIC_*, AWS_*, B2_*,
            # AZURE_*, GOOGLE_*, OS_*, ST_*) — same Secret the on-
            # demand and scheduled backup Jobs use (#497).
            envFrom:
              - secretRef:
                  name: "canasta-{{ instance_id }}-backup-env"
            volumeMounts: "{{ _restore_volume_mounts }}"
        volumes: "{{ _restore_volumes }}"

# Poll readiness with short `kubectl get` calls rather than a single held
# `kubectl wait`: a controller-side SSH reset during a held wait would abort
# the restore, while the pod keeps running on the target. Each poll is a
# brief connection, so transient resets are simply retried.
- name: Wait for restore pod to be Ready
  ansible.builtin.command:
    cmd: >-
      kubectl get pod restic-restore -n {{ _k8s_namespace }}
      -o jsonpath={.status.conditions[?(@.type=="Ready")].status}
  register: _restore_pod_ready
  changed_when: false
  failed_when: false
  retries: 60
  delay: 2
  until: (_restore_pod_ready.stdout | trim) == 'True'

# Poll for the restore sentinel with short `kubectl exec test -f` calls
# instead of a single held exec that loops on the target for up to 10
# minutes — same resilience rationale as the readiness poll above.
- name: Wait for restore to complete
  ansible.builtin.command:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      test -f /tmp/restore-done
  register: _restore_done
  changed_when: false
  failed_when: false
  retries: 300
  delay: 2
  until: _restore_done.rc == 0

# Inspect restic's captured exit code and output. A non-zero rc is only
# tolerated when it is the known xattr noise (no "Fatal:" line); anything
# restic flagged as fatal — repo unreachable, wrong password, snapshot not
# found — must abort loudly instead of being reported as a successful
# restore that actually restored nothing.
- name: Read restic restore exit code
  ansible.builtin.command:
    cmd: kubectl exec -n {{ _k8s_namespace }} restic-restore -- cat /tmp/restore-rc
  register: _restore_rc
  changed_when: false
  failed_when: false

- name: Read restic restore log
  ansible.builtin.command:
    cmd: kubectl exec -n {{ _k8s_namespace }} restic-restore -- cat /tmp/restore-log
  register: _restore_log
  changed_when: false
  failed_when: false

# If the exit code couldn't be read (e.g. the pod died after touching the
# sentinel but before this read), we cannot confirm the restore — treat it
# as failed rather than falling through and reporting a success that may not
# have happened.
- name: Fail when the restic restore exit code is unreadable
  ansible.builtin.fail:
    msg: >-
      Could not read the restic restore exit code from the restore pod
      (got '{{ _restore_rc.stdout | default('') | trim }}'). The restore
      could not be confirmed and is treated as failed.
  when: (_restore_rc.stdout | default('') | trim) is not match('^[0-9]+$')

- name: Fail when restic restore reported a fatal error
  ansible.builtin.fail:
    msg: |-
      restic restore failed (exit {{ _restore_rc.stdout | default('?') | trim }}).
      The snapshot was NOT restored. restic output:
      {{ _restore_log.stdout | default('(no log captured)') }}
  when: >-
    (_restore_rc.stdout | trim | int) != 0
    and (_restore_log.stdout | default('') is search('Fatal'))

- name: Warn about ignored non-fatal restore errors
  ansible.builtin.debug:
    msg: >-
      restic exited {{ _restore_rc.stdout | default('?') | trim }} with
      non-fatal errors (treated as the known xattr-on-overlay case); wiki
      content was restored. Output:
      {{ _restore_log.stdout | default('') | truncate(500) }}
  when: >-
    (_restore_rc.stdout | default('0') | trim) != '0'
    and not (_restore_log.stdout | default('') is search('Fatal'))

# Restic restores only the included paths, so a wiki absent from the snapshot
# yields an empty restore that would otherwise look like success. Fail loudly.
- name: Confirm the target wiki is present in the snapshot (single-wiki restore)
  when: wiki is defined
  block:
    - name: Check for the target wiki's DB dump in the restore pod
      ansible.builtin.command:
        cmd: >-
          kubectl exec -n {{ _k8s_namespace }} restic-restore --
          test -f /currentsnapshot/config/backup/db_{{ wiki }}.sql
      register: _restore_k8s_wiki_present
      changed_when: false
      failed_when: false

    - name: Fail when the target wiki is absent from the snapshot
      ansible.builtin.fail:
        msg: >-
          Snapshot {{ _resolved_snapshot }} contains no backup for wiki
          '{{ wiki }}' (no db_{{ wiki }}.sql). Nothing to restore.
      when: _restore_k8s_wiki_present.rc != 0

# Clear config/ first so a full restore exactly matches the snapshot: a plain
# tar-overlay leaves create-seeded files the source deleted (e.g. a removed
# config/settings/global/*.php) in place, silently drifting config from the
# source. .env lives outside config/ (restored separately below), and the
# Caddyfile is regenerated post-restore, so clearing config/ is safe.
- name: Copy restored config to host
  when: wiki is not defined
  ansible.builtin.shell:
    cmd: >-
      rm -rf "{{ instance_path }}/config";
      mkdir -p "{{ instance_path }}/config";
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      tar cf - -C /currentsnapshot/config . 2>/dev/null |
      tar xf - -C "{{ instance_path }}/config/"
  changed_when: true
  ignore_errors: true

# Single-wiki restore replaces only the target wiki's settings dir on the host;
# k8s_sync_config below pushes it into the ConfigMap the pods read.
- name: Copy restored single wiki settings to host
  when: wiki is defined
  ansible.builtin.shell:
    cmd: >-
      rm -rf "{{ instance_path }}/config/settings/wikis/{{ wiki }}";
      mkdir -p "{{ instance_path }}/config/settings/wikis/{{ wiki }}";
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      tar cf - -C /currentsnapshot/config/settings/wikis/{{ wiki }} . 2>/dev/null |
      tar xf - -C "{{ instance_path }}/config/settings/wikis/{{ wiki }}/"
  changed_when: true
  ignore_errors: true

# Full restore round-trips the source host's .env; single-wiki leaves it alone.
- name: Copy restored .env to host
  when: wiki is not defined
  ansible.builtin.shell:
    cmd: >-
      kubectl cp {{ _k8s_namespace }}/restic-restore:/currentsnapshot/.env
      "{{ instance_path }}/.env"
  changed_when: true
  ignore_errors: true

# Restore the declarative user dirs (extensions, skins, public_assets) to the
# host instance dir, mirroring the Compose restore. They are NOT written to
# their PVCs here: the host dir is their source of truth, and the post-restore
# restart (restore.yml) runs k8s_sync_user_dirs, which mirrors the host dir
# into each PVC (with prune). Without this, a k8s restore silently dropped
# custom extensions/skins/public_assets — the backup captured them (see
# k8s_run_backup.yml) but nothing brought them back. (images is different: it
# has no host source of truth and is restored straight into its PVC above.)
# `set -o pipefail` so a broken restic-restore side of the pipe fails loudly;
# the `test -d` guard skips a dir absent from an older snapshot.
# Clear each dir first so a full restore exactly matches the snapshot (as the
# single-wiki public_assets path below already does): a plain overlay leaves
# create-seeded/source-deleted files behind, and the host->PVC sync then mirrors
# that drift into the PVC. If the dir is absent from the snapshot, the target
# ends up empty — the correct exact-match result.
- name: Restore extensions/skins/public_assets to host
  when: wiki is not defined
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      rm -rf "{{ instance_path }}/{{ item }}";
      mkdir -p "{{ instance_path }}/{{ item }}";
      if kubectl exec -n {{ _k8s_namespace }} restic-restore --
      test -d /currentsnapshot/{{ item }}; then
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      tar cf - -C /currentsnapshot/{{ item }} . |
      tar xf - -C "{{ instance_path }}/{{ item }}/";
      fi
  args:
    executable: /bin/bash
  loop: ['extensions', 'skins', 'public_assets']
  changed_when: true

# Single-wiki restore: public_assets is per-wiki, so restore only this wiki's
# subdir to the host (extensions/skins are shared and left untouched). The
# post-restore restart's k8s_sync_user_dirs mirrors it into the PVC. images
# for this wiki was already restored straight into the images PVC by restic.
- name: Restore single wiki public assets to host
  when: wiki is defined
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      if kubectl exec -n {{ _k8s_namespace }} restic-restore --
      test -d /currentsnapshot/public_assets/{{ wiki }}; then
      rm -rf "{{ instance_path }}/public_assets/{{ wiki }}";
      mkdir -p "{{ instance_path }}/public_assets/{{ wiki }}";
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      tar cf - -C /currentsnapshot/public_assets/{{ wiki }} . |
      tar xf - -C "{{ instance_path }}/public_assets/{{ wiki }}/";
      fi
  args:
    executable: /bin/bash
  changed_when: true

# Use the WEB pod (not a DB pod) as the import target. Reasons:
#
#   - External-DB instances have no in-cluster DB pod. The previous
#     code looked up component=db, got an empty list, and crashed
#     with `array index out of bounds` (#520). Restore was unusable
#     for any external-DB K8s install.
#   - The web pod always exists. It has the canasta image (mariadb-
#     client included) and env vars MYSQL_HOST / MYSQL_USER /
#     MYSQL_PASSWORD already wired up to whichever DB the chart is
#     configured against:
#       internal: MYSQL_HOST=db, MYSQL_USER=root, MYSQL_PASSWORD via
#                 secretKeyRef from <id>-db-credentials
#       external: MYSQL_HOST/USER from values.externalDatabase,
#                 MYSQL_PASSWORD via the same secretKeyRef
#   - One unified path replaces the two cases — simpler than
#     branching on db.enabled.
#
# Performance note: import goes via TCP to the DB rather than via a
# local socket inside the DB pod (the previous shape). Negligible
# for a one-shot restore.
- name: Get web pod name (DB import target — works for internal and external DB)
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/k8s_get_pod.yml
  vars:
    _k8s_component: web

- name: Find DB dump files in restore pod
  ansible.builtin.command:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      ls /currentsnapshot/config/backup/
  register: _restore_db_files
  changed_when: false
  ignore_errors: true

- name: Import each DB dump
  when: _restore_db_files is succeeded and _restore_db_files.stdout | trim | length > 0
  ansible.builtin.shell:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      cat /currentsnapshot/config/backup/{{ item }} |
      kubectl exec -i -n {{ _k8s_namespace }} {{ _k8s_pod_name }} --
      bash -c 'mariadb -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}" -p"$MYSQL_PASSWORD"'
  loop: >-
    {{ _restore_db_files.stdout_lines | default([])
       | select('match', '^db_.*\.sql$') | list }}
  no_log: true

# Restore the canasta-managed K8s Secrets if the snapshot includes
# them (#510). Older snapshots taken before #510 don't have the
# secrets file — that's the 'select match secrets-*.yaml' filter,
# which evaluates to empty for those.
#
# Two-step restore mirrors Compose's restore.yml policy
# (clone-friendly):
#
#   1. Apply the snapshot's secrets file blanket — so MW_SECRET_KEY
#      lands at the snapshot's value. MediaWiki uses MW_SECRET_KEY to
#      derive HMACs for sessions, password-reset tokens, etc.; the
#      restored wiki content was encrypted with that key, so the new
#      pod must use the same key to decrypt.
#   2. Patch MYSQL_PASSWORD and MYSQL_ROOT_PASSWORD back to the values
#      they had on the running cluster BEFORE the restore. The
#      running DB pod's mysql.user table has password hashes set when
#      the pod first started (canasta create) — those hashes match
#      the cluster's CURRENT plaintext password, not the snapshot's.
#      Without this preservation step, a clone-into-fresh-cluster
#      restore would auth-mismatch on the next web pod restart.
#
# Compose handles this in restore.yml via 'Save current DB password
# before restore' + 'Preserve DB password in restored .env'. The K8s
# equivalent is below.
- name: Find canasta-managed Secret manifest in snapshot
  ansible.builtin.set_fact:
    _restore_secrets_filename: >-
      {{ (_restore_db_files.stdout_lines | default([])
          | select('match', '^secrets-.+\.yaml$') | list | first) | default('') }}

- name: Save current DB credentials before secret restore (clone-friendly)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ instance_id }}-db-credentials"
    namespace: "{{ _k8s_namespace }}"
  register: _restore_current_db_secret
  when: _restore_secrets_filename != ''
  no_log: true

- name: Capture current DB password values
  ansible.builtin.set_fact:
    _restore_current_mysql_pwd: >-
      {{ ((_restore_current_db_secret.resources | default([]) | first | default({}))
          .data.MYSQL_PASSWORD | default('')) | b64decode }}
    _restore_current_mysql_root_pwd: >-
      {{ ((_restore_current_db_secret.resources | default([]) | first | default({}))
          .data.MYSQL_ROOT_PASSWORD | default('')) | b64decode }}
  when: _restore_secrets_filename != ''
  no_log: true

- name: Restore canasta-managed K8s Secrets from snapshot
  when: _restore_secrets_filename != ''
  ansible.builtin.shell:
    cmd: >-
      kubectl exec -n {{ _k8s_namespace }} restic-restore --
      cat /currentsnapshot/config/backup/{{ _restore_secrets_filename }} |
      kubectl apply -n {{ _k8s_namespace }} -f -
  changed_when: true
  no_log: true

# Preserve the running cluster's DB credentials over the snapshot's
# values. The strategic-merge patch updates only MYSQL_PASSWORD and
# MYSQL_ROOT_PASSWORD; everything else from the snapshot's Secret
# (notably no other keys exist in db-credentials by design) is
# unchanged. We re-set BOTH because the wiki user account in
# mysql.user was hashed against the current root password during
# pod init.
- name: Preserve current DB password in restored Secret
  kubernetes.core.k8s:
    state: patched
    api_version: v1
    kind: Secret
    name: "{{ instance_id }}-db-credentials"
    namespace: "{{ _k8s_namespace }}"
    definition:
      stringData:
        MYSQL_PASSWORD: "{{ _restore_current_mysql_pwd }}"
        MYSQL_ROOT_PASSWORD: "{{ _restore_current_mysql_root_pwd }}"
  when: _restore_secrets_filename != ''
        and _restore_current_mysql_pwd != ''
  no_log: true

- name: Delete restore pod
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Pod
    name: restic-restore
    namespace: "{{ _k8s_namespace }}"

# NOTE: Compose's restore.yml re-renders env.template + host vars
# here via render_compose.yml. K8s gitops uses a different layout
# (values.template.yaml + hosts/<name>/vars.yaml + rendered-values.yaml,
# none of which are produced by render_compose.yml), so invoking
# render_compose for K8s gitops crashed with "File not found:
# env.template" and aborted the restore. For K8s we skip the
# re-render entirely — k8s_sync_config below rebuilds the ConfigMaps
# from the restored .env and config files, and Argo CD reconciles
# from the gitops repo on next sync. Cross-host gitops clones that
# need a fresh render should run `canasta gitops pull` or its K8s
# equivalent after restore.
- name: Sync config to ConfigMaps
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/k8s_sync_config.yml
