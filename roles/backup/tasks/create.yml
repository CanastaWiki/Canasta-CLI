---
# Backup create - matching Go's full staging flow.
# Dumps DBs to config/backup/, backs up config + extensions + images + skins + public_assets + .env + my.cnf

- name: Resolve instance
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/resolve_instance.yml"

- name: Get wiki list for DB dumps
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _backup_wikis

- name: Read DB password
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  register: _backup_dbpass
  no_log: true

- name: Create backup staging directory
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "mkdir -p /mediawiki/config/backup"

- name: Dump each wiki database
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: db
    exec_command: >-
      mariadb-dump -h db -u root -p{{ _backup_dbpass.value | quote }}
      --single-transaction --databases {{ item | quote }}
      > /mediawiki/config/backup/{{ item | quote }}.sql
  loop: "{{ _backup_wikis.wiki_ids }}"
  no_log: true

- name: Get hostname for tag
  ansible.builtin.command:
    cmd: hostname
  register: _hostname
  changed_when: false

- name: Build tag with hostname
  ansible.builtin.set_fact:
    _backup_tag: "{{ tag }}__on__{{ _hostname.stdout | trim }}"

- name: Create backup snapshot
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: "{{ canasta_backup_service }}"
    exec_command: >-
      restic backup --tag {{ _backup_tag | quote }}
      /mediawiki/config
      /mediawiki/extensions
      /mediawiki/images
      /mediawiki/skins
      /mediawiki/public_assets

- name: Display result
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout }}"

- name: Clean up backup staging directory
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: exec.yml
  vars:
    exec_service: web
    exec_command: "rm -rf /mediawiki/config/backup"
