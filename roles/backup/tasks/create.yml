---
# Backup create - matching Go CLI's full staging flow.
# 1. Dump DBs via docker compose exec
# 2. Stage host dirs into backup volume via alpine
# 3. Run restic/restic container to create snapshot

- name: Resolve instance
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/common/tasks/resolve_instance.yml

- name: Get wiki list for DB dumps
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _backup_wikis

- name: Read DB password
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: MYSQL_PASSWORD
  register: _backup_dbpass
  no_log: true

# Compose path: dump DBs into the live web container's
# /mediawiki/config/backup, which is bind-mounted from the host's
# instance_path/config — restic's container then mounts the same host
# path and the dumps appear in the snapshot.
#
# K8s path: SKIP this — it would write into the live web pod's
# emptyDir, which the separately-spawned restic Job has no access to
# (the Job mounts the web-config ConfigMap, not the live pod's
# emptyDir). Pre-#513, this dance ran on K8s anyway and the dumps
# silently vanished from on-demand snapshots, leaving wiki content
# unprotected. The K8s path now does the dump as an init container
# inside the restic Job itself — see k8s_run_backup.yml's
# _backup_init_containers.
- name: Create backup staging directory (Compose)
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
  vars:
    exec_service: web
    exec_command: "mkdir -p /mediawiki/config/backup"
  when: instance_orchestrator | default('compose') == 'compose'

- name: Dump each wiki database (Compose)
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
  vars:
    exec_service: web
    exec_no_log: true
    exec_command: >-
      mariadb-dump -h "${MYSQL_HOST:-db}" -u "${MYSQL_USER:-root}"
      -p{{ _backup_dbpass.value | quote }}
      --single-transaction
      --databases {{ item | quote }}
      > /mediawiki/config/backup/db_{{ item | quote }}.sql
  loop: "{{ _backup_wikis.wiki_ids }}"
  no_log: true
  when: instance_orchestrator | default('compose') == 'compose'

- name: Get hostname for tag
  ansible.builtin.command:
    cmd: hostname
  register: _hostname
  changed_when: false

- name: Build tag with hostname
  ansible.builtin.set_fact:
    _backup_tag: >-
      {{ tag }}__on__{{ _hostname.stdout | trim }}

- name: Build volume map for staging
  ansible.builtin.set_fact:
    _backup_volumes: >-
      {{ {
        instance_path + '/config': '/currentsnapshot/config',
        instance_path + '/extensions': '/currentsnapshot/extensions',
        instance_path + '/images': '/currentsnapshot/images',
        instance_path + '/skins': '/currentsnapshot/skins',
        instance_path + '/public_assets': '/currentsnapshot/public_assets',
        instance_path + '/.env': '/currentsnapshot/.env'
      } }}

- name: Check for optional files
  ansible.builtin.stat:
    path: "{{ instance_path }}/{{ item }}"
  register: _opt_files
  loop:
    - docker-compose.override.yml
    - my.cnf

- name: Add optional files to staging
  ansible.builtin.set_fact:
    _backup_volumes: >-
      {{ _backup_volumes | combine(
         {instance_path + '/' + item.item:
          '/currentsnapshot/' + item.item}) }}
  loop: "{{ _opt_files.results }}"
  when: item.stat.exists
  loop_control:
    label: "{{ item.item }}"

- name: Create backup snapshot
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/run_backup.yml
  vars:
    backup_args:
      - "--tag"
      - "{{ _backup_tag }}"
      - "backup"
      - "/currentsnapshot"
    backup_volumes: "{{ _backup_volumes }}"

- name: Display result
  ansible.builtin.debug:
    msg: "{{ _restic_result.stdout }}"

# Compose-only cleanup. The K8s path's dump-databases init container
# uses an emptyDir that's torn down with the Job — no cleanup needed.
- name: Clean up backup staging directory (Compose)
  ansible.builtin.include_tasks: >-
    {{ canasta_root }}/roles/orchestrator/tasks/exec.yml
  vars:
    exec_service: web
    exec_command: "rm -rf /mediawiki/config/backup"
  when: instance_orchestrator | default('compose') == 'compose'
  ignore_errors: true  # OK if backup dir doesn't exist
