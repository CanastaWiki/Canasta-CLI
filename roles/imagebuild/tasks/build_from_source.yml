---
# Build Canasta image from local source.
#
# Input:
#   build_from (path to workspace containing Canasta/ and optionally CanastaBase/)
#   build_arg  (optional list of "KEY=VALUE" strings forwarded to the builds)
# Output fact: _built_image (str: "canasta:local")

- name: Verify Canasta source exists
  ansible.builtin.stat:
    path: "{{ build_from }}/Canasta/Dockerfile"
  register: _canasta_dockerfile

- name: Fail if Canasta source not found
  ansible.builtin.fail:
    msg: "Canasta Dockerfile not found at {{ build_from }}/Canasta/Dockerfile"
  when: not _canasta_dockerfile.stat.exists

- name: Validate build-arg format (KEY=VALUE)
  ansible.builtin.fail:
    msg: "Invalid --build-arg '{{ item }}': expected KEY=VALUE"
  loop: "{{ build_arg | default([]) }}"
  when: "'=' not in item"

# Render the user's build args as "--build-arg KEY=VALUE ..." tokens. They
# are appended after any built-in --build-arg, so a user-supplied BASE_IMAGE
# wins (docker uses the last value for a repeated build-arg key).
- name: Assemble build-arg flags
  ansible.builtin.set_fact:
    _build_arg_flags: >-
      {{ build_arg | default([])
         | map('regex_replace', '^(.+)$', '--build-arg \1')
         | join(' ') }}

- name: Check for CanastaBase source
  ansible.builtin.stat:
    path: "{{ build_from }}/CanastaBase/Dockerfile"
  register: _base_dockerfile

- name: Build CanastaBase locally
  when: _base_dockerfile.stat.exists
  block:
    - name: Build CanastaBase image
      ansible.builtin.command:
        cmd: "docker build {{ _build_arg_flags }} -t canasta-base:local ."
        chdir: "{{ build_from }}/CanastaBase"
      changed_when: true

    - name: Set base image to local build
      ansible.builtin.set_fact:
        _base_image_arg: "canasta-base:local"

- name: Use published base image
  ansible.builtin.set_fact:
    _base_image_arg: "ghcr.io/canastawiki/canasta-base:latest"
  when: not _base_dockerfile.stat.exists

# The effective base is the last BASE_IMAGE build-arg (a user-supplied one
# wins over the built-in), else the auto-detected base. The output tag is
# fixed at canasta:local, so if the effective base resolves to canasta:local
# the overlay would build FROM its own output tag — overwriting the base and,
# on a repeat build, silently layering the overlay on top of itself. Guard it.
- name: Resolve effective BASE_IMAGE
  ansible.builtin.set_fact:
    _effective_base_image: >-
      {{ (build_arg | default([]) | select('match', '^BASE_IMAGE=')
          | map('regex_replace', '^BASE_IMAGE=', '') | list | last)
         if (build_arg | default([]) | select('match', '^BASE_IMAGE=') | list | length > 0)
         else _base_image_arg }}

- name: Fail if the base image collides with the build-from output tag
  ansible.builtin.fail:
    msg: >-
      --build-arg BASE_IMAGE=canasta:local collides with the build-from output
      tag (canasta:local): the overlay would build FROM its own output and
      overwrite it (and double-layer on a repeat build). Tag the base under a
      distinct name, e.g. `docker tag canasta:local canasta:merged`, and pass
      --build-arg BASE_IMAGE=canasta:merged.
  when: _effective_base_image == 'canasta:local'

- name: Build Canasta image from source
  ansible.builtin.command:
    cmd: "docker build --build-arg BASE_IMAGE={{ _base_image_arg }} {{ _build_arg_flags }} -t canasta:local ."
    chdir: "{{ build_from }}/Canasta"
  changed_when: true

- name: Set built image fact
  ansible.builtin.set_fact:
    _built_image: "canasta:local"
