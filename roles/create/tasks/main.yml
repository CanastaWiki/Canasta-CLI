---
# Create a new Canasta instance.
# Mirrors Go createCanasta() step by step.
#
# Input variables (from extra-vars):
#   id, wiki, path, orchestrator, domain_name, admin, password,
#   site_name, yamlfile, rootdbpass, wikidbuser, wikidbpass,
#   envfile, canasta_image, build_from, database, wiki_settings,
#   global_settings, composer, override, keep_config

# --- Step 0: Pre-flight checks ---
- name: Report connecting to host
  ansible.builtin.debug:
    msg: "Connecting to {{ ansible_host | default(inventory_hostname) }}..."
  when: ansible_host | default(inventory_hostname) != 'localhost'

# Auto-detect rootless container socket on the target before the
# first docker call fires. Only runs when the operator didn't pass
# --docker-host; the play-level env expression in canasta.yml picks
# up `_detected_docker_host` next-in-line. Probe is silent / cheap
# even when nothing rootless is installed (`stdout` ends up empty).
- name: Detect rootless container socket on target
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/detect_docker_socket.yml"
  when:
    - orchestrator | default('compose') == 'compose'
    - (docker_host | default('')) == ''

- name: Check Docker is available
  ansible.builtin.command:
    cmd: docker info
  register: _docker_check
  changed_when: false
  ignore_errors: true  # OK if Docker not installed
  when: orchestrator | default('compose') == 'compose'

- name: Fail if Docker not available
  ansible.builtin.fail:
    msg: >-
      Docker is not available on this host.
      Run 'canasta doctor' to check all dependencies.
  when:
    - orchestrator | default('compose') == 'compose'
    - _docker_check.rc | default(0) != 0

# Compose-only host memory preflight. The K8s path has its own
# per-node memory check in k8s_preflight.yml — running this on a K8s
# create would measure the controller host, not the cluster nodes,
# which is the wrong thing.
#
# Threshold is 3500 MiB rather than a round 4096 MiB because cloud
# instances marketed as "4 GiB" actually expose ~3700-3900 MiB to the
# kernel after BIOS/UEFI/hypervisor reserves. AWS c7i-flex.large
# (4 GiB advertised) reports ~3826 MiB MemTotal, for example. The
# 3500 MiB floor is comfortably above what 2 GiB instances report
# (~1700-1900 MiB) and below what real 4 GiB cloud instances report.
- name: Check target host total memory (minimum 3500 MiB) — Compose only
  ansible.builtin.command:
    cmd: >-
      python3 -c "import os;
      mem_mib = os.sysconf('SC_PAGE_SIZE')
      * os.sysconf('SC_PHYS_PAGES') // (1024**2);
      exit(0 if mem_mib >= 3500 else 1)"
  register: _mem_check
  changed_when: false
  ignore_errors: true  # OK if memory check unavailable
  when: orchestrator | default('compose') == 'compose'

- name: Fail if target host has less than 3500 MiB total memory
  ansible.builtin.fail:
    msg: >-
      Canasta requires at least 3500 MiB of total memory on the target
      host (in practice, a 4 GiB instance class or larger — cloud
      instances marketed as 4 GiB report ~3700-3900 MiB after kernel
      and firmware reserves). The host has less than that.
  when:
    - orchestrator | default('compose') == 'compose'
    - _mem_check.rc | default(0) != 0

# --- Step 1: Validate inputs ---
# Run input validation BEFORE the K8s preflight + Argo CD install
# below. A bad --id, an instance ID that already exists, or any other
# user-input error caught here saves a network round-trip to the
# cluster (and on a fresh cluster, several minutes of Argo CD
# install) that would otherwise happen before the input was checked.
- name: Report validating inputs
  ansible.builtin.debug:
    msg: "Validating inputs..."

- name: Validate instance ID
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/validate_instance_id.yml"

- name: Check instance does not already exist
  canasta_registry:
    id: "{{ id }}"
    state: query
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _existing
  ignore_errors: true  # OK if instance doesn't exist yet

- name: Fail if instance already exists
  ansible.builtin.fail:
    msg: >-
      Instance '{{ id }}' already exists in the registry
      (path: {{ _existing.instance.path }},
      host: {{ _existing.instance.host | default('localhost') }}).
      Run 'canasta delete --id {{ id }}' to remove it first.
  when: _existing is succeeded

# --- Stale-state check (issue #391) ---
# Even when the registry has no entry for this instance, a prior
# 'canasta create' that failed mid-flight may have left orchestrator
# state behind (Docker volumes for Compose, a namespace + PVCs for K8s).
# Re-running create would generate fresh DB passwords that do not match
# the existing volume contents, producing an unrecoverable auth mismatch.
# Refuse upfront with a clear recovery hint.
- name: Check for stale Compose volumes from prior failed create
  when: (orchestrator | default('compose')) == 'compose'
  block:
    - name: Probe for existing docker volumes
      ansible.builtin.command:
        argv:
          - docker
          - volume
          - ls
          - --filter
          - "name={{ id }}_"
          - "-q"
      register: _stale_volumes
      changed_when: false
      failed_when: false

    - name: Fail if stale Compose volumes exist
      ansible.builtin.fail:
        msg: >-
          Docker volumes for instance '{{ id }}' already exist
          ({{ _stale_volumes.stdout_lines | join(', ') }}) but the
          instance is not in the canasta registry. This usually means
          a previous 'canasta create' failed mid-flight and left state
          behind. Re-running would generate fresh DB passwords that
          do not match the existing volumes, producing an unrecoverable
          auth mismatch. To recover, list and remove the stale volumes
          ('docker volume ls --filter name={{ id }}_' to list, then
          'docker volume rm <name>' for each), then re-run.
      when:
        - _stale_volumes.stdout is defined
        - _stale_volumes.stdout | trim | length > 0

- name: Kubernetes setup (validate + stale-state check + Argo CD)
  when: (orchestrator | default('compose')) in ['kubernetes', 'k8s']
  block:
    - name: Validate Kubernetes prerequisites
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: k8s_preflight.yml

    # Stale-state check must come AFTER preflight (which verifies
    # kubectl is reachable) and BEFORE ArgoCD bootstrap (which is
    # expensive). See block comment above for the full rationale.
    - name: Probe for existing canasta-{{ id }} namespace
      ansible.builtin.command:
        argv:
          - kubectl
          - get
          - namespace
          - "canasta-{{ id }}"
          - "-o"
          - name
      register: _stale_ns
      changed_when: false
      failed_when: false

    - name: Fail if stale K8s namespace exists
      ansible.builtin.fail:
        msg: >-
          Kubernetes namespace 'canasta-{{ id }}' already exists but
          instance '{{ id }}' is not in the canasta registry. This
          usually means a previous 'canasta create' failed mid-flight
          and left state (PVCs, Secrets, helm release) behind.
          Re-running would generate fresh DB passwords that do not
          match the existing PVCs, producing an unrecoverable auth
          mismatch. To recover, delete the stale namespace
          ('kubectl delete namespace canasta-{{ id }}' — cascades
          through the helm release, PVCs, and Secrets), then re-run.
      when: _stale_ns.rc | default(1) == 0

    - name: Install Argo CD if not skipped
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: k8s_argocd_bootstrap.yml
      when: not (skip_argocd_install | default(false) | bool)

# --- Step 2: Determine base image ---
- name: Report preparing image
  ansible.builtin.debug:
    msg: "Preparing container image..."

- name: Build from source if requested
  when: build_from is defined and build_from != ''
  ansible.builtin.include_role:
    name: imagebuild
    tasks_from: build_from_source.yml

- name: Set base image
  ansible.builtin.set_fact:
    _base_image: >-
      {{ (build_from is defined and build_from != '') | ternary(
         _built_image | default('canasta:local'),
         canasta_image | default(canasta_default_image)) }}

# --- Step 3: Set instance facts early (needed by write_stack_files and init_config) ---
- name: Report setting up instance
  ansible.builtin.debug:
    msg: "Setting up instance directory..."

- name: Resolve base path (absolute without resolving symlinks)
  ansible.builtin.command:
    cmd: "python3 -c \"import os, sys; print(os.path.abspath(sys.argv[1]))\" {{ path | default('.') | quote }}"
  register: _base_path
  changed_when: false

- name: Set instance path
  ansible.builtin.set_fact:
    instance_path: "{{ _base_path.stdout }}/{{ id }}"

- name: Set orchestrator facts early
  ansible.builtin.set_fact:
    instance_id: "{{ id }}"
    instance_orchestrator: "{{ orchestrator | default('compose') }}"
    instance_managed_cluster: false
    instance_devmode: false

- name: Create instance directory
  ansible.builtin.file:
    path: "{{ instance_path }}"
    state: directory
    mode: "0755"

# --- Step 4: Write stack files ---
- name: Write stack files
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: write_stack_files.yml

# --- Step 5: Copy instance template files (no-clobber) ---
- name: Report copying template files
  ansible.builtin.debug:
    msg: "Copying instance template files..."

- name: Copy instance template
  ansible.builtin.copy:
    src: "{{ canasta_root }}/instance_template/"
    dest: "{{ instance_path }}/"
    force: false
    mode: "0644"

- name: Report directory creation
  ansible.builtin.debug:
    msg: "Creating instance directories..."

- name: Ensure directories exist
  include_tasks: noisy_create_dir.yml
  loop:
    - { dir: extensions }
    - { dir: skins }
    - { dir: images, mode: "0775" }
    - { dir: public_assets }
    - { dir: config/settings/global }
    - { dir: config/settings/wikis }

# --- Step 6: Generate passwords ---
- name: Resolve root DB password
  ansible.builtin.include_tasks: _resolve_password.yml
  vars:
    _rp_input: "{{ rootdbpass | default('') }}"
    _rp_report_msg: "Generated root database password (will be saved to .env)"

- name: Capture root DB password
  ansible.builtin.set_fact:
    _rootdbpass: "{{ _resolved_password }}"

# Wiki DB password follows the root DB password when wikidbuser is
# 'root' (the canasta default — single account for both); only a
# distinct wikidbuser warrants a separate password.
- name: Mirror wiki DB password from root when wikidbuser is root
  ansible.builtin.set_fact:
    _wikidbpass: "{{ _rootdbpass }}"
  when: (wikidbuser | default('root')) == 'root'

- name: Resolve distinct wiki DB password (non-root wikidbuser)
  ansible.builtin.include_tasks: _resolve_password.yml
  vars:
    _rp_input: "{{ wikidbpass | default('') }}"
  when: (wikidbuser | default('root')) != 'root'

- name: Capture distinct wiki DB password
  ansible.builtin.set_fact:
    _wikidbpass: "{{ _resolved_password }}"
  when: (wikidbuser | default('root')) != 'root'

- name: Resolve admin password
  ansible.builtin.include_tasks: _resolve_password.yml
  vars:
    _rp_input: "{{ password | default('') }}"
    _rp_report_msg: "Generated admin password."

- name: Capture admin password
  ansible.builtin.set_fact:
    _admin_password: "{{ _resolved_password }}"

# --- Step 7: Merge custom env file (before wikis.yaml, port may affect domain) ---
- name: Merge custom env file if provided
  when: envfile is defined and envfile != ''
  block:
    - name: Read custom env file
      ansible.builtin.slurp:
        src: "{{ envfile }}"
      register: _custom_env

    - name: Parse and apply custom env variables
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: set
        key: "{{ item.split('=', 1)[0] }}"
        value: "{{ item.split('=', 1)[1] }}"
      loop: "{{ (_custom_env.content | b64decode).split('\n') | select('match', '^[A-Z].*=') | list }}"

# For external DB, use the password from the env file instead of the
# generated one. The env file was merged above and may contain
# MYSQL_PASSWORD from the user's -e file.
- name: Check if using external DB
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: USE_EXTERNAL_DB
  register: _ext_db_early_check

- name: Use external DB password from env file
  when: _ext_db_early_check.found and _ext_db_early_check.value | lower == 'true'
  block:
    - name: Read MYSQL_PASSWORD from env file
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: MYSQL_PASSWORD
      register: _ext_db_password

    - name: Override root DB password with external DB password
      ansible.builtin.set_fact:
        _rootdbpass: "{{ _ext_db_password.value }}"
        _wikidbpass: "{{ _ext_db_password.value }}"
      when: _ext_db_password.found
      no_log: true

- name: Read HTTPS_PORT and CADDY_AUTO_HTTPS from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _env_for_port

- name: Determine which port (if any) to append to the domain
  ansible.builtin.set_fact:
    _http_only: "{{ _env_for_port.variables.CADDY_AUTO_HTTPS | default('on') | lower == 'off' }}"
    _https_port: "{{ _env_for_port.variables.HTTPS_PORT | default('443') }}"
    _http_port: "{{ _env_for_port.variables.HTTP_PORT | default('80') }}"

- name: Build domain with port
  # When CADDY_AUTO_HTTPS=off, append HTTP_PORT (if non-standard).
  # Otherwise, append HTTPS_PORT (if non-standard).
  ansible.builtin.set_fact:
    _domain_with_port: >-
      {{ domain_name | default('localhost') }}{{
        _http_only
        | ternary(
            (_http_port not in ['80', '']) | ternary(':' ~ _http_port, ''),
            (_https_port not in ['443', '']) | ternary(':' ~ _https_port, '')
          ) }}

# --- Step 8: Create wikis.yaml ---
- name: Copy user-provided wikis.yaml
  ansible.builtin.copy:
    src: "{{ yamlfile }}"
    dest: "{{ instance_path }}/config/wikis.yaml"
    mode: "0644"
  when: yamlfile is defined and yamlfile != ''

- name: Generate wikis.yaml
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: generate
    wiki_id: "{{ wiki }}"
    domain: "{{ _domain_with_port }}"
    site_name: "{{ site_name | default('') }}"
  when: yamlfile is not defined or yamlfile == ''

- name: Report wikis.yaml written
  ansible.builtin.debug:
    msg: "Successfully written to wikis.yaml"

# --- Step 9: Update .env file ---
- name: Report updating env
  ansible.builtin.debug:
    msg: "Updating .env configuration"

- name: Validate passwords for problematic characters
  ansible.builtin.include_tasks: "{{ canasta_root }}/roles/common/tasks/validate_passwords.yml"
  vars:
    _password_vars:
      - { key: "MYSQL_PASSWORD", value: "{{ _rootdbpass }}" }
      - { key: "WIKI_DB_PASSWORD", value: "{{ _wikidbpass }}" }

- name: Read wikis.yaml for domain
  canasta_wikis_yaml:
    instance_path: "{{ instance_path }}"
    state: read
  register: _created_wikis

- name: Get domain from first wiki
  ansible.builtin.set_fact:
    _wiki_domain: "{{ _created_wikis.wikis[0].url | regex_replace('/.*$', '') }}"

- name: Set core .env variables
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: set
    key: "{{ item.key }}"
    value: "{{ item.value }}"
  loop:
    - { key: "MW_SITE_SERVER", value: "https://{{ _wiki_domain }}" }
    - { key: "MW_SITE_FQDN", value: "{{ _wiki_domain }}" }
    - { key: "MYSQL_PASSWORD", value: "{{ _rootdbpass }}" }
    - { key: "CANASTA_IMAGE", value: "{{ _base_image }}" }
  no_log: true

- name: Set WIKI_DB_PASSWORD for non-root user
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: set
    key: WIKI_DB_PASSWORD
    value: "{{ _wikidbpass }}"
  when: (wikidbuser | default('root')) != 'root'
  no_log: true

# --- External database setup ---
# If USE_EXTERNAL_DB=true was set (via -e envfile), validate that
# MYSQL_HOST is also present, and configure COMPOSE_PROFILES to skip
# the bundled db container.
- name: Check for external database configuration
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read
    key: USE_EXTERNAL_DB
  register: _ext_db_check

- name: Validate external DB config
  when: _ext_db_check.found and _ext_db_check.value | lower == 'true'
  block:
    - name: Check MYSQL_HOST is set
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read
        key: MYSQL_HOST
      register: _ext_db_host

    - name: Fail if MYSQL_HOST not set for external DB
      ansible.builtin.fail:
        msg: >-
          USE_EXTERNAL_DB=true but MYSQL_HOST is not set. Include
          MYSQL_HOST in your env file (-e) to specify the external
          database server.
      when: not _ext_db_host.found or _ext_db_host.value == ''

- name: Set COMPOSE_PROFILES for database mode
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: set
    key: COMPOSE_PROFILES
    value: >-
      {{ (_ext_db_check.found and _ext_db_check.value | lower == 'true')
         | ternary('', 'internal-db') }}

# Generate a placeholder MW_SECRET_KEY so docker compose variable substitution
# doesn't warn about it being empty during the first 'docker compose up'.
# install.php later replaces this with the key from LocalSettings.php,
# or the import-database path regenerates it.
- name: Generate initial MW_SECRET_KEY
  ansible.builtin.include_role:
    name: mediawiki
    tasks_from: generate_secret_key.yml

# --- Step 9: Copy optional settings files ---
- name: Report copying settings files
  ansible.builtin.debug:
    msg: "Copying per-wiki settings directory"

- name: Create per-wiki settings directory
  ansible.builtin.file:
    path: "{{ instance_path }}/config/settings/wikis/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ _created_wikis.wiki_ids }}"

- name: Report copying per-wiki Settings.php
  when: wiki_settings is defined and wiki_settings != ''
  ansible.builtin.debug:
    msg: "Copying per-wiki Settings.php"

- name: Copy per-wiki Settings.php if provided
  when: wiki_settings is defined and wiki_settings != ''
  ansible.builtin.copy:
    src: "{{ wiki_settings }}"
    dest: "{{ instance_path }}/config/settings/wikis/{{ wiki }}/Settings.php"
    mode: "0644"

- name: Report copying global settings
  when: global_settings is defined and global_settings != ''
  ansible.builtin.debug:
    msg: "Copying global settings"

- name: Copy global settings if provided
  when: global_settings is defined and global_settings != ''
  ansible.builtin.copy:
    src: "{{ global_settings }}"
    dest: "{{ instance_path }}/config/settings/global/{{ global_settings | basename }}"
    mode: "0644"

- name: Report copying composer.local.json
  when: composer is defined and composer != ''
  ansible.builtin.debug:
    msg: "Copying composer.local.json"

- name: Copy composer.local.json if provided
  when: composer is defined and composer != ''
  ansible.builtin.copy:
    src: "{{ composer }}"
    dest: "{{ instance_path }}/config/composer.local.json"
    mode: "0644"

# --- Step 9b: Disable auto-HTTPS when requested or when on K8s ---
# K8s always disables Caddy auto-HTTPS because TLS is handled by the
# ingress controller (Traefik) + cert-manager, not Caddy.
- name: Set CADDY_AUTO_HTTPS=off
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: set
    key: CADDY_AUTO_HTTPS
    value: "off"
  when: >-
    (orchestrator | default('compose')) in ['kubernetes', 'k8s']
    or (skip_tls | default(false) | bool)

# Persist --staging-certs as CANASTA_STAGING_CERTS so all TLS-
# provisioning paths (Caddy ACME CA for Compose, cert-manager issuer
# for K8s, config-set cascade) can honor it consistently.
- name: Set CANASTA_STAGING_CERTS
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: set
    key: CANASTA_STAGING_CERTS
    value: "{{ (staging_certs | default(false) | bool) | string | lower }}"

# --- Step 10: Initialize orchestrator config ---
- name: Initialize orchestrator configuration
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: init_config.yml

- name: Copy docker-compose.override.yml if provided
  ansible.builtin.copy:
    src: "{{ override }}"
    dest: "{{ instance_path }}/docker-compose.override.yml"
    mode: "0644"
  when: override is defined and override != ''

# --- Step 10b: Kubernetes instance setup ---
- name: Kubernetes instance setup
  when: (orchestrator | default('compose')) in ['kubernetes', 'k8s']
  block:
    - name: Install cert-manager and Let's Encrypt issuer
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: k8s_certmanager.yml
      when:
        - domain_name | default('localhost') != 'localhost'
        - not (skip_tls | default(false) | bool)

    - name: Read default storage class from registry
      canasta_registry:
        state: get_setting
        setting_key: defaultStorageClass
      delegate_to: localhost
      vars:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      register: _default_sc
      when: storage_class is not defined or storage_class == ''

    - name: Apply default storage class
      ansible.builtin.set_fact:
        storage_class: "{{ _default_sc.value }}"
      when:
        - storage_class is not defined or storage_class == ''
        - _default_sc.value is defined
        - _default_sc.value is not none
        - _default_sc.value | length > 0

    # Read external-DB configuration from .env so the values.yaml
    # template can switch db.enabled and populate externalDatabase.
    # When USE_EXTERNAL_DB=true, the user's envfile has supplied
    # MYSQL_HOST/PORT/USER/SSL; we surface those as Ansible vars.
    - name: Read external DB config from .env
      canasta_env:
        path: "{{ instance_path }}/.env"
        state: read_all
      register: _k8s_env_for_values

    - name: Set external DB facts for values.yaml template
      ansible.builtin.set_fact:
        _use_external_db: >-
          {{ (_k8s_env_for_values.variables.USE_EXTERNAL_DB | default('false') | lower) == 'true' }}
        _external_db_host: "{{ _k8s_env_for_values.variables.MYSQL_HOST | default('') }}"
        _external_db_port: "{{ _k8s_env_for_values.variables.MYSQL_PORT | default('3306') }}"
        _external_db_user: "{{ _k8s_env_for_values.variables.MYSQL_USER | default('root') }}"
        _external_db_ssl: "{{ _k8s_env_for_values.variables.MYSQL_SSL | default('false') }}"
        _staging_certs: >-
          {{ (_k8s_env_for_values.variables.CANASTA_STAGING_CERTS | default('false') | lower) == 'true' }}

    - name: Generate instance values.yaml
      ansible.builtin.template:
        src: "{{ canasta_root }}/roles/orchestrator/templates/k8s_values.yaml.j2"
        dest: "{{ instance_path }}/values.yaml"
        mode: "0644"

    - name: Apply K8s secrets
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: k8s_apply_secrets.yml
      vars:
        _k8s_namespace: "canasta-{{ id }}"
        _mw_secret_key: "{{ lookup('password', '/dev/null length=64 chars=hexdigits') }}"

    - name: Push image to registry (if built from source)
      when: build_from is defined and build_from != ''
      block:
        - name: Tag and push image to registry
          ansible.builtin.command:
            cmd: "docker tag {{ _base_image }} {{ registry | default('localhost:5000') }}/{{ _base_image }}"
          changed_when: true

        - name: Push image
          ansible.builtin.command:
            cmd: "docker push {{ registry | default('localhost:5000') }}/{{ _base_image }}"
          changed_when: true

# --- Step 11: Start containers (without dev mode) ---
- name: Report pulling Docker images
  ansible.builtin.debug:
    msg: "Pulling Docker images (this may take a while)"

- name: Report starting
  ansible.builtin.debug:
    msg: "Creating Canasta instance '{{ id }}'..."

- name: Start containers (Compose)
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: start.yml
  when: (orchestrator | default('compose')) == 'compose'

- name: Start containers (Kubernetes)
  when: (orchestrator | default('compose')) in ['kubernetes', 'k8s']
  block:
    - name: Sync config to Kubernetes ConfigMaps
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: k8s_sync_config.yml

    - name: Install Helm release (no wait)
      ansible.builtin.include_role:
        name: orchestrator
        tasks_from: helm_deploy.yml
      vars:
        helm_wait: false
        _k8s_namespace: "canasta-{{ id }}"

    - name: Wait for web deployment readiness
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status deployment/canasta-{{ id }}-web
          -n canasta-{{ id }} --timeout=600s
      changed_when: false

# --- Step 12: Database setup ---
- name: Report waiting for database
  ansible.builtin.debug:
    msg: "Waiting for database to be ready"

- name: Wait for database
  ansible.builtin.include_role:
    name: mediawiki
    tasks_from: wait_for_db.yml

- name: Import existing database
  when: database is defined and database != ''
  block:
    - name: Report importing database
      ansible.builtin.debug:
        msg: "Importing database..."

    - name: Import database dump
      ansible.builtin.include_role:
        name: mediawiki
        tasks_from: import_database.yml
      vars:
        import_wiki_id: "{{ wiki }}"
        import_database_path: "{{ database }}"
        import_db_password: "{{ _rootdbpass }}"

    - name: Generate and save MW_SECRET_KEY
      ansible.builtin.include_role:
        name: mediawiki
        tasks_from: generate_secret_key.yml

- name: Report running installer
  ansible.builtin.debug:
    msg: "Configuring MediaWiki installation"
  when: database is not defined or database == ''

- name: Run MediaWiki installer
  when: database is not defined or database == ''
  ansible.builtin.include_role:
    name: mediawiki
    tasks_from: install.yml
  vars:
    install_wiki_ids: "{{ _created_wikis.wiki_ids }}"
    install_wikis: "{{ _created_wikis.wikis }}"
    install_admin_name: "{{ admin | default('WikiSysop') }}"
    install_admin_password: "{{ _admin_password }}"
    install_root_db_password: "{{ _rootdbpass }}"
    install_wiki_db_username: "{{ wikidbuser | default('root') }}"
    install_wiki_db_password: "{{ _wikidbpass }}"

# --- Step 13: Register instance ---
# Capture host identity BEFORE delegate_to: localhost, because
# delegation overrides ansible_host/ansible_user with the delegate's
# values (localhost), not the play target's.
- name: Build registry host string
  ansible.builtin.set_fact:
    _registry_host: "{{ (ansible_user | default('') + '@') if (ansible_user | default('')) else '' }}{{ ansible_host | default(inventory_hostname) }}"

- name: Register instance in controller config
  canasta_registry:
    id: "{{ id }}"
    path: "{{ instance_path }}"
    orchestrator: "{{ orchestrator | default('compose') }}"
    host: "{{ _registry_host }}"
    docker_host: "{{ docker_host | default(_detected_docker_host | default(''), true) | default(omit, true) }}"
    managed_cluster: false
    build_from: "{{ build_from | default(omit) }}"
    state: present
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

- name: Register instance in target host config
  canasta_registry:
    id: "{{ id }}"
    path: "{{ instance_path }}"
    orchestrator: "{{ orchestrator | default('compose') }}"
    docker_host: "{{ docker_host | default(_detected_docker_host | default(''), true) | default(omit, true) }}"
    managed_cluster: false
    build_from: "{{ build_from | default(omit) }}"
    state: present
  when: inventory_hostname != "localhost"

# --- Step 14: Restart with full config (Compose only) ---
# Kubernetes pods are already running with the correct config from PVC.
- name: Stop containers
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: stop.yml
  when: (orchestrator | default('compose')) == 'compose'

- name: Start containers with full config
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: start.yml
  when: (orchestrator | default('compose')) == 'compose'

- name: SMTP note
  ansible.builtin.debug:
    msg: >-
      Please note that mailing does not currently work on
      this wiki, because Canasta requires $wgSMTP to be set
      in order to send emails (see
      https://www.mediawiki.org/wiki/Manual:$wgSMTP).

- name: Report success
  ansible.builtin.debug:
    msg: "Done."
