---
# Pre-flight checks for `canasta create`. Runs before any state-mutating
# step. The orchestrator-specific probes are owned by the orchestrator
# role (create_preflight.yml dispatches to the Compose checks; Kubernetes
# preflight runs later in _validate_inputs.yml, coupled to the namespace
# stale-state check).

- name: Report connecting to host
  ansible.builtin.debug:
    msg: "Connecting to {{ ansible_host | default(inventory_hostname) }}..."
  when: ansible_host | default(inventory_hostname) != 'localhost'

- name: Run orchestrator pre-flight checks
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: create_preflight.yml
