---
# Kubernetes-specific instance setup. Runs only on K8s targets,
# AFTER orchestrator init_config has scaffolded the instance
# directory but BEFORE Helm deploy. Handles:
#   - cert-manager + ClusterIssuer (skipped for localhost / --skip-tls)
#   - default storage class resolution from the controller registry
#   - external-DB facts for the values.yaml template
#   - rendered values.yaml
#   - K8s Secrets (DB creds + MW_SECRET_KEY)
#   - image push to in-cluster registry (when --build-from)
#
# All tasks here are guarded at the include site (orchestrator is
# kubernetes/k8s), so no per-task `when:` is needed.

- name: Install cert-manager and Let's Encrypt issuer
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: k8s_certmanager.yml
  when:
    - domain_name | default('localhost') != 'localhost'
    - not (skip_tls | default(false) | bool)

- name: Read default storage class from registry
  canasta_registry:
    state: get_setting
    setting_key: defaultStorageClass
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  register: _default_sc
  when: storage_class is not defined or storage_class == ''

- name: Apply default storage class
  ansible.builtin.set_fact:
    storage_class: "{{ _default_sc.value }}"
  when:
    - storage_class is not defined or storage_class == ''
    - _default_sc.value is defined
    - _default_sc.value is not none
    - _default_sc.value | length > 0

# Read external-DB configuration from .env so the values.yaml
# template can switch db.enabled and populate externalDatabase.
# When USE_EXTERNAL_DB=true, the user's envfile has supplied
# MYSQL_HOST/PORT/USER/SSL; we surface those as Ansible vars.
- name: Read external DB config from .env
  canasta_env:
    path: "{{ instance_path }}/.env"
    state: read_all
  register: _k8s_env_for_values

- name: Set external DB facts for values.yaml template
  ansible.builtin.set_fact:
    _use_external_db: >-
      {{ (_k8s_env_for_values.variables.USE_EXTERNAL_DB | default('false') | lower) == 'true' }}
    _external_db_host: "{{ _k8s_env_for_values.variables.MYSQL_HOST | default('') }}"
    _external_db_port: "{{ _k8s_env_for_values.variables.MYSQL_PORT | default('3306') }}"
    _external_db_user: "{{ _k8s_env_for_values.variables.MYSQL_USER | default('root') }}"
    _external_db_ssl: "{{ _k8s_env_for_values.variables.MYSQL_SSL | default('false') }}"
    _staging_certs: >-
      {{ (_k8s_env_for_values.variables.CANASTA_STAGING_CERTS | default('false') | lower) == 'true' }}

- name: Generate instance values.yaml
  ansible.builtin.template:
    src: "{{ canasta_root }}/roles/orchestrator/templates/k8s_values.yaml.j2"
    dest: "{{ instance_path }}/values.yaml"
    mode: "0644"

- name: Apply K8s secrets
  ansible.builtin.include_role:
    name: orchestrator
    tasks_from: k8s_apply_secrets.yml
  vars:
    _k8s_namespace: "canasta-{{ id }}"
    _mw_secret_key: "{{ lookup('password', '/dev/null length=64 chars=hexdigits') }}"

- name: Push image to registry (if built from source)
  when: build_from is defined and build_from != ''
  block:
    - name: Tag and push image to registry
      ansible.builtin.command:
        cmd: "docker tag {{ _base_image }} {{ registry | default('localhost:5000') }}/{{ _base_image }}"
      changed_when: true

    - name: Push image
      ansible.builtin.command:
        cmd: "docker push {{ registry | default('localhost:5000') }}/{{ _base_image }}"
      changed_when: true
